<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - Battles</title>
<script src="common.js?v=20260710a"></script>
<script src="https://my-lotto-lab-api.onrender.com/pay/auth_gate.js"></script>
<script>
// =====================================================
// Battles - 1:1 대결 (서버DB 연동, 2026-07-10)
// ⚠️ ROUND1_TS/getLottoInfo/loadResults/raceGrade/racePrize 등은 이제 common.js가 제공합니다.
// 예전의 로컬(localStorage 전용) 재구현과, 이 페이지 전용 가짜 포인트지갑(MLL.POINTS_KEY 등)은
// 전부 삭제했습니다 — 이제 실제 로그인 계정 + 서버 포인트 시스템(/api/points)을 그대로 사용합니다.
// =====================================================
if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

var BATTLE = {};

// ── 대결 종류: 오늘은 1:1만 서버 연동. 나머지(팀전/무제한/토너먼트)는 "준비중"으로 표시만 하고 비활성화. ──
BATTLE.TYPES = {
  '1v1': { code:'1v1', nameKr:'1:1 대결', size:2, teams:false, enabled:true },
  'team':         { code:'team',         nameKr:'팀전',            size:0, teams:true, enabled:false },
  'ffa':          { code:'ffa',          nameKr:'무제한 대결',     size:0, teams:false, enabled:false },
  'tournament3':  { code:'tournament3',  nameKr:'3단계 토너먼트',  size:0, teams:false, isTournament:true, enabled:false },
  'tournament5':  { code:'tournament5',  nameKr:'5단계 토너먼트',  size:0, teams:false, isTournament:true, enabled:false },
  'tournament10': { code:'tournament10', nameKr:'10단계 토너먼트', size:0, teams:false, isTournament:true, enabled:false },
};

// ── 참가비/우승보상 — 서버 point_costs에서 조회 (admin_points.html에서 관리) ──
BATTLE._priceListCache = null;
BATTLE.getPricing = async function(){
  if (BATTLE._priceListCache) return BATTLE._priceListCache;
  try {
    var resp = await fetch(MLL.API_BASE + '/api/points/price-list');
    var data = await resp.json();
    var map = {};
    (data.items || []).forEach(function(it){ map[it.action_key] = Number(it.cost_points); });
    BATTLE._priceListCache = { entry: map['battle_1v1_entry'] || 0, reward: map['battle_1v1_reward'] || 0 };
  } catch(e) {
    console.error('[BATTLE] 가격 조회 오류:', e);
    BATTLE._priceListCache = { entry: 0, reward: 0 };
  }
  return BATTLE._priceListCache;
};

// ── 사용자 인증 (실제 로그인/비회원등록 계정 — common.js의 MLL.getAuthState 그대로 사용) ──
BATTLE.requireAuth = function(){
  var state = MLL.getAuthState();
  if (!state || !state.type) {
    if (window.MLL.requireAuth) MLL.requireAuth(function(){});
    else alert(LANG==='en' ? 'Please log in first.' : '먼저 로그인해주세요.');
    return null;
  }
  return state;
};
BATTLE._authRequest = function(state, body){
  body = body || {};
  var headers = { 'Content-Type': 'application/json' };
  if (state.type === 'member') headers['Authorization'] = 'Bearer ' + state.token;
  else { body.nickname = state.nickname; body.email = state.email; }
  return { headers: headers, body: body };
};
BATTLE._authQuery = function(state){
  return state.type === 'member' ? '' : ('?nickname='+encodeURIComponent(state.nickname)+'&email='+encodeURIComponent(state.email));
};

// 서버 공통 에러 처리(포인트 부족/인증 실패 등) — 실패 시 안내하고 false 반환
BATTLE._handleFail = async function(resp){
  var data = await resp.json().catch(function(){ return {}; });
  if (resp.status === 402) {
    var balance = (data.balance && data.balance.total) || 0;
    alert((LANG==='en'?'Not enough points.\nBalance: ':'포인트가 부족합니다.\n현재 잔액: ')+balance.toLocaleString()+(LANG==='en'?'\nShortfall: ':'\n부족한 포인트: ')+(data.shortfall||0).toLocaleString());
  } else {
    alert('⚠️ ' + (data.error || ('오류 (코드 ' + resp.status + ')')));
  }
  return false;
};

// ── 방 목록/상세 조회 (공개) ──
// 조회 요청에 "내가 누구인지"를 실어 보내는 공용 헬퍼 — 회원은 Authorization 헤더, 비회원은 쿼리파라미터.
// (이전 버전은 회원 로그인 시 이 헤더를 안 실어 보내서, 서버가 "내 참가여부"를 판별 못 하는 버그가 있었음)
BATTLE._viewerFetch = function(url){
  var state = MLL.getAuthState();
  var headers = {};
  var finalUrl = url;
  if (state && state.type === 'member') {
    headers['Authorization'] = 'Bearer ' + state.token;
  } else if (state && state.type === 'guest') {
    var sep = url.indexOf('?') >= 0 ? '&' : '?';
    finalUrl = url + sep + 'nickname=' + encodeURIComponent(state.nickname) + '&email=' + encodeURIComponent(state.email);
  }
  return fetch(finalUrl, { headers: headers });
};

BATTLE.listAvailableRooms = async function(){
  try {
    var resp = await BATTLE._viewerFetch(MLL.API_BASE + '/api/battles/rooms?status=waiting');
    var data = await resp.json();
    return data.items || [];
  } catch(e) { console.error('[BATTLE] 방목록 조회 오류:', e); return []; }
};

BATTLE.getRoom = async function(roomId){
  try {
    var resp = await BATTLE._viewerFetch(MLL.API_BASE + '/api/battles/rooms/' + roomId);
    if (!resp.ok) return null;
    var data = await resp.json();
    return data.room;
  } catch(e) { console.error('[BATTLE] 방조회 오류:', e); return null; }
};

// ── 방 생성 (개설자가 참가비를 내고 바로 첫 참가자가 됨) ──
BATTLE.createRoom = async function(opts){
  var state = BATTLE.requireAuth();
  if (!state) return { ok:false, cancelled:true };
  var req = BATTLE._authRequest(state, { name: opts.name });
  try {
    var resp = await fetch(MLL.API_BASE + '/api/battles/rooms', { method:'POST', headers:req.headers, body:JSON.stringify(req.body) });
    if (!resp.ok) { await BATTLE._handleFail(resp); return { ok:false }; }
    var data = await resp.json();
    return { ok:true, room:data.room };
  } catch(e) {
    alert((LANG==='en'?'Network error: ':'네트워크 오류: ')+e.message);
    return { ok:false };
  }
};

// ── 방 참가 (참가비 실제 차감) ──
BATTLE.joinRoom = async function(roomId){
  var state = BATTLE.requireAuth();
  if (!state) return { ok:false, cancelled:true };
  var req = BATTLE._authRequest(state, {});
  try {
    var resp = await fetch(MLL.API_BASE + '/api/battles/rooms/' + roomId + '/join', { method:'POST', headers:req.headers, body:JSON.stringify(req.body) });
    if (!resp.ok) { await BATTLE._handleFail(resp); return { ok:false }; }
    var data = await resp.json();
    return { ok:true, room:data.room };
  } catch(e) {
    alert((LANG==='en'?'Network error: ':'네트워크 오류: ')+e.message);
    return { ok:false };
  }
};

// ── 번호조합 제출 (최대 100개, 1회) ──
BATTLE.MAX_COMBOS_PER_PARTICIPANT = 100;
BATTLE.submitPicksList = async function(roomId, combosArr){
  var state = BATTLE.requireAuth();
  if (!state) return { ok:false, cancelled:true };
  var req = BATTLE._authRequest(state, { combos: combosArr });
  try {
    var resp = await fetch(MLL.API_BASE + '/api/battles/rooms/' + roomId + '/submit', { method:'POST', headers:req.headers, body:JSON.stringify(req.body) });
    if (!resp.ok) { await BATTLE._handleFail(resp); return { ok:false }; }
    var data = await resp.json();
    return { ok:true, room:data.room };
  } catch(e) {
    alert((LANG==='en'?'Network error: ':'네트워크 오류: ')+e.message);
    return { ok:false };
  }
};
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0d18; --surface:#11152a; --surface-2:#161b35;
  --border:#252b48; --border-soft:#1b2038;
  --text:#eef0f6; --text-dim:#8b91ab; --text-faint:#5a6080;
  --gold:#e0b341; --gold-dim:#8a6f2f;
  --accent:#e8732f; --accent-bg:rgba(232,115,47,.13);
  --indigo:#5b6ee8; --indigo-dim:#2a3270;
  --green:#3fb37f; --red:#d4537e; --blue:#5b9bd5;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;font-size:14px;letter-spacing:-0.01em;min-height:100vh;}
.font-num{font-variant-numeric:tabular-nums;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}

.topbar{border-bottom:1px solid var(--border-soft);}
.topbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;}
.brand-mark{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 32% 28%, #f3d785, var(--gold) 60%, var(--gold-dim));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.brand-text .t1{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
.brand-text .t2{font-size:10px;color:var(--text-faint);margin-top:1px;}

.wrap{max-width:1280px;margin:0 auto;padding:24px;}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:20px;}
.page-title{font-size:23px;font-weight:600;letter-spacing:-0.02em;}
.page-sub{font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.6;max-width:600px;}
.btn{border:none;border-radius:9px;padding:10px 16px;font-size:12.5px;font-weight:600;cursor:pointer;}
.btn-gold{background:var(--gold);color:#1a1404;}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text-dim);}
.btn-outline:hover{border-color:var(--gold-dim);color:var(--text);}

.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.type-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .15s;}
.type-card:hover{border-color:var(--accent);}
.type-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.type-card .ti{font-size:22px;margin-bottom:8px;}
.type-card .tn{font-size:14px;font-weight:700;margin-bottom:4px;}
.type-card .td{font-size:11px;color:var(--text-faint);line-height:1.5;}

.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:20px;margin-bottom:16px;}
.card h3{font-size:14px;font-weight:700;margin-bottom:12px;}

.form-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.form-row label{font-size:12px;color:var(--text-dim);font-weight:600;min-width:80px;}
.inp{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 12px;font-size:12.5px;outline:none;}

.summary-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:18px 20px;margin-bottom:20px;}
.summary-row{display:flex;gap:10px;flex-wrap:wrap;}
.summary-stat{flex:1;min-width:108px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:11px;padding:12px 14px;cursor:pointer;transition:border-color .15s,transform .15s;}
.summary-stat:hover{border-color:var(--accent);transform:translateY(-1px);}
.summary-stat.disabled{cursor:default;}
.summary-stat.disabled:hover{border-color:var(--border-soft);transform:none;}
.summary-stat .ss-num{font-size:21px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.summary-stat .ss-label{font-size:10.5px;color:var(--text-faint);margin-top:5px;font-weight:600;}
.summary-divider{width:1px;background:var(--border-soft);margin:2px 4px;flex-shrink:0;}
.summary-types{display:flex;gap:14px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);flex-wrap:wrap;}
.summary-type-pill{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-dim);}
.summary-type-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.summary-type-pill b{color:var(--text);font-variant-numeric:tabular-nums;}
.summary-empty{font-size:11.5px;color:var(--text-faint);margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);}

.result-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px;}
.result-badge.win{background:rgba(63,179,127,.18);color:var(--green,#3fb37f);}
.result-badge.lose{background:rgba(224,80,80,.15);color:#e05050;}
.result-badge.draw{background:rgba(224,179,65,.15);color:var(--gold,#e0b341);}

.all-rooms-table{width:100%;border-collapse:collapse;font-size:12px;}
.all-rooms-table th{text-align:left;padding:10px 14px;color:var(--text-faint);font-size:11px;font-weight:700;border-bottom:1px solid var(--border-soft);}
.all-rooms-table td{padding:10px 14px;border-bottom:1px solid var(--border-soft);color:var(--text-dim);}
.all-rooms-table tr{cursor:pointer;}
.all-rooms-table tr:hover td{color:var(--text);}
.all-rooms-table tr:last-child td{border-bottom:none;}

.room-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.room-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:16px;cursor:pointer;}
.room-card:hover{border-color:var(--accent);}
.room-card .rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.room-card .rc-type{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;}
.room-card .rc-name{font-size:13.5px;font-weight:700;margin-bottom:4px;}
.room-card .rc-meta{font-size:11px;color:var(--text-faint);}
.status-tag{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;}
.status-waiting{background:rgba(91,156,213,.15);color:var(--blue);}
.status-pending_numbers{background:rgba(224,179,65,.15);color:var(--gold);}
.status-active{background:rgba(63,179,127,.15);color:var(--green);}
.status-stage_running{background:rgba(232,115,47,.15);color:var(--accent);}
.status-completed{background:var(--surface-2);color:var(--text-faint);}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-faint);font-size:13px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;padding:26px;}
.modal-box h3{margin-bottom:14px;font-size:16px;}
.modal-box{position:relative;}
.modal-close-x{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.modal-close-x:hover{background:var(--red);color:#fff;border-color:var(--red);}

.ball-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-bottom:14px;}
.ball-btn{aspect-ratio:1;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.ball-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}

.participant-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface-2);border-radius:8px;margin-bottom:6px;font-size:12px;}
.participant-row.winner{border:1px solid var(--gold);background:rgba(224,179,65,.08);}
.admin-lock{display:flex;flex-direction:column;align-items:center;gap:12px;padding:30px;color:var(--text-faint);}
.admin-lock input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 14px;font-size:13px;text-align:center;}

@media (max-width:760px){ .type-grid{grid-template-columns:repeat(2,1fr);} }

/* ── 메인 허브 레이아웃: 좌(새 방 만들기) / 우(참가가능한 방) 2단 ── */
.hub-columns{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
@media (max-width:900px){ .hub-columns{grid-template-columns:1fr;} }
.hub-col-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.hub-col-title .cnt{font-size:11px;font-weight:600;color:var(--text-faint);background:var(--surface-2);border-radius:20px;padding:2px 9px;}

/* 새 방 만들기: 4개 타입 카드를 2열 그리드로 (좌측 컬럼 폭에 맞춤) */
.create-type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.create-type-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;}
.create-type-card:hover{border-color:var(--accent);}
.create-type-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.create-type-card .ti{font-size:19px;margin-bottom:6px;}
.create-type-card .tn{font-size:13px;font-weight:700;margin-bottom:3px;}
.create-type-card .td{font-size:10.5px;color:var(--text-faint);line-height:1.45;}

.tournament-stage-row{display:flex;gap:8px;margin-bottom:14px;}
.tournament-stage-btn{flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);border-radius:9px;padding:10px 8px;text-align:center;cursor:pointer;font-size:11.5px;}
.tournament-stage-btn.active{background:rgba(232,115,47,.12);border-color:var(--accent);color:var(--text);}
.tournament-stage-btn b{display:block;font-size:13px;margin-bottom:2px;}

/* 참가가능 방 목록: 종류별 탭 (토너먼트는 3/5/10단계 통합 1개 탭) */
.avail-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.avail-tab{flex:1;min-width:80px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);border-radius:9px;padding:8px 6px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;}
.avail-tab.active{background:rgba(232,115,47,.12);border-color:var(--accent);color:var(--text);}
.avail-tab .cnt{display:block;font-size:9.5px;color:var(--text-faint);margin-top:2px;}
.avail-tab.active .cnt{color:var(--accent);}
.avail-room-list{display:flex;flex-direction:column;gap:8px;}
.avail-room-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:10px;padding:11px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.avail-room-card:hover{border-color:var(--accent);}
.avail-room-card .arc-name{font-size:12.5px;font-weight:700;margin-bottom:2px;}
.avail-room-card .arc-meta{font-size:10.5px;color:var(--text-faint);}
.avail-room-card .arc-join{font-size:10.5px;font-weight:700;color:var(--accent);white-space:nowrap;flex-shrink:0;}
.avail-empty{font-size:11px;color:var(--text-faint);padding:10px 0;}

.my-progress-section{margin-top:32px;padding-top:24px;border-top:1px solid var(--border-soft);}
</style>

<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="location.href='main_page.html'">
      <div class="brand-mark">⚔️</div>
      <div class="brand-text"><div class="t1">My Lotto Lab — Battles</div><div class="t2" data-i18n-kr="전략으로 맞붙는 1:1·팀전·무제한·토너먼트 대결" data-i18n-en="Strategy showdowns — 1:1, Team, Free-for-all, Tournament battles">전략으로 맞붙는 1:1·팀전·무제한·토너먼트 대결</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="lang-toggle" style="display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <button id="langKrBtn" onclick="setLang('kr')" style="background:var(--gold);color:#1a1305;border:none;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;">KR</button>
        <button id="langEnBtn" onclick="setLang('en')" style="background:var(--surface);color:var(--text-dim);border:none;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;">EN</button>
      </div>
      <button class="btn btn-outline" onclick="location.href='main_page.html'">← <span data-i18n-kr="메인으로" data-i18n-en="Back to Main">메인으로</span></button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="page-head">
    <div>
      <div class="page-title" id="pageTitleArea">⚔️ Battles</div>
      <div class="page-sub" id="pageSubArea" data-i18n-kr="같은 회차에 번호를 미리 제출하고, 추첨 결과로 승부를 가립니다." data-i18n-en="Submit your numbers in advance for the same round, and the draw result decides the winner.">같은 회차에 번호를 미리 제출하고, 추첨 결과로 승부를 가립니다.</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" id="adminEntryBtn" onclick="BUI.openAdminView()">🔒 <span data-i18n-kr="관리자" data-i18n-en="Admin">관리자</span></button>
    </div>
  </div>

  <!-- ===== 메인 화면: 요약 + 좌(새 방 만들기) / 우(참가가능한 방) + 하단(내 진행상황) ===== -->
  <div id="viewTypeSelect">
    <div id="typeSelectBanner"></div>
    <div class="summary-card" id="battleSummary"></div>

    <div class="hub-columns">
      <div>
        <div class="hub-col-title">⚔️ 새 배틀방 만들기</div>
        <div class="create-type-grid" id="createTypeGrid"></div>
        <div id="createFormBody"></div>
      </div>
      <div>
        <div class="hub-col-title">🙋 참가가능한 방<span class="cnt" id="availRoomCount">0개</span></div>
        <div class="avail-tabs" id="availTabs"></div>
        <div id="availableRoomsBody"></div>
      </div>
    </div>

    <div class="my-progress-section">
      <div class="hub-col-title">📋 내 진행상황 <span class="cnt" id="myRoomCount">0개</span></div>
      <div id="myTimelineBody"></div>
    </div>

    <div class="my-progress-section">
      <div class="hub-col-title">📊 전체 배틀참여현황 (1:1 대결) <span class="cnt" id="allRoomCount">0개</span></div>
      <div id="allRoomsTableBody"></div>
    </div>
  </div>

  <!-- ===== 관리자 화면 ===== -->
  <div id="viewAdmin" style="display:none;">
    <button class="btn btn-outline" style="margin-bottom:16px;" onclick="BUI.backToTypeSelect()">← 메인으로</button>
    <div id="adminBody"></div>
  </div>
</div>

<div class="modal-overlay" id="roomModal" onclick="if(event.target===this)BUI.closeRoom()">
  <div class="modal-box" id="roomModalBox"></div>
</div>

<script>
// =====================================================
// BUI - 화면 컨트롤러
// =====================================================
var BUI = {};
BUI.state = { view:'typeSelect', createType:null, selectedBalls:[], multiCombos:[], currentRoomId:null };

BUI.init = function(){ BUI.showTypeSelectView(); };

// 회원(로그인) 상태는 MLL.getAuthState()가 토큰만 주고 닉네임은 안 주기 때문에,
// 화면표시용 닉네임은 서버(/api/auth/me)에서 한 번 받아와 캐시해둔다. 비회원은 이미 state.nickname이 있음.
BATTLE._myNicknameCache = null;
BATTLE.getMyNickname = async function(){
  var state = MLL.getAuthState();
  if (!state || !state.type) return null;
  if (state.type === 'guest') return state.nickname;
  if (BATTLE._myNicknameCache) return BATTLE._myNicknameCache;
  try {
    var resp = await fetch(MLL.API_BASE + '/api/auth/me', { headers: { 'Authorization': 'Bearer ' + state.token } });
    if (!resp.ok) return null;
    var data = await resp.json();
    BATTLE._myNicknameCache = data.nickname;
    return data.nickname;
  } catch(e) { console.error('[BATTLE] 내 정보 조회 오류:', e); return null; }
};

BUI.renderSummary = async function(){
  var el = document.getElementById('battleSummary');
  if (!el) return;
  var state = MLL.getAuthState();
  var nickname = (state && state.type) ? await BATTLE.getMyNickname() : null;
  el.innerHTML = '<div style="padding:14px 4px;font-size:12px;color:var(--text-dim);">' +
    (nickname ? ('👤 <b style="color:var(--text);">' + nickname + '</b>' + (LANG==='en'?' is participating':'님으로 참여 중')) : (LANG==='en' ? 'Not logged in yet. We will guide you when you create/join a room.' : '아직 로그인하지 않으셨습니다. 방 생성/참가 시 로그인을 안내해드립니다.')) +
  '</div>';
};

// 결과작업중(추첨대기 및 결과작업중)일 때 화면 상단에 띄울 공통 안내 배너
BUI.pendingBannerHtml = function(){
  var info = MLL.getLottoInfo();
  if (info.status !== 'closing') return '';
  return '<div class="card" style="background:rgba(224,179,65,.08);border-color:var(--gold-dim);font-size:12px;color:var(--text-dim);text-align:center;padding:14px;margin-bottom:16px;">' +
    '⏳ <b style="color:var(--gold);">추첨대기 및 결과작업중</b> — 제' + info.thisRound + '회 추첨 결과가 집계되는 중입니다. 결과 반영 즉시 제' + info.nextRound + '회 배틀 신청이 시작됩니다.' +
  '</div>';
};

// ── 화면 전환 ──
BUI.showView = function(view){
  BUI.state.view = view;
  document.getElementById('viewTypeSelect').style.display = (view==='typeSelect') ? '' : 'none';
  document.getElementById('viewAdmin').style.display = (view==='admin') ? '' : 'none';
};

BUI.showTypeSelectView = async function(){
  document.getElementById('pageTitleArea').textContent = '⚔️ Battles';
  document.getElementById('pageSubArea').textContent = (typeof LANG !== 'undefined' && LANG === 'en')
    ? 'Submit your numbers in advance for the same round, and the draw result decides the winner.'
    : '같은 회차에 번호를 미리 제출하고, 추첨 결과로 승부를 가립니다.';
  var bannerEl = document.getElementById('typeSelectBanner');
  if (bannerEl) bannerEl.innerHTML = BUI.pendingBannerHtml();
  BUI.renderSummary();
  BUI.renderCreateTypeGrid();
  BUI.renderCreateForm();
  BUI.showView('typeSelect');
  await Promise.all([ BUI.renderAvailableRooms(), BUI.renderMyTimeline(), BUI.renderAllRoomsTable() ]);
};

BUI.backToTypeSelect = function(){ BUI.showTypeSelectView(); };

// 참가비/보상은 포인트관리자(admin_points.html)에서, 채점은 서버가 자동으로 처리하므로
// 이 페이지에는 더 이상 별도 관리자 화면이 필요 없습니다 — 버튼은 그 화면으로 안내만 합니다.
BUI.openAdminView = function(){
  if (confirm(LANG==='en'
    ? 'Battle pricing is managed in the Points Admin screen, and grading happens automatically. Go there now?'
    : '배틀 참가비/보상은 포인트관리자 화면에서 관리하고, 채점은 서버가 자동으로 처리합니다.\\n지금 그 화면으로 이동할까요?')) {
    location.href = 'admin_points.html';
  }
};

// ── 새 방 만들기: 오늘은 1:1만 활성화, 나머지는 "준비중" ──
BUI.CREATE_CARDS = [
  { key:'1v1', icon:'⚔️', label:'1:1 대결', desc:'1:1 정면대결 — 둘 중 결과가 좋은 쪽이 승리', enabled:true },
  { key:'team', icon:'🛡️', label:'팀전', desc:'준비중입니다.', enabled:false },
  { key:'ffa', icon:'🌀', label:'무제한 대결', desc:'준비중입니다.', enabled:false },
  { key:'tournament', icon:'🏆', label:'토너먼트', desc:'준비중입니다.', enabled:false },
];
BUI.renderCreateTypeGrid = function(){
  document.getElementById('createTypeGrid').innerHTML = BUI.CREATE_CARDS.map(function(c){
    var active = c.enabled && BUI.state.createType === c.key;
    var style = c.enabled ? '' : 'opacity:.42;cursor:default;';
    var onclick = c.enabled ? ("BUI.selectCreateType('" + c.key + "')") : '';
    return '<div class="create-type-card' + (active?' active':'') + '" style="' + style + '" onclick="' + onclick + '">' +
      '<div class="ti">' + c.icon + '</div>' +
      '<div class="tn">' + c.label + (c.enabled?'':' <span style="font-size:9.5px;color:var(--text-faint);">(준비중)</span>') + '</div>' +
      '<div class="td">' + c.desc + '</div>' +
    '</div>';
  }).join('');
};
BUI.selectCreateType = function(cardKey){
  BUI.state.createType = cardKey;
  BUI.renderCreateTypeGrid();
  BUI.renderCreateForm();
};

BUI.renderCreateForm = async function(){
  var createType = BUI.state.createType;
  if (!createType) {
    document.getElementById('createFormBody').innerHTML = '<div class="card"><div class="empty-state" style="padding:18px;">위에서 대결 종류를 선택해주세요.</div></div>';
    return;
  }
  var info = MLL.getLottoInfo();
  var pricing = await BATTLE.getPricing();
  var pending = info.status === 'closing';

  var priceRewardHtml = '<div class="form-row"><label style="color:var(--text-faint);">참가비/보상</label>' +
    '<span style="font-size:12px;color:var(--gold);font-weight:700;">참가비 ' + pricing.entry.toLocaleString() + 'P (참가 1인당)</span>' +
    '<span style="font-size:12px;color:var(--green);font-weight:700;margin-left:8px;">우승 보상 ' + pricing.reward.toLocaleString() + 'P</span></div>';

  var roundFieldHtml = pending
    ? ('<div class="form-row" style="background:rgba(224,179,65,.08);border-radius:8px;padding:8px 10px;"><label>대상 회차</label><span style="font-size:12.5px;color:var(--gold);font-weight:700;">⏳ 추첨대기 및 결과작업중</span><span style="font-size:11px;color:var(--text-faint);">제' + info.thisRound + '회 결과 집계 중 — 결과 반영 즉시 제' + info.nextRound + '회로 방을 만들 수 있어요.</span></div>')
    : ('<div class="form-row"><label>대상 회차</label><span style="font-size:13px;font-weight:700;color:var(--accent);">제' + info.saleRound + '회</span> <span style="font-size:11px;color:var(--text-faint);">(현재 판매중인 회차로 자동 설정됩니다)</span></div>');

  var submitLabel = pending ? '결과 집계 완료 후 이용 가능' : '⚔️ 배틀방 만들기';

  document.getElementById('createFormBody').innerHTML =
    '<div class="card">' +
    '<div class="form-row"><label>방 이름</label><input type="text" class="inp" id="cfName" placeholder="1:1 대결 방" autocomplete="off" style="flex:1;"' + (pending?' disabled':'') + '></div>' +
    roundFieldHtml + priceRewardHtml +
    '<button class="btn btn-gold" style="width:100%;margin-top:10px;" onclick="BUI.submitCreate()"' + (pending?' disabled':'') + '>' + submitLabel + '</button>' +
    '</div>';
};

BUI.submitCreate = async function(){
  var info = MLL.getLottoInfo();
  if (info.status === 'closing') { alert('⏳ 추첨대기 및 결과작업중입니다. 결과가 반영된 뒤 다시 시도해주세요.'); return; }
  var name = document.getElementById('cfName').value.trim();
  var result = await BATTLE.createRoom({ name: name });
  if (!result.ok) return;
  BUI.state.createType = null;
  await BUI.showTypeSelectView();
  alert('✅ 방이 생성되었습니다! 참가자를 모아보세요.');
  BUI.openRoom(result.room.id);
};

// ── 방 상세 ──
BUI.openRoom = async function(roomId){
  BUI.state.currentRoomId = roomId;
  BUI.state.selectedBalls = [];
  BUI.state.multiCombos = [];
  document.getElementById('roomModal').classList.add('show');
  await BUI.renderRoomModal();
};
BUI.closeRoom = function(){
  document.getElementById('roomModal').classList.remove('show');
  BUI.renderAvailableRooms();
  BUI.renderMyTimeline();
  BUI.renderAllRoomsTable();
};

BUI.renderRoomModal = async function(){
  var room = await BATTLE.getRoom(BUI.state.currentRoomId);
  if (!room) { BUI.closeRoom(); return; }
  var box = document.getElementById('roomModalBox');
  var myParticipant = room.participants.find(function(p){ return p.isMe; });

  var header =
    '<button class="modal-close-x" onclick="BUI.closeRoom()" title="닫기">✕</button>' +
    '<div style="margin-bottom:6px;padding-right:36px;"><h3 style="margin-bottom:0;">' + room.name + '</h3></div>' +
    '<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:16px;">1:1 대결 · 제' + room.round + '회 · <span class="status-tag status-' + room.status + '">' + BUI.statusLabel(room.status) + '</span></div>';

  var bodyHtml = '';
  if (room.status === 'waiting') bodyHtml = BUI.roomWaitingHtml(room, myParticipant);
  else if (room.status === 'pending_numbers') bodyHtml = BUI.roomPendingHtml(room, myParticipant);
  else if (room.status === 'active') bodyHtml = BUI.roomActiveHtml(room);
  else if (room.status === 'completed') bodyHtml = BUI.roomCompletedHtml(room);

  box.innerHTML = header + bodyHtml;
  if (room.status === 'pending_numbers' && myParticipant && !myParticipant.submitted && document.getElementById('multiBallGrid')) {
    BUI.renderMultiBallGrid();
    BUI.renderMultiComboList();
  }
};

BUI.roomWaitingHtml = function(room, myParticipant){
  var participantsHtml = room.participants.map(function(p){
    return '<div class="participant-row"><span>' + p.nickname + (p.isMe?' (나)':'') + '</span><span style="color:var(--text-faint);">참가완료</span></div>';
  }).join('') || '<div class="empty-state">아직 참가자가 없습니다.</div>';

  var joinFormHtml = '';
  if (!myParticipant && room.participants.length < room.maxParticipants) {
    joinFormHtml = '<button class="btn btn-gold" style="width:100%;" onclick="BUI.doJoin()">참가하기</button>';
  } else if (myParticipant) {
    joinFormHtml = '<div style="font-size:12px;color:var(--green);text-align:center;padding:10px;">✅ ' + (LANG==='en' ? 'Room created! Waiting for a challenger.' : '방이 개설되었습니다. 도전자를 기다립시다.') + '</div>';
  }

  return '<div class="card"><h3>참가자 (' + room.participants.length + '/' + room.maxParticipants + ')</h3>' + participantsHtml + '</div>' +
    '<div class="card">' + joinFormHtml + '</div>';
};

BUI.doJoin = async function(){
  var result = await BATTLE.joinRoom(BUI.state.currentRoomId);
  if (!result.ok) return;
  BUI.renderRoomModal();
};

BUI.roomPendingHtml = function(room, myParticipant){
  var deadlineNotice = '<div class="card" style="background:rgba(224,179,65,.06);border-color:var(--gold-dim);font-size:11px;color:var(--text-dim);">⏰ 번호조합 등록 마감: 추첨일(토요일) 밤 20시까지. 그때까지 1개도 등록하지 않으면 자동 몰수패 처리됩니다.</div>';
  var participantsHtml = room.participants.map(function(p){
    var comboLabel = p.submitted ? (' · ' + p.comboCount + '개 조합') : '';
    return '<div class="participant-row"><span>' + p.nickname + (p.isMe?' (나)':'') + comboLabel + '</span><span style="color:' + (p.submitted?'var(--green)':'var(--text-faint)') + ';">' + (p.submitted?'제출완료':'대기중') + '</span></div>';
  }).join('');

  var submitHtml = '';
  if (myParticipant && !myParticipant.submitted) {
    submitHtml = '<div class="card">' +
      '<h3>내 번호조합 등록 (최대 ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '개)</h3>' +
      '<p style="font-size:11.5px;color:var(--text-dim);margin-bottom:12px;line-height:1.6;">여러 개의 번호조합을 등록할 수 있어요. 추첨 후 각 조합의 당첨금을 모두 더한 <b style="color:var(--gold);">합계</b>로 승부를 가립니다. (참가비는 조합 개수와 무관하게 1회만 부과됩니다)</p>' +
      '<div class="form-row"><label>자동 생성 개수</label><input type="number" class="inp" id="multiGenCount" value="10" min="1" max="' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '" style="width:80px;"> <button class="btn btn-outline" onclick="BUI.addAutoCombos()">+ 자동 추가</button></div>' +
      '<div class="form-row"><label>직접 선택</label><span style="font-size:11px;color:var(--text-faint);">아래 공에서 6개를 고르면 조합이 1개씩 추가됩니다</span></div>' +
      '<div class="ball-grid" id="multiBallGrid"></div>' +
      '<div id="multiComboList" style="margin-top:12px;"></div>' +
      '<button class="btn btn-gold" style="width:100%;margin-top:10px;" id="submitMultiPicksBtn" disabled onclick="BUI.doSubmitMultiPicks()">조합 등록 완료하기</button>' +
    '</div>';
  } else if (myParticipant && myParticipant.submitted) {
    submitHtml = '<div class="card"><div style="font-size:12px;color:var(--green);text-align:center;">✓ ' + myParticipant.comboCount + '개 조합 제출 완료<br>다른 참가자의 제출을 기다리는 중입니다.</div></div>';
  }

  return deadlineNotice + '<div class="card"><h3>참가자 (' + room.participants.length + '명)</h3>' + participantsHtml + '</div>' + submitHtml;
};

BUI.renderMultiBallGrid = function(){
  var el = document.getElementById('multiBallGrid');
  if (!el) return;
  var html = '';
  for (var n=1; n<=45; n++) {
    var on = BUI.state.selectedBalls.indexOf(n) >= 0;
    html += '<button class="ball-btn' + (on?' on':'') + '" onclick="BUI.toggleMultiBall(' + n + ')">' + n + '</button>';
  }
  el.innerHTML = html;
};
BUI.toggleMultiBall = function(n){
  var sel = BUI.state.selectedBalls;
  var idx = sel.indexOf(n);
  if (idx >= 0) { sel.splice(idx, 1); }
  else if (sel.length < 6) { sel.push(n); }
  if (sel.length === 6) {
    BUI.addCombo(sel.slice().sort(function(a,b){return a-b;}));
    BUI.state.selectedBalls = [];
  }
  BUI.renderMultiBallGrid();
};
BUI.addCombo = function(combo){
  if (BUI.state.multiCombos.length >= BATTLE.MAX_COMBOS_PER_PARTICIPANT) {
    alert('번호조합은 최대 ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '개까지만 등록할 수 있어요.');
    return;
  }
  BUI.state.multiCombos.push(combo);
  BUI.renderMultiComboList();
};
BUI.removeCombo = function(idx){
  BUI.state.multiCombos.splice(idx, 1);
  BUI.renderMultiComboList();
};
BUI.addAutoCombos = function(){
  var countInput = document.getElementById('multiGenCount');
  var count = Math.max(1, Math.min(BATTLE.MAX_COMBOS_PER_PARTICIPANT - BUI.state.multiCombos.length, parseInt(countInput.value)||1));
  if (count <= 0) { alert('이미 최대 ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '개를 등록했어요.'); return; }
  for (var i=0;i<count;i++){
    var pool = []; for (var n=1;n<=45;n++) pool.push(n);
    var picked = [];
    while (picked.length < 6) { var idx = Math.floor(Math.random()*pool.length); picked.push(pool.splice(idx,1)[0]); }
    BUI.state.multiCombos.push(picked.sort(function(a,b){return a-b;}));
  }
  BUI.renderMultiComboList();
};
BUI.renderMultiComboList = function(){
  var el = document.getElementById('multiComboList');
  if (!el) return;
  var combos = BUI.state.multiCombos;
  var listHtml = combos.map(function(c, i){
    return '<div class="participant-row"><span class="font-num">' + (i+1) + '. ' + c.join(', ') + '</span><span style="color:var(--red);cursor:pointer;" onclick="BUI.removeCombo(' + i + ')">✕ 삭제</span></div>';
  }).join('') || '<div style="font-size:11.5px;color:var(--text-faint);padding:8px 0;">아직 등록된 조합이 없습니다.</div>';
  el.innerHTML = '<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:6px;">등록된 조합: <b style="color:var(--gold);">' + combos.length + ' / ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '</b></div>' + listHtml;
  var btn = document.getElementById('submitMultiPicksBtn');
  if (btn) btn.disabled = combos.length === 0;
};
BUI.doSubmitMultiPicks = async function(){
  if (!BUI.state.multiCombos.length) { alert('번호조합을 1개 이상 등록해주세요.'); return; }
  var result = await BATTLE.submitPicksList(BUI.state.currentRoomId, BUI.state.multiCombos);
  if (!result.ok) return;
  BUI.state.multiCombos = [];
  BUI.state.selectedBalls = [];
  BUI.renderRoomModal();
};

BUI.roomActiveHtml = function(room){
  return '<div class="card"><div class="empty-state">⏳ 모든 참가자가 번호를 제출했습니다.<br>제' + room.round + '회 추첨 결과가 발표되면 자동으로 채점됩니다.</div></div>' +
    '<div class="card"><h3>참가자별 제출 조합 수</h3>' + room.participants.map(function(p){
      return '<div class="participant-row"><span>' + p.nickname + (p.isMe?' (나)':'') + '</span><span class="font-num">' + (p.comboCount||0) + '개 조합</span></div>';
    }).join('') + '</div>';
};

BUI.roomCompletedHtml = function(room){
  var r = room.result;
  var resultHtml = r ? ('<div class="card"><h3>추첨 결과</h3><div class="font-num" style="font-size:14px;">' + r.nums.join(', ') + ' <span style="color:var(--text-faint);">+ ' + r.bonus + '</span></div></div>') : '';

  var rankedHtml;
  if (room.allForfeited) {
    rankedHtml = '<div class="card" style="background:rgba(224,80,80,.08);border-color:#e05050;"><h3>⚠️ 전원 몰수패</h3><div style="font-size:12.5px;color:var(--text-dim);line-height:1.6;">등록 마감(추첨일 20시)까지 어느 쪽도 번호조합을 제출하지 않아 우승자가 없습니다. 참가비 환불이나 보상 지급도 없습니다.</div></div>';
  } else if (room.isDraw) {
    rankedHtml = '<div class="card" style="background:rgba(91,156,213,.08);border-color:var(--blue);"><h3>🤝 무승부</h3><div style="font-size:12.5px;color:var(--text-dim);line-height:1.6;">당첨금 합계와 등록건수까지 완전히 같아 우승자를 가릴 수 없었습니다.<br>참가자 전원에게 참가비의 절반이 활동포인트로 환불되었습니다.</div></div>' +
      '<div class="card"><h3>결과</h3>' + room.participants.map(function(p){
        return '<div class="participant-row"><span>' + p.nickname + (p.isMe?' (나)':'') + (p.forfeited?' (미제출)':'') + '</span><span class="font-num">누적 ' + (p.totalPrize||0).toLocaleString() + '원 · ' + (p.comboCount||0) + '개 조합</span></div>';
      }).join('') + '</div>';
  } else {
    rankedHtml = '<div class="card"><h3>🏆 결과</h3>' + room.participants.map(function(p){
      var isWinner = room.winnerIds.indexOf(p.id) >= 0;
      var forfeitTag = p.forfeited ? ' (미제출·몰수패)' : '';
      return '<div class="participant-row' + (isWinner?' winner':'') + '"><span>' + p.nickname + (p.isMe?' (나)':'') + forfeitTag + (isWinner?' 🏆':'') + '</span><span class="font-num">누적 ' + (p.totalPrize||0).toLocaleString() + '원 · ' + (p.comboCount||0) + '개 조합</span></div>';
    }).join('') + '</div>';
  }

  return resultHtml + rankedHtml;
};

BUI.statusLabel = function(s){
  return { waiting:'대기중', pending_numbers:'번호제출중', active:'추첨대기', completed:'완료' }[s] || s;
};

// ── 결과카드 뱃지: 완료된 방에서 내가 이겼는지/졌는지/무승부인지/몰수패인지 한눈에 ──
BUI.myResultBadge = function(r){
  var mine = r.participants.find(function(p){ return p.isMe; });
  if (!mine) return '';
  if (r.allForfeited) return '<span class="result-badge draw">⚠️ 전원몰수</span>';
  if (r.isDraw) return '<span class="result-badge draw">🤝 무승부</span>';
  if (mine.forfeited) return '<span class="result-badge lose">패(몰수)</span>';
  var won = r.winnerIds.indexOf(mine.id) >= 0;
  return won ? '<span class="result-badge win">🏆 승리</span>' : '<span class="result-badge lose">패배</span>';
};

// ── 참가가능한 방 (1:1만, 이미 내가 낀 방은 제외) ──
BUI.renderAvailableRooms = async function(){
  var rooms = await BATTLE.listAvailableRooms();
  // (내가 만든 방도 함께 표시합니다 — 카드에서 내 방인지 여부는 아래에서 구분)
  document.getElementById('availRoomCount').textContent = rooms.length + '개';
  if (!rooms.length) {
    document.getElementById('availableRoomsBody').innerHTML = '<div class="card"><div class="empty-state">지금 참가할 수 있는 방이 없어요.<br>왼쪽에서 새 방을 만들어보세요!</div></div>';
    return;
  }
  document.getElementById('availableRoomsBody').innerHTML = '<div class="avail-room-list">' + rooms.map(function(r){
    var isMine = r.participants.some(function(p){ return p.isMe; });
    var actionLabel = isMine ? '내 방 · 도전자 대기중' : '참가하기 →';
    return '<div class="avail-room-card" onclick="BUI.openRoom(\'' + r.id + '\')">' +
      '<div><div class="arc-name">' + r.name + (isMine ? ' <span style="color:var(--text-faint);font-weight:400;">(내가 만든 방)</span>' : '') + '</div>' +
      '<div class="arc-meta">제' + r.round + '회 · ' + r.participants.length + '/' + r.maxParticipants + '명</div></div>' +
      '<div class="arc-join"' + (isMine ? ' style="color:var(--text-faint);"' : '') + '>' + actionLabel + '</div>' +
    '</div>';
  }).join('') + '</div>';
};

// 번호제출중(pending_numbers) 방의 상태 라벨을 나/상대 제출여부에 따라 세분화
// - 둘 다 미제출: 기본 라벨("번호제출중") 유지
// - 나는 제출, 상대는 미제출: "상대번호대기"
// - 상대는 제출, 나는 미제출: "내번호대기"
BUI.detailedStatusLabel = function(r){
  if (r.status === 'waiting') {
    var mineW = r.participants.find(function(p){ return p.isMe; });
    return mineW ? '도전자 대기중' : BUI.statusLabel(r.status);
  }
  if (r.status !== 'pending_numbers') return BUI.statusLabel(r.status);
  var mine = r.participants.find(function(p){ return p.isMe; });
  if (!mine) return BUI.statusLabel(r.status); // 내가 참가한 방이 아니면 세분화 불가
  var opponent = r.participants.find(function(p){ return !p.isMe; });
  if (mine.submitted && opponent && !opponent.submitted) return LANG==='en' ? 'Waiting on opponent' : '상대번호대기';
  if (opponent && opponent.submitted && !mine.submitted) return LANG==='en' ? 'Your number needed' : '내번호대기';
  return BUI.statusLabel(r.status);
};

// ── 내 진행상황: 내가 개설했든 도전했든, 모든 상태를 한 번에 타임라인으로 ──
BUI.renderMyTimeline = async function(){
  var body = document.getElementById('myTimelineBody');
  var countEl = document.getElementById('myRoomCount');
  var state = MLL.getAuthState();
  if (!state || !state.type) {
    countEl.textContent = '0개';
    body.innerHTML = '<div class="card"><div class="empty-state">로그인하시면 내가 만들거나 참가한 배틀을 한눈에 볼 수 있어요.</div></div>';
    return;
  }
  try {
    var resp = await BATTLE._viewerFetch(MLL.API_BASE + '/api/battles/my-rooms');
    var data = await resp.json();
    var rooms = data.items || [];
    countEl.textContent = rooms.length + '개';
    if (!rooms.length) { body.innerHTML = '<div class="card"><div class="empty-state">아직 참가한 배틀이 없습니다. 방을 만들거나 참가가능한 방에 도전해보세요!</div></div>'; return; }
    body.innerHTML = '<div class="room-list">' + rooms.map(function(r){
      var badge = r.status === 'completed' ? BUI.myResultBadge(r) : '';
      return '<div class="room-card" onclick="BUI.openRoom(\'' + r.id + '\')">' +
        '<div class="rc-top"><span class="rc-type" style="background:#5b9bd522;color:#5b9bd5;">1:1 대결</span>' + badge + '<span class="status-tag status-' + r.status + '">' + BUI.detailedStatusLabel(r) + '</span></div>' +
        '<div class="rc-name">' + r.name + '</div>' +
        '<div class="rc-meta">제' + r.round + '회 · 참가자 ' + r.participants.length + '/' + r.maxParticipants + '명</div>' +
      '</div>';
    }).join('') + '</div>';
  } catch(e) { body.innerHTML = '<div class="card"><div class="empty-state">불러오지 못했습니다.</div></div>'; }
};

// ── 전체 배틀참여현황: 이 배틀종목(1:1)에서 벌어지는 모든 방(남의 것 포함)을 표로 ──
BUI.renderAllRoomsTable = async function(){
  var body = document.getElementById('allRoomsTableBody');
  var countEl = document.getElementById('allRoomCount');
  try {
    var resp = await BATTLE._viewerFetch(MLL.API_BASE + '/api/battles/rooms');
    var data = await resp.json();
    var rooms = data.items || [];
    // 아직 모집 중(대기중)이면서 내가 안 낀 방은 "참가가능한 방"에서만 보여주면 되므로 여기서는 제외
    rooms = rooms.filter(function(r){
      if (r.status !== 'waiting') return true;
      return r.participants.some(function(p){ return p.isMe; });
    });
    countEl.textContent = rooms.length + '개';
    if (!rooms.length) { body.innerHTML = '<div class="card"><div class="empty-state">아직 개설된 배틀이 없습니다.</div></div>'; return; }

    var rowsHtml = rooms.map(function(r){
      var opponentNames = r.participants.map(function(p){ return p.nickname + (p.isMe?' (나)':''); }).join(' vs ') || '-';
      return '<tr onclick="BUI.openRoom(\'' + r.id + '\')">' +
        '<td>' + r.name + '</td>' +
        '<td class="font-num">제' + r.round + '회</td>' +
        '<td>' + opponentNames + '</td>' +
        '<td class="font-num">' + r.participants.length + '/' + r.maxParticipants + '</td>' +
        '<td><span class="status-tag status-' + r.status + '">' + BUI.detailedStatusLabel(r) + '</span></td>' +
      '</tr>';
    }).join('');
    body.innerHTML = '<div class="card" style="padding:0;overflow-x:auto;"><table class="all-rooms-table">' +
      '<thead><tr><th>방 이름</th><th>회차</th><th>참가자</th><th>인원</th><th>상태</th></tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody></table></div>';
  } catch(e) { body.innerHTML = '<div class="card"><div class="empty-state">불러오지 못했습니다.</div></div>'; }
};

document.addEventListener('DOMContentLoaded', BUI.init);
document.addEventListener('keydown', function(e){
  if (e.key !== 'Escape') return;
  if (document.getElementById('roomModal').classList.contains('show')) BUI.closeRoom();
});


// =====================================================
// 다국어(i18n) - main_page.html과 동일한 'mll_lang' 키 공유
// (이 페이지는 메인 타이틀/설명문만 전환 대상 — Battles 구조개편 시 전체 재점검 예정)
// =====================================================
var LANG = localStorage.getItem('mll_lang') || 'kr';
function applyLang(){
  document.title = (LANG === 'en') ? 'My Lotto Lab - Battles' : 'My Lotto Lab - Battles';
  document.querySelectorAll('[data-i18n-kr]').forEach(function(el){
    var text = (LANG === 'en') ? el.dataset.i18nEn : el.dataset.i18nKr;
    if (text !== undefined) el.textContent = text;
  });
  var krBtn = document.getElementById('langKrBtn'), enBtn = document.getElementById('langEnBtn');
  if (krBtn) { krBtn.style.background = LANG==='kr' ? 'var(--gold)' : 'var(--surface)'; krBtn.style.color = LANG==='kr' ? '#1a1305' : 'var(--text-dim)'; }
  if (enBtn) { enBtn.style.background = LANG==='en' ? 'var(--gold)' : 'var(--surface)'; enBtn.style.color = LANG==='en' ? '#1a1305' : 'var(--text-dim)'; }
}
function setLang(lang){
  LANG = lang;
  localStorage.setItem('mll_lang', lang);
  applyLang();
  if (typeof BUI !== 'undefined' && BUI.showTypeSelectView) BUI.showTypeSelectView();
}
document.addEventListener('DOMContentLoaded', applyLang);
</script>
</body>
</html>
