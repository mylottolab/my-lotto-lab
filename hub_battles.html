<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - Battles</title>
<script>
// =====================================================
// My Lotto Lab - 공통 모듈 (다른 페이지와 동일)
// =====================================================
if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.ROUND1_TS = new Date('2002-12-07T20:00:00+09:00').getTime();
MLL.WEEK_MS   = 7 * 24 * 60 * 60 * 1000;
MLL.STORAGE_KEY  = 'mll_entries';
MLL.RESULTS_KEY  = 'mll_results';
MLL.ADMIN_PW_KEY = 'mll_admin_auth';
MLL.ADMIN_PW     = 'lotto2024!';

MLL.checkAdmin = function() { return sessionStorage.getItem(MLL.ADMIN_PW_KEY) === 'ok'; };
MLL.tryAdminLogin = function(pw) {
  if (pw === MLL.ADMIN_PW) { sessionStorage.setItem(MLL.ADMIN_PW_KEY, 'ok'); return true; }
  return false;
};
MLL.logoutAdmin = function() { sessionStorage.removeItem(MLL.ADMIN_PW_KEY); };

MLL.loadResults = function(){
  try { return JSON.parse(localStorage.getItem(MLL.RESULTS_KEY) || '{}'); } catch(e){ return {}; }
};

// ── 회차 판정: main_page.html과 동일한 규칙 ──
// "판매 중단 시간대"(토요일 20시 이후 ~ 일요일 06시 전)에는, 그 주 추첨 결과(thisRound)가 mll_results에
// 이미 들어왔는지 여부로 판매중 회차를 가른다. 결과가 들어오는 즉시(추첨 후 며칠이 걸리든) 다음 회차로 전환된다.
// 판매 중단 시간대가 아니면 항상 다음 회차가 판매중이다.
MLL.getLottoInfo = function() {
  var nowKo = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var day = nowKo.getDay(), hour = nowKo.getHours(), min = nowKo.getMinutes();
  var elapsed = Date.now() - MLL.ROUND1_TS;
  var thisRound = Math.floor(elapsed / MLL.WEEK_MS) + 1;
  var nextRound = thisRound + 1;

  // 판매 중단 시간대: 토요일 20시 이후 ~ 일요일 06시 전
  var inClosedWindow = (day===6 && (hour>20 || (hour===20 && min>=0))) || (day===0 && hour<6);

  var results = MLL.loadResults();
  var thisRoundDrawn = !!(results[thisRound] && results[thisRound].nums);

  var saleRound;
  if (!inClosedWindow) saleRound = nextRound;
  else if (!thisRoundDrawn) saleRound = thisRound; // 아직 결과 없음 -> 이번 회차가 막 마감된 상태, 다음 회차로 안 넘어감
  else saleRound = nextRound; // 결과 등록 완료 -> 즉시 다음 회차로 전환

  // "추첨대기 및 결과작업중" 표시: 판매 중단 시간대인데 아직 그 회차 결과가 안 들어온 상태
  var isPending = inClosedWindow && !thisRoundDrawn;

  return {
    thisRound: thisRound,
    nextRound: nextRound,
    saleRound: saleRound,
    isPending: isPending,
    soldOut: isPending, // 하위호환용 별칭
  };
};

// ── 채점(100전략레이스와 동일 로직 재사용) ──
MLL.raceGrade = function(myNums, winNums, bonusNum) {
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  var hasBonus = myNums.indexOf(bonusNum) >= 0;
  if (match===6) return 1;
  if (match===5 && hasBonus) return 2;
  if (match===5) return 3;
  if (match===4) return 4;
  if (match===3) return 5;
  return 0;
};
MLL.matchCount = function(myNums, winNums){
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  return match;
};
// "더 좋은 결과"일수록 작은 수가 되도록 변환 (0=낙첨은 가장 나쁨 취급 -> 99)
MLL.gradeRank = function(grade){ return grade === 0 ? 99 : grade; };

// 등급별 당첨금 (1~3등은 그 회차 실제 발표금액, 4등 5만원/5등 5천원 고정 — 100전략레이스와 동일 규칙)
MLL.racePrize = function(grade, result) {
  if (!result || grade===0) return 0;
  if (grade===1) return result.prize1 || 0;
  if (grade===2) return result.prize2 || 0;
  if (grade===3) return result.prize3 || 0;
  if (grade===4) return 50000;
  if (grade===5) return 5000;
  return 0;
};

// ── 이용포인트 (전체 사이트 공용 지갑 — toto_app.js/global_lotto.html과 동일 키를 공유) ──
MLL.POINTS_KEY = 'mll_global_points';
MLL.LEDGER_KEY = 'mll_global_points_ledger';
MLL.STARTING_POINTS = 1000;
MLL.getPoints = function(){
  try {
    var v = JSON.parse(localStorage.getItem(MLL.POINTS_KEY) || 'null');
    if (v && typeof v.balance === 'number') return v;
  } catch(e){}
  var fresh = { balance: MLL.STARTING_POINTS };
  localStorage.setItem(MLL.POINTS_KEY, JSON.stringify(fresh));
  return fresh;
};
MLL.loadLedger = function(){
  try { return JSON.parse(localStorage.getItem(MLL.LEDGER_KEY) || '[]'); } catch(e){ return []; }
};
MLL.saveLedgerEntry = function(entry){
  var ledger = MLL.loadLedger();
  ledger.push(entry);
  localStorage.setItem(MLL.LEDGER_KEY, JSON.stringify(ledger));
};
// 차감: 잔액 부족 시 false 반환(아무 변화 없음). 성공 시 true.
MLL.deductPoints = function(amount, memo){
  var pt = MLL.getPoints();
  if (pt.balance < amount) return false;
  pt.balance -= amount;
  localStorage.setItem(MLL.POINTS_KEY, JSON.stringify(pt));
  MLL.saveLedgerEntry({ type:'BATTLE_DEDUCT', amount:-amount, balanceAfter:pt.balance, memo:memo, at:Date.now() });
  return true;
};
// 적립: 보상 지급용. 항상 성공.
MLL.addPoints = function(amount, memo){
  if (amount <= 0) return;
  var pt = MLL.getPoints();
  pt.balance += amount;
  localStorage.setItem(MLL.POINTS_KEY, JSON.stringify(pt));
  MLL.saveLedgerEntry({ type:'BATTLE_REWARD', amount:amount, balanceAfter:pt.balance, memo:memo, at:Date.now() });
};

// =====================================================
// BATTLE 엔진
// =====================================================
var BATTLE = {};
BATTLE.STORAGE_KEY = 'mll_battle_rooms';

// ── 참가비 설정 (관리자가 언제든 변경 가능하도록 분리 — 코드 하드코딩 금지) ──
BATTLE.PRICING_KEY = 'mll_battle_pricing';
BATTLE.DEFAULT_PRICING = {
  '1v1': 100,
  'team': 100,
  'ffa': 100,
  'tournament3': 300,
  'tournament5': 500,
  'tournament10': 700,
};
BATTLE.loadPricing = function(){
  try {
    var saved = JSON.parse(localStorage.getItem(BATTLE.PRICING_KEY) || '{}');
    return Object.assign({}, BATTLE.DEFAULT_PRICING, saved);
  } catch(e) { return Object.assign({}, BATTLE.DEFAULT_PRICING); }
};
BATTLE.savePricing = function(pricing){
  localStorage.setItem(BATTLE.PRICING_KEY, JSON.stringify(pricing));
};
BATTLE.getPrice = function(typeKey){
  return BATTLE.loadPricing()[typeKey] || 0;
};

// ── 우승 보상 설정 (금전이 아닌 이용포인트 고정 지급, 관리자가 언제든 변경 가능) ──
// 1:1/팀전/무제한: 승자(동점이면 전원 각자 전액) 또는 이긴 팀 전원 각자 동일 지급.
// 토너먼트: 최종 우승자 1인에게만 지급.
BATTLE.REWARDS_KEY = 'mll_battle_rewards';
BATTLE.DEFAULT_REWARDS = {
  '1v1': 150,
  'team': 150,
  'ffa': 200,
  'tournament3': 1000,
  'tournament5': 2000,
  'tournament10': 5000,
};
BATTLE.loadRewards = function(){
  try {
    var saved = JSON.parse(localStorage.getItem(BATTLE.REWARDS_KEY) || '{}');
    return Object.assign({}, BATTLE.DEFAULT_REWARDS, saved);
  } catch(e) { return Object.assign({}, BATTLE.DEFAULT_REWARDS); }
};
BATTLE.saveRewards = function(rewards){
  localStorage.setItem(BATTLE.REWARDS_KEY, JSON.stringify(rewards));
};
BATTLE.getReward = function(typeKey){
  return BATTLE.loadRewards()[typeKey] || 0;
};


// ── 배틀 타입 정의 ──
// 토너먼트: 3/5/10단계. 각 단계마다 하위 N%가 당첨금 합계 순위 기준으로 탈락.
// 마지막 단계는 남은 인원 중 당첨금 합계 1위가 우승. 인원 무제한(variableSize).
// 과금은 BATTLE.PRICING 참조(관리자 설정 가능, 토너먼트는 최초 1단계 참가 시 1회만).
BATTLE.TYPES = {
  '1v1':          { code:'1v1',          nameKr:'1:1 대결',       size:2,  teams:false },
  'team':         { code:'team',         nameKr:'팀전',           size:0,  teams:true, teamCount:2, variableSize:true },
  'ffa':          { code:'ffa',          nameKr:'무제한 대결',    size:0,  teams:false, variableSize:true },
  'tournament3':  { code:'tournament3',  nameKr:'3단계 토너먼트', size:0,  teams:false, variableSize:true, isTournament:true, totalStages:3, eliminateRates:[0.30,0.30] },
  'tournament5':  { code:'tournament5',  nameKr:'5단계 토너먼트', size:0,  teams:false, variableSize:true, isTournament:true, totalStages:5, eliminateRates:[0.20,0.20,0.20,0.20] },
  'tournament10': { code:'tournament10', nameKr:'10단계 토너먼트',size:0,  teams:false, variableSize:true, isTournament:true, totalStages:10, eliminateRates:[0.10,0.10,0.10,0.10,0.10,0.10,0.10,0.10,0.10] },
};
// eliminateRates: 각 단계(결승 제외) 탈락 비율.
// 3단계: 1·2단계 각 30% 탈락 → 3단계 결승(누적 당첨금 1위 우승)
// 5단계: 1~4단계 각 20% 탈락 → 5단계 결승
// 10단계: 1~9단계 각 10% 탈락 → 10단계 결승

BATTLE.load = function(){
  try { return JSON.parse(localStorage.getItem(BATTLE.STORAGE_KEY) || '[]'); } catch(e){ return []; }
};
BATTLE.save = function(rooms){ localStorage.setItem(BATTLE.STORAGE_KEY, JSON.stringify(rooms)); };

BATTLE.createRoom = function(opts){
  var rooms = BATTLE.load();
  var type = BATTLE.TYPES[opts.type];
  var autoRound = MLL.getLottoInfo().saleRound; // 회차는 항상 현재 판매중인 회차로 자동 설정 (과거 회차로 배틀 불가)
  var room = {
    id: 'b_' + Date.now() + '_' + Math.floor(Math.random()*100000),
    type: opts.type,
    name: opts.name || (type.nameKr + ' 방'),
    round: autoRound,
    maxParticipants: opts.maxParticipants || (type.size > 0 ? type.size : 999999),
    teamCount: opts.teamCount || type.teamCount || null,
    status: 'waiting', // waiting -> pending_numbers -> (stage_running, 토너먼트만 반복) -> active -> completed
    createdAt: Date.now(),
    participants: [],
    result: null,
    winnerIds: [],
    stageLog: [], // 토너먼트: 단계별 진행 기록(당첨금 순위·탈락자). 그 외 타입은 항상 빈 배열
    // ── 토너먼트 전용 진행상태 ──
    stage: 1,                 // 현재 몇 단계인지
    stageRound: autoRound,    // 현재 단계가 어느 회차 추첨을 기다리는지
    aliveIds: [],             // 현재 단계까지 생존한 참가자 id 목록 (정원이 차면 채워짐)
    totalStages: type.totalStages || null,
    eliminateRates: type.eliminateRates || null,
  };
  rooms.unshift(room);
  BATTLE.save(rooms);
  return room;
};

BATTLE.getRoom = function(id){
  return BATTLE.load().find(function(r){ return r.id === id; });
};

BATTLE.joinRoom = function(roomId, nickname, side){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  if (room.status !== 'waiting') return { ok:false, msg:'이미 마감되었거나 진행 중인 방입니다.' };
  if (room.participants.some(function(p){ return p.nickname === nickname; })) return { ok:false, msg:'이미 참가한 닉네임입니다.' };
  if (room.participants.length >= room.maxParticipants) return { ok:false, msg:'정원이 가득 찼습니다.' };

  var typeInfo = BATTLE.TYPES[room.type];
  var price = BATTLE.getPrice(room.type);
  if (price > 0) {
    var deducted = MLL.deductPoints(price, typeInfo.nameKr + ' "' + room.name + '" 참가비');
    if (!deducted) return { ok:false, msg:'포인트가 부족합니다. (참가비 ' + price.toLocaleString() + 'P 필요)' };
  }

  room.participants.push({
    id: 'p_' + Date.now() + '_' + Math.floor(Math.random()*100000),
    nickname: nickname,
    side: side != null ? side : null,
    picks: null,
    grade: null,
    matchCount: null,
    totalPrize: 0, // 토너먼트: 각 단계별 당첨금 누적합 (우승 기준)
    submittedAt: null,
  });

  // 1:1만 정원이 차면 자동 마감. 나머지(팀전/ffa/토너먼트)는 인원무제한이라 방장이 수동 마감.
  var full = (room.type === '1v1') && (room.participants.length >= room.maxParticipants);
  if (full) room.status = 'pending_numbers';

  BATTLE.save(rooms);
  return { ok:true, room:room };
};

// 인원무제한(팀전/ffa/토너먼트) 전용: 정원을 안 채워도 방장이 직접 마감(접수 종료)할 수 있게
BATTLE.closeRegistration = function(roomId){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room || room.status !== 'waiting') return { ok:false };
  if (room.participants.length < 2) return { ok:false, msg:'최소 2명 이상 모여야 마감할 수 있습니다.' };

  var typeInfo = BATTLE.TYPES[room.type];
  if (room.type === 'team') {
    var teamCount = room.teamCount || 2;
    for (var t=0; t<teamCount; t++) {
      var cnt = room.participants.filter(function(p){ return p.side===t; }).length;
      if (cnt < 1) return { ok:false, msg:'모든 팀에 최소 1명 이상 있어야 마감할 수 있습니다.' };
    }
  }

  room.status = 'pending_numbers';
  if (typeInfo.isTournament) room.aliveIds = room.participants.map(function(p){ return p.id; });
  BATTLE.save(rooms);
  return { ok:true };
};

// 토너먼트 전용: 단계마다 1세트(6개 숫자)만 제출
BATTLE.submitPicks = function(roomId, participantId, picks){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  var p = room.participants.find(function(x){ return x.id === participantId; });
  if (!p) return { ok:false, msg:'참가자를 찾을 수 없습니다.' };
  if (p.picks) return { ok:false, msg:'이미 번호를 제출했습니다.' };

  p.picks = picks.slice().sort(function(a,b){return a-b;});
  p.submittedAt = Date.now();

  var aliveSet = room.aliveIds;
  var aliveParticipants = room.participants.filter(function(x){ return aliveSet.indexOf(x.id) >= 0; });
  var allAliveSubmitted = aliveParticipants.every(function(x){ return !!x.picks; });
  if (allAliveSubmitted) room.status = 'stage_running';

  BATTLE.save(rooms);
  return { ok:true, room:room };
};

// 1:1/팀전/무제한 전용: 참가자 1명이 번호조합 1~100개를 한 번에 제출. 참가비는 조합 개수와 무관하게 인당 1회 고정.
BATTLE.MAX_COMBOS_PER_PARTICIPANT = 100;
BATTLE.submitPicksList = function(roomId, participantId, combosArr){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  var p = room.participants.find(function(x){ return x.id === participantId; });
  if (!p) return { ok:false, msg:'참가자를 찾을 수 없습니다.' };
  if (p.picksList && p.picksList.length) return { ok:false, msg:'이미 번호를 제출했습니다.' };
  if (!combosArr || !combosArr.length) return { ok:false, msg:'번호조합을 1개 이상 등록해주세요.' };
  if (combosArr.length > BATTLE.MAX_COMBOS_PER_PARTICIPANT) return { ok:false, msg:'번호조합은 최대 ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '개까지만 등록할 수 있습니다.' };

  p.picksList = combosArr.map(function(c){ return c.slice().sort(function(a,b){return a-b;}); });
  p.submittedAt = Date.now();

  var allSubmitted = room.participants.every(function(x){ return !!(x.picksList && x.picksList.length); });
  if (allSubmitted) room.status = 'active';

  BATTLE.save(rooms);
  return { ok:true, room:room };
};

// 생존자가 "같은 번호로 다음 단계 계속하기"를 선택했을 때 - 이전 picks를 그대로 복사해 제출 처리 (토너먼트 전용)
BATTLE.keepSamePicks = function(roomId, participantId){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false };
  var p = room.participants.find(function(x){ return x.id === participantId; });
  if (!p || !p.lastPicks) return { ok:false, msg:'이전에 사용한 번호가 없습니다.' };
  return BATTLE.submitPicks(roomId, participantId, p.lastPicks);
};

// 1:1/팀전/무제한 전용 채점: picksList 전체를 채점해 당첨금 합계·등록건수를 구한다.
// 비교 규칙: ①당첨금 합계가 큰 쪽 승 ②합계 동률이면 등록건수가 적은 쪽 승(효율 우대)
//            ③합계·건수까지 완전 동일하면 무승부(0 반환)
BATTLE.gradeParticipantCombos = function(p, winNums, bonus, resultForPrize){
  var totalPrize = 0, winCount = 0, bestGrade = 0;
  p.picksList.forEach(function(nums){
    var g = MLL.raceGrade(nums, winNums, bonus);
    if (g > 0) {
      winCount++;
      if (!bestGrade || g < bestGrade) bestGrade = g;
      totalPrize += MLL.racePrize(g, resultForPrize);
    }
  });
  p.totalPrize = totalPrize;
  p.winCount = winCount;
  p.bestGrade = bestGrade;
  p.comboCount = p.picksList.length;
};

// 두 참가자를 비교 (-1: a승, 1: b승, 0: 완전동점/무승부) — 1v1/team/ffa 전용(당첨금 합계 기준)
BATTLE.compareParticipants = function(a, b){
  if (a.totalPrize !== b.totalPrize) return a.totalPrize > b.totalPrize ? -1 : 1;
  if (a.comboCount !== b.comboCount) return a.comboCount < b.comboCount ? -1 : 1; // 적은 건수가 우대
  return 0;
};


BATTLE.gradeAndFinish = function(roomId, winNums, bonus){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  if (BATTLE.TYPES[room.type].isTournament) return BATTLE.advanceTournamentStage(roomId, winNums, bonus);
  if (room.status !== 'active') return { ok:false, msg:'아직 모든 참가자가 번호를 제출하지 않았거나, 이미 종료된 방입니다.' };

  // 이 회차의 실제 1~3등 당첨금은 mll_results에서 그대로 가져온다(관리자가 별도 입력하지 않음)
  var allResults = MLL.loadResults();
  var roundResult = allResults[room.round] || {};
  var resultForPrize = { nums:winNums, bonus:bonus, prize1:roundResult.prize1, prize2:roundResult.prize2, prize3:roundResult.prize3 };

  room.participants.forEach(function(p){
    BATTLE.gradeParticipantCombos(p, winNums, bonus, resultForPrize);
  });
  room.result = { nums: winNums, bonus: bonus };

  var price = BATTLE.getPrice(room.type);
  var reward = BATTLE.getReward(room.type);
  var myNick = BUI.getMyNick();

  if (room.type === '1v1' || room.type === 'ffa') {
    var sorted = room.participants.slice().sort(BATTLE.compareParticipants);
    var best = sorted[0];
    // "완전동점(합계+건수 동일)"인 사람들만 best와 진짜 동점 — compareParticipants가 0을 반환하는 경우
    var trueTies = sorted.filter(function(p){ return BATTLE.compareParticipants(p, best) === 0; });

    if (trueTies.length > 1) {
      // 무승부: 우승자 없음. 모든 참가자에게 참가비 절반 환불.
      room.winnerIds = [];
      room.isDraw = true;
      room.participants.forEach(function(p){
        if (price > 0 && p.nickname === myNick) MLL.addPoints(Math.floor(price/2), '"' + room.name + '" 무승부 참가비 절반 환불');
      });
    } else {
      room.winnerIds = [best.id];
      room.isDraw = false;
      if (reward > 0 && best.nickname === myNick) MLL.addPoints(reward, '"' + room.name + '" 우승 보상');
    }

  } else if (room.type === 'team') {
    var teamCount = room.teamCount || 2;
    var teamTotals = {}; // { teamIdx: { totalPrize, comboCount } }
    for (var t=0; t<teamCount; t++) {
      var members = room.participants.filter(function(p){ return p.side === t; });
      teamTotals[t] = {
        totalPrize: members.reduce(function(s,p){ return s + (p.totalPrize||0); }, 0),
        comboCount: members.reduce(function(s,p){ return s + (p.comboCount||0); }, 0),
      };
    }
    var compareTeams = function(t1, t2){
      var a = teamTotals[t1], b = teamTotals[t2];
      if (a.totalPrize !== b.totalPrize) return a.totalPrize > b.totalPrize ? -1 : 1;
      if (a.comboCount !== b.comboCount) return a.comboCount < b.comboCount ? -1 : 1; // 팀 전체 등록건수 적은 쪽 우대
      return 0;
    };
    var teamOrder = Object.keys(teamTotals).sort(compareTeams);
    var tieTeams = teamOrder.filter(function(t){ return compareTeams(t, teamOrder[0]) === 0; });

    if (tieTeams.length > 1) {
      // 팀 간 완전동점: 무승부. 전원 참가비 절반 환불.
      room.winnerIds = [];
      room.winningSide = null;
      room.isDraw = true;
      room.participants.forEach(function(p){
        if (price > 0 && p.nickname === myNick) MLL.addPoints(Math.floor(price/2), '"' + room.name + '" 무승부 참가비 절반 환불');
      });
    } else {
      var winningTeam = parseInt(teamOrder[0]);
      room.winningSide = winningTeam;
      room.isDraw = false;
      var winningMembers = room.participants.filter(function(p){ return p.side === winningTeam; });
      room.winnerIds = winningMembers.map(function(p){ return p.id; });
      // 이긴 팀 전원에게 각자 동일 보상
      if (reward > 0) {
        winningMembers.forEach(function(p){
          if (p.nickname === myNick) MLL.addPoints(reward, '"' + room.name + '" 우승팀 보상');
        });
      }
    }
  }

  room.status = 'completed';
  room.completedAt = Date.now();
  BATTLE.save(rooms);
  return { ok:true, room:room };
};

BATTLE.deleteRoom = function(roomId){
  var rooms = BATTLE.load().filter(function(r){ return r.id !== roomId; });
  BATTLE.save(rooms);
};

// 토너먼트 단계 진행: 이 단계의 실제 추첨결과가 나오면, 생존자 전원의 당첨금을 누적 합산하고
// 합계 순위 기준 하위 N%(eliminateRates)가 탈락한다. 마지막 단계(totalStages)는 결승으로,
// 남은 인원 중 누적 당첨금 합계가 가장 높은 1인이 우승한다. 동률 시 먼저 등록한 참가자가 우선 생존.
BATTLE.advanceTournamentStage = function(roomId, winNums, bonus){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  if (room.status !== 'stage_running') return { ok:false, msg:'아직 이 단계의 생존자 전원이 번호를 제출하지 않았거나, 진행 단계가 아닙니다.' };

  var alive = room.participants.filter(function(p){ return room.aliveIds.indexOf(p.id) >= 0; });
  // 이 단계(회차)의 실제 1~3등 당첨금은 사이트에 이미 등록된 mll_results에서 그대로 가져온다(관리자가 별도 입력하지 않음)
  var allResults = MLL.loadResults();
  var roundResult = allResults[room.stageRound] || {};
  var resultForPrize = { nums:winNums, bonus:bonus, prize1:roundResult.prize1, prize2:roundResult.prize2, prize3:roundResult.prize3 };

  alive.forEach(function(p){
    p.grade = MLL.raceGrade(p.picks, winNums, bonus);
    p.matchCount = MLL.matchCount(p.picks, winNums);
    var prize = MLL.racePrize(p.grade, resultForPrize);
    p.totalPrize = (p.totalPrize || 0) + prize; // 단계가 진행될수록 누적
    p.lastPicks = p.picks;
  });
  room.result = { nums: winNums, bonus: bonus }; // 가장 최근 단계의 결과(화면 표시용)

  // 누적 당첨금 합계 내림차순 정렬. 동률이면 원래 등록 순서 유지(먼저 등록한 쪽 우선 생존).
  var origIndex = {};
  room.participants.forEach(function(p, i){ origIndex[p.id] = i; });
  var ranked = alive.slice().sort(function(a, b){
    if (b.totalPrize !== a.totalPrize) return b.totalPrize - a.totalPrize;
    return origIndex[a.id] - origIndex[b.id];
  });

  var isFinalStage = (room.stage >= room.totalStages);

  if (isFinalStage) {
    // 결승: 누적 당첨금 1위가 우승
    room.winnerIds = ranked.length ? [ranked[0].id] : [];
    room.status = 'completed';
    room.completedAt = Date.now();
    room.stageLog.push({ stage: room.stage, round: room.stageRound, isFinal: true, standings: ranked.map(function(p){ return {id:p.id, nickname:p.nickname, totalPrize:p.totalPrize}; }) });

    var reward = BATTLE.getReward(room.type);
    if (reward > 0 && ranked.length) {
      var champion = ranked[0];
      if (champion.nickname === BUI.getMyNick()) MLL.addPoints(reward, '"' + room.name + '" 토너먼트 우승 보상');
    }
  } else {
    // 이번 단계 탈락 비율 적용 (eliminateRates는 1단계부터 순서대로: eliminateRates[stage-1])
    var rate = room.eliminateRates[room.stage - 1] || 0;
    var eliminateCount = Math.round(ranked.length * rate);
    if (eliminateCount === 0 && ranked.length > 1) eliminateCount = 1; // 최소 1명은 탈락
    if (eliminateCount >= ranked.length) eliminateCount = ranked.length - 1; // 전원 탈락 방지

    var eliminated = ranked.slice(ranked.length - eliminateCount);
    var survivors = ranked.slice(0, ranked.length - eliminateCount);

    room.stageLog.push({
      stage: room.stage, round: room.stageRound, isFinal: false,
      eliminatedIds: eliminated.map(function(p){ return p.id; }),
      standings: ranked.map(function(p){ return {id:p.id, nickname:p.nickname, totalPrize:p.totalPrize}; })
    });

    room.aliveIds = survivors.map(function(p){ return p.id; });
    survivors.forEach(function(p){ p.picks = null; p.submittedAt = null; });
    room.stage += 1;
    room.stageRound += 1;
    room.status = 'pending_numbers';
  }

  BATTLE.save(rooms);
  return { ok:true, room:room };
};
</script>

  <div class="page-head">
    <div>
      <div class="page-title" id="pageTitleArea">⚔️ Battles</div>
      <div class="page-sub" id="pageSubArea">같은 회차에 번호를 미리 제출하고, 추첨 결과로 승부를 가립니다.</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" id="adminEntryBtn" onclick="BUI.openAdminView()">🔒 관리자</button>
    </div>
  </div>

  <!-- ===== 메인 화면: 요약 + 좌(새 방 만들기) / 우(참가가능한 방) + 하단(내 진행상황) ===== -->
  <div id="viewTypeSelect">
    <div id="typeSelectBanner"></div>
    <div class="summary-card" id="battleSummary"></div>

    <div class="hub-columns">
      <div>
        <div class="hub-col-title">⚔️ 새 배틀방 만들기</div>
        <div class="create-type-grid" id="createTypeGrid"></div>
        <div id="createFormBody"></div>
      </div>
      <div>
        <div class="hub-col-title">🙋 참가가능한 방<span class="cnt" id="availRoomCount">0개</span></div>
        <div class="avail-tabs" id="availTabs"></div>
        <div id="availableRoomsBody"></div>
      </div>
    </div>

    <div class="my-progress-section">
      <div class="hub-col-title">📋 내 진행상황</div>
      <div class="room-tabs" id="roomTabs"></div>
      <div id="roomListBody"></div>
    </div>
  </div>

  <!-- ===== 관리자 화면 ===== -->
  <div id="viewAdmin" style="display:none;">
    <button class="btn btn-outline" style="margin-bottom:16px;" onclick="BUI.backToTypeSelect()">← 메인으로</button>
    <div id="adminBody"></div>
  </div>
</div>

<div class="modal-overlay" id="roomModal" onclick="if(event.target===this)BUI.closeRoom()">
  <div class="modal-box" id="roomModalBox"></div>
</div>

<script>
// =====================================================
// BUI - 화면 컨트롤러
// =====================================================
var BUI = {};
BUI.state = { view: 'typeSelect', filterType: null, roomTab: 'waiting', createType: null, createTournamentStage: 'tournament3', availFilterType: '1v1', selectedBalls: [], multiCombos: [], currentRoomId: null, joinAsNickname: null };
BUI.MY_NICK_KEY = 'mll_battle_my_nick';

BUI.getMyNick = function(){
  var n = localStorage.getItem(BUI.MY_NICK_KEY);
  if (!n) { n = '게스트' + Math.floor(Math.random()*9000+1000); localStorage.setItem(BUI.MY_NICK_KEY, n); }
  return n;
};

BUI.init = function(){
  BUI.showTypeSelectView();
};

BUI.renderSummary = function(){
  var el = document.getElementById('battleSummary');
  if (!el) return;
  var rooms = BATTLE.load();

  if (!rooms.length) {
    el.innerHTML = '<div class="empty-state" style="padding:24px 20px;">아직 만들어진 배틀 방이 없습니다. 아래에서 대결 종류를 골라 첫 방을 만들어보세요!</div>';
    BUI.updateAdminBadge(0);
    return;
  }

  var statKeys = [
    { key:'waiting', label:'대기중' },
    { key:'pending_numbers', label:'번호제출중' },
    { key:'active', label:'추첨대기' },
    { key:'stage_running', label:'단계 추첨대기' },
    { key:'completed', label:'완료' },
  ];
  var counts = {};
  statKeys.forEach(function(s){ counts[s.key] = 0; });
  var totalParticipants = 0;
  var typeCounts = { '1v1':0, 'team':0, 'ffa':0, 'tournament3':0, 'tournament5':0, 'tournament10':0 };

  rooms.forEach(function(r){
    if (counts[r.status] != null) counts[r.status]++;
    totalParticipants += r.participants.length;
    if (typeCounts[r.type] != null) typeCounts[r.type]++;
  });

  var statsHtml = statKeys.map(function(s){
    return '<div class="summary-stat disabled">' +
      '<div class="ss-num">' + counts[s.key] + '</div>' +
      '<div class="ss-label">' + s.label + '</div>' +
    '</div>';
  }).join('');

  statsHtml += '<div class="summary-divider"></div>' +
    '<div class="summary-stat disabled">' +
      '<div class="ss-num" style="color:var(--gold);">' + rooms.length + '</div>' +
      '<div class="ss-label">전체 방</div>' +
    '</div>' +
    '<div class="summary-stat disabled">' +
      '<div class="ss-num" style="color:var(--gold);">' + totalParticipants + '</div>' +
      '<div class="ss-label">참가자 누적</div>' +
    '</div>';

  var typesHtml = Object.keys(typeCounts).map(function(key){
    var t = BATTLE.TYPES[key];
    var color = BUI.typeColor(key);
    var tabKey = t.isTournament ? 'tournament' : key;
    return '<div class="summary-type-pill" style="cursor:pointer;" onclick="BUI.setAvailFilter(\'' + tabKey + '\')" title="' + t.nameKr + ' 방 목록 보기">' +
      '<span class="dot" style="background:' + color + ';"></span>' + t.nameKr + ' <b>' + typeCounts[key] + '</b></div>';
  }).join('');

  el.innerHTML = '<div class="summary-row">' + statsHtml + '</div>' +
    '<div class="summary-types">' + typesHtml + '</div>';

  var gradeableCount = rooms.filter(function(r){ return r.status === 'active' || r.status === 'stage_running'; }).length;
  BUI.updateAdminBadge(gradeableCount);
};

BUI.updateAdminBadge = function(count){
  var btn = document.getElementById('adminEntryBtn');
  if (!btn) return;
  btn.innerHTML = '🔒 관리자' + (count > 0 ? ' <span style="background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;margin-left:4px;">' + count + '</span>' : '');
};

BUI.renderTabs = function(){
  var tabs = [
    { key:'waiting', label:'대기중' },
    { key:'pending_numbers', label:'번호제출중' },
    { key:'active', label:'추첨대기' },
    { key:'stage_running', label:'단계 추첨대기' },
    { key:'completed', label:'완료' },
  ];
  document.getElementById('roomTabs').innerHTML = tabs.map(function(t){
    return '<div class="room-tab' + (BUI.state.roomTab===t.key?' active':'') + '" onclick="BUI.setRoomTab(\'' + t.key + '\')">' + t.label + '</div>';
  }).join('');
};
BUI.setRoomTab = function(key){
  BUI.state.roomTab = key;
  BUI.renderTabs();
  BUI.renderRoomList();
};

BUI.typeColor = function(type){ return { '1v1':'#5b9bd5', 'team':'#3fb37f', 'ffa':'#e8732f', 'tournament3':'#e0b341', 'tournament5':'#d4853e', 'tournament10':'#d4537e' }[type]; };
BUI.typeIcons = { '1v1':'⚔️', 'team':'🛡️', 'ffa':'🌀', 'tournament3':'🥉', 'tournament5':'🥈', 'tournament10':'🥇' };

// 결과작업중(추첨대기 및 결과작업중)일 때 화면 상단에 띄울 공통 안내 배너
BUI.pendingBannerHtml = function(){
  var info = MLL.getLottoInfo();
  if (!info.isPending) return '';
  return '<div class="card" style="background:rgba(224,179,65,.08);border-color:var(--gold-dim);font-size:12px;color:var(--text-dim);text-align:center;padding:14px;margin-bottom:16px;">' +
    '⏳ <b style="color:var(--gold);">추첨대기 및 결과작업중</b> — 제' + info.thisRound + '회 추첨 결과가 집계되는 중입니다. 결과 반영 즉시 제' + info.nextRound + '회 배틀 신청이 시작됩니다.' +
  '</div>';
};

// ── 화면 전환: 메인(타입선택+만들기+목록 통합) / 관리자 ──
BUI.showView = function(view){
  BUI.state.view = view;
  document.getElementById('viewTypeSelect').style.display = (view==='typeSelect') ? '' : 'none';
  document.getElementById('viewAdmin').style.display = (view==='admin') ? '' : 'none';
};

BUI.showTypeSelectView = function(){
  document.getElementById('pageTitleArea').textContent = '⚔️ Battles';
  document.getElementById('pageSubArea').textContent = '같은 회차에 번호를 미리 제출하고, 추첨 결과로 승부를 가립니다.';
  var bannerEl = document.getElementById('typeSelectBanner');
  if (bannerEl) bannerEl.innerHTML = BUI.pendingBannerHtml();
  BUI.renderSummary();
  BUI.renderCreateTypeGrid();
  BUI.renderCreateForm();
  BUI.renderAvailTabs();
  BUI.renderAvailableRooms();
  BUI.renderTabs();
  BUI.renderRoomList();
  BUI.showView('typeSelect');
};

BUI.backToTypeSelect = function(){
  BUI.showTypeSelectView();
};

BUI.openAdminView = function(){
  BUI.adminLoggedIn = BUI.adminLoggedIn || MLL.checkAdmin();
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
  BUI.showView('admin');
};

// ── 오른쪽: 참가가능한 방 (탭으로 종류 구분, 토너먼트는 3종 통합 1개 탭) ──
BUI.AVAIL_TABS = [
  { key:'1v1', label:'1:1 대결', icon:'⚔️' },
  { key:'team', label:'팀전', icon:'🛡️' },
  { key:'ffa', label:'무제한', icon:'🌀' },
  { key:'tournament', label:'토너먼트', icon:'🏆' }, // tournament3/5/10 통합
];
BUI.renderAvailTabs = function(){
  var rooms = BATTLE.load();
  document.getElementById('availTabs').innerHTML = BUI.AVAIL_TABS.map(function(t){
    var matchTypes = (t.key === 'tournament') ? ['tournament3','tournament5','tournament10'] : [t.key];
    var count = rooms.filter(function(r){ return matchTypes.indexOf(r.type)>=0 && r.status==='waiting'; }).length;
    var active = BUI.state.availFilterType === t.key;
    return '<div class="avail-tab' + (active?' active':'') + '" onclick="BUI.setAvailFilter(\'' + t.key + '\')">' + t.icon + ' ' + t.label + '<span class="cnt">' + count + '개</span></div>';
  }).join('');
};
BUI.setAvailFilter = function(key){
  BUI.state.availFilterType = key;
  BUI.renderAvailTabs();
  BUI.renderAvailableRooms();
};
BUI.renderAvailableRooms = function(){
  var key = BUI.state.availFilterType;
  var matchTypes = (key === 'tournament') ? ['tournament3','tournament5','tournament10'] : [key];
  var rooms = BATTLE.load().filter(function(r){ return matchTypes.indexOf(r.type)>=0 && r.status==='waiting'; });

  document.getElementById('availRoomCount').textContent = rooms.length + '개';

  if (!rooms.length) {
    document.getElementById('availableRoomsBody').innerHTML = '<div class="card"><div class="empty-state">지금 참가할 수 있는 방이 없어요.<br>왼쪽에서 새 방을 만들어보세요!</div></div>';
    return;
  }

  document.getElementById('availableRoomsBody').innerHTML = '<div class="avail-room-list">' + rooms.map(function(r){
    var typeInfo = BATTLE.TYPES[r.type];
    var stageTag = typeInfo.isTournament ? (' · ' + typeInfo.totalStages + '단계') : '';
    var capacityText = (r.maxParticipants >= 999999) ? (r.participants.length + '명 참가중') : (r.participants.length + '/' + r.maxParticipants + '명');
    return '<div class="avail-room-card" onclick="BUI.openRoom(\'' + r.id + '\')">' +
      '<div><div class="arc-name">' + r.name + typeInfo.nameKr + stageTag + '</div>' +
      '<div class="arc-meta">제' + r.round + '회 · ' + capacityText + '</div></div>' +
      '<div class="arc-join">참가하기 →</div>' +
    '</div>';
  }).join('') + '</div>';
};

// ── 하단: 내 진행상황 (전체 타입 통합, 상태탭으로만 구분) ──
BUI.renderRoomList = function(){
  BUI.renderSummary();
  var body = document.getElementById('roomListBody');

  var rooms = BATTLE.load().filter(function(r){ return r.status === BUI.state.roomTab; });
  if (!rooms.length) { body.innerHTML = '<div class="card"><div class="empty-state">해당 상태의 방이 없습니다.</div></div>'; return; }

  body.innerHTML = '<div class="room-list">' + rooms.map(function(r){
    var typeInfo = BATTLE.TYPES[r.type];
    var color = BUI.typeColor(r.type);
    var stageInfo = typeInfo.isTournament ? (' · ' + r.stage + '/' + r.totalStages + '단계') : '';
    var capacityText = (r.maxParticipants >= 999999) ? (r.participants.length + '명 참가 (무제한)') : (r.participants.length + '/' + r.maxParticipants + '명');
    return '<div class="room-card" onclick="BUI.openRoom(\'' + r.id + '\')">' +
      '<div class="rc-top">' +
        '<span class="rc-type" style="background:' + color + '22;color:' + color + ';">' + typeInfo.nameKr + stageInfo + '</span>' +
        '<span class="status-tag status-' + r.status + '">' + BUI.statusLabel(r.status) + '</span>' +
      '</div>' +
      '<div class="rc-name">' + r.name + '</div>' +
      '<div class="rc-meta">제' + (typeInfo.isTournament?r.stageRound:r.round) + '회 · 참가자 ' + capacityText + '</div>' +
    '</div>';
  }).join('') + '</div>';
};

BUI.statusLabel = function(s){
  return { waiting:'대기중', pending_numbers:'번호제출중', active:'추첨대기', stage_running:'단계 추첨대기', completed:'완료' }[s] || s;
};

// ── 방 만들기 ──
// ── 새 배틀방 만들기: 4개 카드(1:1/팀전/무제한/토너먼트), 토너먼트는 클릭시 단계선택 추가 ──
BUI.CREATE_CARDS = [
  { key:'1v1', icon:'⚔️', label:'1:1 대결', desc:'1:1 정면대결 — 둘 중 결과가 좋은 쪽이 승리' },
  { key:'team', icon:'🛡️', label:'팀전', desc:'여러 팀으로 나뉘어, 팀 내 최고성적자끼리 비교' },
  { key:'ffa', icon:'🌀', label:'무제한 대결', desc:'여러 명이 한꺼번에, 1위가 승리' },
  { key:'tournament', icon:'🏆', label:'토너먼트', desc:'시스템이 운영하는 토너먼트입니다. 매 단계 추첨 후 하위 성적자가 탈락하며, 생존자는 번호를 그대로 쓰거나 새로 등록할 수 있어요.' },
];

BUI.renderCreateTypeGrid = function(){
  document.getElementById('createTypeGrid').innerHTML = BUI.CREATE_CARDS.map(function(c){
    var active = BUI.state.createType === c.key || (c.key==='tournament' && BUI.state.createType && BUI.state.createType.indexOf('tournament')===0);
    return '<div class="create-type-card' + (active?' active':'') + '" onclick="BUI.selectCreateType(\'' + c.key + '\')">' +
      '<div class="ti">' + c.icon + '</div>' +
      '<div class="tn">' + c.label + '</div>' +
      '<div class="td">' + c.desc + '</div>' +
    '</div>';
  }).join('');
};

BUI.selectCreateType = function(cardKey){
  if (cardKey === 'tournament') {
    BUI.state.createType = BUI.state.createTournamentStage || 'tournament3';
  } else {
    BUI.state.createType = cardKey;
  }
  BUI.renderCreateTypeGrid();
  BUI.renderCreateForm();
};

BUI.selectTournamentStage = function(stageKey){
  BUI.state.createTournamentStage = stageKey;
  BUI.state.createType = stageKey;
  BUI.renderCreateForm();
};

BUI.renderCreateForm = function(){
  var createType = BUI.state.createType;
  if (!createType) {
    document.getElementById('createFormBody').innerHTML = '<div class="card"><div class="empty-state" style="padding:18px;">위에서 대결 종류를 선택해주세요.</div></div>';
    return;
  }

  var type = BATTLE.TYPES[createType];
  var info = MLL.getLottoInfo();
  var isTournamentCard = type.isTournament;

  var stageRowHtml = '';
  if (isTournamentCard) {
    var stages = [
      { key:'tournament3', label:'3단계', sub:'30%씩 2회 탈락' },
      { key:'tournament5', label:'5단계', sub:'20%씩 4회 탈락' },
      { key:'tournament10', label:'10단계', sub:'10%씩 9회 탈락' },
    ];
    stageRowHtml = '<div class="tournament-stage-row">' + stages.map(function(s){
      var active = BUI.state.createTournamentStage === s.key;
      return '<div class="tournament-stage-btn' + (active?' active':'') + '" onclick="BUI.selectTournamentStage(\'' + s.key + '\')"><b>' + s.label + '</b>' + s.sub + '</div>';
    }).join('') + '</div>';
  }

  var sizeOptionsHtml = '';
  if (createType === 'team') {
    sizeOptionsHtml = '<div class="form-row"><label>팀 수</label><input type="number" class="inp" id="cfTeamCount" value="2" min="2" max="10" style="width:80px;"> <span style="font-size:11px;color:var(--text-faint);">팀당 인원 제한 없음 — 모집 후 방장이 마감</span></div>';
  } else {
    sizeOptionsHtml = '<div class="form-row"><label style="color:var(--text-faint);">인원</label><span style="font-size:12px;color:var(--text-dim);">제한 없음 — 모집 후 방장이 마감</span></div>';
  }

  var price = BATTLE.getPrice(createType);
  var reward = BATTLE.getReward(createType);
  var priceUnitLabel = isTournamentCard ? ' (참가 시 최초 1회만)' : ' (참가 1인당)';
  var priceRewardHtml = '<div class="form-row"><label style="color:var(--text-faint);">참가비/보상</label>' +
    '<span style="font-size:12px;color:var(--gold);font-weight:700;">참가비 ' + price.toLocaleString() + 'P' + priceUnitLabel + '</span>' +
    '<span style="font-size:12px;color:var(--green);font-weight:700;margin-left:8px;">우승 보상 ' + reward.toLocaleString() + 'P</span></div>';

  var roundFieldHtml;
  if (info.isPending) {
    roundFieldHtml = '<div class="form-row" style="background:rgba(224,179,65,.08);border-radius:8px;padding:8px 10px;">' +
      '<label>대상 회차</label><span style="font-size:12.5px;color:var(--gold);font-weight:700;">⏳ 추첨대기 및 결과작업중</span>' +
      '<span style="font-size:11px;color:var(--text-faint);">제' + info.thisRound + '회 결과 집계 중 — 결과 반영 즉시 제' + info.nextRound + '회로 방을 만들 수 있어요.</span>' +
    '</div>';
  } else {
    roundFieldHtml = '<div class="form-row"><label>대상 회차</label><span style="font-size:13px;font-weight:700;color:var(--accent);">제' + info.saleRound + '회</span> <span style="font-size:11px;color:var(--text-faint);">(현재 판매중인 회차로 자동 설정됩니다)</span></div>';
  }

  document.getElementById('createFormBody').innerHTML =
    '<div class="card">' +
    stageRowHtml +
    '<div class="form-row"><label>방 이름</label><input type="text" class="inp" id="cfName" placeholder="' + type.nameKr + ' 방" style="flex:1;"' + (info.isPending?' disabled':'') + '></div>' +
    roundFieldHtml +
    priceRewardHtml +
    sizeOptionsHtml +
    '<button class="btn btn-gold" style="width:100%;margin-top:10px;" onclick="BUI.submitCreate()"' + (info.isPending?' disabled':'') + '>' + (info.isPending ? '결과 집계 완료 후 이용 가능' : '⚔️ 배틀방 만들기와 도전하기') + '</button>' +
    '</div>';
};

BUI.submitCreate = function(){
  var info = MLL.getLottoInfo();
  if (info.isPending) { alert('⏳ 추첨대기 및 결과작업중입니다. 결과가 반영된 뒤 다시 시도해주세요.'); return; }

  var type = BUI.state.createType;
  if (!type) { alert('대결 종류를 먼저 선택해주세요.'); return; }
  var name = document.getElementById('cfName').value.trim();
  // round는 BATTLE.createRoom 내부에서 MLL.getLottoInfo().saleRound로 자동 설정되므로 여기서 넘기지 않는다.
  var opts = { type: type, name: name };

  if (type === 'team') {
    opts.teamCount = parseInt(document.getElementById('cfTeamCount').value) || 2;
    opts.maxParticipants = 999999; // 인원 무제한, 방장이 수동 마감
  } else {
    opts.maxParticipants = (type === '1v1') ? 2 : 999999;
  }

  var room = BATTLE.createRoom(opts);

  // 오른쪽 "참가가능한 방" 탭을 방금 만든 종류로 전환해서 바로 보이게
  var tabKey = BATTLE.TYPES[type].isTournament ? 'tournament' : type;
  BUI.state.availFilterType = tabKey;
  BUI.state.createType = null; // 폼 초기화
  BUI.showTypeSelectView();

  alert('✅ 방이 생성되었습니다! 참가자를 모아보세요.');
  BUI.openRoom(room.id);
};

// ── 방 상세 ──
BUI.openRoom = function(roomId){
  BUI.state.currentRoomId = roomId;
  BUI.state.selectedBalls = [];
  BUI.state.multiCombos = [];
  BUI.renderRoomModal();
  document.getElementById('roomModal').classList.add('show');
};
BUI.closeRoom = function(){
  document.getElementById('roomModal').classList.remove('show');
  BUI.renderSummary();
  BUI.renderAvailTabs();
  BUI.renderAvailableRooms();
  BUI.renderRoomList();
};

BUI.renderRoomModal = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  if (!room) { BUI.closeRoom(); return; }
  var box = document.getElementById('roomModalBox');
  var typeInfo = BATTLE.TYPES[room.type];
  var myNick = BUI.getMyNick();
  var myParticipant = room.participants.find(function(p){ return p.nickname === myNick; });

  var header =
    '<button class="modal-close-x" onclick="BUI.closeRoom()" title="닫기">✕</button>' +
    '<div style="margin-bottom:6px;padding-right:36px;">' +
      '<h3 style="margin-bottom:0;">' + room.name + '</h3>' +
    '</div>' +
    '<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:16px;">' + typeInfo.nameKr + ' · 제' + (typeInfo.isTournament?room.stageRound:room.round) + '회' + (typeInfo.isTournament?(' · '+room.stage+'/'+room.totalStages+'단계'):'') + ' · <span class="status-tag status-' + room.status + '">' + BUI.statusLabel(room.status) + '</span></div>';

  var bodyHtml = '';
  if (room.status === 'waiting') {
    bodyHtml = BUI.roomWaitingHtml(room, myParticipant, myNick);
  } else if (room.status === 'pending_numbers') {
    bodyHtml = BUI.roomPendingHtml(room, myParticipant);
  } else if (room.status === 'active') {
    bodyHtml = BUI.roomActiveHtml(room);
  } else if (room.status === 'stage_running') {
    bodyHtml = BUI.roomStageRunningHtml(room);
  } else if (room.status === 'completed') {
    bodyHtml = BUI.roomCompletedHtml(room);
  }

  box.innerHTML = header + bodyHtml;
  if (room.status === 'pending_numbers' && myParticipant) {
    if (typeInfo.isTournament) {
      var stillNeedsBallGrid = !myParticipant.picks && room.aliveIds.indexOf(myParticipant.id) >= 0;
      if (stillNeedsBallGrid && document.getElementById('pendingBallGrid')) {
        BUI.renderBallGrid('pendingBallGrid');
      }
    } else {
      var notSubmittedYet = !(myParticipant.picksList && myParticipant.picksList.length);
      if (notSubmittedYet && document.getElementById('multiBallGrid')) {
        BUI.renderMultiBallGrid();
        BUI.renderMultiComboList();
      }
    }
  }
};

BUI.roomWaitingHtml = function(room, myParticipant, myNick){
  var typeInfo = BATTLE.TYPES[room.type];
  var participantsHtml = room.participants.map(function(p){
    var sideLabel = (room.type === 'team') ? (' · 팀' + (p.side+1)) : '';
    return '<div class="participant-row"><span>' + p.nickname + sideLabel + '</span><span style="color:var(--text-faint);">참가완료</span></div>';
  }).join('') || '<div class="empty-state">아직 참가자가 없습니다.</div>';

  var joinFormHtml = '';
  if (!myParticipant && room.participants.length < room.maxParticipants) {
    if (room.type === 'team') {
      var teamCount = room.teamCount || 2;
      var optionsHtml = '';
      for (var t=0; t<teamCount; t++) {
        var cnt = room.participants.filter(function(p){return p.side===t;}).length;
        optionsHtml += '<option value="' + t + '">팀' + (t+1) + ' (' + cnt + '명 참가중)</option>';
      }
      joinFormHtml =
        '<div class="form-row"><label>참가할 팀</label>' +
          '<select class="inp" id="joinSide">' + optionsHtml + '</select>' +
        '</div>' +
        '<button class="btn btn-gold" style="width:100%;" onclick="BUI.doJoin()">' + myNick + '으로 참가하기</button>';
    } else {
      joinFormHtml = '<button class="btn btn-gold" style="width:100%;" onclick="BUI.doJoin()">' + myNick + '으로 참가하기</button>';
    }
  } else if (myParticipant) {
    joinFormHtml = '<div style="font-size:12px;color:var(--green);text-align:center;padding:10px;">✓ 이미 참가하셨습니다. 다른 참가자를 기다려주세요.</div>';
  }

  var closeBtnHtml = '';
  if (typeInfo.variableSize && room.participants.length >= 2 && !myParticipant) {
    closeBtnHtml = '<button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="BUI.doCloseRegistration()">지금 바로 접수 마감하고 번호제출 단계로</button>';
  }

  var capacityLabel = (room.maxParticipants >= 999999) ? (room.participants.length + '명, 무제한') : (room.participants.length + '/' + room.maxParticipants);
  return '<div class="card"><h3>참가자 (' + capacityLabel + ')</h3>' + participantsHtml + '</div>' +
    '<div class="card">' + joinFormHtml + closeBtnHtml + '</div>';
};

BUI.doJoin = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  var side = (room.type === 'team') ? parseInt(document.getElementById('joinSide').value) : null;
  var result = BATTLE.joinRoom(room.id, BUI.getMyNick(), side);
  if (!result.ok) { alert('⚠️ ' + result.msg); return; }
  BUI.renderRoomModal();
};
BUI.doCloseRegistration = function(){
  var result = BATTLE.closeRegistration(BUI.state.currentRoomId);
  if (!result.ok) { alert('⚠️ ' + (result.msg||'마감할 수 없습니다.')); return; }
  BUI.renderRoomModal();
};

BUI.roomPendingHtml = function(room, myParticipant){
  var isTournament = BATTLE.TYPES[room.type].isTournament;

  if (isTournament) {
    return BUI.roomPendingTournamentHtml(room, myParticipant);
  }
  return BUI.roomPendingMultiHtml(room, myParticipant);
};

// 토너먼트 전용 (기존 방식 유지: 단계마다 1세트만 제출)
BUI.roomPendingTournamentHtml = function(room, myParticipant){
  var displayParticipants = room.participants.filter(function(p){ return room.aliveIds.indexOf(p.id) >= 0; });
  var isFinalStage = room.stage >= room.totalStages;
  var noticeHtml = '<div class="card" style="background:rgba(224,179,65,.06);border-color:var(--gold-dim);font-size:11.5px;color:var(--text-dim);line-height:1.7;">' +
    '🏆 ' + room.stage + '/' + room.totalStages + '단계 (제' + room.stageRound + '회 추첨 기준)' + (isFinalStage ? ' — 결승! 누적 당첨금 합계 1위가 우승합니다.' : ' — 이번 단계 추첨 후 하위 성적자가 탈락합니다.') +
    (room.stage > 1 ? '<br>현재 ' + displayParticipants.length + '명이 생존해 있습니다. (각 단계 당첨금은 계속 누적됩니다)' : '') +
  '</div>';

  var participantsHtml = displayParticipants.map(function(p){
    var prizeLabel = ' · 누적 ' + (p.totalPrize||0).toLocaleString() + '원';
    return '<div class="participant-row"><span>' + p.nickname + prizeLabel + '</span><span style="color:' + (p.picks?'var(--green)':'var(--text-faint)') + ';">' + (p.picks?'제출완료':'대기중') + '</span></div>';
  }).join('');

  var submitHtml = '';
  if (myParticipant && !myParticipant.picks && room.aliveIds.indexOf(myParticipant.id)>=0) {
    var keepBtnHtml = myParticipant.lastPicks
      ? '<button class="btn btn-outline" style="width:100%;margin-bottom:8px;" onclick="BUI.doKeepSamePicks()">↺ 이전 번호 그대로 쓰기 (' + myParticipant.lastPicks.join(', ') + ')</button>'
      : '';
    submitHtml = '<div class="card"><h3>내 번호 선택 (' + BUI.state.selectedBalls.length + '/6)</h3>' +
      keepBtnHtml +
      '<div class="ball-grid" id="pendingBallGrid"></div>' +
      '<button class="btn btn-outline" style="width:100%;margin-bottom:8px;" onclick="BUI.autoFillBalls()">✦ 자동 채우기</button>' +
      '<button class="btn btn-gold" style="width:100%;" id="submitPicksBtn" disabled onclick="BUI.doSubmitPicks()">번호 제출하기</button>' +
    '</div>';
  } else if (myParticipant && myParticipant.picks) {
    submitHtml = '<div class="card"><div style="font-size:12px;color:var(--green);text-align:center;">✓ 제출 완료: ' + myParticipant.picks.join(', ') + '<br>다른 참가자의 제출을 기다리는 중입니다.</div></div>';
  } else if (myParticipant && room.aliveIds.indexOf(myParticipant.id) < 0) {
    submitHtml = '<div class="card"><div style="font-size:12px;color:var(--text-faint);text-align:center;">이전 단계에서 탈락하셨습니다. 결과는 "완료" 탭에서 확인하실 수 있어요.</div></div>';
  }

  return noticeHtml + '<div class="card"><h3>생존자 (' + displayParticipants.length + '명)</h3>' + participantsHtml + '</div>' + submitHtml;
};

// 1:1/팀전/무제한 전용: 참가자 1명이 번호조합 1~100개를 한 번에 등록, 당첨금 합계로 승부
BUI.roomPendingMultiHtml = function(room, myParticipant){
  var participantsHtml = room.participants.map(function(p){
    var sideLabel = (room.type === 'team') ? (' · 팀' + (p.side+1)) : '';
    var submitted = !!(p.picksList && p.picksList.length);
    var comboLabel = submitted ? (' · ' + p.picksList.length + '개 조합') : '';
    return '<div class="participant-row"><span>' + p.nickname + sideLabel + comboLabel + '</span><span style="color:' + (submitted?'var(--green)':'var(--text-faint)') + ';">' + (submitted?'제출완료':'대기중') + '</span></div>';
  }).join('');

  var submitHtml = '';
  var iSubmitted = !!(myParticipant && myParticipant.picksList && myParticipant.picksList.length);
  if (myParticipant && !iSubmitted) {
    submitHtml = '<div class="card">' +
      '<h3>내 번호조합 등록 (최대 ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '개)</h3>' +
      '<p style="font-size:11.5px;color:var(--text-dim);margin-bottom:12px;line-height:1.6;">여러 개의 번호조합을 등록할 수 있어요. 추첨 후 각 조합의 당첨금을 모두 더한 <b style="color:var(--gold);">합계</b>로 승부를 가립니다. (참가비는 조합 개수와 무관하게 1회만 부과됩니다)</p>' +
      '<div class="form-row"><label>자동 생성 개수</label><input type="number" class="inp" id="multiGenCount" value="10" min="1" max="' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '" style="width:80px;"> <button class="btn btn-outline" onclick="BUI.addAutoCombos()">+ 자동 추가</button></div>' +
      '<div class="form-row"><label>직접 선택</label><span style="font-size:11px;color:var(--text-faint);">아래 공에서 6개를 고르면 조합이 1개씩 추가됩니다</span></div>' +
      '<div class="ball-grid" id="multiBallGrid"></div>' +
      '<div id="multiComboList" style="margin-top:12px;"></div>' +
      '<button class="btn btn-gold" style="width:100%;margin-top:10px;" id="submitMultiPicksBtn" disabled onclick="BUI.doSubmitMultiPicks()">조합 등록 완료하기</button>' +
    '</div>';
  } else if (iSubmitted) {
    submitHtml = '<div class="card"><div style="font-size:12px;color:var(--green);text-align:center;">✓ ' + myParticipant.picksList.length + '개 조합 제출 완료<br>다른 참가자의 제출을 기다리는 중입니다.</div></div>';
  }

  return '<div class="card"><h3>참가자 (' + room.participants.length + '명)</h3>' + participantsHtml + '</div>' + submitHtml;
};

BUI.doKeepSamePicks = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  var myParticipant = room.participants.find(function(p){ return p.nickname === BUI.getMyNick(); });
  if (!myParticipant) return;
  var result = BATTLE.keepSamePicks(room.id, myParticipant.id);
  if (!result.ok) { alert('⚠️ ' + (result.msg||'처리할 수 없습니다.')); return; }
  BUI.renderRoomModal();
};

BUI.roomStageRunningHtml = function(room){
  var alive = room.participants.filter(function(p){ return room.aliveIds.indexOf(p.id) >= 0; });
  return '<div class="card" style="background:rgba(232,115,47,.06);border-color:var(--accent);font-size:11.5px;color:var(--text-dim);line-height:1.7;">' +
      '⏳ ' + room.stage + '/' + room.totalStages + '단계 — 생존자 ' + alive.length + '명 전원이 번호를 제출했습니다. 제' + room.stageRound + '회 추첨 결과가 나오면 자동으로 다음 단계가 진행됩니다.' +
    '</div>' +
    '<div class="card"><h3>이번 단계 제출 번호</h3>' + alive.map(function(p){
      return '<div class="participant-row"><span>' + p.nickname + '</span><span class="font-num">' + p.picks.join(', ') + '</span></div>';
    }).join('') + '</div>';
};

BUI.renderBallGrid = function(containerId){
  var html = '';
  for (var n=1; n<=45; n++) {
    var on = BUI.state.selectedBalls.indexOf(n) >= 0;
    html += '<button class="ball-btn' + (on?' on':'') + '" onclick="BUI.toggleBall(' + n + ')">' + n + '</button>';
  }
  document.getElementById(containerId).innerHTML = html;
};
BUI.toggleBall = function(n){
  var sel = BUI.state.selectedBalls;
  var idx = sel.indexOf(n);
  if (idx >= 0) sel.splice(idx, 1);
  else if (sel.length < 6) sel.push(n);
  BUI.renderBallGrid('pendingBallGrid');
  var btn = document.getElementById('submitPicksBtn');
  if (btn) btn.disabled = sel.length !== 6;
  var header = document.querySelector('#roomModalBox .card h3');
  if (header) header.textContent = '내 번호 선택 (' + sel.length + '/6)';
};
BUI.autoFillBalls = function(){
  var pool = []; for (var i=1;i<=45;i++) pool.push(i);
  var picked = [];
  while (picked.length < 6) {
    var idx = Math.floor(Math.random()*pool.length);
    picked.push(pool.splice(idx,1)[0]);
  }
  BUI.state.selectedBalls = picked;
  BUI.renderBallGrid('pendingBallGrid');
  var btn = document.getElementById('submitPicksBtn');
  if (btn) btn.disabled = false;
  var header = document.querySelector('#roomModalBox .card h3');
  if (header) header.textContent = '내 번호 선택 (6/6)';
};
BUI.doSubmitPicks = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  var myParticipant = room.participants.find(function(p){ return p.nickname === BUI.getMyNick(); });
  if (!myParticipant) return;
  var result = BATTLE.submitPicks(room.id, myParticipant.id, BUI.state.selectedBalls);
  if (!result.ok) { alert('⚠️ ' + result.msg); return; }
  BUI.state.selectedBalls = [];
  BUI.renderRoomModal();
};

// ── 1:1/팀전/무제한 전용: 다중 번호조합 등록 UI ──
BUI.renderMultiBallGrid = function(){
  var el = document.getElementById('multiBallGrid');
  if (!el) return;
  var html = '';
  for (var n=1; n<=45; n++) {
    var on = BUI.state.selectedBalls.indexOf(n) >= 0;
    html += '<button class="ball-btn' + (on?' on':'') + '" onclick="BUI.toggleMultiBall(' + n + ')">' + n + '</button>';
  }
  el.innerHTML = html;
};
BUI.toggleMultiBall = function(n){
  var sel = BUI.state.selectedBalls;
  var idx = sel.indexOf(n);
  if (idx >= 0) { sel.splice(idx, 1); }
  else if (sel.length < 6) { sel.push(n); }
  if (sel.length === 6) {
    // 6개가 완성되면 조합 목록에 자동 추가하고 선택 초기화
    BUI.addCombo(sel.slice().sort(function(a,b){return a-b;}));
    BUI.state.selectedBalls = [];
  }
  BUI.renderMultiBallGrid();
};
BUI.addCombo = function(combo){
  if (BUI.state.multiCombos.length >= BATTLE.MAX_COMBOS_PER_PARTICIPANT) {
    alert('번호조합은 최대 ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '개까지만 등록할 수 있어요.');
    return;
  }
  BUI.state.multiCombos.push(combo);
  BUI.renderMultiComboList();
};
BUI.removeCombo = function(idx){
  BUI.state.multiCombos.splice(idx, 1);
  BUI.renderMultiComboList();
};
BUI.addAutoCombos = function(){
  var countInput = document.getElementById('multiGenCount');
  var count = Math.max(1, Math.min(BATTLE.MAX_COMBOS_PER_PARTICIPANT - BUI.state.multiCombos.length, parseInt(countInput.value)||1));
  if (count <= 0) { alert('이미 최대 ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '개를 등록했어요.'); return; }
  for (var i=0;i<count;i++){
    var pool = []; for (var n=1;n<=45;n++) pool.push(n);
    var picked = [];
    while (picked.length < 6) { var idx = Math.floor(Math.random()*pool.length); picked.push(pool.splice(idx,1)[0]); }
    BUI.state.multiCombos.push(picked.sort(function(a,b){return a-b;}));
  }
  BUI.renderMultiComboList();
};
BUI.renderMultiComboList = function(){
  var el = document.getElementById('multiComboList');
  if (!el) return;
  var combos = BUI.state.multiCombos;
  var listHtml = combos.map(function(c, i){
    return '<div class="participant-row"><span class="font-num">' + (i+1) + '. ' + c.join(', ') + '</span><span style="color:var(--red);cursor:pointer;" onclick="BUI.removeCombo(' + i + ')">✕ 삭제</span></div>';
  }).join('') || '<div style="font-size:11.5px;color:var(--text-faint);padding:8px 0;">아직 등록된 조합이 없습니다.</div>';
  el.innerHTML = '<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:6px;">등록된 조합: <b style="color:var(--gold);">' + combos.length + ' / ' + BATTLE.MAX_COMBOS_PER_PARTICIPANT + '</b></div>' + listHtml;
  var btn = document.getElementById('submitMultiPicksBtn');
  if (btn) btn.disabled = combos.length === 0;
};
BUI.doSubmitMultiPicks = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  var myParticipant = room.participants.find(function(p){ return p.nickname === BUI.getMyNick(); });
  if (!myParticipant) return;
  if (!BUI.state.multiCombos.length) { alert('번호조합을 1개 이상 등록해주세요.'); return; }
  var result = BATTLE.submitPicksList(room.id, myParticipant.id, BUI.state.multiCombos);
  if (!result.ok) { alert('⚠️ ' + result.msg); return; }
  BUI.state.multiCombos = [];
  BUI.state.selectedBalls = [];
  BUI.renderRoomModal();
};

BUI.roomActiveHtml = function(room){
  return '<div class="card"><div class="empty-state">⏳ 모든 참가자가 번호를 제출했습니다.<br>제' + room.round + '회 추첨 결과가 발표되면 자동으로 채점됩니다.</div></div>' +
    '<div class="card"><h3>참가자별 제출 조합 수</h3>' + room.participants.map(function(p){
      var sideLabel = (room.type === 'team') ? (' · 팀' + (p.side+1)) : '';
      return '<div class="participant-row"><span>' + p.nickname + sideLabel + '</span><span class="font-num">' + (p.picksList?p.picksList.length:0) + '개 조합</span></div>';
    }).join('') + '</div>';
};

BUI.roomCompletedHtml = function(room){
  var isTournament = BATTLE.TYPES[room.type].isTournament;
  var r = room.result;
  var resultHtml = isTournament
    ? '' // 토너먼트는 단계마다 추첨회차가 달라서, 아래 "단계별 진행표"에 단계별로 회차+결과를 같이 보여준다
    : '<div class="card"><h3>추첨 결과</h3><div class="font-num" style="font-size:14px;">' + r.nums.join(', ') + ' <span style="color:var(--text-faint);">+ ' + r.bonus + '</span></div></div>';

  var rankedHtml;
  if (isTournament) {
    var winner = room.participants.find(function(p){ return room.winnerIds.indexOf(p.id) >= 0; });
    rankedHtml = '<div class="card"><h3>🏆 최종 우승 (' + room.totalStages + '단계 진행)</h3><div class="participant-row winner"><span>' + winner.nickname + '</span><span class="font-num">누적 당첨금 ' + (winner.totalPrize||0).toLocaleString() + '원</span></div></div>' +
      '<div class="card"><h3>단계별 진행표</h3>' + room.stageLog.map(function(stage){
        var stageTitle = stage.isFinal ? (stage.stage + '단계(결승) · 제' + stage.round + '회 추첨 기준') : (stage.stage + '단계 · 제' + stage.round + '회 추첨 기준 — 하위 ' + stage.eliminatedIds.length + '명 탈락');
        return '<div style="font-size:11px;color:var(--text-faint);margin:10px 0 4px;">' + stageTitle + '</div>' +
          stage.standings.map(function(s){
            var eliminated = !stage.isFinal && stage.eliminatedIds.indexOf(s.id) >= 0;
            var isChampion = stage.isFinal && s.id === room.winnerIds[0];
            return '<div class="participant-row' + (isChampion?' winner':'') + '"><span>' + s.nickname + (eliminated?' (탈락)':'') + (isChampion?' 🏆':'') + '</span><span class="font-num" style="color:' + (eliminated?'var(--text-faint)':'var(--text)') + ';">누적 ' + s.totalPrize.toLocaleString() + '원</span></div>';
          }).join('');
      }).join('') + '</div>';
  } else if (room.isDraw) {
    var refundAmount = Math.floor(BATTLE.getPrice(room.type)/2);
    rankedHtml = '<div class="card" style="background:rgba(91,156,213,.08);border-color:var(--blue);">' +
      '<h3>🤝 무승부</h3><div style="font-size:12.5px;color:var(--text-dim);line-height:1.6;">당첨금 합계와 등록건수까지 완전히 같아 우승자를 가릴 수 없었습니다.<br>참가자 전원에게 참가비의 절반(' + refundAmount.toLocaleString() + 'P)이 환불되었습니다.</div>' +
    '</div>' +
    '<div class="card"><h3>결과 순위</h3>' +
      room.participants.slice().sort(BATTLE.compareParticipants).map(function(p){
        return '<div class="participant-row"><span>' + p.nickname + (room.type==='team'?(' · 팀'+(p.side+1)):'') + '</span><span class="font-num">누적 ' + (p.totalPrize||0).toLocaleString() + '원 · ' + (p.comboCount||0) + '개 조합</span></div>';
      }).join('') + '</div>';
  } else if (room.type === 'team') {
    var teamLabel = '팀' + (room.winningSide + 1);
    rankedHtml = '<div class="card"><h3>🏆 승리팀: ' + teamLabel + '</h3>' +
      room.participants.slice().sort(function(a,b){return BATTLE.compareParticipants(a,b);}).map(function(p){
        var isWinner = room.winnerIds.indexOf(p.id) >= 0;
        var sideLabel = '팀' + (p.side+1);
        return '<div class="participant-row' + (isWinner?' winner':'') + '"><span>' + p.nickname + ' · ' + sideLabel + (isWinner?' 🏆':'') + '</span><span class="font-num">누적 ' + (p.totalPrize||0).toLocaleString() + '원 · ' + (p.comboCount||0) + '개 조합</span></div>';
      }).join('') + '</div>';
  } else {
    rankedHtml = '<div class="card"><h3>🏆 결과 순위</h3>' +
      room.participants.slice().sort(function(a,b){return BATTLE.compareParticipants(a,b);}).map(function(p, idx){
        var isWinner = room.winnerIds.indexOf(p.id) >= 0;
        return '<div class="participant-row' + (isWinner?' winner':'') + '"><span>' + (idx+1) + '위 · ' + p.nickname + (isWinner?' 🏆':'') + '</span><span class="font-num">누적 ' + (p.totalPrize||0).toLocaleString() + '원 · ' + (p.comboCount||0) + '개 조합</span></div>';
      }).join('') + '</div>';
  }

  return resultHtml + rankedHtml;
};

// ── 관리자 ──
BUI.adminLoggedIn = false;
BUI.adminHtml = function(){
  if (!BUI.adminLoggedIn && MLL.checkAdmin()) BUI.adminLoggedIn = true;
  if (!BUI.adminLoggedIn) {
    return '<div class="card"><div class="admin-lock">' +
      '<div>관리자 비밀번호</div>' +
      '<input type="password" id="adminPwInput" onkeydown="if(event.key===\'Enter\')BUI.adminLogin();">' +
      '<button class="btn btn-gold" onclick="BUI.adminLogin()">입장</button>' +
    '</div></div>';
  }

  var topBar = '<div class="card" style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12.5px;color:var(--text-dim);">🔓 관리자로 로그인됨</div><button class="btn btn-outline" onclick="BUI.adminLogout()">로그아웃</button></div>';
  var pricingPanel = BUI.adminPricingPanelHtml();

  var gradeable = BATTLE.load().filter(function(r){ return r.status === 'active' || r.status === 'stage_running'; });
  if (!gradeable.length) {
    return topBar + pricingPanel + '<div class="card"><div class="empty-state">추첨 대기 중인(채점 가능한) 방이 없습니다.</div></div>';
  }

  var roomsHtml = gradeable.map(function(r){
    var typeInfo = BATTLE.TYPES[r.type];
    var targetRound = typeInfo.isTournament ? r.stageRound : r.round;
    var stageLabel = typeInfo.isTournament ? (', ' + r.stage + '/' + r.totalStages + '단계') : '';
    return '<div class="card">' +
      '<h3>' + r.name + ' (' + typeInfo.nameKr + stageLabel + ', 제' + targetRound + '회, 참가자 ' + r.participants.length + '명)</h3>' +
      '<div class="form-row"><label>당첨번호 6개</label><input type="text" class="inp" id="adminNums_' + r.id + '" placeholder="예: 1,7,13,22,31,40" style="flex:1;"></div>' +
      '<div class="form-row"><label>보너스번호</label><input type="number" class="inp" id="adminBonus_' + r.id + '" min="1" max="45" style="width:80px;"></div>' +
      '<button class="btn btn-gold" onclick="BUI.adminGradeRoom(\'' + r.id + '\')">결과 입력 + 자동채점</button>' +
    '</div>';
  }).join('');

  return topBar + pricingPanel + roomsHtml;
};

// 토너먼트 참가비(및 그 외 타입 참가비)를 언제든 조정할 수 있는 관리자 패널
BUI.adminPricingPanelHtml = function(){
  var pricing = BATTLE.loadPricing();
  var rewards = BATTLE.loadRewards();
  var priceRows = Object.keys(BATTLE.TYPES).map(function(key){
    var t = BATTLE.TYPES[key];
    return '<div class="form-row"><label style="min-width:120px;">' + t.nameKr + '</label>' +
      '<input type="number" class="inp" id="priceInput_' + key + '" value="' + pricing[key] + '" min="0" step="10" style="width:100px;">' +
      '<span style="font-size:11px;color:var(--text-faint);">P' + (t.isTournament ? ' (최초 1회만)' : ' (참가 1회당)') + '</span></div>';
  }).join('');
  var rewardRows = Object.keys(BATTLE.TYPES).map(function(key){
    var t = BATTLE.TYPES[key];
    return '<div class="form-row"><label style="min-width:120px;">' + t.nameKr + '</label>' +
      '<input type="number" class="inp" id="rewardInput_' + key + '" value="' + rewards[key] + '" min="0" step="10" style="width:100px;">' +
      '<span style="font-size:11px;color:var(--text-faint);">P</span></div>';
  }).join('');
  return '<div class="card">' +
    '<h3>💰 종류별 참가비 설정</h3>' +
    priceRows +
    '<h3 style="margin-top:18px;">🏆 종류별 우승 보상 설정 (이용포인트 고정 지급)</h3>' +
    '<div style="font-size:11px;color:var(--text-faint);margin-bottom:10px;line-height:1.6;">실제 로또 당첨금이 아닌, 여기서 설정한 고정 포인트가 승자에게 지급됩니다. 팀전은 이긴 팀 전원에게 각자 동일하게 지급됩니다.</div>' +
    rewardRows +
    '<button class="btn btn-gold" style="margin-top:8px;" onclick="BUI.adminSavePricing()">저장</button>' +
    '<span id="pricingSaveMsg" style="font-size:11.5px;margin-left:10px;"></span>' +
  '</div>';
};
BUI.adminSavePricing = function(){
  var newPricing = {};
  var newRewards = {};
  Object.keys(BATTLE.TYPES).forEach(function(key){
    var priceEl = document.getElementById('priceInput_' + key);
    var priceVal = parseInt(priceEl.value);
    newPricing[key] = isNaN(priceVal) ? BATTLE.DEFAULT_PRICING[key] : priceVal;

    var rewardEl = document.getElementById('rewardInput_' + key);
    var rewardVal = parseInt(rewardEl.value);
    newRewards[key] = isNaN(rewardVal) ? BATTLE.DEFAULT_REWARDS[key] : rewardVal;
  });
  BATTLE.savePricing(newPricing);
  BATTLE.saveRewards(newRewards);
  var msg = document.getElementById('pricingSaveMsg');
  if (msg) { msg.style.color = 'var(--green)'; msg.textContent = '✅ 저장되었습니다.'; }
};

BUI.adminLogin = function(){
  var pw = document.getElementById('adminPwInput').value;
  if (!MLL.tryAdminLogin(pw)) { alert('비밀번호가 올바르지 않습니다.'); return; }
  BUI.adminLoggedIn = true;
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
};
BUI.adminLogout = function(){
  MLL.logoutAdmin();
  BUI.adminLoggedIn = false;
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
};

BUI.adminGradeRoom = function(roomId){
  var numsRaw = document.getElementById('adminNums_' + roomId).value;
  var nums = numsRaw.split(',').map(function(s){ return parseInt(s.trim()); }).filter(function(n){ return !isNaN(n); });
  var bonus = parseInt(document.getElementById('adminBonus_' + roomId).value);
  if (nums.length !== 6) { alert('당첨번호 6개를 정확히 입력해주세요.'); return; }
  if (!bonus) { alert('보너스번호를 입력해주세요.'); return; }

  var result = BATTLE.gradeAndFinish(roomId, nums, bonus);
  if (!result.ok) { alert('⚠️ ' + result.msg); return; }
  alert('✅ 채점이 완료되었습니다!');
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
  BUI.renderSummary();
};

document.addEventListener('DOMContentLoaded', BUI.init);
document.addEventListener('keydown', function(e){
  if (e.key !== 'Escape') return;
  if (document.getElementById('roomModal').classList.contains('show')) BUI.closeRoom();
});
</script>
</body>
