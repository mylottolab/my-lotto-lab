<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - Battles</title>
<script>
// =====================================================
// My Lotto Lab - 공통 모듈 (다른 페이지와 동일)
// =====================================================
if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.ROUND1_TS = new Date('2002-12-07T20:00:00+09:00').getTime();
MLL.WEEK_MS   = 7 * 24 * 60 * 60 * 1000;
MLL.STORAGE_KEY  = 'mll_entries';
MLL.RESULTS_KEY  = 'mll_results';
MLL.ADMIN_PW_KEY = 'mll_admin_auth';
MLL.ADMIN_PW     = 'lotto2024!';

MLL.checkAdmin = function() { return sessionStorage.getItem(MLL.ADMIN_PW_KEY) === 'ok'; };
MLL.tryAdminLogin = function(pw) {
  if (pw === MLL.ADMIN_PW) { sessionStorage.setItem(MLL.ADMIN_PW_KEY, 'ok'); return true; }
  return false;
};
MLL.logoutAdmin = function() { sessionStorage.removeItem(MLL.ADMIN_PW_KEY); };

MLL.getLottoInfo = function() {
  var now = Date.now();
  var elapsed = now - MLL.ROUND1_TS;
  var thisRound = Math.floor(elapsed / MLL.WEEK_MS) + 1;
  var nowKo = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var day = nowKo.getDay(), hour = nowKo.getHours();
  var soldOut = (day===6 && hour>=20) || day===0 || (day===6 && hour===20);
  var saleRound = soldOut ? thisRound+1 : thisRound;
  return { thisRound: thisRound, nextRound: thisRound+1, saleRound: saleRound, soldOut: soldOut };
};
MLL.loadResults = function(){
  try { return JSON.parse(localStorage.getItem(MLL.RESULTS_KEY) || '{}'); } catch(e){ return {}; }
};

// ── 채점(100전략레이스와 동일 로직 재사용) ──
MLL.raceGrade = function(myNums, winNums, bonusNum) {
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  var hasBonus = myNums.indexOf(bonusNum) >= 0;
  if (match===6) return 1;
  if (match===5 && hasBonus) return 2;
  if (match===5) return 3;
  if (match===4) return 4;
  if (match===3) return 5;
  return 0;
};
MLL.matchCount = function(myNums, winNums){
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  return match;
};
// "더 좋은 결과"일수록 작은 수가 되도록 변환 (0=낙첨은 가장 나쁨 취급 -> 99)
MLL.gradeRank = function(grade){ return grade === 0 ? 99 : grade; };

// =====================================================
// BATTLE 엔진
// =====================================================
var BATTLE = {};
BATTLE.STORAGE_KEY = 'mll_battle_rooms';
BATTLE.TYPES = {
  '1v1':       { code:'1v1',       nameKr:'1:1 대결',     size:2,  teams:false },
  'team':      { code:'team',      nameKr:'팀전',         size:6,  teams:true, teamCount:2 },
  'ffa':       { code:'ffa',       nameKr:'무제한 대결',  size:8,  teams:false, variableSize:true },
  'tournament':{ code:'tournament',nameKr:'토너먼트',     size:8,  teams:false, bracket:true },
};

BATTLE.load = function(){
  try { return JSON.parse(localStorage.getItem(BATTLE.STORAGE_KEY) || '[]'); } catch(e){ return []; }
};
BATTLE.save = function(rooms){ localStorage.setItem(BATTLE.STORAGE_KEY, JSON.stringify(rooms)); };

BATTLE.createRoom = function(opts){
  var rooms = BATTLE.load();
  var type = BATTLE.TYPES[opts.type];
  var room = {
    id: 'b_' + Date.now() + '_' + Math.floor(Math.random()*100000),
    type: opts.type,
    name: opts.name || (type.nameKr + ' 방'),
    round: opts.round,
    maxParticipants: opts.maxParticipants || type.size,
    teamCount: opts.teamCount || type.teamCount || null,
    status: 'waiting', // waiting -> pending_numbers -> (stage_running, 토너먼트만 반복) -> active -> completed
    createdAt: Date.now(),
    participants: [],
    result: null,
    winnerIds: [],
    bracketLog: [], // 토너먼트: 단계별 진행 기록. 그 외 타입은 항상 빈 배열
    // ── 토너먼트 전용 진행상태 ──
    stage: 1,                 // 현재 몇 단계인지
    stageRound: opts.round,   // 현재 단계가 어느 회차 추첨을 기다리는지
    aliveIds: [],             // 현재 단계까지 생존한 참가자 id 목록 (정원이 차면 채워짐)
  };
  rooms.unshift(room);
  BATTLE.save(rooms);
  return room;
};

BATTLE.getRoom = function(id){
  return BATTLE.load().find(function(r){ return r.id === id; });
};

BATTLE.joinRoom = function(roomId, nickname, side){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  if (room.status !== 'waiting') return { ok:false, msg:'이미 마감되었거나 진행 중인 방입니다.' };
  if (room.participants.some(function(p){ return p.nickname === nickname; })) return { ok:false, msg:'이미 참가한 닉네임입니다.' };
  if (room.participants.length >= room.maxParticipants) return { ok:false, msg:'정원이 가득 찼습니다.' };

  room.participants.push({
    id: 'p_' + Date.now() + '_' + Math.floor(Math.random()*100000),
    nickname: nickname,
    side: side != null ? side : null,
    picks: null,
    grade: null,
    matchCount: null,
    submittedAt: null,
  });

  var typeInfo = BATTLE.TYPES[room.type];
  var full = typeInfo.variableSize ? (room.participants.length >= 2 && room.participants.length >= room.maxParticipants)
                                    : (room.participants.length >= room.maxParticipants);
  if (full) {
    room.status = 'pending_numbers';
    if (room.type === 'tournament') room.aliveIds = room.participants.map(function(p){ return p.id; });
  }

  BATTLE.save(rooms);
  return { ok:true, room:room };
};

// 무제한(ffa) 전용: 정원을 안 채워도 방장이 직접 마감(접수 종료)할 수 있게
BATTLE.closeRegistration = function(roomId){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room || room.status !== 'waiting') return { ok:false };
  if (room.participants.length < 2) return { ok:false, msg:'최소 2명 이상 모여야 마감할 수 있습니다.' };
  room.status = 'pending_numbers';
  BATTLE.save(rooms);
  return { ok:true };
};

BATTLE.submitPicks = function(roomId, participantId, picks){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  var p = room.participants.find(function(x){ return x.id === participantId; });
  if (!p) return { ok:false, msg:'참가자를 찾을 수 없습니다.' };
  if (p.picks) return { ok:false, msg:'이미 번호를 제출했습니다.' };

  p.picks = picks.slice().sort(function(a,b){return a-b;});
  p.submittedAt = Date.now();

  if (room.type === 'tournament') {
    var aliveSet = room.aliveIds;
    var aliveParticipants = room.participants.filter(function(x){ return aliveSet.indexOf(x.id) >= 0; });
    var allAliveSubmitted = aliveParticipants.every(function(x){ return !!x.picks; });
    if (allAliveSubmitted) room.status = 'stage_running';
  } else {
    var allSubmitted = room.participants.every(function(x){ return !!x.picks; });
    if (allSubmitted) room.status = 'active';
  }

  BATTLE.save(rooms);
  return { ok:true, room:room };
};

// 생존자가 "같은 번호로 다음 단계 계속하기"를 선택했을 때 - 이전 picks를 그대로 복사해 제출 처리
BATTLE.keepSamePicks = function(roomId, participantId){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false };
  var p = room.participants.find(function(x){ return x.id === participantId; });
  if (!p || !p.lastPicks) return { ok:false, msg:'이전에 사용한 번호가 없습니다.' };
  return BATTLE.submitPicks(roomId, participantId, p.lastPicks);
};

// 두 참가자를 비교해서 더 나은 쪽을 반환 (-1: a승, 1: b승, 0: 무승부)
BATTLE.compareParticipants = function(a, b){
  var ra = MLL.gradeRank(a.grade), rb = MLL.gradeRank(b.grade);
  if (ra !== rb) return ra < rb ? -1 : 1;
  if (a.matchCount !== b.matchCount) return a.matchCount > b.matchCount ? -1 : 1;
  return 0;
};

BATTLE.gradeAndFinish = function(roomId, winNums, bonus){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  if (room.type === 'tournament') return BATTLE.advanceTournamentStage(roomId, winNums, bonus);
  if (room.status !== 'active') return { ok:false, msg:'아직 모든 참가자가 번호를 제출하지 않았거나, 이미 종료된 방입니다.' };

  room.participants.forEach(function(p){
    p.grade = MLL.raceGrade(p.picks, winNums, bonus);
    p.matchCount = MLL.matchCount(p.picks, winNums);
  });
  room.result = { nums: winNums, bonus: bonus };

  if (room.type === '1v1' || room.type === 'ffa') {
    var sorted = room.participants.slice().sort(BATTLE.compareParticipants);
    var best = sorted[0];
    var winners = sorted.filter(function(p){ return BATTLE.compareParticipants(p, best) === 0; });
    room.winnerIds = winners.map(function(p){ return p.id; });

  } else if (room.type === 'team') {
    var teamCount = room.teamCount || 2;
    var teamBest = {};
    for (var t=0; t<teamCount; t++) {
      var members = room.participants.filter(function(p){ return p.side === t; });
      members.sort(BATTLE.compareParticipants);
      teamBest[t] = members[0]; // 팀 내 최고성적자가 팀 대표 성적
    }
    var teamOrder = Object.keys(teamBest).sort(function(t1,t2){ return BATTLE.compareParticipants(teamBest[t1], teamBest[t2]); });
    var winningTeam = parseInt(teamOrder[0]);
    room.winningSide = winningTeam;
    room.winnerIds = room.participants.filter(function(p){ return p.side === winningTeam; }).map(function(p){ return p.id; });
  }

  room.status = 'completed';
  room.completedAt = Date.now();
  BATTLE.save(rooms);
  return { ok:true, room:room };
};

BATTLE.deleteRoom = function(roomId){
  var rooms = BATTLE.load().filter(function(r){ return r.id !== roomId; });
  BATTLE.save(rooms);
};

// 토너먼트 단계 진행: 이 단계(stage)의 실제 추첨결과가 나오면 생존자 중 절반이 탈락하고,
// 남은 인원이 1명이 될 때까지 다음 단계(다음 회차)로 계속 진행한다.
// 즉 "3단계 토너먼트"라면 실제로 3번의 서로 다른 회차 추첨결과를 거쳐야 우승자가 나온다.
BATTLE.advanceTournamentStage = function(roomId, winNums, bonus){
  var rooms = BATTLE.load();
  var room = rooms.find(function(r){ return r.id === roomId; });
  if (!room) return { ok:false, msg:'방을 찾을 수 없습니다.' };
  if (room.status !== 'stage_running') return { ok:false, msg:'아직 이 단계의 생존자 전원이 번호를 제출하지 않았거나, 진행 단계가 아닙니다.' };

  var alive = room.participants.filter(function(p){ return room.aliveIds.indexOf(p.id) >= 0; });
  alive.forEach(function(p){
    p.grade = MLL.raceGrade(p.picks, winNums, bonus);
    p.matchCount = MLL.matchCount(p.picks, winNums);
    p.lastPicks = p.picks; // "다음 단계도 같은 번호 쓰기" 옵션을 위해 보관
  });
  room.result = { nums: winNums, bonus: bonus }; // 가장 최근 단계의 결과(화면 표시용)

  var stageMatches = [];
  var survivors = [];
  for (var i=0; i<alive.length; i+=2) {
    if (i+1 >= alive.length) { survivors.push(alive[i]); continue; } // 부전승(인원이 홀수일 때)
    var p1 = alive[i], p2 = alive[i+1];
    var cmp = BATTLE.compareParticipants(p1, p2);
    var winner = cmp <= 0 ? p1 : p2; // 0(무승부)이면 먼저 등록한 p1이 진출(시드 우선)
    stageMatches.push({ p1Id:p1.id, p2Id:p2.id, winnerId:winner.id, round: room.stageRound });
    survivors.push(winner);
  }
  room.bracketLog.push({ stage: room.stage, round: room.stageRound, matches: stageMatches });

  if (survivors.length <= 1) {
    room.winnerIds = survivors.length ? [survivors[0].id] : [];
    room.status = 'completed';
    room.completedAt = Date.now();
  } else {
    // 다음 단계로 진행: 생존자만 남기고, 번호는 일단 비워서 "유지/재등록"을 다시 선택하게 한다
    room.aliveIds = survivors.map(function(p){ return p.id; });
    survivors.forEach(function(p){ p.picks = null; p.submittedAt = null; });
    room.stage += 1;
    room.stageRound += 1;
    room.status = 'pending_numbers';
  }

  BATTLE.save(rooms);
  return { ok:true, room:room };
};
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0d18; --surface:#11152a; --surface-2:#161b35;
  --border:#252b48; --border-soft:#1b2038;
  --text:#eef0f6; --text-dim:#8b91ab; --text-faint:#5a6080;
  --gold:#e0b341; --gold-dim:#8a6f2f;
  --accent:#e8732f; --accent-bg:rgba(232,115,47,.13);
  --indigo:#5b6ee8; --indigo-dim:#2a3270;
  --green:#3fb37f; --red:#d4537e; --blue:#5b9bd5;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;font-size:14px;letter-spacing:-0.01em;min-height:100vh;}
.font-num{font-variant-numeric:tabular-nums;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}

.topbar{border-bottom:1px solid var(--border-soft);}
.topbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;}
.brand-mark{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 32% 28%, #f3d785, var(--gold) 60%, var(--gold-dim));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.brand-text .t1{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
.brand-text .t2{font-size:10px;color:var(--text-faint);margin-top:1px;}

.wrap{max-width:1280px;margin:0 auto;padding:24px;}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:20px;}
.page-title{font-size:23px;font-weight:600;letter-spacing:-0.02em;}
.page-sub{font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.6;max-width:600px;}
.btn{border:none;border-radius:9px;padding:10px 16px;font-size:12.5px;font-weight:600;cursor:pointer;}
.btn-gold{background:var(--gold);color:#1a1404;}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text-dim);}
.btn-outline:hover{border-color:var(--gold-dim);color:var(--text);}

.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.type-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .15s;}
.type-card:hover{border-color:var(--accent);}
.type-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.type-card .ti{font-size:22px;margin-bottom:8px;}
.type-card .tn{font-size:14px;font-weight:700;margin-bottom:4px;}
.type-card .td{font-size:11px;color:var(--text-faint);line-height:1.5;}

.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:20px;margin-bottom:16px;}
.card h3{font-size:14px;font-weight:700;margin-bottom:12px;}

.form-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.form-row label{font-size:12px;color:var(--text-dim);font-weight:600;min-width:80px;}
.inp{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 12px;font-size:12.5px;outline:none;}

.summary-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:18px 20px;margin-bottom:20px;}
.summary-row{display:flex;gap:10px;flex-wrap:wrap;}
.summary-stat{flex:1;min-width:108px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:11px;padding:12px 14px;cursor:pointer;transition:border-color .15s,transform .15s;}
.summary-stat:hover{border-color:var(--accent);transform:translateY(-1px);}
.summary-stat.disabled{cursor:default;}
.summary-stat.disabled:hover{border-color:var(--border-soft);transform:none;}
.summary-stat .ss-num{font-size:21px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.summary-stat .ss-label{font-size:10.5px;color:var(--text-faint);margin-top:5px;font-weight:600;}
.summary-divider{width:1px;background:var(--border-soft);margin:2px 4px;flex-shrink:0;}
.summary-types{display:flex;gap:14px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);flex-wrap:wrap;}

.summary-type-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.summary-type-pill b{color:var(--text);font-variant-numeric:tabular-nums;}
.summary-empty{font-size:11.5px;color:var(--text-faint);margin-top:14px;padding-top:14px;border-top:1px solid var(--border-soft);}

.room-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-soft);margin-bottom:18px;}
.room-tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--text-faint);border-bottom:2px solid transparent;cursor:pointer;}
.room-tab.active{color:var(--text);border-bottom-color:var(--accent);}

.room-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.room-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:16px;cursor:pointer;}
.room-card:hover{border-color:var(--accent);}
.room-card .rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.room-card .rc-type{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;}
.room-card .rc-name{font-size:13.5px;font-weight:700;margin-bottom:4px;}
.room-card .rc-meta{font-size:11px;color:var(--text-faint);}
.status-tag{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:20px;}
.status-waiting{background:rgba(91,156,213,.15);color:var(--blue);}
.status-pending_numbers{background:rgba(224,179,65,.15);color:var(--gold);}
.status-active{background:rgba(63,179,127,.15);color:var(--green);}
.status-stage_running{background:rgba(232,115,47,.15);color:var(--accent);}
.status-completed{background:var(--surface-2);color:var(--text-faint);}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-faint);font-size:13px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;padding:26px;}
.modal-box h3{margin-bottom:14px;font-size:16px;}
.modal-box{position:relative;}
.modal-close-x{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5;}
.modal-close-x:hover{background:var(--red);color:#fff;border-color:var(--red);}

.ball-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-bottom:14px;}
.ball-btn{aspect-ratio:1;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text-dim);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.ball-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}

.participant-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--surface-2);border-radius:8px;margin-bottom:6px;font-size:12px;}
.participant-row.winner{border:1px solid var(--gold);background:rgba(224,179,65,.08);}
.admin-lock{display:flex;flex-direction:column;align-items:center;gap:12px;padding:30px;color:var(--text-faint);}
.admin-lock input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 14px;font-size:13px;text-align:center;}

@media (max-width:760px){ .type-grid{grid-template-columns:repeat(2,1fr);} }
</style>

<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="location.href='main_page.html'">
      <div class="brand-mark">⚔️</div>
      <div class="brand-text"><div class="t1">My Lotto Lab — Battles</div><div class="t2">전략으로 맞붙는 1:1·팀전·무제한·토너먼트 대결</div></div>
    </div>
    <button class="btn btn-outline" onclick="location.href='main_page.html'">← 메인으로</button>
  </div>
</div>

<div class="wrap">
  <div class="page-head">
    <div>
      <div class="page-title" id="pageTitleArea">⚔️ Battles</div>
      <div class="page-sub" id="pageSubArea">같은 회차에 번호를 미리 제출하고, 추첨 결과로 승부를 가립니다. 신청시간 매주 일요일 0시 ~ 토요일 오후 8시.</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" id="adminEntryBtn" onclick="BUI.openAdminView()">🔒 관리자</button>
      <button class="btn btn-gold" onclick="BUI.openCreateModal()">+ 방 만들기</button>
    </div>
  </div>

  <!-- ===== 1단계: 종류 선택 화면 ===== -->
  <div id="viewTypeSelect">
    <div class="summary-card" id="battleSummary"></div>
    <div class="type-grid" id="typeSelectGrid" style="margin-top:4px;"></div>
  </div>

  <!-- ===== 2단계: 방 목록 화면 ===== -->
  <div id="viewRoomList" style="display:none;">
    <button class="btn btn-outline" style="margin-bottom:16px;" onclick="BUI.backToTypeSelect()">← 대결종류 선택으로</button>
    <div class="room-tabs" id="roomTabs"></div>
    <div id="roomListBody"></div>
  </div>

  <!-- ===== 관리자 화면 ===== -->
  <div id="viewAdmin" style="display:none;">
    <button class="btn btn-outline" style="margin-bottom:16px;" onclick="BUI.backToTypeSelect()">← 대결종류 선택으로</button>
    <div id="adminBody"></div>
  </div>
</div>

<div class="modal-overlay" id="createModal" onclick="if(event.target===this)BUI.closeCreate()">
  <div class="modal-box">
    <button class="modal-close-x" onclick="BUI.closeCreate()" title="닫기">✕</button>
    <h3>새 배틀 만들기</h3>
    <div class="type-grid" id="createTypeGrid"></div>
    <div id="createFormBody"></div>
  </div>
</div>

<div class="modal-overlay" id="roomModal" onclick="if(event.target===this)BUI.closeRoom()">
  <div class="modal-box" id="roomModalBox"></div>
</div>

<script>
// =====================================================
// BUI - 화면 컨트롤러
// =====================================================
var BUI = {};
BUI.state = { view: 'typeSelect', filterType: null, roomTab: 'waiting', createType: '1v1', selectedBalls: [], currentRoomId: null, joinAsNickname: null };
BUI.MY_NICK_KEY = 'mll_battle_my_nick';

BUI.getMyNick = function(){
  var n = localStorage.getItem(BUI.MY_NICK_KEY);
  if (!n) { n = '게스트' + Math.floor(Math.random()*9000+1000); localStorage.setItem(BUI.MY_NICK_KEY, n); }
  return n;
};

BUI.init = function(){
  BUI.showTypeSelectView();
};

BUI.renderSummary = function(){
  var el = document.getElementById('battleSummary');
  if (!el) return;
  var rooms = BATTLE.load();

  if (!rooms.length) {
    el.innerHTML = '<div class="empty-state" style="padding:24px 20px;">아직 만들어진 배틀 방이 없습니다. 아래에서 대결 종류를 골라 첫 방을 만들어보세요!</div>';
    BUI.updateAdminBadge(0);
    return;
  }

  var statKeys = [
    { key:'waiting', label:'대기중' },
    { key:'pending_numbers', label:'번호제출중' },
    { key:'active', label:'추첨대기' },
    { key:'stage_running', label:'단계 추첨대기' },
    { key:'completed', label:'완료' },
  ];
  var counts = {};
  statKeys.forEach(function(s){ counts[s.key] = 0; });
  var totalParticipants = 0;
  var typeCounts = { '1v1':0, 'team':0, 'ffa':0, 'tournament':0 };

  rooms.forEach(function(r){
    if (counts[r.status] != null) counts[r.status]++;
    totalParticipants += r.participants.length;
    if (typeCounts[r.type] != null) typeCounts[r.type]++;
  });

  var statsHtml = statKeys.map(function(s){
    return '<div class="summary-stat disabled">' +
      '<div class="ss-num">' + counts[s.key] + '</div>' +
      '<div class="ss-label">' + s.label + '</div>' +
    '</div>';
  }).join('');

  statsHtml += '<div class="summary-divider"></div>' +
    '<div class="summary-stat disabled">' +
      '<div class="ss-num" style="color:var(--gold);">' + rooms.length + '</div>' +
      '<div class="ss-label">전체 방</div>' +
    '</div>' +
    '<div class="summary-stat disabled">' +
      '<div class="ss-num" style="color:var(--gold);">' + totalParticipants + '</div>' +
      '<div class="ss-label">참가자 누적</div>' +
    '</div>';

  var typesHtml = Object.keys(typeCounts).map(function(key){
    var t = BATTLE.TYPES[key];
    var color = BUI.typeColor(key);
    return '<div class="summary-type-pill" style="cursor:pointer;" onclick="BUI.openTypeRoomList(\'' + key + '\')" title="' + t.nameKr + ' 방 목록 보기">' +
      '<span class="dot" style="background:' + color + ';"></span>' + t.nameKr + ' <b>' + typeCounts[key] + '</b></div>';
  }).join('');

  el.innerHTML = '<div class="summary-row">' + statsHtml + '</div>' +
    '<div class="summary-types">' + typesHtml + '</div>';

  var gradeableCount = rooms.filter(function(r){ return r.status === 'active' || r.status === 'stage_running'; }).length;
  BUI.updateAdminBadge(gradeableCount);
};

BUI.updateAdminBadge = function(count){
  var btn = document.getElementById('adminEntryBtn');
  if (!btn) return;
  btn.innerHTML = '🔒 관리자' + (count > 0 ? ' <span style="background:var(--accent);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;margin-left:4px;">' + count + '</span>' : '');
};

BUI.renderTabs = function(){
  var tabs = [
    { key:'waiting', label:'대기중' },
    { key:'pending_numbers', label:'번호제출중' },
    { key:'active', label:'추첨대기' },
    { key:'stage_running', label:'단계 추첨대기' },
    { key:'completed', label:'완료' },
  ];
  document.getElementById('roomTabs').innerHTML = tabs.map(function(t){
    return '<div class="room-tab' + (BUI.state.roomTab===t.key?' active':'') + '" onclick="BUI.setRoomTab(\'' + t.key + '\')">' + t.label + '</div>';
  }).join('');
};
BUI.setRoomTab = function(key){
  BUI.state.roomTab = key;
  BUI.renderTabs();
  BUI.renderRoomList();
};

BUI.typeColor = function(type){ return { '1v1':'#5b9bd5', 'team':'#3fb37f', 'ffa':'#e8732f', 'tournament':'#e0b341' }[type]; };

// ── 화면 전환 (1단계: 종류선택 / 2단계: 방목록 / 관리자) ──
BUI.showView = function(view){
  BUI.state.view = view;
  document.getElementById('viewTypeSelect').style.display = (view==='typeSelect') ? '' : 'none';
  document.getElementById('viewRoomList').style.display = (view==='roomList') ? '' : 'none';
  document.getElementById('viewAdmin').style.display = (view==='admin') ? '' : 'none';
};

BUI.showTypeSelectView = function(){
  BUI.state.filterType = null;
  document.getElementById('pageTitleArea').textContent = '⚔️ Battles';
  document.getElementById('pageSubArea').textContent = '같은 회차에 번호를 미리 제출하고, 추첨 결과로 승부를 가립니다. 신청시간 매주 일요일 0시 ~ 토요일 오후 8시.';
  BUI.renderSummary();
  BUI.renderTypeSelectGrid();
  BUI.showView('typeSelect');
};

BUI.openTypeRoomList = function(typeKey){
  BUI.state.filterType = typeKey;
  BUI.state.roomTab = 'waiting';
  var t = BATTLE.TYPES[typeKey];
  var icons = { '1v1':'⚔️', 'team':'🛡️', 'ffa':'🌀', 'tournament':'🏆' };
  document.getElementById('pageTitleArea').textContent = icons[typeKey] + ' ' + t.nameKr;
  var descs = {
    '1v1': '1:1 정면대결 — 둘 중 결과가 좋은 쪽이 승리합니다.',
    'team': '두 팀으로 나뉘어, 팀 내 최고성적자끼리 비교합니다.',
    'ffa': '여러 명이 한꺼번에 참가하고, 1위가 승리합니다.',
    'tournament': '시스템이 운영하는 토너먼트입니다. 매 단계 추첨 후 하위 성적자가 탈락합니다.',
  };
  document.getElementById('pageSubArea').textContent = descs[typeKey];
  BUI.renderTabs();
  BUI.renderRoomList();
  BUI.showView('roomList');
};

BUI.backToTypeSelect = function(){
  BUI.showTypeSelectView();
};

BUI.openAdminView = function(){
  BUI.adminLoggedIn = BUI.adminLoggedIn || MLL.checkAdmin();
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
  BUI.showView('admin');
};

BUI.renderTypeSelectGrid = function(){
  var rooms = BATTLE.load();
  var icons = { '1v1':'⚔️', 'team':'🛡️', 'ffa':'🌀', 'tournament':'🏆' };
  var descs = {
    '1v1': '1:1 정면대결 — 둘 중 결과가 좋은 쪽이 승리',
    'team': '두 팀으로 나뉘어, 팀 내 최고성적자끼리 비교',
    'ffa': '여러 명이 한꺼번에, 1위가 승리',
    'tournament': '매 단계 추첨 후 하위 성적자가 탈락하는 시스템 운영 토너먼트',
  };
  document.getElementById('typeSelectGrid').innerHTML = Object.keys(BATTLE.TYPES).map(function(key){
    var t = BATTLE.TYPES[key];
    var count = rooms.filter(function(r){ return r.type === key; }).length;
    var openCount = rooms.filter(function(r){ return r.type === key && r.status === 'waiting'; }).length;
    return '<div class="type-card" onclick="BUI.openTypeRoomList(\'' + key + '\')">' +
      '<div class="ti">' + icons[key] + '</div>' +
      '<div class="tn">' + t.nameKr + '</div>' +
      '<div class="td">' + descs[key] + '</div>' +
      '<div style="margin-top:10px;font-size:11px;color:var(--text-faint);">방 ' + count + '개' + (openCount>0 ? ' · <span style="color:var(--accent);font-weight:700;">참가가능 ' + openCount + '개</span>' : '') + '</div>' +
    '</div>';
  }).join('');
};

BUI.renderRoomList = function(){
  BUI.renderSummary();
  var body = document.getElementById('roomListBody');

  var rooms = BATTLE.load().filter(function(r){ return r.status === BUI.state.roomTab && r.type === BUI.state.filterType; });
  if (!rooms.length) { body.innerHTML = '<div class="card"><div class="empty-state">해당 상태의 방이 없습니다.</div></div>'; return; }

  body.innerHTML = '<div class="room-list">' + rooms.map(function(r){
    var typeInfo = BATTLE.TYPES[r.type];
    var color = BUI.typeColor(r.type);
    var stageInfo = (r.type === 'tournament') ? (' · ' + r.stage + '단계') : '';
    return '<div class="room-card" onclick="BUI.openRoom(\'' + r.id + '\')">' +
      '<div class="rc-top">' +
        '<span class="rc-type" style="background:' + color + '22;color:' + color + ';">' + typeInfo.nameKr + stageInfo + '</span>' +
        '<span class="status-tag status-' + r.status + '">' + BUI.statusLabel(r.status) + '</span>' +
      '</div>' +
      '<div class="rc-name">' + r.name + '</div>' +
      '<div class="rc-meta">제' + (r.type==='tournament'?r.stageRound:r.round) + '회 · 참가자 ' + r.participants.length + '/' + r.maxParticipants + '명</div>' +
    '</div>';
  }).join('') + '</div>';
};

BUI.statusLabel = function(s){
  return { waiting:'대기중', pending_numbers:'번호제출중', active:'추첨대기', stage_running:'단계 추첨대기', completed:'완료' }[s] || s;
};

// ── 방 만들기 ──
BUI.openCreateModal = function(){
  BUI.state.createType = BUI.state.filterType || '1v1';
  BUI.renderCreateTypeGrid();
  BUI.renderCreateForm();
  document.getElementById('createModal').classList.add('show');
};
BUI.closeCreate = function(){ document.getElementById('createModal').classList.remove('show'); };

BUI.renderCreateTypeGrid = function(){
  var descs = {
    '1v1': '1:1 정면대결 — 둘 중 결과가 좋은 쪽이 승리',
    'team': '두 팀으로 나뉘어, 팀 내 최고성적자끼리 비교',
    'ffa': '여러 명이 한꺼번에, 1위가 승리',
    'tournament': '시스템이 운영하는 토너먼트입니다. 매 단계 추첨 후 하위 성적자가 탈락하며, 생존자는 번호를 그대로 쓰거나 새로 등록할 수 있어요. (예: 8명 토너먼트는 실제 추첨 3번을 거쳐야 우승자가 나와요)',
  };
  document.getElementById('createTypeGrid').innerHTML = Object.keys(BATTLE.TYPES).map(function(key){
    var t = BATTLE.TYPES[key];
    var icons = { '1v1':'⚔️', 'team':'🛡️', 'ffa':'🌀', 'tournament':'🏆' };
    var active = BUI.state.createType === key;
    return '<div class="type-card' + (active?' active':'') + '" onclick="BUI.selectCreateType(\'' + key + '\')">' +
      '<div class="ti">' + icons[key] + '</div>' +
      '<div class="tn">' + t.nameKr + '</div>' +
      '<div class="td">' + descs[key] + '</div>' +
    '</div>';
  }).join('');
};
BUI.selectCreateType = function(key){
  BUI.state.createType = key;
  BUI.renderCreateTypeGrid();
  BUI.renderCreateForm();
};

BUI.renderCreateForm = function(){
  var type = BATTLE.TYPES[BUI.state.createType];
  var info = MLL.getLottoInfo();
  var sizeOptionsHtml = '';
  if (BUI.state.createType === 'team') {
    sizeOptionsHtml = '<div class="form-row"><label>팀당 인원</label><input type="number" class="inp" id="cfTeamSize" value="2" min="1" max="10" style="width:80px;"> <span style="font-size:11px;color:var(--text-faint);">명 × 2팀</span></div>';
  } else if (BUI.state.createType === 'ffa') {
    sizeOptionsHtml = '<div class="form-row"><label>최대 인원</label><input type="number" class="inp" id="cfMaxSize" value="8" min="2" max="50" style="width:80px;"></div>';
  } else if (BUI.state.createType === 'tournament') {
    sizeOptionsHtml = '<div class="form-row"><label>참가 인원</label><select class="inp" id="cfMaxSize"><option value="4">4명</option><option value="8" selected>8명</option><option value="16">16명</option></select></div>';
  }

  document.getElementById('createFormBody').innerHTML =
    '<div class="form-row"><label>방 이름</label><input type="text" class="inp" id="cfName" placeholder="' + type.nameKr + ' 방" style="flex:1;"></div>' +
    '<div class="form-row"><label>대상 회차</label><input type="number" class="inp" id="cfRound" value="' + info.saleRound + '" style="width:100px;"> <span style="font-size:11px;color:var(--text-faint);">현재 판매중: 제' + info.saleRound + '회</span></div>' +
    sizeOptionsHtml +
    '<button class="btn btn-gold" style="width:100%;margin-top:10px;" onclick="BUI.submitCreate()">방 만들기</button>';
};

BUI.submitCreate = function(){
  var type = BUI.state.createType;
  var name = document.getElementById('cfName').value.trim();
  var round = parseInt(document.getElementById('cfRound').value);
  var opts = { type: type, name: name, round: round };

  if (type === 'team') {
    var teamSize = parseInt(document.getElementById('cfTeamSize').value) || 2;
    opts.maxParticipants = teamSize * 2;
    opts.teamCount = 2;
  } else if (type === 'ffa' || type === 'tournament') {
    opts.maxParticipants = parseInt(document.getElementById('cfMaxSize').value) || 8;
  } else {
    opts.maxParticipants = 2;
  }

  var room = BATTLE.createRoom(opts);
  BUI.closeCreate();
  BUI.openTypeRoomList(type);
  BUI.setRoomTab('waiting');
  alert('✅ 방이 생성되었습니다! 참가자를 모아보세요.');
  BUI.openRoom(room.id);
};

// ── 방 상세 ──
BUI.openRoom = function(roomId){
  BUI.state.currentRoomId = roomId;
  BUI.renderRoomModal();
  document.getElementById('roomModal').classList.add('show');
};
BUI.closeRoom = function(){
  document.getElementById('roomModal').classList.remove('show');
  BUI.renderRoomList();
};

BUI.renderRoomModal = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  if (!room) { BUI.closeRoom(); return; }
  var box = document.getElementById('roomModalBox');
  var typeInfo = BATTLE.TYPES[room.type];
  var myNick = BUI.getMyNick();
  var myParticipant = room.participants.find(function(p){ return p.nickname === myNick; });

  var header =
    '<button class="modal-close-x" onclick="BUI.closeRoom()" title="닫기">✕</button>' +
    '<div style="margin-bottom:6px;padding-right:36px;">' +
      '<h3 style="margin-bottom:0;">' + room.name + '</h3>' +
    '</div>' +
    '<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:16px;">' + typeInfo.nameKr + ' · 제' + (room.type==='tournament'?room.stageRound:room.round) + '회' + (room.type==='tournament'?(' · '+room.stage+'단계'):'') + ' · <span class="status-tag status-' + room.status + '">' + BUI.statusLabel(room.status) + '</span></div>';

  var bodyHtml = '';
  if (room.status === 'waiting') {
    bodyHtml = BUI.roomWaitingHtml(room, myParticipant, myNick);
  } else if (room.status === 'pending_numbers') {
    bodyHtml = BUI.roomPendingHtml(room, myParticipant);
  } else if (room.status === 'active') {
    bodyHtml = BUI.roomActiveHtml(room);
  } else if (room.status === 'stage_running') {
    bodyHtml = BUI.roomStageRunningHtml(room);
  } else if (room.status === 'completed') {
    bodyHtml = BUI.roomCompletedHtml(room);
  }

  box.innerHTML = header + bodyHtml;
  var stillNeedsBallGrid = room.status === 'pending_numbers' && myParticipant && !myParticipant.picks &&
    (room.type !== 'tournament' || room.aliveIds.indexOf(myParticipant.id) >= 0);
  if (stillNeedsBallGrid && document.getElementById('pendingBallGrid')) {
    BUI.renderBallGrid('pendingBallGrid');
  }
};

BUI.roomWaitingHtml = function(room, myParticipant, myNick){
  var typeInfo = BATTLE.TYPES[room.type];
  var participantsHtml = room.participants.map(function(p){
    var sideLabel = (room.type === 'team') ? (' · ' + (p.side===0?'팀A':'팀B')) : '';
    return '<div class="participant-row"><span>' + p.nickname + sideLabel + '</span><span style="color:var(--text-faint);">참가완료</span></div>';
  }).join('') || '<div class="empty-state">아직 참가자가 없습니다.</div>';

  var joinFormHtml = '';
  if (!myParticipant && room.participants.length < room.maxParticipants) {
    if (room.type === 'team') {
      var teamSize = room.maxParticipants / 2;
      var teamACounts = room.participants.filter(function(p){return p.side===0;}).length;
      var teamBCounts = room.participants.filter(function(p){return p.side===1;}).length;
      joinFormHtml =
        '<div class="form-row"><label>참가할 팀</label>' +
          '<select class="inp" id="joinSide">' +
            '<option value="0"' + (teamACounts>=teamSize?' disabled':'') + '>팀A (' + teamACounts + '/' + teamSize + ')</option>' +
            '<option value="1"' + (teamBCounts>=teamSize?' disabled':'') + '>팀B (' + teamBCounts + '/' + teamSize + ')</option>' +
          '</select>' +
        '</div>' +
        '<button class="btn btn-gold" style="width:100%;" onclick="BUI.doJoin()">' + myNick + '으로 참가하기</button>';
    } else {
      joinFormHtml = '<button class="btn btn-gold" style="width:100%;" onclick="BUI.doJoin()">' + myNick + '으로 참가하기</button>';
    }
  } else if (myParticipant) {
    joinFormHtml = '<div style="font-size:12px;color:var(--green);text-align:center;padding:10px;">✓ 이미 참가하셨습니다. 다른 참가자를 기다려주세요.</div>';
  }

  var closeBtnHtml = '';
  if (typeInfo.variableSize && room.participants.length >= 2 && !myParticipant) {
    closeBtnHtml = '<button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="BUI.doCloseRegistration()">지금 바로 접수 마감하고 번호제출 단계로</button>';
  }

  return '<div class="card"><h3>참가자 (' + room.participants.length + '/' + room.maxParticipants + ')</h3>' + participantsHtml + '</div>' +
    '<div class="card">' + joinFormHtml + closeBtnHtml + '</div>';
};

BUI.doJoin = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  var side = (room.type === 'team') ? parseInt(document.getElementById('joinSide').value) : null;
  var result = BATTLE.joinRoom(room.id, BUI.getMyNick(), side);
  if (!result.ok) { alert('⚠️ ' + result.msg); return; }
  BUI.renderRoomModal();
};
BUI.doCloseRegistration = function(){
  var result = BATTLE.closeRegistration(BUI.state.currentRoomId);
  if (!result.ok) { alert('⚠️ ' + (result.msg||'마감할 수 없습니다.')); return; }
  BUI.renderRoomModal();
};

BUI.roomPendingHtml = function(room, myParticipant){
  var isTournament = room.type === 'tournament';
  var displayParticipants = isTournament ? room.participants.filter(function(p){ return room.aliveIds.indexOf(p.id) >= 0; }) : room.participants;

  var noticeHtml = '';
  if (isTournament) {
    noticeHtml = '<div class="card" style="background:rgba(224,179,65,.06);border-color:var(--gold-dim);font-size:11.5px;color:var(--text-dim);line-height:1.7;">' +
      '🏆 ' + room.stage + '단계 (제' + room.stageRound + '회 추첨 기준) — 시스템이 운영하는 토너먼트입니다. 매 단계 추첨 후 하위 성적자가 탈락하며, 생존자는 번호를 그대로 쓰거나 새로 등록할 수 있어요.' +
      (room.stage > 1 ? '<br>현재 ' + displayParticipants.length + '명이 생존해 있습니다.' : '') +
    '</div>';
  }

  var participantsHtml = displayParticipants.map(function(p){
    var sideLabel = (room.type === 'team') ? (' · ' + (p.side===0?'팀A':'팀B')) : '';
    return '<div class="participant-row"><span>' + p.nickname + sideLabel + '</span><span style="color:' + (p.picks?'var(--green)':'var(--text-faint)') + ';">' + (p.picks?'제출완료':'대기중') + '</span></div>';
  }).join('');

  var submitHtml = '';
  if (myParticipant && !myParticipant.picks && (!isTournament || room.aliveIds.indexOf(myParticipant.id)>=0)) {
    var keepBtnHtml = (isTournament && myParticipant.lastPicks)
      ? '<button class="btn btn-outline" style="width:100%;margin-bottom:8px;" onclick="BUI.doKeepSamePicks()">↺ 이전 번호 그대로 쓰기 (' + myParticipant.lastPicks.join(', ') + ')</button>'
      : '';
    submitHtml = '<div class="card"><h3>내 번호 선택 (' + BUI.state.selectedBalls.length + '/6)</h3>' +
      keepBtnHtml +
      '<div class="ball-grid" id="pendingBallGrid"></div>' +
      '<button class="btn btn-outline" style="width:100%;margin-bottom:8px;" onclick="BUI.autoFillBalls()">✦ 자동 채우기</button>' +
      '<button class="btn btn-gold" style="width:100%;" id="submitPicksBtn" disabled onclick="BUI.doSubmitPicks()">번호 제출하기</button>' +
    '</div>';
  } else if (myParticipant && myParticipant.picks) {
    submitHtml = '<div class="card"><div style="font-size:12px;color:var(--green);text-align:center;">✓ 제출 완료: ' + myParticipant.picks.join(', ') + '<br>다른 참가자의 제출을 기다리는 중입니다.</div></div>';
  } else if (isTournament && myParticipant && room.aliveIds.indexOf(myParticipant.id) < 0) {
    submitHtml = '<div class="card"><div style="font-size:12px;color:var(--text-faint);text-align:center;">이전 단계에서 탈락하셨습니다. 결과는 "완료" 탭에서 확인하실 수 있어요.</div></div>';
  }

  return noticeHtml + '<div class="card"><h3>' + (isTournament?'생존자':'참가자') + ' (' + displayParticipants.length + '명)</h3>' + participantsHtml + '</div>' + submitHtml;
};

BUI.doKeepSamePicks = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  var myParticipant = room.participants.find(function(p){ return p.nickname === BUI.getMyNick(); });
  if (!myParticipant) return;
  var result = BATTLE.keepSamePicks(room.id, myParticipant.id);
  if (!result.ok) { alert('⚠️ ' + (result.msg||'처리할 수 없습니다.')); return; }
  BUI.renderRoomModal();
};

BUI.roomStageRunningHtml = function(room){
  var alive = room.participants.filter(function(p){ return room.aliveIds.indexOf(p.id) >= 0; });
  return '<div class="card" style="background:rgba(232,115,47,.06);border-color:var(--accent);font-size:11.5px;color:var(--text-dim);line-height:1.7;">' +
      '⏳ ' + room.stage + '단계 — 생존자 ' + alive.length + '명 전원이 번호를 제출했습니다. 제' + room.stageRound + '회 추첨 결과가 나오면 자동으로 다음 단계가 진행됩니다.' +
    '</div>' +
    '<div class="card"><h3>이번 단계 제출 번호</h3>' + alive.map(function(p){
      return '<div class="participant-row"><span>' + p.nickname + '</span><span class="font-num">' + p.picks.join(', ') + '</span></div>';
    }).join('') + '</div>';
};

BUI.renderBallGrid = function(containerId){
  var html = '';
  for (var n=1; n<=45; n++) {
    var on = BUI.state.selectedBalls.indexOf(n) >= 0;
    html += '<button class="ball-btn' + (on?' on':'') + '" onclick="BUI.toggleBall(' + n + ')">' + n + '</button>';
  }
  document.getElementById(containerId).innerHTML = html;
};
BUI.toggleBall = function(n){
  var sel = BUI.state.selectedBalls;
  var idx = sel.indexOf(n);
  if (idx >= 0) sel.splice(idx, 1);
  else if (sel.length < 6) sel.push(n);
  BUI.renderBallGrid('pendingBallGrid');
  var btn = document.getElementById('submitPicksBtn');
  if (btn) btn.disabled = sel.length !== 6;
  var header = document.querySelector('#roomModalBox .card h3');
  if (header) header.textContent = '내 번호 선택 (' + sel.length + '/6)';
};
BUI.autoFillBalls = function(){
  var pool = []; for (var i=1;i<=45;i++) pool.push(i);
  var picked = [];
  while (picked.length < 6) {
    var idx = Math.floor(Math.random()*pool.length);
    picked.push(pool.splice(idx,1)[0]);
  }
  BUI.state.selectedBalls = picked;
  BUI.renderBallGrid('pendingBallGrid');
  var btn = document.getElementById('submitPicksBtn');
  if (btn) btn.disabled = false;
  var header = document.querySelector('#roomModalBox .card h3');
  if (header) header.textContent = '내 번호 선택 (6/6)';
};
BUI.doSubmitPicks = function(){
  var room = BATTLE.getRoom(BUI.state.currentRoomId);
  var myParticipant = room.participants.find(function(p){ return p.nickname === BUI.getMyNick(); });
  if (!myParticipant) return;
  var result = BATTLE.submitPicks(room.id, myParticipant.id, BUI.state.selectedBalls);
  if (!result.ok) { alert('⚠️ ' + result.msg); return; }
  BUI.state.selectedBalls = [];
  BUI.renderRoomModal();
};

BUI.roomActiveHtml = function(room){
  return '<div class="card"><div class="empty-state">⏳ 모든 참가자가 번호를 제출했습니다.<br>제' + room.round + '회 추첨 결과가 발표되면 자동으로 채점됩니다.</div></div>' +
    '<div class="card"><h3>참가자별 제출 번호</h3>' + room.participants.map(function(p){
      var sideLabel = (room.type === 'team') ? (' · ' + (p.side===0?'팀A':'팀B')) : '';
      return '<div class="participant-row"><span>' + p.nickname + sideLabel + '</span><span class="font-num">' + p.picks.join(', ') + '</span></div>';
    }).join('') + '</div>';
};

BUI.roomCompletedHtml = function(room){
  var isTournament = room.type === 'tournament';
  var r = room.result;
  var resultHtml = isTournament
    ? '' // 토너먼트는 단계마다 추첨회차가 달라서, 아래 "대결 진행표"에 단계별로 회차+결과를 같이 보여준다
    : '<div class="card"><h3>추첨 결과</h3><div class="font-num" style="font-size:14px;">' + r.nums.join(', ') + ' <span style="color:var(--text-faint);">+ ' + r.bonus + '</span></div></div>';

  var rankedHtml;
  if (isTournament) {
    var winner = room.participants.find(function(p){ return room.winnerIds.indexOf(p.id) >= 0; });
    rankedHtml = '<div class="card"><h3>🏆 최종 우승 (' + room.bracketLog.length + '단계 진행)</h3><div class="participant-row winner"><span>' + winner.nickname + '</span><span class="font-num">마지막 단계 ' + winner.matchCount + '개 일치 · ' + (winner.grade>0?winner.grade+'등':'낙첨') + '</span></div></div>' +
      '<div class="card"><h3>단계별 진행표</h3>' + room.bracketLog.map(function(stage){
        return '<div style="font-size:11px;color:var(--text-faint);margin:10px 0 4px;">' + stage.stage + '단계 · 제' + stage.round + '회 추첨 기준</div>' +
          stage.matches.map(function(m){
            var p1 = room.participants.find(function(p){return p.id===m.p1Id;});
            var p2 = room.participants.find(function(p){return p.id===m.p2Id;});
            var winnerNick = room.participants.find(function(p){return p.id===m.winnerId;}).nickname;
            return '<div class="participant-row"><span>' + p1.nickname + ' vs ' + p2.nickname + '</span><span style="color:var(--gold);">→ ' + winnerNick + '</span></div>';
          }).join('');
      }).join('') + '</div>';
  } else if (room.type === 'team') {
    var teamLabel = room.winningSide === 0 ? '팀A' : '팀B';
    rankedHtml = '<div class="card"><h3>🏆 승리팀: ' + teamLabel + '</h3>' +
      room.participants.slice().sort(function(a,b){return BATTLE.compareParticipants(a,b);}).map(function(p){
        var isWinner = room.winnerIds.indexOf(p.id) >= 0;
        var sideLabel = (p.side===0?'팀A':'팀B');
        return '<div class="participant-row' + (isWinner?' winner':'') + '"><span>' + p.nickname + ' · ' + sideLabel + '</span><span class="font-num">' + p.matchCount + '개 일치 · ' + (p.grade>0?p.grade+'등':'낙첨') + '</span></div>';
      }).join('') + '</div>';
  } else {
    rankedHtml = '<div class="card"><h3>🏆 결과 순위</h3>' +
      room.participants.slice().sort(function(a,b){return BATTLE.compareParticipants(a,b);}).map(function(p, idx){
        var isWinner = room.winnerIds.indexOf(p.id) >= 0;
        return '<div class="participant-row' + (isWinner?' winner':'') + '"><span>' + (idx+1) + '위 · ' + p.nickname + (isWinner?' 🏆':'') + '</span><span class="font-num">' + p.matchCount + '개 일치 · ' + (p.grade>0?p.grade+'등':'낙첨') + '</span></div>';
      }).join('') + '</div>';
  }

  return resultHtml + rankedHtml;
};

// ── 관리자 ──
BUI.adminLoggedIn = false;
BUI.adminHtml = function(){
  if (!BUI.adminLoggedIn && MLL.checkAdmin()) BUI.adminLoggedIn = true;
  if (!BUI.adminLoggedIn) {
    return '<div class="card"><div class="admin-lock">' +
      '<div>관리자 비밀번호</div>' +
      '<input type="password" id="adminPwInput" onkeydown="if(event.key===\'Enter\')BUI.adminLogin();">' +
      '<button class="btn btn-gold" onclick="BUI.adminLogin()">입장</button>' +
    '</div></div>';
  }

  var gradeable = BATTLE.load().filter(function(r){ return r.status === 'active' || r.status === 'stage_running'; });
  if (!gradeable.length) {
    return '<div class="card" style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12.5px;color:var(--text-dim);">🔓 관리자로 로그인됨</div><button class="btn btn-outline" onclick="BUI.adminLogout()">로그아웃</button></div>' +
      '<div class="card"><div class="empty-state">추첨 대기 중인(채점 가능한) 방이 없습니다.</div></div>';
  }

  return '<div class="card" style="display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12.5px;color:var(--text-dim);">🔓 관리자로 로그인됨</div><button class="btn btn-outline" onclick="BUI.adminLogout()">로그아웃</button></div>' +
    gradeable.map(function(r){
      var typeInfo = BATTLE.TYPES[r.type];
      var targetRound = r.type === 'tournament' ? r.stageRound : r.round;
      var stageLabel = r.type === 'tournament' ? (', ' + r.stage + '단계') : '';
      return '<div class="card">' +
        '<h3>' + r.name + ' (' + typeInfo.nameKr + stageLabel + ', 제' + targetRound + '회, 참가자 ' + r.participants.length + '명)</h3>' +
        '<div class="form-row"><label>당첨번호 6개</label><input type="text" class="inp" id="adminNums_' + r.id + '" placeholder="예: 1,7,13,22,31,40" style="flex:1;"></div>' +
        '<div class="form-row"><label>보너스번호</label><input type="number" class="inp" id="adminBonus_' + r.id + '" min="1" max="45" style="width:80px;"></div>' +
        '<button class="btn btn-gold" onclick="BUI.adminGradeRoom(\'' + r.id + '\')">결과 입력 + 자동채점</button>' +
      '</div>';
    }).join('');
};

BUI.adminLogin = function(){
  var pw = document.getElementById('adminPwInput').value;
  if (!MLL.tryAdminLogin(pw)) { alert('비밀번호가 올바르지 않습니다.'); return; }
  BUI.adminLoggedIn = true;
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
};
BUI.adminLogout = function(){
  MLL.logoutAdmin();
  BUI.adminLoggedIn = false;
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
};

BUI.adminGradeRoom = function(roomId){
  var numsRaw = document.getElementById('adminNums_' + roomId).value;
  var nums = numsRaw.split(',').map(function(s){ return parseInt(s.trim()); }).filter(function(n){ return !isNaN(n); });
  var bonus = parseInt(document.getElementById('adminBonus_' + roomId).value);
  if (nums.length !== 6) { alert('당첨번호 6개를 정확히 입력해주세요.'); return; }
  if (!bonus) { alert('보너스번호를 입력해주세요.'); return; }

  var result = BATTLE.gradeAndFinish(roomId, nums, bonus);
  if (!result.ok) { alert('⚠️ ' + result.msg); return; }
  alert('✅ 채점이 완료되었습니다!');
  document.getElementById('adminBody').innerHTML = BUI.adminHtml();
  BUI.renderSummary();
};

document.addEventListener('DOMContentLoaded', BUI.init);
document.addEventListener('keydown', function(e){
  if (e.key !== 'Escape') return;
  if (document.getElementById('roomModal').classList.contains('show')) BUI.closeRoom();
  else if (document.getElementById('createModal').classList.contains('show')) BUI.closeCreate();
});
</script>
</body>
</html>
