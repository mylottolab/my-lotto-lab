<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 로또 모의테스트 및 실험</title>
<script src="https://my-lotto-lab-api.onrender.com/pay/auth_gate.js"></script>
<style>
:root{
  --bg:#0a0d18; --surface:#11152a; --surface-2:#161b35;
  --border:#252b48; --border-soft:#1b2038;
  --text:#eef0f6; --text-dim:#8b91ab; --text-faint:#5a6080;
  --gold:#e0b341; --gold-dim:#8a6f2f;
  --green:#3fb37f; --green-dim:#1e7b4d;
  --red:#d4537e; --blue:#5b9bd5;
  --game-accent:#8a6fe8;
}
*{box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;font-size:14px;letter-spacing:-0.01em;min-height:100vh;margin:0;}
.font-num{font-variant-numeric:tabular-nums;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}

.topbar{border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg);z-index:50;}
.topbar-inner{max-width:1180px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:11px;}
.brand-mark{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 32% 28%, #c3b2ff, var(--game-accent) 60%, #4a3a99);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.brand-name{font-size:15px;font-weight:700;}
.brand-sub{font-size:10.5px;color:var(--text-faint);}
.topbar-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.points-badge{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;}
.points-badge .lbl{font-size:11px;color:var(--text-dim);}
.points-badge .val{font-size:14px;font-weight:700;color:var(--gold);}

.lotto-wrap{position:relative;}
.lotto-switch{display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:12px;cursor:pointer;border:1px solid var(--border);padding:6px 12px;border-radius:7px;background:none;font-family:inherit;}
.lotto-switch:hover{border-color:var(--game-accent);color:var(--text);}
.lotto-menu{display:none;position:absolute;right:0;top:42px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:200px;z-index:50;}
.lotto-menu.show{display:block;}
.lotto-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;font-size:12.5px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border-soft);}
.lotto-item:last-child{border-bottom:none;}
.lotto-item:hover{background:var(--surface-2);}
.lotto-item .soon{font-size:9px;color:var(--text-faint);border:1px solid var(--border);padding:2px 7px;border-radius:20px;}
.flag-ic{display:inline-block;width:18px;height:13px;border-radius:2px;background-size:cover;background-position:center;vertical-align:middle;box-shadow:0 0 0 1px rgba(255,255,255,.08);flex-shrink:0;}
.flag-kr{background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect width='30' height='20' fill='%23fff'/%3E%3Cg transform='translate(15,10)'%3E%3Ccircle r='4.2' fill='%23c60c30'/%3E%3Cpath d='M0,-4.2 A4.2,4.2 0 0 1 0,4.2 A2.1,2.1 0 0 1 0,0 A2.1,2.1 0 0 0 0,-4.2 Z' fill='%23003478'/%3E%3C/g%3E%3C/svg%3E");}
.flag-us{background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect width='30' height='20' fill='%23b22234'/%3E%3Cg fill='%23fff'%3E%3Crect y='1.54' width='30' height='1.54'/%3E%3Crect y='4.62' width='30' height='1.54'/%3E%3Crect y='7.69' width='30' height='1.54'/%3E%3Crect y='10.77' width='30' height='1.54'/%3E%3Crect y='13.85' width='30' height='1.54'/%3E%3Crect y='16.92' width='30' height='1.54'/%3E%3C/g%3E%3Crect width='13' height='10.77' fill='%233c3b6e'/%3E%3C/svg%3E");}
.flag-eu{background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect width='30' height='20' fill='%23003399'/%3E%3Cg fill='%23ffcc00'%3E%3Ccircle cx='15' cy='4.3' r='0.85'/%3E%3Ccircle cx='15' cy='15.7' r='0.85'/%3E%3Ccircle cx='9.8' cy='5.8' r='0.85'/%3E%3Ccircle cx='20.2' cy='5.8' r='0.85'/%3E%3Ccircle cx='9.8' cy='14.2' r='0.85'/%3E%3Ccircle cx='20.2' cy='14.2' r='0.85'/%3E%3Ccircle cx='7' cy='10' r='0.85'/%3E%3Ccircle cx='23' cy='10' r='0.85'/%3E%3C/g%3E%3C/svg%3E");}

.wrap{max-width:1180px;margin:0 auto;padding:24px;}

.main-tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.main-tab{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:16px 18px;cursor:pointer;transition:border-color .15s, transform .1s;}
.main-tab:hover{transform:translateY(-1px);}
.main-tab.active{border-color:var(--game-accent);box-shadow:0 0 0 1px var(--game-accent);}
.main-tab .mt-icon{font-size:18px;margin-right:7px;}
.main-tab .mt-title{font-size:15px;font-weight:700;display:inline;}
.main-tab .mt-desc{font-size:11px;color:var(--text-faint);margin-top:6px;}

.game-tabs{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.game-tab{flex:1;min-width:170px;background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:13px 16px;cursor:pointer;}
.game-tab.active{border-color:var(--tab-accent, var(--game-accent));box-shadow:0 0 0 1px var(--tab-accent, var(--game-accent));}
.game-tab .gt-name{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px;}
.game-tab .gt-sub{font-size:10.5px;color:var(--text-faint);margin-top:4px;}
.game-tab .gt-status{margin-top:8px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block;}
.game-tab .gt-status.wait{background:rgba(212,83,126,.14);color:var(--red);}
.game-tab .gt-status.ready{background:rgba(63,179,127,.14);color:var(--green);}

.landing-section-title{font-size:13.5px;font-weight:700;color:var(--text-dim);margin-bottom:10px;}
.landing-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.landing-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:16px;cursor:pointer;transition:transform .15s,border-color .15s;}
.landing-card:hover{transform:translateY(-2px);border-color:var(--game-accent);}
.landing-card .lc-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px;}
.landing-card .lc-badge.wait{background:rgba(212,83,126,.14);color:var(--red);}
.landing-card .lc-badge.ready{background:rgba(63,179,127,.14);color:var(--green);}
.landing-card .lc-name{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:7px;}
.landing-card .lc-target{font-size:12px;color:var(--text-dim);margin-top:6px;}
.landing-card .lc-countdown{font-size:11px;color:var(--gold);margin-top:8px;}
.landing-card .lc-jackpot{font-size:11px;color:var(--green);margin-top:6px;}
@media (max-width:900px){ .landing-grid{grid-template-columns:repeat(2,1fr);} }
@media (max-width:520px){ .landing-grid{grid-template-columns:1fr;} }

.info-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:18px 22px;margin-bottom:20px;display:flex;gap:28px;flex-wrap:wrap;}
.info-item .k{font-size:10.5px;color:var(--text-faint);margin-bottom:3px;}
.info-item .v{font-size:14.5px;font-weight:700;color:var(--text);}
.info-item .v.accent{color:var(--game-accent);}

.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:22px;margin-bottom:18px;}
.card h3{margin:0 0 14px;font-size:15px;font-weight:700;}

.form-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid var(--border-soft);}
.form-row:last-child{border-bottom:none;}
.form-row label{font-size:12.5px;font-weight:700;color:var(--text-dim);min-width:120px;}
.inp{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 10px;font-size:13px;outline:none;}
select.scroll-picker{width:100%;max-height:220px;overflow-y:auto;font-family:inherit;font-variant-numeric:tabular-nums;}
select.scroll-picker option{padding:8px 10px;}
select.scroll-picker option:checked{background:var(--game-accent);color:#fff;}

.ball-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:10px 0;}
.ball-btn{border:1px solid var(--border);background:var(--bg);color:var(--text-dim);border-radius:50%;aspect-ratio:1;font-size:11.5px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0;}
.ball-btn.on{background:var(--game-accent);color:#fff;border-color:var(--game-accent);}
.ball-btn:hover{border-color:var(--game-accent);}
.ball-btn.bonus.on{background:var(--gold);color:#1a1305;border-color:var(--gold);}

.btn{border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--surface-2);color:var(--text);}
.btn-outline{background:transparent;}
.btn-accent{background:var(--game-accent);color:#fff;border:none;}
.btn-accent:disabled{opacity:.4;cursor:not-allowed;}
.btn:hover{filter:brightness(1.12);}

.participant-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:12.5px;}
.participant-row:last-child{border-bottom:none;}

.entry-card{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.entry-card:hover{border-color:var(--game-accent);}

.empty-state{text-align:center;padding:34px 20px;color:var(--text-faint);font-size:13px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;padding:26px;position:relative;}
.modal-box h3{margin:0 0 12px;font-size:16px;}
.modal-box p{font-size:13px;color:var(--text-dim);line-height:1.6;margin:0 0 18px;white-space:pre-line;}
.modal-close-x{position:absolute;top:18px;right:18px;background:none;border:none;color:var(--text-faint);font-size:18px;cursor:pointer;}

.slider-row{display:flex;align-items:center;gap:14px;margin:10px 0;}
.slider-row input[type=range]{flex:1;accent-color:var(--game-accent);}

@media (max-width:680px){
  .main-tabs, .game-tabs{flex-direction:column;}
  .ball-grid{grid-template-columns:repeat(7,1fr);}
}

/* ── 번호입력 화면: 왼쪽(입력공, 세로로 길게) / 오른쪽(등록된 조합, 세로로 길게) ── */
.register-cols{display:flex;gap:22px;align-items:flex-start;margin-top:6px;}
.reg-col-left{flex:0 0 300px;}
.reg-col-right{flex:1;min-width:0;max-height:620px;overflow-y:auto;padding-right:4px;}
@media (max-width:820px){
  .register-cols{flex-direction:column;}
  .reg-col-left{flex:none;width:100%;}
  .reg-col-right{max-height:420px;width:100%;}
}
.input-mode-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.mode-btn{flex:1;min-width:76px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:8px 6px;font-size:12px;font-weight:700;}
.mode-btn.active{background:var(--game-accent);color:#fff;border-color:var(--game-accent);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">🧪</div>
      <div>
        <div class="brand-name">My Lotto Lab — 모의테스트</div>
        <div class="brand-sub">4종 복권 예행연습 · 즉시확인 · 무료 수동조회기</div>

    </div>

      <div class="lotto-wrap">
        <button class="lotto-switch" id="lottoBtn" onclick="toggleLottoMenu()">
          <span style="font-size:13px;">🧪</span> <span>모의테스트</span> ▾
        </button>
        <div class="lotto-menu" id="lottoMenu">
          <div class="lotto-item" onclick="location.href='main_page.html'"><span><span class="flag-ic flag-kr"></span> 한국 로또</span><span class="soon" style="color:#9aa8f5;border-color:#4a52a8;">메인</span></div>
          <div class="lotto-item" onclick="location.href='global_lotto.html'"><span><span class="flag-ic flag-us"></span> 해외복권 3종</span><span class="soon" style="color:#9aa8f5;border-color:#4a52a8;">GLOBAL</span></div>
          <div class="lotto-item" onclick="location.href='toto_proto.html'"><span>⚽ 토토·프로토</span><span class="soon" style="color:#3fb37f;border-color:#1e7b4d;">SPORTS</span></div>
          <div class="lotto-item" style="color:var(--game-accent);" onclick="toggleLottoMenu()"><span>🧪 모의테스트 및 실험</span><span class="soon" style="color:var(--game-accent);border-color:var(--game-accent);">이용중</span></div>
        </div>
      </div>
      <button onclick="location.href='hub_lounge.html'" style="display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:11.5px;cursor:pointer;border:1px solid var(--border);padding:6px 12px;border-radius:7px;background:none;font-family:inherit;">
        👤 <span>회원·Lounge</span>
      </button>
      <div class="points-badge">
        <span class="lbl">포인트</span>
        <span class="val font-num" id="pointsBalance">-</span>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="main-tabs" id="mainTabs"></div>
  <div id="mainTabBody"></div>
</div>

<!-- 등록 확인 모달 -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h3 id="confirmTitle">등록 확인</h3>
    <p id="confirmBody"></p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" style="flex:1;" onclick="MU.closeConfirm()">취소</button>
      <button class="btn btn-accent" style="flex:2;" onclick="MU.confirmSubmit()">확인하고 등록</button>
    </div>
  </div>
</div>

<!-- 등록내역 상세 / 채점결과 모달 -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)MU.closeDetail()">
  <div class="modal-box" id="detailModalBox"></div>
</div>

<script>
// =====================================================
// MT - API 통신 계층
// =====================================================
var MT = {};
MT.API_BASE = 'https://my-lotto-lab-api.onrender.com';
MT.GAMES = {
  KR:           { nameKr:'한국로또',     flag:'kr', mainCount:6, mainMax:45, bonusCount:0, bonusMax:0 },
  POWERBALL:    { nameKr:'파워볼',       flag:'us', mainCount:5, mainMax:69, bonusCount:1, bonusMax:26 },
  MEGAMILLIONS: { nameKr:'메가밀리언스', flag:'us', mainCount:5, mainMax:70, bonusCount:1, bonusMax:25 },
  EUROMILLIONS: { nameKr:'유로밀리언스', flag:'eu', mainCount:5, mainMax:50, bonusCount:2, bonusMax:12 },
};
MT.GAME_ORDER = ['KR','POWERBALL','MEGAMILLIONS','EUROMILLIONS'];

async function mtAuthState(){
  if (window.MLL && MLL.ensureFreshToken) { try { await MLL.ensureFreshToken(); } catch(e){} }
  return (window.MLL && MLL.getAuthState) ? MLL.getAuthState() : { type:null };
}
function mtHeaders(state){
  var h = {'Content-Type':'application/json'};
  if (state.type === 'member') h['Authorization'] = 'Bearer ' + state.token;
  return h;
}
function mtAuthBody(state, body){
  body = body || {};
  if (state.type === 'guest') { body.nickname = state.nickname; body.email = state.email; }
  return body;
}
function mtQueryString(params){
  var parts = [];
  Object.keys(params).forEach(function(k){
    var v = params[k];
    if (v !== undefined && v !== null && v !== '') parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(v));
  });
  return parts.length ? ('?' + parts.join('&')) : '';
}

MT._priceCache = null;
MT.getPrice = async function(actionKey){
  if (!MT._priceCache) {
    try {
      var resp = await fetch(MT.API_BASE + '/api/points/price-list');
      var data = await resp.json();
      var map = {};
      (data.items || []).forEach(function(it){ map[it.action_key] = Number(it.cost_points); });
      MT._priceCache = map;
    } catch(e) { MT._priceCache = {}; }
  }
  return MT._priceCache[actionKey] || 0;
};

MT.getKrMeta = async function(){
  try { var r = await fetch(MT.API_BASE + '/api/mocktest/kr/meta'); return r.ok ? r.json() : null; } catch(e){ return null; }
};
MT.getGlobalMeta = async function(gameCode){
  try { var r = await fetch(MT.API_BASE + '/api/mocktest/global/meta/' + gameCode); return r.ok ? r.json() : null; } catch(e){ return null; }
};
MT.getGlobalDates = async function(gameCode){
  try {
    var r = await fetch(MT.API_BASE + '/api/mocktest/global/dates/' + gameCode);
    var d = await r.json();
    return d.dates || [];
  } catch(e) { return []; }
};
// 잭팟은 별도로 안 만들고 기존 해외복권(global_lotto) 시스템의 실시간 잭팟을 그대로 재사용한다
// (설계 확정 2026-07-12 — 정확도/지연은 신경쓰지 않고 그대로 공유하기로 함).
MT.getJackpot = async function(gameCode){
  try {
    var r = await fetch(MT.API_BASE + '/api/global/jackpot/' + gameCode);
    return r.ok ? r.json() : null;
  } catch(e) { return null; }
};
MT.getMyEntries = async function(gameCode, mode){
  var state = await mtAuthState();
  if (!state.type) return [];
  try {
    var qs = mtQueryString({
      game_code: gameCode, mode: mode,
      nickname: state.type==='guest' ? state.nickname : undefined,
      email: state.type==='guest' ? state.email : undefined,
    });
    var r = await fetch(MT.API_BASE + '/api/mocktest/entries' + qs, { headers: mtHeaders(state) });
    var d = await r.json();
    return r.ok ? (d.items || []) : [];
  } catch(e) { return []; }
};
MT.submitEntry = async function(payload){
  var state = await mtAuthState();
  if (!state.type) { if (window.MLL && MLL.requireAuth) MLL.requireAuth(function(){}); return { ok:false }; }
  try {
    var r = await fetch(MT.API_BASE + '/api/mocktest/entries', {
      method: 'POST', headers: mtHeaders(state), body: JSON.stringify(mtAuthBody(state, payload)),
    });
    var d = await r.json();
    if (!r.ok) { alert('등록 실패: ' + (d.error || '')); return { ok:false }; }
    if (d.entry && d.entry.combo_count !== undefined) MT._priceCache = MT._priceCache; // no-op, balance shown via badge separately
    return { ok:true, entry: d.entry, cost: d.cost };
  } catch(e) { alert('네트워크 오류: ' + e.message); return { ok:false }; }
};
MT.check = async function(payload){
  try {
    var r = await fetch(MT.API_BASE + '/api/mocktest/check', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload),
    });
    var d = await r.json();
    if (!r.ok) { alert(d.error || '조회 실패'); return null; }
    return d;
  } catch(e) { alert('네트워크 오류: ' + e.message); return null; }
};

// =====================================================
// MU - 화면(UI) 계층
// =====================================================
var MU = {};
MU.state = {
  mainTab: 'REAL',      // REAL | MOCK | CHECK
  game: 'KR',
  picks: [],            // 스테이징된 조합 [{main:[..], bonus:[..]}]
  selectedMain: [], selectedBonus: [],
  mockTarget: null, mockTargetIdx: null,
  krMeta: null, globalMeta: {}, globalDates: {},
  entriesCache: [],
  checkGame: 'KR', checkMain: [], checkBonus: [], checkRound: null, checkDate: null,
};

MU.state.view = 'landing'; // 'landing' | 'register' | 'check'

MU.init = async function(){
  var params = new URLSearchParams(location.search);
  var tabParam = (params.get('tab') || '').toUpperCase();
  var gameParam = (params.get('game') || '').toUpperCase();

  MU.renderMainTabs();

  if (tabParam === 'CHECK') {

// ⏱ 남은시간 표시용 — 여러 카드의 카운트다운을 1초마다 한 우번에 갱신 (landing 뷰일 때만 동작)
MU.landingDeadlines = {};
function formatCountdown(ms){
  if (ms <= 0) return '마감';
  var totalSec = Math.floor(ms/1000);
  var d = Math.floor(totalSec/86400), h = Math.floor((totalSec%86400)/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  if (d > 0) return d+'일 '+h+'시간 '+m+'분';
  return (h<10?'0'+h:h)+':'+(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
}
function computeKRRegDeadline(){
  var nowKo = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var d = nowKo.getDay();
  var daysUntilSat = (6 - d + 7) % 7;
  var candidate = new Date(nowKo.getFullYear(), nowKo.getMonth(), nowKo.getDate()+daysUntilSat, 20,0,0,0);
  if (candidate.getTime() <= nowKo.getTime()) candidate = new Date(candidate.getTime() + 7*86400000);
  return candidate;
}
if (!window._mtLandingInterval) {
  window._mtLandingInterval = setInterval(function(){
    if (MU.state.view !== 'landing') return;
    Object.keys(MU.landingDeadlines).forEach(function(id){
      var el = document.getElementById(id);
      if (!el) { delete MU.landingDeadlines[id]; return; }
      el.textContent = formatCountdown(MU.landingDeadlines[id].getTime() - Date.now());
    });
  }, 1000);
}

// ── 반자동: 지금 선택된 번호(고정)는 유지하고, 나머지 자리만 무작위로 채워 N개 생성 ──
MU.addSemiAutoCombos = function(){
  var g = MT.GAMES[MU.state.game];
  var fixedMain = MU.state.selectedMain.slice();
  var fixedBonus = MU.state.selectedBonus.slice();
  if (fixedMain.length >= g.mainCount && (!g.bonusCount || fixedBonus.length >= g.bonusCount)) {
    alert('번호를 이미 전부 고르셨어요. 반자동은 "일부만 고르고 나머지는 자동"인 방식입니다 — 전부 직접 고르셨다면 그냥 공을 마저 누르면 자동으로 조합이 추가됩니다.');
    return;
  }
  var count = Math.max(1, parseInt(document.getElementById('mtSemiCount').value) || 1);
  for (var i=0;i<count;i++){
    var mainPool = []; for (var n=1;n<=g.mainMax;n++) if (fixedMain.indexOf(n)<0) mainPool.push(n);
    var main = fixedMain.slice();
    while (main.length < g.mainCount && mainPool.length) { var idx = Math.floor(Math.random()*mainPool.length); main.push(mainPool.splice(idx,1)[0]); }
    var bonus = fixedBonus.slice();
    if (g.bonusCount) {
      var bonusPool = []; for (var n=1;n<=g.bonusMax;n++) if (fixedBonus.indexOf(n)<0) bonusPool.push(n);
      while (bonus.length < g.bonusCount && bonusPool.length) { var idx = Math.floor(Math.random()*bonusPool.length); bonus.push(bonusPool.splice(idx,1)[0]); }
    }
    MU.state.picks.push({ main: main.sort(function(a,b){return a-b;}), bonus: bonus.sort(function(a,b){return a-b;}) });
  }
  MU.renderPicksList();
};

// ── 음성입력 (Web Speech API — Chrome 계열 지원, 한국어/영어) ──
// ⚠ 브라우저 STT가 말한 숫자를 대부분 아라비아 숫자로 바로 인식해주지만(가장 흔한 경우),
// 혹시 한글 숫자 단어 그대로 나오는 경우를 대비해 최소한의 단어 매핑도 함께 시도한다.
// 완벽한 한글 숫자 파서는 아니며, 최선 노력(best-effort) 수준이다.
var MT_KOREAN_NUM_WORDS = { '영':0,'공':0,'일':1,'이':2,'삼':3,'사':4,'오':5,'육':6,'유':6,'칠':7,'팔':8,'구':9,'십':10 };
function mtExtractNumbersFromSpeech(text){
  var matches = text.match(/\d+/g);
  if (matches && matches.length) return matches.map(Number);
  var words = text.replace(/[,、]/g,' ').split(/\s+/).filter(Boolean);
  var nums = [];
  words.forEach(function(w){ if (MT_KOREAN_NUM_WORDS.hasOwnProperty(w)) nums.push(MT_KOREAN_NUM_WORDS[w]); });
  return nums;
}
MU.startVoiceInput = function(){
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var statusEl = document.getElementById('mtVoiceStatus');
  if (!SpeechRecognition) {
    if (statusEl) statusEl.textContent = '이 브라우저는 음성입력을 지원하지 않아요. (Chrome 권장)';
    return;
  }
  var g = MT.GAMES[MU.state.game];
  var lang = document.getElementById('mtVoiceLang').value;
  var recog = new SpeechRecognition();
  recog.lang = lang;
  recog.interimResults = false;
  recog.maxAlternatives = 1;
  if (statusEl) statusEl.textContent = '🎙️ 듣고 있어요... 번호를 순서대로 말씀해주세요.';

  recog.onresult = function(e){
    var transcript = e.results[0][0].transcript;
    var numbers = mtExtractNumbersFromSpeech(transcript);
    var needCount = g.mainCount + g.bonusCount;
    if (numbers.length < needCount) {
      if (statusEl) statusEl.textContent = '인식됨: "' + transcript + '" — 번호를 ' + needCount + '개 이상 인식하지 못했어요. 다시 시도해주세요.';
      return;
    }
    var main = numbers.slice(0, g.mainCount);
    var bonus = g.bonusCount ? numbers.slice(g.mainCount, needCount) : [];
    if (new Set(main).size !== main.length || main.some(function(n){ return n<1 || n>g.mainMax; })) {
      if (statusEl) statusEl.textContent = '인식됨: "' + transcript + '" — 번호가 중복되거나 범위(1~' + g.mainMax + ')를 벗어났어요. 다시 시도해주세요.';
      return;
    }
    if (g.bonusCount && (new Set(bonus).size !== bonus.length || bonus.some(function(n){ return n<1 || n>g.bonusMax; }))) {
      if (statusEl) statusEl.textContent = '인식됨: "' + transcript + '" — 보너스번호가 중복되거나 범위를 벗어났어요. 다시 시도해주세요.';
      return;
    }
    MU.state.picks.push({ main: main.slice().sort(function(a,b){return a-b;}), bonus: bonus.slice().sort(function(a,b){return a-b;}) });
    MU.renderPicksList();
    if (statusEl) statusEl.textContent = '✅ 조합 추가됨: ' + main.join(', ') + (bonus.length ? (' + ' + bonus.join(',')) : '');
  };
  recog.onerror = function(e){ if (statusEl) statusEl.textContent = '음성인식 오류: ' + e.error; };
  recog.start();
};

MU.renderBallGrid = function(){
  var g = MT.GAMES[MU.state.game];
  var mainEl = document.getElementById('mtMainGrid');
  if (mainEl) {
    var h = '';
    for (var n=1;n<=g.mainMax;n++){
      var on = MU.state.selectedMain.indexOf(n) >= 0;
      h += '<button class="ball-btn' + (on?' on':'') + '" onclick="MU.toggleMain(' + n + ')">' + n + '</button>';
    }
    mainEl.innerHTML = h;
  }
  var bonusEl = document.getElementById('mtBonusGrid');
  if (bonusEl && g.bonusCount) {
    var h2 = '';
    for (var n=1;n<=g.bonusMax;n++){
      var on = MU.state.selectedBonus.indexOf(n) >= 0;
      h2 += '<button class="ball-btn bonus' + (on?' on':'') + '" onclick="MU.toggleBonus(' + n + ')">' + n + '</button>';
    }
    bonusEl.innerHTML = h2;
  }
};
MU.toggleMain = function(n){
  var g = MT.GAMES[MU.state.game];
  var sel = MU.state.selectedMain;
  var idx = sel.indexOf(n);
  if (idx >= 0) sel.splice(idx, 1);
  else if (sel.length < g.mainCount) sel.push(n);
  MU.maybeCompleteCombo();
  MU.renderBallGrid();
};
MU.toggleBonus = function(n){
  var g = MT.GAMES[MU.state.game];
  var sel = MU.state.selectedBonus;
  var idx = sel.indexOf(n);
  if (idx >= 0) sel.splice(idx, 1);
  else if (sel.length < g.bonusCount) sel.push(n);
  MU.maybeCompleteCombo();
  MU.renderBallGrid();
};
MU.maybeCompleteCombo = function(){
  var g = MT.GAMES[MU.state.game];
  if (MU.state.selectedMain.length === g.mainCount && MU.state.selectedBonus.length === g.bonusCount) {
    MU.state.picks.push({
      main: MU.state.selectedMain.slice().sort(function(a,b){return a-b;}),
      bonus: MU.state.selectedBonus.slice().sort(function(a,b){return a-b;}),
    });
    MU.state.selectedMain = []; MU.state.selectedBonus = [];
    MU.renderPicksList();
  }
};
MU.addAutoCombos = function(){
  var g = MT.GAMES[MU.state.game];
  var count = Math.max(1, parseInt(document.getElementById('mtGenCount').value) || 1);
  for (var i=0;i<count;i++){
    var mainPool = []; for (var n=1;n<=g.mainMax;n++) mainPool.push(n);
    var main = []; while (main.length < g.mainCount) { var idx = Math.floor(Math.random()*mainPool.length); main.push(mainPool.splice(idx,1)[0]); }
    var bonus = [];
    if (g.bonusCount) {
      var bonusPool = []; for (var n=1;n<=g.bonusMax;n++) bonusPool.push(n);
      while (bonus.length < g.bonusCount) { var idx = Math.floor(Math.random()*bonusPool.length); bonus.push(bonusPool.splice(idx,1)[0]); }
    }
    MU.state.picks.push({ main: main.sort(function(a,b){return a-b;}), bonus: bonus.sort(function(a,b){return a-b;}) });
  }
  MU.renderPicksList();
};
MU.removePick = function(idx){ MU.state.picks.splice(idx, 1); MU.renderPicksList(); };

MU.calcCurrentCost = async function(){
  var count = MU.state.picks.length;
  var isKR = MU.state.game === 'KR';
  var baseKey = isKR ? 'mocktest_kr_base' : (MU.state.mainTab==='REAL' ? 'mocktest_global_real_base' : 'mocktest_global_mock_base');
  var incrKey = isKR ? 'mocktest_kr_incr' : (MU.state.mainTab==='REAL' ? 'mocktest_global_real_incr' : 'mocktest_global_mock_incr');
  var base = await MT.getPrice(baseKey);
  var incr = await MT.getPrice(incrKey);
  if (count === 0) return 0;
  if (count <= 100) return base;
  return base + (count - 100) * incr;
};
MU.renderPicksList = async function(){
  var el = document.getElementById('mtPicksList');
  if (!el) return;
  var picks = MU.state.picks;
  var listHtml = picks.map(function(c, i){
    var bonusStr = c.bonus && c.bonus.length ? (' + ' + c.bonus.join(',')) : '';
    return '<div class="participant-row"><span class="font-num">' + (i+1) + '. ' + c.main.join(', ') + bonusStr + '</span><span style="color:var(--red);cursor:pointer;" onclick="MU.removePick(' + i + ')">✕</span></div>';
  }).join('') || '<div style="font-size:11.5px;color:var(--text-faint);padding:8px 0;">아직 담은 조합이 없습니다.</div>';

  var cost = await MU.calcCurrentCost();
  el.innerHTML = '<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">담은 조합: <b style="color:var(--gold);">' + picks.length + '개</b> · 예상 참가비 <b style="color:var(--gold);">' + cost.toLocaleString() + 'P</b></div>' + listHtml;
  var btn = document.getElementById('mtSubmitBtn');
  if (btn) btn.disabled = picks.length === 0;
};

// ── 모의테스트 대상 선택 슬라이더 ──
MU.renderTargetSlider = async function(){
  var box = document.getElementById('mtTargetBox');
  if (!box) return;
  if (MU.state.game === 'KR') {
    var meta = MU.state.krMeta || await MT.getKrMeta();
    MU.state.krMeta = meta;
    if (!meta || !meta.maxRound) { box.innerHTML = '<div class="empty-state">아직 결과 데이터가 없습니다.</div>'; return; }
    if (MU.state.mockTarget == null) MU.state.mockTarget = meta.maxRound;
    box.innerHTML = '<h3 style="margin-bottom:6px;">모의테스트할 회차 선택</h3>' +
      '<div class="slider-row"><input type="range" min="1" max="' + meta.maxRound + '" value="' + MU.state.mockTarget + '" oninput="MU.onSliderChange(this.value)">' +
      '<span class="font-num" style="font-weight:800;color:var(--gold);min-width:80px;text-align:right;">제' + MU.state.mockTarget + '회</span></div>';
  } else {
    var code = MU.state.game;
    var dates = MU.state.globalDates[code];

    if (!dates.length) { box.innerHTML = '<div class="empty-state">아직 등록된 과거 결과가 없습니다. (관리자가 CSV 업로드 후 이용 가능)</div>'; return; }
    var idx = MU.state.mockTargetIdx != null ? MU.state.mockTargetIdx : dates.length - 1;

      '<div class="slider-row"><input type="range" min="0" max="' + (dates.length-1) + '" value="' + idx + '" oninput="MU.onDateSliderChange(this.value)">' +

MU.onSliderChange = function(v){ MU.state.mockTarget = parseInt(v); MU.renderTargetSlider(); };
MU.onDateSliderChange = function(v){
  var idx = parseInt(v);
  MU.state.mockTargetIdx = idx;
  MU.state.mockTarget = MU.state.globalDates[MU.state.game][idx];
  MU.renderTargetSlider();
};

// ── 등록 확인 → 실제 제출 ──
MU.openConfirm = function(){
  if (!MU.state.picks.length) { alert('번호조합을 1개 이상 등록해주세요.'); return; }
  if (MU.state.mainTab === 'MOCK' && MU.state.mockTarget == null) { alert('모의테스트할 회차/날짜를 선택해주세요.'); return; }
  MU.calcCurrentCost().then(function(cost){
    var g = MT.GAMES[MU.state.game];
    var targetLabel = MU.state.mainTab === 'MOCK'
      ? (MU.state.game === 'KR' ? ('제' + MU.state.mockTarget + '회') : MU.state.mockTarget)
      : (MU.state.game === 'KR' ? '다음 회차 (추첨대기)' : '다음 추첨일 (추첨대기)');
    document.getElementById('confirmTitle').textContent = (MU.state.mainTab === 'REAL' ? '실전테스트' : '모의테스트') + ' 등록 확인';
    document.getElementById('confirmBody').textContent =
      g.nameKr + ' · ' + targetLabel + '\n' +
      MU.state.picks.length + '개 조합 등록\n' +
      '참가비: ' + cost.toLocaleString() + 'P\n\n' +
      (MU.state.mainTab === 'MOCK' ? '등록 즉시 채점 결과를 보여드립니다.' : '실제 추첨 후 자동으로 채점됩니다.');
    document.getElementById('confirmModal').classList.add('show');
  });
};
MU.closeConfirm = function(){ document.getElementById('confirmModal').classList.remove('show'); };
MU.confirmSubmit = async function(){
  MU.closeConfirm();
  var payload = { game_code: MU.state.game, mode: MU.state.mainTab, picks_list: MU.state.picks };
  if (MU.state.mainTab === 'MOCK') {
    if (MU.state.game === 'KR') payload.target_round = MU.state.mockTarget;
    else payload.target_draw_date = MU.state.mockTarget;
  }
  var result = await MT.submitEntry(payload);
  if (!result.ok) return;
  MU.state.picks = [];
  MU.refreshBalance();
  if (MU.state.mainTab === 'MOCK') {
    alert('✅ 채점 완료! 결과를 바로 보여드릴게요.');
    await MU.renderMyEntries();
    MU.openDetail(result.entry.id);
  } else {
    alert('✅ 등록 완료! 실제 추첨 후 자동으로 채점됩니다.');
    await MU.renderPicksList();
    await MU.renderMyEntries();
  }
};

MU.openDetail = function(entryId){
  var entry = MU.state.entriesCache.find(function(e){ return String(e.id) === String(entryId); });
  if (!entry) return;
  var isKR = entry.game_code === 'KR';
  var box = document.getElementById('detailModalBox');

  var header = '<button class="modal-close-x" onclick="MU.closeDetail()">✕</button>' +
    '<h3>' + MT.GAMES[entry.game_code].nameKr + ' · ' + (isKR ? ('제' + entry.target_round + '회') : entry.target_draw_date) + '</h3>';

  if (entry.status === 'pending') {
    box.innerHTML = header + '<p>아직 추첨 전입니다. 실제 추첨 후 자동으로 채점되면 여기서 결과를 볼 수 있어요.</p>';
    document.getElementById('detailModal').classList.add('show');
    return;
  }

  var top3Html = '';
  if (entry.top3 && entry.top3.length) {
    top3Html = '<div class="card"><h3>🏆 내 조합 중 Top' + entry.top3.length + '</h3>' + entry.top3.map(function(r, i){
      var label = isKR ? (r.grade + '등 · ' + (r.prize||0).toLocaleString() + '원') : (r.tier + '등');
      return '<div class="participant-row"><span>' + (i+1) + '위</span><span style="color:var(--green);font-weight:700;">' + label + '</span></div>';
    }).join('') + '</div>';
  }

  var statsHtml = '';
  if (entry.stats && Object.keys(entry.stats).length) {
    statsHtml = '<div class="card"><h3>등수별 통계</h3>' + Object.keys(entry.stats).sort(function(a,b){return a-b;}).map(function(k){
      return '<div class="participant-row"><span>' + k + '등</span><span class="font-num">' + entry.stats[k] + '개</span></div>';
    }).join('') + '</div>';
  } else {
    statsHtml = '<div class="card"><div class="empty-state">당첨된 조합이 없습니다.</div></div>';
  }

  var rowsHtml = (entry.results || []).map(function(r, i){
    var bonusStr = r.bonus && r.bonus.length ? (' + ' + r.bonus.join(',')) : '';
    var win = isKR ? r.grade : r.tier;
    var label = isKR ? (r.grade ? (r.grade + '등') : '낙첨') : (r.tier ? (r.tier + '등') : '낙첨');
    return '<div class="participant-row"><span class="font-num">' + (i+1) + '. ' + r.main.join(',') + bonusStr + '</span><span style="color:' + (win?'var(--green)':'var(--text-faint)') + ';font-weight:700;">' + label + '</span></div>';
  }).join('');

  box.innerHTML = header + top3Html + statsHtml + '<div class="card"><h3>전체 조합 결과 (' + entry.combo_count + '개)</h3>' + rowsHtml + '</div>';
  document.getElementById('detailModal').classList.add('show');
};
MU.closeDetail = function(){ document.getElementById('detailModal').classList.remove('show'); };

// ⚠ 2026-07-12: 달력(<input type="date">)이나 숫자 직접입력은 회차/날짜를 정확히 몰라도

MU.renderCheckTargetRow = async function(){
  var el = document.getElementById('checkTargetRow');
  el.innerHTML = '<div class="form-row"><label>' + (MU.state.checkGame==='KR'?'회차':'추첨일') + '</label></div><div class="empty-state" style="padding:10px;">불러오는 중...</div>';

    if (!maxRound) { el.innerHTML = '<div class="empty-state">회차 데이터가 없습니다.</div>'; return; }
    if (MU.state.checkRound == null) MU.state.checkRound = maxRound;

    for (var r = maxRound; r >= 1; r--) {
      optsHtml += '<option value="' + r + '"' + (r === MU.state.checkRound ? ' selected' : '') + '>제' + r + '회</option>';
    }
    el.innerHTML = '<div class="form-row"><label>회차 (스크롤해서 선택)</label></div>' +
      '<select class="inp scroll-picker" id="checkRoundInput" size="8" onchange="MU.state.checkRound=parseInt(this.value)">' + optsHtml + '</select>';
  } else {
    var code = MU.state.checkGame;
    var dates = MU.state.globalDates[code];

    if (!dates.length) { el.innerHTML = '<div class="empty-state">아직 등록된 결과가 없습니다. (관리자 CSV 업로드 후 이용 가능)</div>'; return; }
    var sortedDesc = dates.slice().reverse();
    if (MU.state.checkDate == null) MU.state.checkDate = sortedDesc[0];
    var optsHtml2 = sortedDesc.map(function(d){
      return '<option value="' + d + '"' + (d === MU.state.checkDate ? ' selected' : '') + '>' + d + '</option>';
    }).join('');
    el.innerHTML = '<div class="form-row"><label>추첨일 (스크롤해서 선택)</label></div>' +
      '<select class="inp scroll-picker" id="checkDateInput" size="8" onchange="MU.state.checkDate=this.value">' + optsHtml2 + '</select>';

MU.renderCheckBallGrid = function(){
  var g = MT.GAMES[MU.state.checkGame];
  var mainEl = document.getElementById('checkMainGrid');
  var h = '';
  for (var n=1;n<=g.mainMax;n++){
    var on = MU.state.checkMain.indexOf(n) >= 0;
    h += '<button class="ball-btn' + (on?' on':'') + '" onclick="MU.toggleCheckMain(' + n + ')">' + n + '</button>';
  }
  mainEl.innerHTML = h;

  var bonusRow = document.getElementById('checkBonusRow');
  if (g.bonusCount) {
    var h2 = '';
    for (var n=1;n<=g.bonusMax;n++){

    }
    bonusRow.innerHTML = '<div class="form-row"><label>보너스번호</label></div><div class="ball-grid">' + h2 + '</div>';
  } else {

MU.toggleCheckMain = function(n){
  var g = MT.GAMES[MU.state.checkGame];
  var sel = MU.state.checkMain;
  var idx = sel.indexOf(n);
  if (idx >= 0) sel.splice(idx, 1);
  else if (sel.length < g.mainCount) sel.push(n);
  MU.renderCheckBallGrid();
};
MU.toggleCheckBonus = function(n){
  var g = MT.GAMES[MU.state.checkGame];
  var sel = MU.state.checkBonus;
  var idx = sel.indexOf(n);
  if (idx >= 0) sel.splice(idx, 1);
  else if (sel.length < g.bonusCount) sel.push(n);
  MU.renderCheckBallGrid();
};
MU.doCheck = async function(){
  var g = MT.GAMES[MU.state.checkGame];
  if (MU.state.checkMain.length !== g.mainCount) { alert('메인번호 ' + g.mainCount + '개를 선택해주세요.'); return; }
  if (g.bonusCount && MU.state.checkBonus.length !== g.bonusCount) { alert('보너스번호 ' + g.bonusCount + '개를 선택해주세요.'); return; }

  var payload = { game_code: MU.state.checkGame, main: MU.state.checkMain, bonus: MU.state.checkBonus };
  if (MU.state.checkGame === 'KR') {
    if (!MU.state.checkRound) { alert('회차를 입력해주세요.'); return; }
    payload.round = MU.state.checkRound;
  } else {
    if (!MU.state.checkDate) { alert('추첨일을 선택해주세요.'); return; }
    payload.draw_date = MU.state.checkDate;
  }

  var result = await MT.check(payload);
  var box = document.getElementById('checkResultBox');
  if (!result) { box.innerHTML = ''; return; }

  var isKR = MU.state.checkGame === 'KR';
  var win = isKR ? result.grade : result.tier;
  var drawStr = isKR ? (result.drawNums.join(', ') + ' + 보너스 ' + result.drawBonus) : (result.drawMain.join(', ') + (result.drawBonus.length ? ' + ' + result.drawBonus.join(',') : ''));
  box.innerHTML = '<div class="card" style="background:' + (win ? 'rgba(63,179,127,.08)' : 'var(--surface-2)') + ';border-color:' + (win ? 'var(--green)' : 'var(--border-soft)') + ';">' +
    '<div style="font-size:15px;font-weight:800;color:' + (win ? 'var(--green)' : 'var(--text-dim)') + ';">' + (win ? ('🎉 ' + win + '등 당첨!') : '😢 낙첨') + '</div>' +
    '<div style="font-size:11.5px;color:var(--text-faint);margin-top:8px;">당첨번호: ' + drawStr + '</div>' +
  '</div>';
};

document.addEventListener('keydown', function(e){
  if (e.key !== 'Escape') return;
  if (document.getElementById('confirmModal').classList.contains('show')) MU.closeConfirm();
  if (document.getElementById('detailModal').classList.contains('show')) MU.closeDetail();
});
</script>
