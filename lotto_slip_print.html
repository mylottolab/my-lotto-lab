<script>
// 이 페이지 전용 기능: 번호조합을 역대 전체회차와 대조하는 성적분석(common.js에는 없음)
// mll_results(auto_update.html이 부분적으로 채워주는 캐시)와는 별개의, 1회~최신회차 전체를 담은 완전한 데이터셋.
MLL._fullHistoryCache = null;
MLL._fullHistoryPromise = null;

MLL.loadFullHistory = function(){
  if (MLL._fullHistoryCache) return Promise.resolve(MLL._fullHistoryCache);
  if (MLL._fullHistoryPromise) return MLL._fullHistoryPromise;
  MLL._fullHistoryPromise = fetch('lotto_results_full.json')
    .then(function(res){ if (!res.ok) throw new Error('fetch failed: '+res.status); return res.json(); })
    .then(function(data){ MLL._fullHistoryCache = data; return data; })
    .catch(function(err){
      console.warn('[MLL] lotto_results_full.json 로드 실패, 부분 데이터(mll_results)로 대체:', err.message);
      MLL._fullHistoryCache = MLL.loadResults(); // 실패 시 최소한 자동업데이트 캐시로 대체
      return MLL._fullHistoryCache;
    });
  return MLL._fullHistoryPromise;
};

// 6개 번호조합을 "역대 전체 회차(1회~최신)"와 전부 대조하여 등수별 누적횟수를 계산.
// 등록 이력(mll_entries)과는 무관하게, 순수하게 "이 번호가 그 회차에 나왔다면 몇 등이었을까"를 매 회차 가상으로 채점함.
// async 함수이므로 호출 측에서 await 또는 .then()으로 받아야 함.
MLL.getComboHistoryStat = async function(nums){
  var history = await MLL.loadFullHistory();
  var gradeCounts = [0,0,0,0,0,0];
  var totalPrize = 0;
  var perRound = []; // {round, grade, prizeMoney} 회차 오름차순 누적용(최근판정을 위해 round 내림차순 정렬은 아래에서)

  Object.keys(history).forEach(function(roundKey){
    var res = history[roundKey];
    if (!res || !res.nums) return;
    var grade = MLL.calcGrade(nums, res.nums, res.bonus);
    var prize = MLL.calcPrize(grade, res);
    if (grade >= 1 && grade <= 5) gradeCounts[grade]++;
    totalPrize += prize;
    perRound.push({ round: parseInt(roundKey), grade: grade, prizeMoney: prize });
  });

  perRound.sort(function(a,b){ return b.round - a.round; }); // 최신 회차부터
  var GRADE_LABEL = ['낙첨','1등','2등','3등','4등','5등'];
  // "최근/최근-1/최근-2"는 적중 여부와 무관하게, 조회시점 기준 가장 최근 3개 회차를 그대로 보여줌 (낙첨이면 낙첨)
  var recentRounds = perRound.slice(0,3).map(function(r){ return GRADE_LABEL[r.grade]; });
  while (recentRounds.length < 3) recentRounds.push('-');

  return {
    totalRoundsChecked: perRound.length, // 대조에 사용된 전체 회차 수
    grade1: gradeCounts[1], grade2: gradeCounts[2], grade3: gradeCounts[3],
    grade4: gradeCounts[4], grade5: gradeCounts[5],
    totalPrize: totalPrize,
    recent: recentRounds[0], recent1: recentRounds[1], recent2: recentRounds[2]
  };
};
</script>

<script>
// 마킹용지 PDF 생성 — makinglotto.com 인증정보는 이제 서버(Render)
// 환경변수(MAKINGLOTTO_USER/MAKINGLOTTO_PASS)로 옮겨졌고, marking.js가 프록시합니다.
// 프론트는 우리 서버(/api/marking/generate)만 호출합니다.

if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.MARKING_CONFIG = {
  chunkSize: 15,
  pageSize: 15,          // makinglotto.com이 이미지를 바꿀 수 있는 실제 단위(페이지=전표 3매).
                         // 이 값을 넘게 이미지를 선택해도 실제로는 쓰이지 않으므로, 선택 개수 자체를 여기서 제한한다.
  defaultCid: '158',
  pricePerSheet: 300,   // 전표용지 1매당 300원
  gamesPerSheet: 5,      // 마킹용지 1매(A~E)에 들어가는 게임(번호조합) 수
  extraImagePrice: 500, // 이미지 1개 추가(2개째부터)당 500원
  imageBasePath: ''
};

// ── 캐릭터 목록(이미지 폴더 스캔 대체: 정적 목록, 실제로는 145개 PNG 파일과 1:1) ──
MLL.getAvailableCharacterIds = function(){
  if (typeof MLL_CHAR_NAMES === 'undefined') return [];
  return Object.keys(MLL_CHAR_NAMES).map(Number).sort(function(a,b){return a-b;});
};
MLL.getCharacterName = function(cid){
  if (typeof MLL_CHAR_NAMES === 'undefined') return '';
  return MLL_CHAR_NAMES[String(cid)] || '';
};

// ── 캐릭터 선택 모달 상태 ──
MLL.markingState = { selectedCids: [], pendingRows: null, pendingFileBase: 'lotto_marking' };

MLL.openMarkingModal = function(rows, fileBase){
  if (!rows || !rows.length) { alert('받을 번호조합이 없습니다.'); return; }
  MLL.markingState.pendingRows = rows;
  MLL.markingState.pendingFileBase = fileBase || 'lotto_marking';
  MLL.markingState.selectedCids = [];
  MLL._renderMarkingModal();
  document.getElementById('mllMarkingModal').style.display = 'flex';
};

MLL._ensureMarkingModalDom = function(){
  if (document.getElementById('mllMarkingModal')) return;
  var overlay = document.createElement('div');
  overlay.id = 'mllMarkingModal';
  overlay.className = 'modal-overlay';
  // 외부 페이지의 CSS(부모 transform/contain 등)에 의해 position:fixed가 깨지는 것을 방지하기 위해
  // 핵심 위치 속성을 인라인 스타일로 강제 지정 (외부 스타일시트보다 우선 적용됨)
  overlay.setAttribute('style', 'position:fixed !important;top:0 !important;left:0 !important;right:0 !important;bottom:0 !important;width:100vw;height:100vh;background:rgba(0,0,0,.65);z-index:999999;display:none;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;');
  overlay.innerHTML =
    '<div class="modal-box" style="position:relative;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;background:#11152a;border:1px solid #252b48;border-radius:16px;padding:24px;box-sizing:border-box;">' +
      '<button class="modal-close-x" style="position:absolute;top:20px;right:20px;background:none;border:none;color:#5a6080;font-size:18px;cursor:pointer;" onclick="MLL.closeMarkingModal()">✕</button>' +
      '<h3 style="font-size:16px;font-weight:700;margin-bottom:8px;color:#eef0f6;display:flex;align-items:center;gap:7px;"><span style="font-size:18px;">🖨️</span> 로또인쇄 — 마킹용지 PDF로 받기</h3>' +
      '<p style="font-size:11.5px;color:#8b91ab;line-height:1.7;margin-bottom:8px;">실물 로또 판매점에 바로 제출 가능한 마킹용지 형태로 출력합니다.</p>' +
      '<div id="mllMarkingGuide" style="font-size:11.5px;color:#e0b341;background:rgba(224,179,65,.08);border:1px solid rgba(224,179,65,.25);border-radius:8px;padding:8px 11px;margin-bottom:12px;line-height:1.6;"></div>' +
      '<div id="mllCharGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-height:320px;overflow-y:auto;padding:4px;border:1px solid #252b48;border-radius:10px;margin-bottom:14px;"></div>' +
      '<div id="mllMarkingPriceBox" style="font-size:12.5px;color:#8b91ab;margin-bottom:12px;"></div>' +
      '<div id="mllMarkingResultBox" style="margin-top:10px;padding:11px 14px;border-radius:9px;font-size:12px;display:none;"></div>' +
      '<button class="btn" style="width:100%;background:#2FBFA3;color:#fff;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;" onclick="MLL.submitMarkingRequest()">PDF 생성하기</button>' +
    '</div>';
  overlay.addEventListener('click', function(e){ if (e.target === overlay) MLL.closeMarkingModal(); });
  document.body.appendChild(overlay);
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') MLL.closeMarkingModal();
  });
};



MLL._renderMarkingModal = function(){
  MLL._ensureMarkingModalDom();
  var cfg = MLL.MARKING_CONFIG;
  var gameCount = (MLL.markingState.pendingRows||[]).length;
  var maxUsefulImages = Math.max(1, Math.ceil(gameCount / cfg.pageSize));
  var sheetsPerPage = Math.round(cfg.pageSize / cfg.gamesPerSheet);
  document.getElementById('mllMarkingGuide').innerHTML =
    '💡 지금 게임 수(' + gameCount + '게임) 기준으로 <b>이미지 ' + maxUsefulImages + '개</b>까지 선택할 수 있으며, ' +
    '전표 ' + sheetsPerPage + '매씩 같은 이미지로 인쇄됩니다.';
  var ids = MLL.getAvailableCharacterIds();
  var grid = document.getElementById('mllCharGrid');
  grid.innerHTML = ids.map(function(id){
    var name = MLL.getCharacterName(id);
    return '<div class="mll-char-card" data-cid="'+id+'" onclick="MLL.toggleCharacter('+id+')" style="cursor:pointer;border:2px solid var(--border,#252b48);border-radius:8px;overflow:hidden;text-align:center;background:var(--surface-2,#161b35);">' +
      '<img src="'+MLL.MARKING_CONFIG.imageBasePath+id+'.png" style="width:100%;aspect-ratio:2/1;object-fit:cover;display:block;" loading="lazy">' +
      '<div style="font-size:9px;padding:3px 2px;color:var(--text-dim,#8b91ab);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+id+(name?(' '+name.slice(0,8)):'')+'</div>' +
    '</div>';
  }).join('');
  MLL._updateMarkingPriceBox();
};

MLL.toggleCharacter = function(cid){
  var s = MLL.markingState;
  var cfg = MLL.MARKING_CONFIG;
  var idx = s.selectedCids.indexOf(cid);
  if (idx>=0) {
    s.selectedCids.splice(idx,1);
  } else {
    var gameCount = (s.pendingRows||[]).length;
    var maxUsefulImages = Math.max(1, Math.ceil(gameCount / cfg.pageSize));
    if (s.selectedCids.length >= maxUsefulImages) {
      alert('지금 게임 수(' + gameCount + '게임)로는 이미지를 최대 ' + maxUsefulImages + '개까지만 실제로 쓸 수 있어요.\n(이미지는 15게임=용지 3매 단위로만 바뀝니다)');
      return;
    }
    s.selectedCids.push(cid);
  }
  document.querySelectorAll('.mll-char-card').forEach(function(el){
    var on = s.selectedCids.indexOf(parseInt(el.dataset.cid))>=0;
    el.style.borderColor = on ? '#2FBFA3' : 'var(--border,#252b48)';
    el.style.boxShadow = on ? '0 0 0 2px rgba(47,191,163,.3)' : 'none';
  });
  MLL._updateMarkingPriceBox();
};

MLL._updateMarkingPriceBox = function(){
  var rows = MLL.markingState.pendingRows || [];
  var cfg = MLL.MARKING_CONFIG;
  var gameCount = rows.length;
  var sheetCount = Math.ceil(gameCount / cfg.gamesPerSheet); // 5게임당 1매, 나머지가 있으면 올림(1매 더)
  var maxUsefulImages = Math.max(1, Math.ceil(gameCount / cfg.pageSize));
  var imgCount = Math.max(1, Math.min(MLL.markingState.selectedCids.length, maxUsefulImages));
  var sheetCost = sheetCount * cfg.pricePerSheet;
  var extraImgCost = Math.max(0, imgCount-1) * cfg.extraImagePrice;
  var total = sheetCost + extraImgCost;
  document.getElementById('mllMarkingPriceBox').innerHTML =
    gameCount+'게임 → 용지 '+sheetCount+'매('+cfg.gamesPerSheet+'게임/매) × '+cfg.pricePerSheet.toLocaleString()+'원 = '+sheetCost.toLocaleString()+'원' +
    (extraImgCost>0 ? ' + 이미지 추가 '+(imgCount-1)+'개 × '+cfg.extraImagePrice.toLocaleString()+'원 = '+extraImgCost.toLocaleString()+'원' : ' (이미지 1개는 무료)') +
    '<br><b style="color:#2FBFA3;font-size:14px;">합계: '+total.toLocaleString()+'원</b>' +
    '<div style="font-size:10px;color:var(--text-faint,#5a6080);margin-top:4px;">⚠️ 테스트 모드: 현재는 실제 포인트 차감 없이 동작만 확인합니다. (서버 구축 후 정식 차감 적용)</div>';
};

MLL.closeMarkingModal = function(){
  var el = document.getElementById('mllMarkingModal');
  if (el) el.style.display = 'none';
};

MLL._showMarkingResult = function(type, msg, boxId){
  var box = document.getElementById(boxId || 'mllMarkingResultBox');
  if (!box) { console.warn('[MLL] 결과 표시 박스를 찾을 수 없음:', boxId); return; } // 모달이 아직 안 열려있는 등의 경우 조용히 무시(크래시 방지)
  box.style.display = 'block';
  box.style.background = type==='error' ? 'rgba(212,83,94,.1)' : 'rgba(63,179,127,.1)';
  box.style.border = '1px solid ' + (type==='error' ? 'rgba(212,83,94,.25)' : 'rgba(63,179,127,.25)');
  box.style.color = type==='error' ? '#D4537E' : '#3FB37F';
  box.textContent = msg;
};

// ── makinglotto.com 연동 ──
MLL.submitMarkingRequest = function(){
  var rows = MLL.markingState.pendingRows;
  if (!rows || !rows.length) { MLL._showMarkingResult('error','받을 번호조합이 없습니다.'); return; }
  MLL._showMarkingResult('success', '⏳ PDF 생성 요청 중입니다... (여러 페이지인 경우 다소 시간이 걸려요)');
  MLL._runMarkingPipeline(rows, MLL.markingState.selectedCids, MLL.markingState.pendingFileBase);
};

MLL._runMarkingPipeline = async function(rows, cids, fileBase, boxId){
  boxId = boxId || 'mllMarkingResultBox';
  var cfg = MLL.MARKING_CONFIG;
  if (!cids || !cids.length) cids = [parseInt(cfg.defaultCid)];

  try {
    MLL._showMarkingResult('success', '⏳ PDF 생성 중입니다... (여러 페이지인 경우 다소 시간이 걸려요)', boxId);

    var resp = await fetch(MLL.API_BASE + '/api/marking/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows: rows, cids: cids })
    });

    if (!resp.ok) {
      var errData = await resp.json().catch(function(){ return {}; });
      throw new Error(errData.error || ('서버 응답 오류 (코드 ' + resp.status + ')'));
    }

    var blob = await resp.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileBase + '_마킹용지.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    var pageCount = Math.ceil(rows.length / cfg.chunkSize);
    MLL._showMarkingResult('success', '✅ 마킹용지 PDF 생성 완료! ('+rows.length+'게임, '+pageCount+'페이지)', boxId);
    return true;
  } catch(e) {
    MLL._showMarkingResult('error', '⚠️ PDF 생성 실패: ' + e.message, boxId);
    console.error('[MLL marking] error:', e);
    return false;
  }
};

</script>
<script>
// =====================================================
// SLIP - 편리한 로또구매전표 작성 화면 컨트롤러 (v3: 전체 Data출처 통합)
// =====================================================
var SLIP = {};
SLIP.checkedIds = {}; // {rowKey: true} - 로또전표(마킹용지) 체크

// "입력방식 또는 Data출처" 통합 라벨 (영구저장 소스 + 즉석생성 소스 전체)
SLIP.SOURCE_LABEL = {
  general:'일반방식', camera:'실구매(카메라/QR)', excel:'엑셀대량', ai:'AI음성·문자',
  mock:'모의실전시뮬레이션', favorite:'관심번호(최애번호)', strategy:'전략비교평가',
  race:'100전략레이스 (위의 "즉석에서 가져오기"를 클릭하세요)', generator:'전략등록 (위의 "즉석에서 가져오기"를 클릭하세요)'
};
SLIP.SOURCE_TAG_CLASS = {
  general:'tag-general', camera:'tag-camera', excel:'tag-excel', ai:'tag-ai',
  mock:'tag-mock', favorite:'tag-favorite', strategy:'tag-strategy',
  race:'tag-race', generator:'tag-generator'
};

SLIP.init = async function(){
  await MLL.refreshResults();
  await MLL.refreshEntries(); // Data등록 4개 소스(일반/실구매/엑셀/AI)는 이제 서버 DB 기준
  SLIP.buildRoundFilterOptions();
  SLIP.render();
};

// 영구저장 4개 소스(Data등록)를 공통 행 형식으로 변환
SLIP._fromDataEntries = function(){
  return MLL.loadEntries().map(function(e){
    return {
      rowKey: 'entry_'+e.id, refId: e.id, source: e.inputMethod || 'general',
      round: e.round, nums: e.nums, type: e.type, isReal: !!e.isReal, memo: e.memo || '',
      createdAt: e.createdAt, status: e.status, grade: e.grade, prizeMoney: e.prizeMoney,
      isFavorite: !!e.isFavorite
    };
  });
};

// 모의실전시뮬레이션(mll_mock_entries)을 공통 행 형식으로 변환
SLIP._fromMockEntries = function(){
  if (typeof MOCK === 'undefined' || !MOCK.loadEntries) return [];
  return MOCK.loadEntries().map(function(e){
    return {
      rowKey: 'mock_'+e.id, refId: e.id, source: 'mock',
      round: e.round, nums: e.nums, type: e.type, isReal: false, memo: '['+(e.nickname||'')+']',
      createdAt: e.createdAt, status: (e.grade!==null && e.grade!==undefined)?'추첨후':'추첨전',
      grade: e.grade, prizeMoney: e.prizeMoney, isFavorite: false
    };
  });
};

// 관심번호/최애번호 저장소(mll_favorites)를 공통 행 형식으로 변환 (중복 표시 허용)
SLIP._fromFavorites = function(){
  if (!MLL.loadFavorites) return [];
  return MLL.loadFavorites().map(function(f){
    return {
      rowKey: 'fav_'+f.id, refId: f.id, source: 'favorite',
      round: f.round, nums: f.nums, type: f.type, isReal: !!f.isReal, memo: f.memo || '',
      createdAt: f.createdAt, status: f.status, grade: f.grade, prizeMoney: f.prizeMoney,
      isFavorite: true
    };
  });
};

// 전략비교평가(mll_strategy_results) - 1건이 numbers 배열(여러 조합)을 가지므로 펼쳐서 변환
SLIP._fromStrategyResults = function(){
  if (!MLL.loadStrategyResults) return [];
  var rows = [];
  MLL.loadStrategyResults().forEach(function(sr){
    (sr.numbers || []).forEach(function(nums, idx){
      rows.push({
        rowKey: 'strategy_'+sr.id+'_'+idx, refId: sr.id, source: 'strategy',
        round: sr.round, nums: nums, type: '전략', isReal: false, memo: '['+(sr.strategyName||'')+']',
        createdAt: sr.createdAt || Date.now(), status: null, grade: null, prizeMoney: 0,
        isFavorite: false
      });
    });
  });
  return rows;
};

// 영구저장 4개 소스 + 즉석생성으로 추가된 임시항목을 모두 합친 전체 목록
SLIP._onDemandRows = [];
SLIP.getAllRows = function(){
  return SLIP._fromDataEntries()
    .concat(SLIP._fromMockEntries())
    .concat(SLIP._fromFavorites())
    .concat(SLIP._fromStrategyResults())
    .concat(SLIP._onDemandRows);
};

SLIP.buildRoundFilterOptions = function(){
  var rows = SLIP.getAllRows();
  var rounds = Array.from(new Set(rows.map(function(e){ return e.round; }))).sort(function(a,b){ return b-a; });
  var sel = document.getElementById('filterRound');
  rounds.forEach(function(r){
    var opt = document.createElement('option');
    opt.value = r; opt.textContent = r+'회';
    sel.appendChild(opt);
  });
};

SLIP.getFilteredEntries = function(){
  var rows = SLIP.getAllRows();
  var from = document.getElementById('filterFrom').value;
  var to = document.getElementById('filterTo').value;
  var method = document.getElementById('filterMethod').value;
  var round = document.getElementById('filterRound').value;

  if (from) {
    var fromTs = new Date(from+'T00:00:00').getTime();
    rows = rows.filter(function(e){ return e.createdAt >= fromTs; });
  }
  if (to) {
    var toTs = new Date(to+'T23:59:59').getTime();
    rows = rows.filter(function(e){ return e.createdAt <= toTs; });
  }
  if (method) rows = rows.filter(function(e){ return e.source === method; });
  if (round) rows = rows.filter(function(e){ return String(e.round) === String(round); });

  rows.sort(function(a,b){ return b.createdAt - a.createdAt; });
  return rows;
};

SLIP.applyFilter = function(){ SLIP.render(); };
SLIP.resetFilter = function(){
  document.getElementById('filterFrom').value = '';
  document.getElementById('filterTo').value = '';
  document.getElementById('filterMethod').value = '';
  document.getElementById('filterRound').value = '';
  SLIP.render();
};

// ── 같은 번호조합(6개 숫자 완전일치) 기준 역대 성적 집계 ──
SLIP._comboKey = function(nums){
  return nums.slice().sort(function(a,b){ return a-b; }).join('-');
};

  var allCount = SLIP.getAllRows().length;
  var entries = SLIP.getFilteredEntries();
  document.getElementById('phCount').textContent = '(' + entries.length + '개 / 전체 ' + allCount + '개)';

  if (allCount === 0) {
    document.getElementById('filterPanel').style.display = 'none';
    document.getElementById('listBody').innerHTML =
      '<div class="empty-guide">' +
        '<div class="ico">📭</div>' +
        '<div class="msg">아직 등록된 번호가 없습니다.</div>' +
        '<div class="sub">직전메뉴인 "일반방식 편한등록"을 사용하여 입력 후 방문해 주시기 바랍니다.<br>카메라/QR·엑셀·AI 음성·문자·모의시뮬레이션·관심번호·전략비교평가 등 다른 곳에 등록하신 내용도 모두 이곳에서 모아볼 수 있어요.</div>' +
        '<a class="link-btn" href="lotto_input_page_v4.html">일반방식 편한등록으로 이동 →</a>' +
      '</div>';
    document.getElementById('bottomBar').style.display = 'none';
    return;
  }

  document.getElementById('filterPanel').style.display = 'block';

  if (!entries.length) {
    document.getElementById('listBody').innerHTML =
      '<div class="empty-guide">' +
        '<div class="ico">🔍</div>' +
        '<div class="msg">조회 조건에 맞는 번호가 없습니다.</div>' +
        '<div class="sub">조회 조건을 변경해보세요.</div>' +
      '</div>';
    document.getElementById('bottomBar').style.display = 'none';
    return;
  }

  document.getElementById('listBody').innerHTML = '<div class="empty-guide"><div class="ico">⏳</div><div class="msg">역대 회차와 대조하는 중...</div></div>';

  // 화면에 보이는 행들의 조합별 통계를 한 번씩만 계산(캐시)
  var statCache = {};
  for (var i=0; i<entries.length; i++) {
    var key = SLIP._comboKey(entries[i].nums);
    if (!statCache[key]) {
      statCache[key] = await MLL.getComboHistoryStat(entries[i].nums);
    }
  }

  var allChecked = entries.every(function(e){ return SLIP.checkedIds[e.rowKey]; });
  var html =
    '<div class="list-toolbar">' +
      '<label style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:#555;cursor:pointer;">' +
        '<input type="checkbox" id="checkAll" onclick="SLIP.toggleAll(this.checked)" '+(allChecked?'checked':'')+'> 전체선택(로또전표)' +
      '</label>' +
      '<span class="cnt">조회됨 <b>'+entries.length+'</b>개</span>' +
      '<span class="checked-cnt" id="checkedCntLabel"></span>' +
    '</div>' +
    '<div class="tw"><table><thead><tr>' +
      '<th>입력일자</th><th>회차</th><th>번호</th><th>메모</th><th>구매형태</th><th>입력방식 또는 Data출처</th><th>구분</th>' +
      '<th>역대1등</th><th>역대2등</th><th>역대3등</th><th>역대4등</th><th>역대5등</th><th>총상금액</th>' +
      '<th>최근</th><th>최근-1</th><th>최근-2</th>' +
      '<th style="width:36px;">로또전표</th><th style="width:36px;">최애번호</th>' +
    '</tr></thead><tbody>' +
    entries.map(function(e){ return SLIP._renderRow(e, statCache[SLIP._comboKey(e.nums)]); }).join('') +
    '</tbody></table></div>';

  document.getElementById('listBody').innerHTML = html;
  document.getElementById('bottomBar').style.display = 'flex';
  SLIP.updateCheckedDisplay();
};

SLIP._renderRow = function(entry, stat){
  stat = stat || { grade1:0, grade2:0, grade3:0, grade4:0, grade5:0, totalPrize:0, recent:'-', recent1:'-', recent2:'-' };

  var sorted = entry.nums.slice().sort(function(a,b){ return a-b; });
  var ballsHtml = sorted.map(function(n){
    return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';margin:1px;">'+n+'</span>';
  }).join('');

  var typeColor = entry.type==='자동'?'#2f9e44':entry.type==='반자동'?'#e67700':entry.type==='전략'?'#7048e8':'#1a7ad4';
  var typeBg = entry.type==='자동'?'#e8fff0':entry.type==='반자동'?'#fff3e0':entry.type==='전략'?'#f0ecff':'#e8f4ff';
  var typeHtml = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;color:'+typeColor+';background:'+typeBg+';border:1px solid '+typeColor+';">'+entry.type+'</span>';

  var srcCls = SLIP.SOURCE_TAG_CLASS[entry.source] || 'tag-general';
  var srcLabel = SLIP.SOURCE_LABEL[entry.source] || entry.source;
  var srcHtml = '<span class="input-method-tag '+srcCls+'">'+srcLabel+'</span>';

  var realHtml = entry.isReal
    ? '<span style="background:#f5c518;color:#7a5e00;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;">실구매</span>'
    : '<span style="background:#eee;color:#999;font-size:8px;padding:1px 4px;border-radius:3px;">가상</span>';

  var d = new Date(entry.createdAt);
  var dateStr = d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');

  var isChecked = !!SLIP.checkedIds[entry.rowKey];
  var isFav = !!entry.isFavorite;
  // 최애번호 토글은 mll_entries(일반/카메라/엑셀/AI) 기준으로만 가능 (모의시뮬/전략비교는 별도 저장소라 미지원)
  var favSupported = ['general','camera','excel','ai'].indexOf(entry.source) >= 0;

  return '<tr id="row_'+entry.rowKey+'" class="'+(isChecked?'checked':'')+'">' +
    '<td style="color:#999;">'+dateStr+'</td>' +
    '<td><span style="background:#555;color:#fff;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700;">'+entry.round+'회</span></td>' +
    '<td><div style="display:flex;gap:1px;align-items:center;justify-content:center;flex-wrap:nowrap;">'+ballsHtml+'</div></td>' +
    '<td style="text-align:left;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#888;">'+(entry.memo||'')+'</td>' +
    '<td>'+typeHtml+'</td>' +
    '<td>'+srcHtml+'</td>' +
    '<td>'+realHtml+'</td>' +
    '<td>'+(stat.grade1||0)+'</td>' +
    '<td>'+(stat.grade2||0)+'</td>' +
    '<td>'+(stat.grade3||0)+'</td>' +
    '<td>'+(stat.grade4||0)+'</td>' +
    '<td>'+(stat.grade5||0)+'</td>' +
    '<td style="color:'+(stat.totalPrize>0?'#e03131':'#bbb')+';font-weight:'+(stat.totalPrize>0?'700':'400')+';">'+(stat.totalPrize>0?stat.totalPrize.toLocaleString():'-')+'</td>' +
    '<td style="color:#666;">'+stat.recent+'</td>' +
    '<td style="color:#999;">'+stat.recent1+'</td>' +
    '<td style="color:#999;">'+stat.recent2+'</td>' +
    '<td><input type="checkbox" '+(isChecked?'checked':'')+' onchange="SLIP.toggleOne(\''+entry.rowKey+'\', this.checked)" title="이 조합을 로또전표(마킹용지)에 포함"></td>' +
    '<td>'+(favSupported ? '<input type="checkbox" '+(isFav?'checked':'')+' onchange="SLIP.toggleFavorite(\''+entry.refId+'\', this)" title="최애번호(관심번호) 저장소에 추가/제거">' : '<span style="color:#ccc;font-size:9px;">-</span>')+'</td>' +
  '</tr>';
};

SLIP.toggleOne = function(rowKey, checked){
  if (checked) SLIP.checkedIds[rowKey] = true;
  else delete SLIP.checkedIds[rowKey];
  var row = document.getElementById('row_'+rowKey);
  if (row) row.classList.toggle('checked', checked);
  SLIP.updateCheckedDisplay();
};

SLIP.toggleAll = function(checked){
  var entries = SLIP.getFilteredEntries();
  entries.forEach(function(e){
    if (checked) SLIP.checkedIds[e.rowKey] = true;
    else delete SLIP.checkedIds[e.rowKey];
  });
  SLIP.render();
};

// 최애번호(관심번호 저장소) 토글 — results_stats.html의 MLL.toggleFavorite 재사용 (mll_entries 기준 소스만 지원)
SLIP.toggleFavorite = function(refId, checkboxEl){
  var nowFav = MLL.toggleFavorite(refId);
  if (nowFav === null) { alert('항목을 찾을 수 없습니다.'); return; }
  if (checkboxEl) checkboxEl.checked = nowFav;
};

SLIP.updateCheckedDisplay = function(){
  var count = Object.keys(SLIP.checkedIds).length;
  var label = document.getElementById('checkedCntLabel');
  if (label) label.textContent = count > 0 ? '✓ 선택됨 '+count+'개' : '';
  document.getElementById('checkedCountDisplay').textContent = count;
  document.getElementById('btnMakeSlip').disabled = count === 0;
};

SLIP.openMarkingForChecked = function(){
  var rowKeys = Object.keys(SLIP.checkedIds);
  if (!rowKeys.length) { alert('전표로 작성할 번호조합을 먼저 체크해주세요.'); return; }
  var allRows = SLIP.getAllRows();
  var selected = allRows.filter(function(e){ return SLIP.checkedIds[e.rowKey]; });
  var rows = selected.map(function(e){ return e.nums.slice().sort(function(a,b){ return a-b; }); });
  MLL.openMarkingModal(rows, '로또구매전표_' + selected.length + '매');
};

document.addEventListener('DOMContentLoaded', function(){ SLIP.init(); });

// 즉석생성 그룹 — 100전략레이스 / 전략등록(번호생성기)
// 화면 전환 없이, 숨김 iframe으로 해당 페이지의 생성 로직을 그대로 호출하여
// "한 자리에 머물러 있다"는 느낌을 유지한다. 매번 새로 생성되므로 안내 토스트를 함께 띄운다.
// =====================================================
SLIP.showOnDemandToast = function(){
  var toast = document.getElementById('onDemandToast');
  toast.style.display = 'block';
  setTimeout(function(){ toast.style.display = 'none'; }, 2600);
};

SLIP.closeOnDemandModal = function(){
  document.getElementById('onDemandModalOverlay').style.display = 'none';
};

SLIP._waitForFrame = function(frameId){
  return new Promise(function(resolve, reject){
    var frame = document.getElementById(frameId);
    var tries = 0;
    var check = function(){
      tries++;
      try {
        if (frame.contentWindow && frame.contentWindow.RACE && frameId==='raceEngineFrame') { resolve(frame.contentWindow); return; }
        if (frame.contentWindow && frame.contentWindow.MLL && frameId==='generatorEngineFrame') { resolve(frame.contentWindow); return; }
      } catch(e) {}
      if (tries > 100) { reject(new Error('엔진 로드 시간 초과')); return; }
      setTimeout(check, 100);
    };
    check();
  });
};

// ── 100전략레이스에서 가져오기 ──
SLIP.openRaceFetchModal = async function(){
  document.getElementById('onDemandTitle').textContent = '🏇 100전략레이스에서 가져오기';
  document.getElementById('onDemandDesc').textContent = '100가지 전략 중 하나를 선택하고 개수를 입력하면, 그 자리에서 즉시 번호를 생성해 로또전표 후보에 추가합니다.';
  document.getElementById('onDemandFormArea').innerHTML = '<div style="text-align:center;padding:20px;color:#999;">불러오는 중...</div>';
  document.getElementById('onDemandResultArea').innerHTML = '';
  document.getElementById('onDemandModalOverlay').style.display = 'flex';

  try {
    var win = await SLIP._waitForFrame('raceEngineFrame');
    var strategies = win.RACE.ensureStrategies();
    var options = strategies.map(function(s){ return '<option value="'+s.no+'">'+s.name+'</option>'; }).join('');
    document.getElementById('onDemandFormArea').innerHTML =
      '<div class="filter-group" style="margin-bottom:10px;">' +
        '<label>전략 선택</label>' +
        '<select id="raceStrategySelect" style="width:100%;">'+options+'</select>' +
      '</div>' +
      '<div class="filter-group" style="margin-bottom:14px;">' +
        '<label>생성 개수</label>' +
        '<input type="number" id="raceCountInput" value="10" min="1" max="100" style="width:100%;">' +
      '</div>' +
      '<button class="btn-filter" style="width:100%;background:#7048e8;" onclick="SLIP.fetchFromRace()">⚡ 즉시 생성하기</button>';
  } catch(e) {
    document.getElementById('onDemandFormArea').innerHTML = '<div style="color:#e03131;font-size:12px;">엔진을 불러오지 못했습니다: '+e.message+'</div>';
  }
};

SLIP.fetchFromRace = async function(){
  var win = await SLIP._waitForFrame('raceEngineFrame');
  var strategyNo = parseInt(document.getElementById('raceStrategySelect').value);
  var count = Math.max(1, Math.min(100, parseInt(document.getElementById('raceCountInput').value)||10));
  SLIP.showOnDemandToast();
  var combos = win.RACE.generateOnDemand(strategyNo, count);
  if (!combos || !combos.length) {
    document.getElementById('onDemandResultArea').innerHTML = '<div style="color:#e03131;font-size:12px;">번호 생성에 실패했습니다.</div>';
    return;
  }
  SLIP._renderOnDemandResult(combos, 'race', strategyNo);
};

// ── 전략등록(번호생성기)에서 가져오기 ──
SLIP.openGeneratorFetchModal = async function(){
  document.getElementById('onDemandTitle').textContent = '✨ 전략등록(번호생성기)에서 가져오기';
  document.getElementById('onDemandDesc').textContent = '직접 만들어두신 전략 중 하나를 선택하고 개수를 입력하면, 그 자리에서 즉시 번호를 생성해 로또전표 후보에 추가합니다.';
  document.getElementById('onDemandFormArea').innerHTML = '<div style="text-align:center;padding:20px;color:#999;">불러오는 중...</div>';
  document.getElementById('onDemandResultArea').innerHTML = '';
  document.getElementById('onDemandModalOverlay').style.display = 'flex';

  try {
    var win = await SLIP._waitForFrame('generatorEngineFrame');
    var myStrategies = win.MLL.loadStrategies();
    if (!myStrategies || !myStrategies.length) {
      SLIP.closeOnDemandModal();
      alert('현재 이용자님이 만드신 전략이 없어요. 전략부터 만드세요!');
      return;
    }
    var options = myStrategies.map(function(s){ return '<option value="'+s.id+'">'+s.name+'</option>'; }).join('');
    document.getElementById('onDemandFormArea').innerHTML =
      '<div class="filter-group" style="margin-bottom:10px;">' +
        '<label>내 전략 선택</label>' +
        '<select id="genStrategySelect" style="width:100%;">'+options+'</select>' +
      '</div>' +
      '<div class="filter-group" style="margin-bottom:14px;">' +
        '<label>생성 개수</label>' +
        '<input type="number" id="genCountInput" value="10" min="1" max="100" style="width:100%;">' +
      '</div>' +
      '<button class="btn-filter" style="width:100%;background:#e8478e;" onclick="SLIP.fetchFromGenerator()">⚡ 즉시 생성하기</button>';
  } catch(e) {
    document.getElementById('onDemandFormArea').innerHTML = '<div style="color:#e03131;font-size:12px;">엔진을 불러오지 못했습니다: '+e.message+'</div>';
  }
};

SLIP.fetchFromGenerator = async function(){
  var win = await SLIP._waitForFrame('generatorEngineFrame');
  var stId = document.getElementById('genStrategySelect').value;
  var count = Math.max(1, Math.min(100, parseInt(document.getElementById('genCountInput').value)||10));
  var strategy = win.MLL.getStrategy ? win.MLL.getStrategy(stId) : win.MLL.loadStrategies().find(function(s){ return s.id===stId; });
  if (!strategy) { document.getElementById('onDemandResultArea').innerHTML = '<div style="color:#e03131;font-size:12px;">전략을 찾을 수 없습니다.</div>'; return; }

  SLIP.showOnDemandToast();
  var strategyForCount = Object.assign({}, strategy, { set_count: count });
  var results = win.MLL.loadResults();
  var history = Object.keys(results).map(Number).sort(function(a,b){return b-a;}).map(function(r){
    return {round:r, nums:results[r].nums||[], bonus:results[r].bonus||null};
  });
  var result = win.MLL.generateNumbers(strategyForCount, history);
  var combos = (result && result.numbers) ? result.numbers : [];
  if (!combos.length) {
    document.getElementById('onDemandResultArea').innerHTML = '<div style="color:#e03131;font-size:12px;">번호 생성에 실패했습니다.</div>';
    return;
  }
  SLIP._renderOnDemandResult(combos, 'generator', strategy.id);
};

// 즉석생성 결과를 모달 안에 보여주고, 로또전표 추가용 임시 체크상태(SLIP._onDemandCombos)로 보관
SLIP._onDemandCombos = [];
SLIP._renderOnDemandResult = function(combos, source, refKey){
  SLIP._onDemandCombos = combos.map(function(nums, i){ return { nums: nums, checked: true, idx: i }; });
  var rows = SLIP._onDemandCombos.map(function(c, i){
    var sorted = c.nums.slice().sort(function(a,b){return a-b;});
    var balls = sorted.map(function(n){
      return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';margin:1px;">'+n+'</span>';
    }).join('');
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0;">' +
      '<input type="checkbox" checked onchange="SLIP.toggleOnDemandCombo('+i+', this.checked)">' +
      '<div style="display:flex;gap:1px;">'+balls+'</div>' +
    '</div>';
  }).join('');
  document.getElementById('onDemandResultArea').innerHTML =
    '<div style="font-size:11.5px;color:#555;margin-bottom:8px;">생성된 '+combos.length+'개 — 로또전표에 추가할 것만 체크하세요</div>' +
    '<div style="max-height:240px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:8px 12px;margin-bottom:12px;">'+rows+'</div>' +
    '<button class="btn-filter" style="width:100%;background:#1a7ad4;" onclick="SLIP.addOnDemandToSlip(\''+source+'\')">✅ 체크된 조합 로또전표에 추가</button>';
};

SLIP.toggleOnDemandCombo = function(i, checked){ SLIP._onDemandCombos[i].checked = checked; };

SLIP.addOnDemandToSlip = function(source){
  var selected = SLIP._onDemandCombos.filter(function(c){ return c.checked; });
  if (!selected.length) { alert('추가할 조합을 1개 이상 체크해주세요.'); return; }
  selected.forEach(function(c, i){
    var rowKey = 'ondemand_'+source+'_'+Date.now()+'_'+i;
    SLIP._onDemandRows = SLIP._onDemandRows || [];
    SLIP._onDemandRows.push({
      rowKey: rowKey, refId: rowKey, source: source,
      round: MLL.getLottoInfo().saleRound, nums: c.nums, type: '즉석생성', isReal: false,
      memo: source==='race' ? '[100전략레이스 즉석생성]' : '[전략등록 즉석생성]',
      createdAt: Date.now(), status: null, grade: null, prizeMoney: 0, isFavorite: false
    });
    SLIP.checkedIds[rowKey] = true; // 추가하면서 바로 로또전표 체크도 켜둠
  });
  SLIP.closeOnDemandModal();
  SLIP.render();
  alert('✅ '+selected.length+'개 조합이 로또전표 후보로 추가되었습니다. 하단의 "로또구매전표 작성" 버튼으로 인쇄하실 수 있어요.');
};





// =====================================================
// BLANKSLIP - 마킹 없는 빈 로또용지 인쇄
// 기존 makinglotto.com 마킹 파이프라인을 그대로 재사용하되,
// 실제 번호 대신 "빈칸 코드"(46/47은 자동/취소로 특수처리되므로 안전하게 50 이상)를 넣어 요청한다.
// =====================================================
var BLANKSLIP = {};

BLANKSLIP.PRICE_FLAT = 1000;       // 기본 캐릭터 선택 — 장수 무관 고정가
BLANKSLIP.PRICE_UPLOAD = 1500;     // 내 이미지 업로드 — 아직 구현 전(아래 설명 참고)
BLANKSLIP.BLANK_CODE = [50, 51, 52, 53, 54, 55]; // 1~45(실제번호), 46/47(자동/취소) 모두 피한 안전한 빈칸 코드

BLANKSLIP.state = { selectedCids: [], sheets: 1 };

BLANKSLIP._ensureModalDom = function(){
  if (document.getElementById('blankSlipModal')) return;
  var overlay = document.createElement('div');
  overlay.id = 'blankSlipModal';
  overlay.className = 'modal-overlay';
  overlay.setAttribute('style', 'position:fixed !important;top:0 !important;left:0 !important;right:0 !important;bottom:0 !important;width:100vw;height:100vh;background:rgba(0,0,0,.65);z-index:999999;display:none;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;');
  overlay.innerHTML =
    '<div class="modal-box" style="position:relative;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;background:#11152a;border:1px solid #252b48;border-radius:16px;padding:24px;box-sizing:border-box;">' +
      '<button style="position:absolute;top:20px;right:20px;background:none;border:none;color:#5a6080;font-size:18px;cursor:pointer;" onclick="BLANKSLIP.close()">\u2715</button>' +
      '<h3 style="font-size:16px;font-weight:700;margin-bottom:8px;color:#eef0f6;display:flex;align-items:center;gap:7px;"><span style="font-size:18px;">\uD83D\uDCC4</span> 나만의 로또 빈용지 인쇄</h3>' +
      '<p style="font-size:11.5px;color:#8b91ab;line-height:1.7;margin-bottom:14px;">번호조합과 전혀 무관하게, 마킹 안 된 빈 용지를 실물 판매점 제출 가능한 형태의 PDF로 받습니다. 기존 마킹용지와 같은 makinglotto.com 인쇄 엔진을 사용하며, 번호만 비워서 요청합니다.</p>' +
      '<div style="display:flex;gap:8px;margin-bottom:14px;">' +
        '<button id="bsTabExisting" onclick="BLANKSLIP.setMode(\'existing\')" style="flex:1;padding:10px;border-radius:8px;border:1px solid #2FBFA3;background:#2FBFA3;color:#fff;font-weight:700;font-size:12.5px;cursor:pointer;">기존 캐릭터 선택 (1,000P)</button>' +
        '<button id="bsTabUpload" onclick="BLANKSLIP.setMode(\'upload\')" style="flex:1;padding:10px;border-radius:8px;border:1px solid #444a6e;background:#161b35;color:#8b91ab;font-weight:700;font-size:12.5px;cursor:pointer;">나의 이미지 업로드 (1,500P)</button>' +
      '</div>' +
      '<div id="bsExistingPane">' +
        '<div id="bsCharGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-height:300px;overflow-y:auto;padding:4px;border:1px solid #252b48;border-radius:10px;margin-bottom:14px;"></div>' +
      '</div>' +
      '<div id="bsUploadPane" style="display:none;padding:18px;border:1px dashed #444a6e;border-radius:10px;font-size:12px;color:#8b91ab;line-height:1.8;">' +
        '\u26A0\uFE0F 이 기능은 아직 준비 중입니다. makinglotto.com 인쇄 엔진이 직접 업로드한 이미지를 받을 수 있는지 확인 후 연결할 예정입니다 (캐릭터 이미지는 가로:세로 2:1 비율로 사용돼요).' +
      '</div>' +
      '<div style="margin-top:10px;display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:12.5px;color:#c5c9d8;font-weight:600;">인쇄 매수</span>' +
        '<input type="number" id="bsSheets" value="1" min="1" max="20" style="width:70px;padding:7px;border:1px solid #444a6e;border-radius:6px;font-size:12.5px;background:#161b35;color:#eef0f6;" oninput="BLANKSLIP.updatePriceBox()">' +
        '<span style="font-size:11px;color:#5a6080;">(매수와 관계없이 요금은 동일, 1매 = A~E 5칸)</span>' +
      '</div>' +
      '<div id="bsPriceBox" style="font-size:12.5px;color:#8b91ab;margin:12px 0;"></div>' +
      '<div id="bsResultBox" style="margin-top:6px;padding:11px 14px;border-radius:9px;font-size:12px;display:none;"></div>' +
      '<button style="width:100%;background:#2FBFA3;color:#fff;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;" onclick="BLANKSLIP.confirmAndGenerate()">PDF 생성하기</button>' +
    '</div>';
  overlay.addEventListener('click', function(e){ if (e.target === overlay) BLANKSLIP.close(); });
  document.body.appendChild(overlay);
};

BLANKSLIP.open = function(){
  BLANKSLIP._ensureModalDom();
  BLANKSLIP.renderCharGrid();
  BLANKSLIP.setMode('existing');
  document.getElementById('blankSlipModal').style.display = 'flex';
};
BLANKSLIP.close = function(){
  var m = document.getElementById('blankSlipModal');
  if (m) m.style.display = 'none';
};

BLANKSLIP.setMode = function(mode){
  BLANKSLIP.state.mode = mode;
  var isExisting = (mode === 'existing');
  document.getElementById('bsExistingPane').style.display = isExisting ? 'block' : 'none';
  document.getElementById('bsUploadPane').style.display = isExisting ? 'none' : 'block';
  var tabE = document.getElementById('bsTabExisting'), tabU = document.getElementById('bsTabUpload');
  tabE.style.background = isExisting ? '#2FBFA3' : '#161b35';
  tabE.style.color = isExisting ? '#fff' : '#8b91ab';
  tabE.style.borderColor = isExisting ? '#2FBFA3' : '#444a6e';
  tabU.style.background = !isExisting ? '#2FBFA3' : '#161b35';
  tabU.style.color = !isExisting ? '#fff' : '#8b91ab';
  tabU.style.borderColor = !isExisting ? '#2FBFA3' : '#444a6e';
  BLANKSLIP.updatePriceBox();
};

BLANKSLIP.renderCharGrid = function(){
  var ids = MLL.getAvailableCharacterIds();
  var grid = document.getElementById('bsCharGrid');
  grid.innerHTML = ids.map(function(id){
    var name = MLL.getCharacterName(id);
    return '<div class="bs-char-card" data-cid="'+id+'" onclick="BLANKSLIP.toggleCharacter('+id+')" style="cursor:pointer;border:2px solid #252b48;border-radius:8px;overflow:hidden;text-align:center;background:#161b35;">' +
      '<img src="'+MLL.MARKING_CONFIG.imageBasePath+id+'.png" style="width:100%;aspect-ratio:2/1;object-fit:cover;display:block;" loading="lazy">' +
      '<div style="font-size:9px;padding:3px 2px;color:#8b91ab;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+id+(name?(' '+name.slice(0,8)):'')+'</div>' +
    '</div>';
  }).join('');
  BLANKSLIP.updatePriceBox();
};

BLANKSLIP.toggleCharacter = function(cid){
  var s = BLANKSLIP.state;
  var idx = s.selectedCids.indexOf(cid);
  if (idx>=0) {
    s.selectedCids.splice(idx,1);
  } else {
    var sheets = Math.max(1, parseInt(document.getElementById('bsSheets').value) || 1);
    var gameCount = sheets * (MLL.MARKING_CONFIG.gamesPerSheet || 5);
    var maxUsefulImages = Math.max(1, Math.ceil(gameCount / MLL.MARKING_CONFIG.pageSize));
    if (s.selectedCids.length >= maxUsefulImages) {
      alert('지금 인쇄 매수(' + sheets + '매)로는 이미지를 최대 ' + maxUsefulImages + '개까지만 실제로 쓸 수 있어요.\n(이미지는 15게임=용지 3매 단위로만 바뀝니다)');
      return;
    }
    s.selectedCids.push(cid);
  }
  document.querySelectorAll('.bs-char-card').forEach(function(el){
    var on = s.selectedCids.indexOf(parseInt(el.dataset.cid))>=0;
    el.style.borderColor = on ? '#2FBFA3' : '#252b48';
    el.style.boxShadow = on ? '0 0 0 2px rgba(47,191,163,.3)' : 'none';
  });
  BLANKSLIP.updatePriceBox();
};

BLANKSLIP.updatePriceBox = function(){
  var sheets = Math.max(1, parseInt(document.getElementById('bsSheets').value) || 1);
  var isUpload = (BLANKSLIP.state.mode === 'upload');
  var price = isUpload ? BLANKSLIP.PRICE_UPLOAD : BLANKSLIP.PRICE_FLAT;
  var gameCount = sheets * (MLL.MARKING_CONFIG.gamesPerSheet || 5);
  var maxUsefulImages = Math.max(1, Math.ceil(gameCount / MLL.MARKING_CONFIG.pageSize));

  // 매수를 줄여서 한도가 선택된 개수보다 작아지면, 뒤에서부터 초과분을 자동으로 해제
  if (!isUpload && BLANKSLIP.state.selectedCids.length > maxUsefulImages) {
    BLANKSLIP.state.selectedCids = BLANKSLIP.state.selectedCids.slice(0, maxUsefulImages);
    document.querySelectorAll('.bs-char-card').forEach(function(el){
      var on = BLANKSLIP.state.selectedCids.indexOf(parseInt(el.dataset.cid))>=0;
      el.style.borderColor = on ? '#2FBFA3' : '#252b48';
      el.style.boxShadow = on ? '0 0 0 2px rgba(47,191,163,.3)' : 'none';
    });
  }

  document.getElementById('bsPriceBox').innerHTML =
    '\uD83D\uDCB3 ' + (isUpload ? '나의 이미지 업로드' : '기존 캐릭터 선택') + ' \u2014 <b style="color:#2FBFA3;font-size:14px;">' + price.toLocaleString() + 'P</b> (인쇄 ' + sheets + '매, 매수 무관 고정가)' +
    (isUpload ? '' : '<div style="font-size:10px;color:#e0b341;margin-top:4px;">\uD83D\uDCA1 지금 매수 기준으로 이미지 ' + maxUsefulImages + '개까지 선택 가능해요.</div>');
};

BLANKSLIP.showResult = function(type, msg){
  var box = document.getElementById('bsResultBox');
  box.style.display = 'block';
  box.style.background = type==='error' ? 'rgba(212,83,94,.1)' : 'rgba(63,179,127,.1)';
  box.style.border = '1px solid ' + (type==='error' ? 'rgba(212,83,94,.25)' : 'rgba(63,179,127,.25)');
  box.style.color = type==='error' ? '#D4537E' : '#3FB37F';
  box.textContent = msg;
};

// 매수(sheets)만큼 "빈칸 게임" 묶음을 만든다. 1매 = 5게임(A~E)이므로 sheets*5게임을 모두 빈칸코드로 채운다.
BLANKSLIP.makeBlankRows = function(sheets){
  var gamesPerSheet = MLL.MARKING_CONFIG.gamesPerSheet || 5;
  var rows = [];
  for (var i = 0; i < sheets * gamesPerSheet; i++) {
    rows.push(BLANKSLIP.BLANK_CODE.slice());
  }
  return rows;
};

BLANKSLIP.confirmAndGenerate = async function(){
  if (BLANKSLIP.state.mode === 'upload') {
    alert('이 기능은 아직 준비 중입니다. 우선 "기존 캐릭터 선택"을 이용해주세요.');
    return;
  }
  var sheets = Math.max(1, Math.min(20, parseInt(document.getElementById('bsSheets').value) || 1));
  var price = BLANKSLIP.PRICE_FLAT;

  var ok = confirm('이 생성은 ' + price.toLocaleString() + 'P가 차감됩니다(매수 무관 고정가).\n이대로 진행할까요?');
  if (!ok) return;

  // 실제 포인트 차감 (성공하면 화면 우측 상단에 차감 안내 배너가 자동으로 뜬다)
  var spend = await MLL.spendPoints('blank_slip', 1);
  if (!spend.success) {
    if (spend.needAuth || spend.insufficientPoints) return; // 안내 모달이 이미 떴음
    BLANKSLIP.showResult('error', '⛔ 처리 실패: ' + (spend.message || ''));
    return;
  }

  var rows = BLANKSLIP.makeBlankRows(sheets);
  BLANKSLIP.showResult('success', '\u23F3 PDF 생성 요청 중입니다...');
  MLL._runMarkingPipeline(rows, BLANKSLIP.state.selectedCids, 'blank_slip', 'bsResultBox').then(function(success){
    if (!success) return; // 실패 메시지는 _runMarkingPipeline이 이미 bsResultBox에 표시함
    BLANKSLIP.showResult('success', '\u2705 빈 용지 PDF 생성 완료! (' + sheets + '매)');
  });
};

document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') BLANKSLIP.close();
});

</script>
