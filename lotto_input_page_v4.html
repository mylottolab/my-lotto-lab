<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 번호 입력</title>
<script>
// =====================================================
// My Lotto Lab - 공통 모듈 (common.js)
// 모든 페이지에서 공유하는 데이터/함수
// =====================================================

// ── 전역 MLL 객체 (중복 로드 방지) ──
if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.ROUND1_TS = new Date('2002-12-07T20:00:00+09:00').getTime();
MLL.WEEK_MS   = 7 * 24 * 60 * 60 * 1000;
MLL.STORAGE_KEY       = 'mll_entries';      // 등록번호
MLL.RESULTS_KEY       = 'mll_results';      // 당첨결과
MLL.ADMIN_PW_KEY      = 'mll_admin_auth';   // 관리자 인증
MLL.SESSION_KEY       = 'mll_session';      // 현재 세션ID

// ── 세션ID 생성/조회 ──
MLL.getSession = function(tag) {
  // 각 입력창마다 고유 세션 태그 (general/camera/ai/excel)
  var key = MLL.SESSION_KEY + '_' + tag;
  var s = sessionStorage.getItem(key);
  if (!s) { s = tag + '_' + Date.now(); sessionStorage.setItem(key, s); }
  return s;
};

// ── 회차/시간 계산 ──
MLL.getLottoInfo = function() {
  var now = new Date();
  var ko  = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var day = ko.getDay(), hour = ko.getHours(), min = ko.getMinutes();
  var elapsed   = now.getTime() - MLL.ROUND1_TS;
  var thisRound = Math.floor(elapsed / MLL.WEEK_MS) + 1;
  var nextRound = thisRound + 1;
  var soldOut   = (day===6 && (hour>20||(hour===20&&min===0))) || (day===0 && hour<6);
  return { thisRound:thisRound, nextRound:nextRound, soldOut:soldOut };
};

MLL.getDrawDate = function(round) {
  var d = new Date(MLL.ROUND1_TS + (round - 1) * MLL.WEEK_MS);
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var dd= String(d.getDate()).padStart(2,'0');
  return y+'/'+m+'/'+dd;
};

MLL.getRoundStatus = function(round) {
  var info = MLL.getLottoInfo();
  return round < info.thisRound ? '추첨후' : '추첨전';
};

// ── 볼 색상 ──
MLL.BC = function(n) {
  return n<=10?'#f5c518':n<=20?'#1a7ad4':n<=30?'#e03131':n<=40?'#888888':'#2f9e44';
};
MLL.TC = function(n) { return n<=10?'#7a5e00':'#ffffff'; };

// ── UUID 생성 ──
MLL.uuid = function() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
};

// =====================================================
// 데이터 CRUD
// =====================================================

MLL.loadEntries = function() {
  try { return JSON.parse(localStorage.getItem(MLL.STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
};

MLL.saveEntries = function(entries) {
  localStorage.setItem(MLL.STORAGE_KEY, JSON.stringify(entries));
};

// 단일 항목 추가
MLL.addEntry = function(item) {
  var entries = MLL.loadEntries();
  if (!item.id)          item.id          = MLL.uuid();
  if (!item.createdAt)   item.createdAt   = Date.now();
  if (!item.grade)       item.grade       = null;
  if (!item.prizeMoney)  item.prizeMoney  = 0;
  if (!item.sessionTag)  item.sessionTag  = '';
  // status 자동 판단
  item.status = MLL.getRoundStatus(item.round);
  entries.push(item);
  MLL.saveEntries(entries);
  return item;
};

// 여러 항목 추가
MLL.addEntries = function(items) {
  var entries = MLL.loadEntries();
  items.forEach(function(item) {
    if (!item.id)         item.id         = MLL.uuid();
    if (!item.createdAt)  item.createdAt  = Date.now();
    if (!item.grade)      item.grade      = null;
    if (!item.prizeMoney) item.prizeMoney = 0;
    if (!item.sessionTag) item.sessionTag = '';
    item.status = MLL.getRoundStatus(item.round);
    entries.push(item);
  });
  MLL.saveEntries(entries);
  return items;
};

// 항목 삭제
MLL.deleteEntry = function(id) {
  var entries = MLL.loadEntries().filter(function(e){ return e.id !== id; });
  MLL.saveEntries(entries);
};

// =====================================================
// 당첨결과 데이터
// =====================================================

MLL.loadResults = function() {
  try { return JSON.parse(localStorage.getItem(MLL.RESULTS_KEY) || '{}'); }
  catch(e) { return {}; }
};

MLL.saveResults = function(results) {
  localStorage.setItem(MLL.RESULTS_KEY, JSON.stringify(results));
};

MLL.getResult = function(round) {
  return MLL.loadResults()[round] || null;
};

// ── 당첨 등수 계산 ──
MLL.calcGrade = function(myNums, winNums, bonusNum) {
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  var hasBonus = myNums.indexOf(bonusNum) >= 0;
  if (match===6)                  return 1;
  if (match===5 && hasBonus)      return 2;
  if (match===5)                  return 3;
  if (match===4)                  return 4;
  if (match===3)                  return 5;
  return 0;
};

// ── 당첨금액 계산 ──
MLL.calcPrize = function(grade, result) {
  if (!result || grade===0) return 0;
  if (grade===1) return result.prize1 || 0;
  if (grade===2) return result.prize2 || 0;
  if (grade===3) return result.prize3 || 0;
  if (grade===4) return 50000;
  if (grade===5) return 5000;
  return 0;
};

// ── 당첨결과로 전체 업데이트 ──
// resultsObj 구조:
// {
//   1227: {
//     nums: [1,14,16,34,41,44],  // 당첨번호 6개
//     bonus: 13,                  // 보너스번호
//     winners1: 11,               // 1등 총 당첨게임수
//     prize1: 2674808455,         // 1등 1게임당 당첨금액
//     autoWin: 8,                 // 자동 1등 당첨게임수
//     semiWin: 1,                 // 반자동 1등 당첨게임수
//     manualWin: 2,               // 수동 1등 당첨게임수
//     winnerShops: "진흥수퍼, ...", // 1등 당첨점명
//     winners2: 70,               // 2등 당첨게임수
//     prize2: 70054508,           // 2등 1게임당 당첨금액
//     winners3: 3042,             // 3등 당첨게임수
//     prize3: 1612037,            // 3등 1게임당 당첨금액
//     note: "..."                 // 특이사항 (옵션)
//   }
// }
MLL.applyResults = function(resultsObj) {
  MLL.saveResults(resultsObj);
  var entries = MLL.loadEntries();
  var updated = 0;
  entries.forEach(function(entry) {
    // round가 숫자/문자열 둘 다 처리
    var res = resultsObj[entry.round] || resultsObj[String(entry.round)] || resultsObj[parseInt(entry.round)];
    if (res) {
      entry.status     = '추첨후';
      entry.grade      = MLL.calcGrade(entry.nums, res.nums, res.bonus);
      entry.prizeMoney = MLL.calcPrize(entry.grade, res);
      updated++;
    }
  });
  MLL.saveEntries(entries);
  return updated;
};

// =====================================================
// 정렬 (추첨전 상단, 추첨후 하단, 각각 회차 내림차순)
// =====================================================

MLL.sortEntries = function(entries) {
  var pre  = entries.filter(function(e){ return e.status==='추첨전'; })
                    .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });
  var post = entries.filter(function(e){ return e.status!=='추첨전'; })
                    .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });
  return pre.concat(post);
};

// =====================================================
// 공통 테이블 렌더러
// =====================================================

MLL.GRADE_LABEL = ['낙첨','1등','2등','3등','4등','5등'];
MLL.GRADE_COLOR = ['#aaa','#e03131','#e67700','#1a7ad4','#2f9e44','#888'];

MLL.renderBalls = function(nums, bonusNums, small) {
  var size = small ? 19 : 24;
  var fs   = small ? 8  : 10;
  return nums.map(function(n) {
    var isBonus = bonusNums && bonusNums.indexOf(n)>=0;
    var bg  = isBonus ? '#fff'    : MLL.BC(n);
    var tc  = isBonus ? '#555'    : MLL.TC(n);
    var brd = isBonus ? '2px solid #aaa' : 'none';
    return '<span style="width:'+size+'px;height:'+size+'px;border-radius:50%;display:inline-flex;' +
      'align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:700;flex-shrink:0;' +
      'background:'+bg+';color:'+tc+';border:'+brd+';margin:1px;">'+n+'</span>';
  }).join('');
};

// 통일된 테이블 행 생성
MLL.renderRow = function(entry, sessionTag, opts) {
  opts = opts || {};
  var isSession = sessionTag && entry.sessionTag === sessionTag;
  var result    = MLL.getResult(entry.round);
  var winNums   = result ? result.nums  : [];
  var bonusNum  = result ? result.bonus : null;

  // status 실시간 재판단 (당첨결과 적용 후 반영)
  var actualStatus = entry.status;
  if (result && entry.status === '추첨전') actualStatus = '추첨후';

  // 반자동: autoNums 필드(시스템 채운 번호) 저장되어 있으면 사용
  var autoNums = entry.autoNums || [];

  // 번호 정렬 후 매치 표시
  var sorted = entry.nums.slice().sort(function(a,b){return a-b;});
  var ballsHTML = sorted.map(function(n) {
    var isMatch = winNums.indexOf(n) >= 0;
    var isBonus = n === bonusNum && !isMatch;
    var bg  = isBonus ? '#fff' : MLL.BC(n);
    var tc  = isBonus ? '#555' : MLL.TC(n);
    var brd = isMatch ? '2px solid #f5c518' : isBonus ? '2px solid #aaa' : 'none';
    // 반자동: 시스템이 채운 번호(autoNums)만 흐리게 — 추첨전/후 관계없이 항상 유지
    var op = (entry.type==='반자동' && autoNums.length>0 && autoNums.indexOf(n)>=0) ? '0.4' : '1';
    // 단, 당첨번호와 일치하는 경우 당첨 표시를 위해 흐리기 해제
    if (isMatch) op = '1';
    return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;' +
      'align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;' +
      'background:'+bg+';color:'+tc+';border:'+brd+';margin:1px;opacity:'+op+';">'+n+'</span>';
  }).join('');

  // 구매형태 뱃지
  var typeColor = entry.type==='자동'?'#2f9e44':entry.type==='반자동'?'#e67700':'#1a7ad4';
  var typeBg    = entry.type==='자동'?'#e8fff0':entry.type==='반자동'?'#fff3e0':'#e8f4ff';
  var typeHTML  = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;' +
    'color:'+typeColor+';background:'+typeBg+';border:1px solid '+typeColor+';">'+entry.type+'</span>';

  // 구분 (실구매/가상)
  var realHTML = entry.isReal
    ? '<span style="background:#f5c518;color:#7a5e00;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;">실구매</span>'
    : '<span style="background:#eee;color:#999;font-size:8px;padding:1px 4px;border-radius:3px;">가상</span>';

  // 추첨상태 (실시간 재판단 적용)
  var statusHTML = actualStatus==='추첨전'
    ? '<span style="color:#e03131;font-weight:700;font-size:9px;">추첨전</span>'
    : '<span style="color:#999;font-size:9px;">추첨후</span>';

  // 당첨결과
  var gradeHTML = '<span style="color:#ddd;">-</span>';
  if (actualStatus==='추첨후' && entry.grade !== null) {
    if (entry.grade === 0) {
      gradeHTML = '<span style="color:#aaa;font-size:9px;">낙첨</span>';
    } else {
      gradeHTML = '<span style="color:'+MLL.GRADE_COLOR[entry.grade]+';font-weight:700;font-size:9px;">' +
        MLL.GRADE_LABEL[entry.grade]+'</span>';
    }
  }

  // 당첨금
  var prizeHTML = '<span style="color:#ddd;">-</span>';
  if (entry.prizeMoney && entry.prizeMoney > 0) {
    prizeHTML = '<span style="color:#e03131;font-weight:700;font-size:9px;">' +
      entry.prizeMoney.toLocaleString()+'원</span>';
  }

  // 세션 하이라이트
  var rowStyle = isSession
    ? 'border-left:3px solid #1a7ad4;background:#f0f8ff;'
    : (actualStatus==='추첨전' ? 'background:#fff8e1;' : '');

  var rcColor = actualStatus==='추첨전' ? '#e03131' : '#555';

  var delBtn = opts.noDelete ? '' :
    '<button onclick="MLL.deleteEntry(\''+entry.id+'\');if(window.refreshTable)refreshTable();" ' +
    'style="background:none;border:1px solid #fcc;border-radius:3px;padding:1px 4px;color:#e03131;cursor:pointer;font-size:9px;">🗑</button>';

  return '<tr style="'+rowStyle+'">' +
    '<td style="text-align:center;padding:4px 4px;"><span style="background:'+rcColor+';color:#fff;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700;">'+entry.round+'회</span></td>' +
    '<td style="padding:4px 6px;"><div style="display:flex;gap:1px;align-items:center;flex-wrap:wrap;">'+ballsHTML+'</div></td>' +
    '<td style="text-align:center;padding:4px 4px;">'+typeHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+realHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+statusHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+gradeHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+prizeHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+delBtn+'</td>' +
    '</tr>';
};

// 섹션 구분선
MLL.renderDivider = function(label, count) {
  return '<tr><td colspan="8" style="background:#f0f0f0;padding:3px 8px;font-size:9px;font-weight:700;color:#888;">'+
    label+' ('+count+'개)</td></tr>';
};

// 전체 테이블 렌더
MLL.renderTable = function(tbodyId, sessionTag, filterRound) {
  var entries = MLL.loadEntries();
  if (filterRound) entries = entries.filter(function(e){ return e.round == filterRound; });
  var sorted  = MLL.sortEntries(entries);
  var pre     = sorted.filter(function(e){ return e.status==='추첨전'; });
  var post    = sorted.filter(function(e){ return e.status!=='추첨전'; });
  var tbody   = document.getElementById(tbodyId);
  if (!tbody) return;

  var html = '';
  if (!sorted.length) {
    html = '<tr><td colspan="8" style="text-align:center;padding:30px;color:#bbb;font-size:12px;">저장된 번호가 없습니다.</td></tr>';
  } else {
    if (pre.length) {
      html += MLL.renderDivider('🔴 추첨 예정', pre.length);
      pre.forEach(function(e){ html += MLL.renderRow(e, sessionTag); });
    }
    if (post.length) {
      html += MLL.renderDivider('✅ 추첨 완료', post.length);
      post.forEach(function(e){ html += MLL.renderRow(e, sessionTag); });
    }
  }
  tbody.innerHTML = html;

  // 카운트 업데이트
  var tcEl = document.getElementById('totalCount');
  if (tcEl) tcEl.textContent = entries.length;
  var realEl = document.getElementById('realCount');
  if (realEl) realEl.textContent = entries.filter(function(e){return e.isReal;}).length;
};

// 테이블 헤더 HTML
MLL.TABLE_HEADER = '<thead><tr>' +
  '<th style="width:52px;">회차</th>' +
  '<th style="width:160px;">번호</th>' +
  '<th style="width:54px;">구매형태</th>' +
  '<th style="width:50px;">구분</th>' +
  '<th style="width:50px;">추첨</th>' +
  '<th style="width:46px;">결과</th>' +
  '<th style="width:80px;">당첨금</th>' +
  '<th style="width:28px;">삭제</th>' +
  '</tr></thead>';

// =====================================================
// 관리자 인증
// =====================================================

MLL.ADMIN_PW = 'lotto2024!';  // 관리자 비밀번호 (변경 가능)

MLL.checkAdmin = function() {
  return sessionStorage.getItem(MLL.ADMIN_PW_KEY) === 'ok';
};

MLL.loginAdmin = function(pw) {
  if (pw === MLL.ADMIN_PW) {
    sessionStorage.setItem(MLL.ADMIN_PW_KEY, 'ok');
    return true;
  }
  return false;
};

MLL.logoutAdmin = function() {
  sessionStorage.removeItem(MLL.ADMIN_PW_KEY);
};

// =====================================================
// 통계
// =====================================================

MLL.getStats = function() {
  var entries = MLL.loadEntries();
  var stats = {
    total: entries.length,
    byMethod: { general:0, camera:0, ai:0, excel:0 },
    byType:   { auto:0, semi:0, manual:0 },
    byStatus: { pre:0, post:0 },
    byReal:   { real:0, virtual:0 },
    byGrade:  { g1:0, g2:0, g3:0, g4:0, g5:0, fail:0 },
    totalPrize: 0
  };
  entries.forEach(function(e) {
    // 입력방법
    var m = e.inputMethod || 'general';
    if (stats.byMethod[m] !== undefined) stats.byMethod[m]++;
    // 구매형태
    if (e.type==='자동')   stats.byType.auto++;
    if (e.type==='반자동') stats.byType.semi++;
    if (e.type==='수동')   stats.byType.manual++;
    // 추첨상태
    if (e.status==='추첨전') stats.byStatus.pre++;
    else                     stats.byStatus.post++;
    // 실구매/가상
    if (e.isReal) stats.byReal.real++;
    else          stats.byReal.virtual++;
    // 당첨
    if (e.grade===1) stats.byGrade.g1++;
    else if (e.grade===2) stats.byGrade.g2++;
    else if (e.grade===3) stats.byGrade.g3++;
    else if (e.grade===4) stats.byGrade.g4++;
    else if (e.grade===5) stats.byGrade.g5++;
    else if (e.status==='추첨후') stats.byGrade.fail++;
    // 당첨금
    stats.totalPrize += (e.prizeMoney || 0);
  });
  return stats;
};

console.log('[MLL] common.js 로드 완료');

</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:#f3f4f6;font-size:14px;}
.header-inner{max-width:1280px;margin:0 auto;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;background:#1c1c2e;border-radius:0 0 8px 8px;}
.logo-left{display:flex;align-items:center;gap:9px;}
.logo-icon{width:30px;height:30px;background:#1a7ad4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text .title{font-size:14px;font-weight:700;color:#fff;}
.logo-text .sub{font-size:9px;color:#aaa;}
.btn-back{background:none;border:1px solid #555;color:#ccc;padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;}
.wrap{display:grid;grid-template-columns:300px 1fr 300px;gap:10px;padding:10px;max-width:1280px;margin:0 auto;}
.panel{background:#fff;border-radius:9px;overflow:hidden;border:1px solid #e0e0e0;margin-bottom:8px;}
.ph{padding:9px 14px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;color:#fff;}
.ph-blue{background:#1a7ad4;}.ph-gray{background:#666;}
.pb{padding:11px 13px;}
.round-badge{background:#f5c518;color:#7a5e00;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;}
.di{font-size:11px;color:#999;margin:5px 0 7px;}
.sr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.sc{background:#1a7ad4;color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;}
.mi{border:1px solid #ddd;border-radius:5px;padding:4px 8px;font-size:11px;width:110px;}
.sd{background:#f8f8f8;border:1px solid #eee;border-radius:5px;padding:6px 9px;font-size:11px;color:#aaa;min-height:26px;margin-bottom:7px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
.sb{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;flex-shrink:0;}
.faded{opacity:0.38;}
.ng{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px;}
.nb{width:100%;aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:none;outline:none;transition:transform 0.1s;}
.nb:hover{transform:scale(1.1);}
.nb.on{box-shadow:0 0 0 2px #fff,0 0 0 3px #222;}
.y{background:#f5c518;color:#7a5e00;}.bl{background:#1a7ad4;color:#fff;}
.r{background:#e03131;color:#fff;}.gy{background:#888;color:#fff;}.gr{background:#2f9e44;color:#fff;}
.br{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.btn-rst{background:#fff;border:1px solid #ccc;border-radius:4px;padding:4px 10px;font-size:11px;color:#666;cursor:pointer;}
.cnt-box{display:flex;align-items:center;gap:3px;margin-left:auto;}
.cnt-in{width:46px;border:1px solid #ddd;border-radius:4px;text-align:center;padding:2px;font-size:12px;font-weight:600;}
.btn-auto{background:#2f9e44;color:#fff;border:none;border-radius:4px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-save{width:100%;background:#1a7ad4;color:#fff;border:none;border-radius:5px;padding:8px;font-size:13px;font-weight:700;cursor:pointer;}
.rsel{width:100%;border:1px solid #ddd;border-radius:5px;padding:5px 8px;font-size:12px;margin-bottom:6px;}
.sh{cursor:pointer;user-select:none;}
.sh:hover{background:#eef2ff;color:#1a7ad4;}
.sa{font-size:8px;margin-left:2px;}
.sa.asc::after{content:'▲';color:#1a7ad4;}
.sa.desc::after{content:'▼';color:#1a7ad4;}
.sa:not(.asc):not(.desc)::after{content:'⇅';color:#ccc;}
.sdiv td{background:#f0f0f0!important;padding:3px 6px;font-size:9px;font-weight:700;color:#888;text-align:left;}

.rph{padding:11px 15px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #eee;flex-wrap:wrap;}
.rpt{font-size:15px;font-weight:700;color:#333;}
.cb{background:#1a7ad4;color:#fff;font-size:10px;padding:1px 7px;border-radius:8px;}
.fsel{border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:10px;}
.btn-q{background:#fff;border:1px solid #1a7ad4;color:#1a7ad4;border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;}
.tw{overflow-x:auto;overflow-y:auto;max-height:580px;}
table{width:100%;border-collapse:collapse;min-width:500px;}
th{background:#f8f8f8;padding:6px 8px;font-size:11px;font-weight:700;color:#555;border-bottom:1px solid #e0e0e0;white-space:nowrap;position:sticky;top:0;z-index:2;text-align:center;}
td{padding:5px 6px;font-size:10px;color:#444;border-bottom:1px solid #f0f0f0;vertical-align:middle;text-align:center;}
tr:hover td{background:#fafafa;}
</style>
</head>

<script>
var SESSION_TAG = MLL.getSession('general');
var INFO        = MLL.getLottoInfo();
var THIS_ROUND  = INFO.thisRound;
var NEXT_ROUND  = INFO.nextRound;
var SOLD_OUT    = INFO.soldOut;

// 현재 판매 가능한 최대 회차
// 토20:00~일06:00(판매중단): NEXT_ROUND가 아직 안 열렸으므로 THIS_ROUND까지만
// 그 외: THIS_ROUND 판매 중 (NEXT_ROUND는 아직 판매 안 함)
var SALE_ROUND = SOLD_OUT ? NEXT_ROUND : THIS_ROUND;

// TEST1 배지: 현재 판매 회차
document.getElementById('t1badge').textContent = '제'+SALE_ROUND+'회';
document.getElementById('t1date').textContent  = '추첨일: '+MLL.getDrawDate(SALE_ROUND);

// 회차 셀렉트 (지난 추첨분) - THIS_ROUND까지만 (과거 회차)
(function(){
  var sel=document.getElementById('rsel2');
  for(var r=THIS_ROUND;r>=Math.max(1,THIS_ROUND-99);r--){
    var o=document.createElement('option');
    o.value=r; o.textContent='제'+r+'회 ('+MLL.getDrawDate(r)+')';
    sel.appendChild(o);
  }
})();

// 필터 셀렉트
(function(){
  var sel=document.getElementById('fs');
  for(var r=SALE_ROUND;r>=Math.max(1,SALE_ROUND-19);r--){
    var o=document.createElement('option');
    o.value=r; o.textContent=r+'회'; sel.appendChild(o);
  }
})();

var BC  = function(n){return n<=10?'#f5c518':n<=20?'#1a7ad4':n<=30?'#e03131':n<=40?'#888':'#2f9e44';};
var TC  = function(n){return n<=10?'#7a5e00':'#fff';};
var CLS = function(n){return n<=10?'y':n<=20?'bl':n<=30?'r':n<=40?'gy':'gr';};

var ST = {1:{sel:[],auto:[],cnt:1}, 2:{sel:[],auto:[],cnt:1}};

function buildGrid(p){
  var g=document.getElementById('g'+p); g.innerHTML='';
  for(var i=1;i<=45;i++){
    var b=document.createElement('button');
    b.className='nb '+CLS(i); b.textContent=i; b.id='btn'+p+'_'+i;
    (function(n){ b.onclick=function(){tog(p,n);}; })(i);
    g.appendChild(b);
  }
}

function tog(p,n){
  var s=ST[p]; var i=s.sel.indexOf(n);
  if(i>=0) s.sel.splice(i,1);
  else if(s.sel.length<6) s.sel.push(n);
  s.auto=[]; upd(p);
}

function upd(p){
  var s=ST[p]; var all=s.sel.concat(s.auto);
  for(var i=1;i<=45;i++){
    var el=document.getElementById('btn'+p+'_'+i);
    if(el) el.classList.toggle('on', all.indexOf(i)>=0);
  }
  document.getElementById('c'+p).textContent=all.length;
  var d=document.getElementById('d'+p);
  if(!all.length){ d.innerHTML='<span style="color:#bbb;font-size:9px;">번호를 선택하세요</span>'; return; }
  d.innerHTML=all.map(function(n){
    var faded=(s.auto.indexOf(n)>=0&&s.sel.length>0)?' faded':'';
    return '<span class="sb'+faded+'" style="background:'+BC(n)+';color:'+TC(n)+'">'+n+'</span>';
  }).join('');
}

function autoGen(p){
  var cnt=parseInt(document.getElementById('ci'+p).value)||1;
  var s=ST[p];
  var pool=[];
  for(var i=1;i<=45;i++) if(s.sel.indexOf(i)<0) pool.push(i);
  for(var i=pool.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp; }
  s.auto=pool.slice(0,6-s.sel.length);
  s.cnt=cnt; upd(p);
}

function rst(p){
  ST[p]={sel:[],auto:[],cnt:1}; upd(p);
  document.getElementById('m'+p).value='';
  document.getElementById('ci'+p).value=1;
}

function sv(p){
  var s=ST[p]; var all=s.sel.concat(s.auto);
  if(all.length!==6){ alert('6개의 번호를 완성해주세요.'); return; }
  var type=s.sel.length===0?'자동':s.auto.length>0?'반자동':'수동';
  var round=p===1?SALE_ROUND:parseInt(document.getElementById('rsel2').value)||THIS_ROUND;
  var memo=document.getElementById('m'+p).value;
  var cnt=parseInt(document.getElementById('ci'+p).value)||1;
  cnt=Math.min(cnt,10000);

  // 판매 가능 회차 초과 차단
  if(round > SALE_ROUND){
    alert('⛔ 제'+round+'회는 아직 판매하지 않습니다.\n현재 판매 중인 회차: 제'+SALE_ROUND+'회');
    return;
  }
  // 판매중단 시간대 현재 회차 차단
  if(SOLD_OUT && round===THIS_ROUND){
    alert('⛔ 제'+THIS_ROUND+'회는 현재 판매 중단 중입니다.\n(토요일 20:00 ~ 일요일 06:00)');
    return;
  }

  if(cnt<=1||s.sel.length>0){
    // 단건 or 반자동/수동 — autoNums(시스템이 채운 번호) 별도 저장
    MLL.addEntry({ round:round, nums:all.slice().sort(function(a,b){return a-b;}),
      type:type, isReal:false, inputMethod:'general',
      sessionTag:SESSION_TAG, memo:memo,
      autoNums:s.auto.slice() });
    rst(p); refreshTable();
  } else {
    // 대량 자동 생성 - 배치로 처리
    if(cnt>1000 && !confirm(cnt+'개를 생성합니다. 시간이 걸릴 수 있어요. 계속하시겠습니까?')) return;
    var items=[];
    for(var k=0;k<cnt;k++){
      var pool=[];
      for(var i=1;i<=45;i++) pool.push(i);
      for(var i=pool.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp; }
      items.push({ round:round, nums:pool.slice(0,6).sort(function(a,b){return a-b;}),
        type:'자동', isReal:false, inputMethod:'general',
        sessionTag:SESSION_TAG, memo:'', autoNums:[] });
    }
    MLL.addEntries(items);
    rst(p); refreshTable();
    alert('✅ '+cnt+'개 자동번호 저장 완료!');
  }
}

// ── 정렬 상태 ──
var sortCol = 'round', sortDir = -1; // 기본: 회차 내림차순

function sortBy(col){
  if(sortCol===col){ sortDir*=-1; }
  else { sortCol=col; sortDir=-1; }
  // 헤더 아이콘 업데이트
  ['round','memo','type','status','grade','prizeMoney'].forEach(function(c){
    var el=document.getElementById('sa-'+c);
    if(!el) return;
    el.className='sa';
    if(c===sortCol) el.classList.add(sortDir===-1?'desc':'asc');
  });
  refreshTable();
}

function refreshTable(){
  var fv  = document.getElementById('fs').value;
  var entries = MLL.loadEntries();
  if(fv) entries = entries.filter(function(e){return String(e.round)===fv;});

  document.getElementById('totalCount').textContent = MLL.loadEntries().length;

  // 정렬
  entries.sort(function(a,b){
    var av,bv;
    if(sortCol==='round')       { av=a.round;       bv=b.round; }
    else if(sortCol==='memo')   { av=a.memo||'';    bv=b.memo||''; }
    else if(sortCol==='type')   { av=a.type||'';    bv=b.type||''; }
    else if(sortCol==='status') { av=a.status||'';  bv=b.status||''; }
    else if(sortCol==='grade')  { av=a.grade==null?-1:a.grade; bv=b.grade==null?-1:b.grade; }
    else if(sortCol==='prizeMoney'){ av=a.prizeMoney||0; bv=b.prizeMoney||0; }
    else { av=a.round; bv=b.round; }
    if(av<bv) return sortDir;
    if(av>bv) return -sortDir;
    return 0;
  });

  // 정렬이 회차 기본일 때만 추첨전/후 섹션 구분
  var useSections = (sortCol==='round');
  var pre  = useSections ? entries.filter(function(e){return e.status==='추첨전';}) : [];
  var post = useSections ? entries.filter(function(e){return e.status!=='추첨전';}) : entries;

  // 섹션 배지
  var badge = document.getElementById('sectionBadge');
  if(useSections){
    badge.innerHTML = '<span style="color:#e03131;">🔴추첨예정 '+pre.length+'개</span>' +
      ' &nbsp;|&nbsp; <span style="color:#888;">✅추첨완료 '+post.length+'개</span>';
  } else { badge.textContent=''; }

  var tb   = document.getElementById('tb');
  if(!entries.length){
    tb.innerHTML='<tr><td colspan="9" style="text-align:center;padding:30px;color:#bbb;font-size:12px;">저장된 번호가 없습니다.</td></tr>';
    return;
  }

  function renderRows(list){
    return list.map(function(entry){
      var result    = MLL.getResult(entry.round) || MLL.loadResults()[entry.round] || MLL.loadResults()[String(entry.round)];
      var winNums   = result ? result.nums  : [];
      var bonusNum  = result ? result.bonus : null;
      // 당첨결과가 있거나 status가 추첨후면 추첨후로 표시
      var actualSt  = (result || entry.status==='추첨후') ? '추첨후' : '추첨전';
      var autoNums  = entry.autoNums || [];
      var isSession = entry.sessionTag === SESSION_TAG;

      var balls = entry.nums.slice().sort(function(a,b){return a-b;}).map(function(n){
        var isMatch = winNums.indexOf(n)>=0;
        var isBonus = n===bonusNum && !isMatch;
        var bg  = isBonus?'#fff':MLL.BC(n);
        var tc  = isBonus?'#555':MLL.TC(n);
        var brd = isMatch?'2px solid #f5c518':isBonus?'2px solid #aaa':'none';
        // 반자동: 시스템번호는 흐리게 — 추첨전/후 항상 유지, 당첨번호 일치 시만 예외
        var op = (entry.type==='반자동'&&autoNums.length>0&&autoNums.indexOf(n)>=0) ? '0.4' : '1';
        if(isMatch) op='1';
        return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;'+
          'font-size:8px;font-weight:700;flex-shrink:0;background:'+bg+';color:'+tc+';border:'+brd+';margin:1px;opacity:'+op+';">'+n+'</span>';
      }).join('');

      var typeColor = entry.type==='자동'?'#2f9e44':entry.type==='반자동'?'#e67700':'#1a7ad4';
      var typeBg    = entry.type==='자동'?'#e8fff0':entry.type==='반자동'?'#fff3e0':'#e8f4ff';
      var typeHTML  = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;color:'+typeColor+';background:'+typeBg+';border:1px solid '+typeColor+';">'+entry.type+'</span>';

      var realHTML  = entry.isReal
        ?'<span style="background:#f5c518;color:#7a5e00;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;">실구매</span>'
        :'<span style="background:#eee;color:#999;font-size:8px;padding:1px 4px;border-radius:3px;">가상</span>';

      var statusHTML = actualSt==='추첨전'
        ?'<span style="color:#e03131;font-weight:700;font-size:9px;">추첨전</span>'
        :'<span style="color:#999;font-size:9px;">추첨후</span>';

      var gradeHTML = '<span style="color:#ddd;">-</span>';
      if(actualSt==='추첨후'&&entry.grade!==null){
        gradeHTML = entry.grade===0
          ?'<span style="color:#aaa;font-size:9px;">낙첨</span>'
          :'<span style="color:'+MLL.GRADE_COLOR[entry.grade]+';font-weight:700;font-size:9px;">'+MLL.GRADE_LABEL[entry.grade]+'</span>';
      }

      var prizeHTML = '<span style="color:#ddd;">-</span>';
      if(entry.prizeMoney&&entry.prizeMoney>0){
        prizeHTML='<span style="color:#e03131;font-weight:700;font-size:9px;">'+entry.prizeMoney.toLocaleString()+'원</span>';
      }

      var rcColor  = actualSt==='추첨전'?'#e03131':'#555';
      var rowStyle = isSession?'border-left:3px solid #1a7ad4;background:#f0f8ff;'
        :actualSt==='추첨전'?'background:#fff8e1;':'';

      return '<tr style="'+rowStyle+'">'
        +'<td style="text-align:center;padding:4px;"><span style="background:'+rcColor+';color:#fff;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700;">'+entry.round+'회</span></td>'
        +'<td style="padding:3px 4px;"><div style="display:flex;gap:1px;align-items:center;">'+balls+'</div></td>'
        +'<td style="font-size:9px;color:#999;text-align:left;padding:4px 5px;overflow:hidden;text-overflow:ellipsis;">'+((entry.memo||''))+'</td>'
        +'<td style="text-align:center;padding:4px;">'+typeHTML+'</td>'
        +'<td style="text-align:center;padding:4px;">'+realHTML+'</td>'
        +'<td style="text-align:center;padding:4px;">'+statusHTML+'</td>'
        +'<td style="text-align:center;padding:4px;">'+gradeHTML+'</td>'
        +'<td style="text-align:center;padding:4px;">'+prizeHTML+'</td>'
        +'<td style="text-align:center;padding:4px;"><button onclick="delEntry(\''+entry.id+'\')" '
        +'style="background:none;border:1px solid #fcc;border-radius:3px;padding:1px 4px;color:#e03131;cursor:pointer;font-size:9px;">🗑</button></td>'
        +'</tr>';
    }).join('');
  }

  var html='';
  if(useSections){
    if(pre.length){
      html+='<tr class="sdiv"><td colspan="9">🔴 추첨 예정 ('+pre.length+'개)</td></tr>';
      html+=renderRows(pre);
    }
    if(post.length){
      html+='<tr class="sdiv"><td colspan="9">✅ 추첨 완료 ('+post.length+'개)</td></tr>';
      html+=renderRows(post);
    }
  } else {
    html=renderRows(entries);
  }
  tb.innerHTML=html;
}

function delEntry(id){
  if(confirm('삭제하시겠습니까?')){ MLL.deleteEntry(id); refreshTable(); }
}

// 전역 등록
window.rst=rst; window.autoGen=autoGen; window.sv=sv;
window.refreshTable=refreshTable; window.sortBy=sortBy; window.delEntry=delEntry;

// 헤더 초기 아이콘
sortBy('round');
buildGrid(1); buildGrid(2); refreshTable();
</script>
</body>
</html>
