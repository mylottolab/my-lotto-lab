<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 인증 확인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0d18;--surface:#11152a;--border-soft:#1b2038;--text:#eef0f6;--text-dim:#8b91ab;--gold:#e0b341;--green:#3fb37f;--red:#e05c5c;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:40px 32px;max-width:420px;width:100%;text-align:center;}
.icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.icon.ok{background:rgba(63,179,127,.10);border:2px solid var(--green);}
.icon.err{background:rgba(224,92,92,.10);border:2px solid var(--red);}
.icon.loading{border:2px solid var(--border-soft);}
.icon svg{width:26px;height:26px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.icon.ok svg{stroke:var(--green);}
.icon.err svg{stroke:var(--red);}
h1{font-size:18px;font-weight:700;margin-bottom:8px;}
.desc{font-size:12.5px;color:var(--text-dim);line-height:1.6;margin-bottom:24px;}
.btn{width:100%;padding:11px;border-radius:9px;border:none;background:var(--gold);color:#1a1305;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block;}
.spinner{width:24px;height:24px;border:2px solid var(--border-soft);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon loading"><div class="spinner"></div></div>
  <h1>확인 중입니다...</h1>
  <p class="desc">잠시만 기다려 주세요.</p>
</div>

<script>
var API = 'https://my-lotto-lab-api.onrender.com';

function parseHash(){
  var hash = window.location.hash.replace(/^#/, '');
  var params = new URLSearchParams(hash);
  return {
    accessToken: params.get('access_token'),
    error: params.get('error_description') || params.get('error')
  };
}

function render(ok, title, desc){
  var card = document.getElementById('card');
  card.innerHTML =
    '<div class="icon ' + (ok ? 'ok' : 'err') + '">' +
      (ok
        ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
        : '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      ) +
    '</div>' +
    '<h1>' + title + '</h1>' +
    '<p class="desc">' + desc + '</p>' +
    '<a class="btn" href="/pay/guest_test.html">' + (ok ? '포인트 조회하러 가기' : '다시 시도하기') + '</a>';
}

(async function(){
  var query = new URLSearchParams(window.location.search);
  var nickname = query.get('nickname');
  var hashData = parseHash();

  if (hashData.error) {
    render(false, '인증에 실패했습니다', '링크가 만료되었거나 이미 사용된 링크입니다. 처음부터 다시 시도해 주세요.');
    return;
  }
  if (!hashData.accessToken || !nickname) {
    render(false, '잘못된 접근입니다', '이메일에서 받은 링크를 통해 접속해 주세요.');
    return;
  }

  try {
    var res = await fetch(API + '/api/guest/finalize-link', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken: hashData.accessToken, nickname: nickname })
    });
    var data = await res.json();

    if (!res.ok) {
      render(false, '등록에 실패했습니다', data.error || '알 수 없는 오류가 발생했습니다.');
      return;
    }

    render(true, '등록이 완료되었습니다!', '닉네임 "' + data.nickname + '" 으로 등록되었습니다. 이제 포인트 조회가 가능합니다.');
  } catch (e) {
    render(false, '오류가 발생했습니다', '잠시 후 다시 시도해 주세요.');
  }
})();
</script>
</body>
</html>
