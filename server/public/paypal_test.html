<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 포인트 충전 (달러)</title>
<!--
  ⚠ 아래 client-id는 실제 PayPal Client ID로 교체하세요.
  실사용(Live) 전환 시에는 Sandbox Client ID가 아니라 Live Client ID를 넣어야 합니다.
  (PayPal JS SDK의 client-id는 브라우저에 노출되는 값이라 Secret과 달리
   공개되어도 안전합니다 — 결제 승인은 항상 서버가 Secret으로 처리합니다.)
-->
<script src="https://www.paypal.com/sdk/js?client-id=AdY3PuD7qKdqZvkIHhkIsDtNXTjG0nb7J2Q0_p71f9nTITJwUFxfq5yFhjvrYxBiBQiK7wr_UrnUgpku&currency=USD"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0d18;--surface:#11152a;--border-soft:#1b2038;--text:#eef0f6;--text-dim:#8b91ab;--gold:#e0b341;--accent:#5b6ee8;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:36px 32px;max-width:440px;width:100%;}
h1{font-size:20px;font-weight:700;margin-bottom:6px;}
.desc{font-size:12.5px;color:var(--text-dim);margin-bottom:20px;line-height:1.6;}
.my-balance{background:var(--bg);border:1px solid var(--border-soft);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--gold);margin-bottom:18px;display:none;line-height:1.6;}
.my-balance.show{display:block;}
.field{margin-bottom:20px;}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border-soft);border-radius:9px;padding:10px 13px;font-size:13.5px;color:var(--text);outline:none;font-family:inherit;}
.field input:focus{border-color:var(--accent);}
.field .hint{font-size:11px;color:var(--text-dim);margin-top:6px;}
.amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.amount-btn{background:var(--bg);border:1px solid var(--border-soft);border-radius:8px;padding:10px 4px;font-size:12.5px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;}
.amount-btn:hover{border-color:var(--accent);}
.amount-btn.active{background:var(--gold);border-color:var(--gold);color:#1a1305;}
.amount-input-wrap{position:relative;}
.amount-input-wrap input{padding-left:24px;}
.amount-input-wrap .unit{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-dim);pointer-events:none;}
.err{background:rgba(224,92,92,.10);border:1px solid rgba(224,92,92,.25);border-radius:9px;padding:10px 13px;font-size:12.5px;color:#f08080;margin-bottom:16px;display:none;}
.err.show{display:block;}
.ok{background:rgba(63,179,127,.10);border:1px solid rgba(63,179,127,.25);border-radius:9px;padding:10px 13px;font-size:12.5px;color:#3fb37f;margin-bottom:16px;display:none;}
.ok.show{display:block;}
#paypal-button-container{margin-top:8px;}
</style>
</head>
<body>
<div class="card">
  <h1>💳 포인트 충전 (달러)</h1>
  <p class="desc">PayPal로 안전하게 포인트를 충전합니다. $1 = 1,400P(환율은 관리자가 조정), 최소 $1부터 가능합니다.</p>

  <div class="my-balance" id="myBalance"></div>
  <div class="err" id="errMsg"></div>
  <div class="ok" id="okMsg"></div>

  <div class="field">
    <label>충전 금액 (USD)</label>
    <div class="amount-grid" id="amountGrid"></div>
    <div class="amount-input-wrap">
      <span class="unit">$</span>
      <input type="number" id="usdAmount" value="10" min="1" max="1000" step="1">
    </div>
    <div class="hint">$1 ~ $1,000 사이 정수로 입력하세요.</div>
  </div>

  <div id="paypal-button-container"></div>
</div>

<script>
var API = 'https://my-lotto-lab-api.onrender.com';
var AMOUNTS = [1, 5, 10, 15, 20, 25, 50, 100, 500, 1000];

function showError(msg){
  var err = document.getElementById('errMsg');
  err.textContent = msg;
  err.classList.add('show');
  document.getElementById('okMsg').classList.remove('show');
}
function showSuccess(msg){
  var ok = document.getElementById('okMsg');
  ok.textContent = msg;
  ok.classList.add('show');
  document.getElementById('errMsg').classList.remove('show');
}

(function renderAmountButtons(){
  var grid = document.getElementById('amountGrid');
  var input = document.getElementById('usdAmount');
  grid.innerHTML = AMOUNTS.map(function(a){
    return '<button type="button" class="amount-btn" data-amt="' + a + '">$' + a.toLocaleString() + '</button>';
  }).join('');
  grid.querySelectorAll('.amount-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      grid.querySelectorAll('.amount-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      input.value = btn.dataset.amt;
    });
  });
  input.addEventListener('input', function(){
    // 정수만 허용 (소수점 입력 시 즉시 절삭)
    if (input.value.indexOf('.') !== -1) input.value = Math.floor(Number(input.value));
    grid.querySelectorAll('.amount-btn').forEach(function(b){
      b.classList.toggle('active', Number(b.dataset.amt) === Number(input.value));
    });
  });
  grid.querySelectorAll('.amount-btn')[2].classList.add('active'); // 기본값 $10 활성화
})();

async function loadBalance(){
  if (typeof MLL === 'undefined') return;
  var state = MLL.getAuthState();
  var box = document.getElementById('myBalance');
  if (!state.type) return;

  var headers = {};
  var qs = '';
  if (state.type === 'member') headers['Authorization'] = 'Bearer ' + state.token;
  else qs = '?nickname=' + encodeURIComponent(state.nickname) + '&email=' + encodeURIComponent(state.email);

  try {
    var res = await fetch(API + '/api/points/balance' + qs, { headers: headers });
    var data = await res.json();
    if (res.ok) {
      box.innerHTML = '현재 보유 포인트: <b>' + data.total.toLocaleString() + 'P</b> (입금 ' + data.deposit.toLocaleString() + ' · 활동 ' + data.activity.toLocaleString() + ')';
      box.classList.add('show');
    }
  } catch(e){}
}
loadBalance();

window.addEventListener('pageshow', function(){
  document.getElementById('usdAmount').value = 10;
  document.getElementById('errMsg').classList.remove('show');
  document.getElementById('okMsg').classList.remove('show');
  document.querySelectorAll('.amount-btn').forEach(function(b){ b.classList.remove('active'); });
  var third = document.querySelectorAll('.amount-btn')[2];
  if (third) third.classList.add('active');
});

if (typeof paypal === 'undefined') {
  showError('PayPal SDK 로딩에 실패했습니다. client-id 설정을 확인하세요.');
} else {
  paypal.Buttons({
    createOrder: function(data, actions) {
      document.getElementById('errMsg').classList.remove('show');
      document.getElementById('okMsg').classList.remove('show');

      if (typeof MLL === 'undefined') {
        showError('인증 모듈 로딩 실패. 새로고침 후 다시 시도해 주세요.');
        return Promise.reject(new Error('MLL not loaded'));
      }
      var authState = MLL.getAuthState();
      if (!authState.type) {
        MLL.requireAuth(function(){});
        return Promise.reject(new Error('로그인/등록 필요'));
      }

      var usdAmount = Math.floor(Number(document.getElementById('usdAmount').value));
      if (!usdAmount || usdAmount < 1 || usdAmount > 1000) {
        showError('충전 금액은 $1 ~ $1,000 사이 정수여야 합니다.');
        return Promise.reject(new Error('금액 오류'));
      }

      var headers = { 'Content-Type': 'application/json' };
      var payload = { usdAmount: usdAmount };
      if (authState.type === 'member') {
        headers['Authorization'] = 'Bearer ' + authState.token;
      } else {
        payload.nickname = authState.nickname;
        payload.email = authState.email;
      }

      return fetch(API + '/api/payment/paypal/create-order', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(payload)
      })
      .then(function(res) { return res.json(); })
      .then(function(order) {
        if (order.error) {
          showError(order.error);
          throw new Error(order.error);
        }
        return order.id;
      });
    },

    onApprove: function(data, actions) {
      return fetch(API + '/api/payment/paypal/capture-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderID: data.orderID })
      })
      .then(function(res) { return res.json(); })
      .then(function(result) {
        if (result.error) {
          showError(result.error);
          return;
        }
        showSuccess('결제가 완료되었습니다! ' + result.points + 'P 적립 (주문번호: ' + data.orderID + ')');
        loadBalance();
      })
      .catch(function(err) {
        console.error(err);
        showError('결제 승인 처리 중 오류가 발생했습니다.');
      });
    },

    onError: function(err) {
      console.error('PayPal 오류:', err);
      showError('결제 중 오류가 발생했습니다.');
    },

    onCancel: function(data) {
      showError('결제가 취소되었습니다.');
    }
  }).render('#paypal-button-container');
}
</script>
<script src="https://my-lotto-lab-api.onrender.com/pay/auth_gate.js"></script>
</body>
</html>
