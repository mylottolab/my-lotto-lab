<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 결제 테스트</title>
<script src="https://stdpay.inicis.com/stdjs/INIStdPay.js" charset="UTF-8"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0d18;--surface:#11152a;--border-soft:#1b2038;--text:#eef0f6;--text-dim:#8b91ab;--gold:#e0b341;--accent:#5b6ee8;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:36px 32px;max-width:440px;width:100%;}
h1{font-size:20px;font-weight:700;margin-bottom:6px;}
.desc{font-size:12.5px;color:var(--text-dim);margin-bottom:28px;line-height:1.6;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border-soft);border-radius:9px;padding:10px 13px;font-size:13.5px;color:var(--text);outline:none;font-family:inherit;}
.field input:focus{border-color:var(--accent);}
.btn{width:100%;padding:12px;border-radius:9px;border:none;background:var(--gold);color:#1a1305;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn.loading{position:relative;color:transparent;}
.btn.loading::after{content:'';position:absolute;left:50%;top:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border:2px solid rgba(26,19,5,.4);border-top-color:#1a1305;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{background:rgba(224,92,92,.10);border:1px solid rgba(224,92,92,.25);border-radius:9px;padding:10px 13px;font-size:12.5px;color:#f08080;margin-bottom:16px;display:none;}
.err.show{display:block;}
#inicisForm{display:none;}
</style>
</head>
<body>
<div class="card">
  <h1>🧪 결제 테스트</h1>
  <p class="desc">실제 이니시스 결제창으로 테스트합니다. 소액(100원)으로 진행하세요.</p>
  <div class="err" id="errMsg"></div>
  <div class="field"><label>상품명</label><input type="text" id="goodname" value="My Lotto Lab 이용권 (테스트)"></div>
  <div class="field"><label>결제금액 (원)</label><input type="number" id="price" value="100"></div>
  <div class="field"><label>구매자 이름</label><input type="text" id="buyername" value="테스트구매자"></div>
  <div class="field"><label>구매자 연락처</label><input type="text" id="buyertel" value="01012345678"></div>
  <div class="field"><label>구매자 이메일</label><input type="email" id="buyeremail" value="test@test.com"></div>
  <button class="btn" id="payBtn" onclick="startPayment()">결제창 열기</button>
</div>

<form id="inicisForm" method="post">
  <input type="hidden" name="version" value="1.0">
  <input type="hidden" name="mid" id="f_mid">
  <input type="hidden" name="goodname" id="f_goodname">
  <input type="hidden" name="oid" id="f_oid">
  <input type="hidden" name="price" id="f_price">
  <input type="hidden" name="currency" value="WON">
  <input type="hidden" name="buyername" id="f_buyername">
  <input type="hidden" name="buyertel" id="f_buyertel">
  <input type="hidden" name="buyeremail" id="f_buyeremail">
  <input type="hidden" name="timestamp" id="f_timestamp">
  <input type="hidden" name="signature" id="f_signature">
  <input type="hidden" name="mKey" id="f_mkey">
  <input type="hidden" name="returnUrl" id="f_returnUrl">
  <input type="hidden" name="closeUrl" id="f_closeUrl">
  <input type="hidden" name="gopaymethod" value="Card">
  <input type="hidden" name="charset" value="UTF-8">
  <input type="hidden" name="acceptmethod" value="CARDPOINT">
</form>

<script>
var API = 'https://my-lotto-lab-api.onrender.com';

async function startPayment(){
  var btn = document.getElementById('payBtn');
  var err = document.getElementById('errMsg');
  err.classList.remove('show');
  btn.classList.add('loading'); btn.disabled=true;

  try {
    var res = await fetch(API+'/api/payment/inicis/prepare', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        price: document.getElementById('price').value,
        goodname: document.getElementById('goodname').value,
        buyername: document.getElementById('buyername').value,
        buyertel: document.getElementById('buyertel').value,
        buyeremail: document.getElementById('buyeremail').value
      })
    });
    var data = await res.json();
    if(!res.ok) throw new Error(data.error||'결제 준비 실패');

    document.getElementById('f_mid').value       = data.mid;
    document.getElementById('f_goodname').value  = data.goodname;
    document.getElementById('f_oid').value       = data.oid;
    document.getElementById('f_price').value     = data.price;
    document.getElementById('f_buyername').value = data.buyername;
    document.getElementById('f_buyertel').value  = data.buyertel;
    document.getElementById('f_buyeremail').value= data.buyeremail;
    document.getElementById('f_timestamp').value = data.timestamp;
    document.getElementById('f_signature').value = data.signature;
    document.getElementById('f_mkey').value      = data.mkey;
    document.getElementById('f_returnUrl').value = data.returnUrl;
    document.getElementById('f_closeUrl').value  = data.closeUrl;

    INIStdPay.pay('inicisForm');
  } catch(e) {
    err.textContent = e.message||'오류가 발생했습니다.';
    err.classList.add('show');
  } finally {
    btn.classList.remove('loading'); btn.disabled=false;
  }
}
</script>
</body>
</html>
