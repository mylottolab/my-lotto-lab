<script src="https://my-lotto-lab-api.onrender.com/pay/common.js"></script>
<script>
// 이 페이지 전용 기능: 번호조합을 역대 전체회차와 대조하는 성적분석(common.js에는 없음)
// ── 전체 역사 데이터(lotto_results_full.json) 로드 ──
// GitHub 저장소에 올려진 lotto_details1.xlsx(사용자가 수동 갱신)를 JSON으로 변환한 파일.
// mll_results(auto_update.html이 부분적으로 채워주는 캐시)와는 별개의, 1회~최신회차 전체를 담은 완전한 데이터셋.
MLL._fullHistoryCache = null;
MLL._fullHistoryPromise = null;

MLL.loadFullHistory = function(){
  if (MLL._fullHistoryCache) return Promise.resolve(MLL._fullHistoryCache);
  if (MLL._fullHistoryPromise) return MLL._fullHistoryPromise;
  MLL._fullHistoryPromise = fetch('lotto_results_full.json')
    .then(function(res){ if (!res.ok) throw new Error('fetch failed: '+res.status); return res.json(); })
    .then(function(data){ MLL._fullHistoryCache = data; return data; })
    .catch(function(err){
      console.warn('[MLL] lotto_results_full.json 로드 실패, 부분 데이터(mll_results)로 대체:', err.message);
      MLL._fullHistoryCache = MLL.loadResults(); // 실패 시 최소한 자동업데이트 캐시로 대체
      return MLL._fullHistoryCache;
    });
  return MLL._fullHistoryPromise;
};

// 6개 번호조합을 "역대 전체 회차(1회~최신)"와 전부 대조하여 등수별 누적횟수를 계산.
// 등록 이력(mll_entries)과는 무관하게, 순수하게 "이 번호가 그 회차에 나왔다면 몇 등이었을까"를 매 회차 가상으로 채점함.
// async 함수이므로 호출 측에서 await 또는 .then()으로 받아야 함.
MLL.getComboHistoryStat = async function(nums){
  var history = await MLL.loadFullHistory();
  var gradeCounts = [0,0,0,0,0,0];
  var totalPrize = 0;
  var perRound = []; // {round, grade, prizeMoney} 회차 오름차순 누적용(최근판정을 위해 round 내림차순 정렬은 아래에서)

  Object.keys(history).forEach(function(roundKey){
    var res = history[roundKey];
    if (!res || !res.nums) return;
    var grade = MLL.calcGrade(nums, res.nums, res.bonus);
    var prize = MLL.calcPrize(grade, res);
    if (grade >= 1 && grade <= 5) gradeCounts[grade]++;
    totalPrize += prize;
    perRound.push({ round: parseInt(roundKey), grade: grade, prizeMoney: prize });
  });

  perRound.sort(function(a,b){ return b.round - a.round; }); // 최신 회차부터
  var GRADE_LABEL = ['낙첨','1등','2등','3등','4등','5등'];
  // "최근/최근-1/최근-2"는 적중 여부와 무관하게, 조회시점 기준 가장 최근 3개 회차를 그대로 보여줌 (낙첨이면 낙첨)
  var recentRounds = perRound.slice(0,3).map(function(r){ return GRADE_LABEL[r.grade]; });
  while (recentRounds.length < 3) recentRounds.push('-');

  return {
    totalRoundsChecked: perRound.length, // 대조에 사용된 전체 회차 수
    grade1: gradeCounts[1], grade2: gradeCounts[2], grade3: gradeCounts[3],
    grade4: gradeCounts[4], grade5: gradeCounts[5],
    totalPrize: totalPrize,
    recent: recentRounds[0], recent1: recentRounds[1], recent2: recentRounds[2]
  };
};
</script>

<script>
// =====================================================
// SLIP - 각종 데이터 통합 리스트 화면 컨트롤러 (v3: 전체 Data출처 통합, 엑셀용)
// =====================================================
var SLIP = {};
SLIP.checkedIds = {}; // {rowKey: true} - 다운로드 대상 선택 체크

// "입력방식 또는 Data출처" 통합 라벨 (영구저장 소스 + 즉석생성 소스 전체)
SLIP.SOURCE_LABEL = {
  general:'일반방식', camera:'실구매(카메라/QR)', excel:'엑셀대량', ai:'AI음성·문자',
  mock:'모의실전시뮬레이션', favorite:'관심번호(최애번호)', strategy:'전략비교평가',
  race:'100전략레이스 (위의 "즉석에서 가져오기"를 클릭하세요)', generator:'전략등록 (위의 "즉석에서 가져오기"를 클릭하세요)'
};
SLIP.SOURCE_TAG_CLASS = {
  general:'tag-general', camera:'tag-camera', excel:'tag-excel', ai:'tag-ai',
  mock:'tag-mock', favorite:'tag-favorite', strategy:'tag-strategy',
  race:'tag-race', generator:'tag-generator'
};

SLIP.init = async function(){
  await MLL.refreshResults();
  await MLL.refreshEntries();
  SLIP.buildRoundFilterOptions();
  SLIP.render();
};

// 영구저장 4개 소스(Data등록)를 공통 행 형식으로 변환
SLIP._fromDataEntries = function(){
  return MLL.loadEntries().map(function(e){
    return {
      rowKey: 'entry_'+e.id, refId: e.id, source: e.inputMethod || 'general',
      round: e.round, nums: e.nums, type: e.type, isReal: !!e.isReal, memo: e.memo || '',
      createdAt: e.createdAt, status: e.status, grade: e.grade, prizeMoney: e.prizeMoney,
      isFavorite: !!e.isFavorite
    };
  });
};

// 모의실전시뮬레이션(mll_mock_entries)을 공통 행 형식으로 변환
SLIP._fromMockEntries = function(){
  if (typeof MOCK === 'undefined' || !MOCK.loadEntries) return [];
  return MOCK.loadEntries().map(function(e){
    return {
      rowKey: 'mock_'+e.id, refId: e.id, source: 'mock',
      round: e.round, nums: e.nums, type: e.type, isReal: false, memo: '['+(e.nickname||'')+']',
      createdAt: e.createdAt, status: (e.grade!==null && e.grade!==undefined)?'추첨후':'추첨전',
      grade: e.grade, prizeMoney: e.prizeMoney, isFavorite: false
    };
  });
};

// 관심번호/최애번호 저장소(mll_favorites)를 공통 행 형식으로 변환 (중복 표시 허용)
SLIP._fromFavorites = function(){
  if (!MLL.loadFavorites) return [];
  return MLL.loadFavorites().map(function(f){
    return {
      rowKey: 'fav_'+f.id, refId: f.id, source: 'favorite',
      round: f.round, nums: f.nums, type: f.type, isReal: !!f.isReal, memo: f.memo || '',
      createdAt: f.createdAt, status: f.status, grade: f.grade, prizeMoney: f.prizeMoney,
      isFavorite: true
    };
  });
};

// 전략비교평가(mll_strategy_results) - 1건이 numbers 배열(여러 조합)을 가지므로 펼쳐서 변환
SLIP._fromStrategyResults = function(){
  if (!MLL.loadStrategyResults) return [];
  var rows = [];
  MLL.loadStrategyResults().forEach(function(sr){
    (sr.numbers || []).forEach(function(nums, idx){
      rows.push({
        rowKey: 'strategy_'+sr.id+'_'+idx, refId: sr.id, source: 'strategy',
        round: sr.round, nums: nums, type: '전략', isReal: false, memo: '['+(sr.strategyName||'')+']',
        createdAt: sr.createdAt || Date.now(), status: null, grade: null, prizeMoney: 0,
        isFavorite: false
      });
    });
  });
  return rows;
};

// 영구저장 4개 소스 + 즉석생성으로 추가된 임시항목을 모두 합친 전체 목록
SLIP._onDemandRows = [];
SLIP.getAllRows = function(){
  return SLIP._fromDataEntries()
    .concat(SLIP._fromMockEntries())
    .concat(SLIP._fromFavorites())
    .concat(SLIP._fromStrategyResults())
    .concat(SLIP._onDemandRows);
};

SLIP.buildRoundFilterOptions = function(){
  var rows = SLIP.getAllRows();
  var rounds = Array.from(new Set(rows.map(function(e){ return e.round; }))).sort(function(a,b){ return b-a; });
  var sel = document.getElementById('filterRound');
  rounds.forEach(function(r){
    var opt = document.createElement('option');
    opt.value = r; opt.textContent = r+'회';
    sel.appendChild(opt);
  });
};

SLIP.getFilteredEntries = function(){
  var rows = SLIP.getAllRows();
  var from = document.getElementById('filterFrom').value;
  var to = document.getElementById('filterTo').value;
  var method = document.getElementById('filterMethod').value;
  var round = document.getElementById('filterRound').value;

  if (from) {
    var fromTs = new Date(from+'T00:00:00').getTime();
    rows = rows.filter(function(e){ return e.createdAt >= fromTs; });
  }
  if (to) {
    var toTs = new Date(to+'T23:59:59').getTime();
    rows = rows.filter(function(e){ return e.createdAt <= toTs; });
  }
  if (method) rows = rows.filter(function(e){ return e.source === method; });
  if (round) rows = rows.filter(function(e){ return String(e.round) === String(round); });

  rows.sort(function(a,b){ return b.createdAt - a.createdAt; });
  return rows;
};

SLIP.applyFilter = function(){ SLIP.render(); };
SLIP.resetFilter = function(){
  document.getElementById('filterFrom').value = '';
  document.getElementById('filterTo').value = '';
  document.getElementById('filterMethod').value = '';
  document.getElementById('filterRound').value = '';
  SLIP.render();
};

// ── 같은 번호조합(6개 숫자 완전일치) 기준 역대 성적 집계 ──
SLIP._comboKey = function(nums){
  return nums.slice().sort(function(a,b){ return a-b; }).join('-');
};

SLIP.render = async function(){
  var allCount = SLIP.getAllRows().length;
  var entries = SLIP.getFilteredEntries();
  document.getElementById('phCount').textContent = '(' + entries.length + '개 / 전체 ' + allCount + '개)';

  if (allCount === 0) {
    document.getElementById('filterPanel').style.display = 'none';
    document.getElementById('listBody').innerHTML =
      '<div class="empty-guide">' +
        '<div class="ico">📭</div>' +
        '<div class="msg">아직 등록된 번호가 없습니다.</div>' +
        '<div class="sub">직전메뉴인 "일반방식 편한등록"을 사용하여 입력 후 방문해 주시기 바랍니다.<br>카메라/QR·엑셀·AI 음성·문자·모의시뮬레이션·관심번호·전략비교평가 등 다른 곳에 등록하신 내용도 모두 이곳에서 모아볼 수 있어요.</div>' +
        '<a class="link-btn" href="lotto_input_page_v4.html">일반방식 편한등록으로 이동 →</a>' +
      '</div>';
    document.getElementById('bottomBar').style.display = 'none';
    return;
  }

  document.getElementById('filterPanel').style.display = 'block';

  if (!entries.length) {
    document.getElementById('listBody').innerHTML =
      '<div class="empty-guide">' +
        '<div class="ico">🔍</div>' +
        '<div class="msg">조회 조건에 맞는 번호가 없습니다.</div>' +
        '<div class="sub">조회 조건을 변경해보세요.</div>' +
      '</div>';
    document.getElementById('bottomBar').style.display = 'none';
    return;
  }

  document.getElementById('listBody').innerHTML = '<div class="empty-guide"><div class="ico">⏳</div><div class="msg">역대 회차와 대조하는 중...</div></div>';

  // 화면에 보이는 행들의 조합별 통계를 한 번씩만 계산(캐시)
  var statCache = {};
  for (var i=0; i<entries.length; i++) {
    var key = SLIP._comboKey(entries[i].nums);
    if (!statCache[key]) {
      statCache[key] = await MLL.getComboHistoryStat(entries[i].nums);
    }
  }

  var allChecked = entries.every(function(e){ return SLIP.checkedIds[e.rowKey]; });
  var html =
    '<div class="list-toolbar">' +
      '<label style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:#555;cursor:pointer;">' +
        '<input type="checkbox" id="checkAll" onclick="SLIP.toggleAll(this.checked)" '+(allChecked?'checked':'')+'> 전체선택' +
      '</label>' +
      '<span class="cnt">조회됨 <b>'+entries.length+'</b>개</span>' +
      '<span class="checked-cnt" id="checkedCntLabel"></span>' +
    '</div>' +
    '<div class="tw"><table><thead><tr>' +
      '<th style="width:36px;">선택</th><th>입력일자</th><th>회차</th><th>번호</th><th>메모</th><th>구매형태</th><th>입력방식 또는 Data출처</th><th>구분</th>' +
      '<th>역대1등</th><th>역대2등</th><th>역대3등</th><th>역대4등</th><th>역대5등</th><th>총상금액</th>' +
      '<th>최근</th><th>최근-1</th><th>최근-2</th>' +
      '<th style="width:36px;">최애번호</th>' +
    '</tr></thead><tbody>' +
    entries.map(function(e){ return SLIP._renderRow(e, statCache[SLIP._comboKey(e.nums)]); }).join('') +
    '</tbody></table></div>';

  document.getElementById('listBody').innerHTML = html;
  document.getElementById('bottomBar').style.display = 'flex';
  SLIP.updateCheckedDisplay();
};

SLIP._renderRow = function(entry, stat){
  stat = stat || { grade1:0, grade2:0, grade3:0, grade4:0, grade5:0, totalPrize:0, recent:'-', recent1:'-', recent2:'-' };

  var sorted = entry.nums.slice().sort(function(a,b){ return a-b; });
  var ballsHtml = sorted.map(function(n){
    return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';margin:1px;">'+n+'</span>';
  }).join('');

  var typeColor = entry.type==='자동'?'#2f9e44':entry.type==='반자동'?'#e67700':entry.type==='전략'?'#7048e8':'#1a7ad4';
  var typeBg = entry.type==='자동'?'#e8fff0':entry.type==='반자동'?'#fff3e0':entry.type==='전략'?'#f0ecff':'#e8f4ff';
  var typeHtml = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;color:'+typeColor+';background:'+typeBg+';border:1px solid '+typeColor+';">'+entry.type+'</span>';

  var srcCls = SLIP.SOURCE_TAG_CLASS[entry.source] || 'tag-general';
  var srcLabel = SLIP.SOURCE_LABEL[entry.source] || entry.source;
  var srcHtml = '<span class="input-method-tag '+srcCls+'">'+srcLabel+'</span>';

  var realHtml = entry.isReal
    ? '<span style="background:#f5c518;color:#7a5e00;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;">실구매</span>'
    : '<span style="background:#eee;color:#999;font-size:8px;padding:1px 4px;border-radius:3px;">가상</span>';

  var d = new Date(entry.createdAt);
  var dateStr = d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');

  var isChecked = !!SLIP.checkedIds[entry.rowKey];
  var isFav = !!entry.isFavorite;
  // 최애번호 토글은 mll_entries(일반/카메라/엑셀/AI) 기준으로만 가능 (모의시뮬/전략비교는 별도 저장소라 미지원)
  var favSupported = ['general','camera','excel','ai'].indexOf(entry.source) >= 0;

  return '<tr id="row_'+entry.rowKey+'" class="'+(isChecked?'checked':'')+'">' +
    '<td><input type="checkbox" '+(isChecked?'checked':'')+' onchange="SLIP.toggleOne(\''+entry.rowKey+'\', this.checked)" title="이 조합을 받을 목록에 포함"></td>' +
    '<td style="color:#999;">'+dateStr+'</td>' +
    '<td><span style="background:#555;color:#fff;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700;">'+entry.round+'회</span></td>' +

// =====================================================
// EXCELDL - 엑셀 다운로드 과금계산 및 생성
// 과금정책: 일반 데이터 1~100개 500P, 초과시 개당 +1P
//           100전략레이스(race) 출처는 별도 단가: 1~10개 1000P, 초과시 개당 +30P
// =====================================================
var EXCELDL = {};
EXCELDL.PRICE_GENERAL_BASE = 500;     // 일반 데이터 1~100개 기본
EXCELDL.PRICE_GENERAL_BASE_MAX = 100; // 기본가 적용 한도
EXCELDL.PRICE_GENERAL_EXTRA = 1;      // 초과 1개당
EXCELDL.PRICE_RACE_BASE = 1000;       // 100전략레이스 1~10개 기본
EXCELDL.PRICE_RACE_BASE_MAX = 10;     // 기본가 적용 한도
EXCELDL.PRICE_RACE_EXTRA = 30;        // 초과 1개당

EXCELDL.calcPrice = function(selectedRows){
  var raceRows = selectedRows.filter(function(r){ return r.source === 'race'; });
  var generalRows = selectedRows.filter(function(r){ return r.source !== 'race'; });

  var racePrice = 0;
  if (raceRows.length > 0) {
    racePrice = EXCELDL.PRICE_RACE_BASE + Math.max(0, raceRows.length - EXCELDL.PRICE_RACE_BASE_MAX) * EXCELDL.PRICE_RACE_EXTRA;
  }
  var generalPrice = 0;
  if (generalRows.length > 0) {
    generalPrice = EXCELDL.PRICE_GENERAL_BASE + Math.max(0, generalRows.length - EXCELDL.PRICE_GENERAL_BASE_MAX) * EXCELDL.PRICE_GENERAL_EXTRA;
  }
  return { raceCount: raceRows.length, racePrice: racePrice, generalCount: generalRows.length, generalPrice: generalPrice, total: racePrice + generalPrice };
};

EXCELDL.updatePriceInfo = function(){
  var rowKeys = Object.keys(SLIP.checkedIds);
  var allRows = SLIP.getAllRows();
  var selected = allRows.filter(function(e){ return SLIP.checkedIds[e.rowKey]; });
  var p = EXCELDL.calcPrice(selected);
  var el = document.getElementById('excelPriceInfo');
  if (!el) return;
  if (!selected.length) { el.textContent = ''; return; }
  var parts = [];
  if (p.generalCount > 0) parts.push('일반 '+p.generalCount+'개 → '+p.generalPrice.toLocaleString()+'P');
  if (p.raceCount > 0) parts.push('100전략레이스 '+p.raceCount+'개 → '+p.racePrice.toLocaleString()+'P');
  el.innerHTML = parts.join(' + ') + ' = <b style="color:#1a7ad4;">합계 '+p.total.toLocaleString()+'P</b>';
};

EXCELDL._xlsxLoaded = false;
EXCELDL._loadXLSX = function(callback){
  if (EXCELDL._xlsxLoaded && window.XLSX) { callback(); return; }
  var script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload = function(){ EXCELDL._xlsxLoaded = true; callback(); };
  script.onerror = function(){ alert('엑셀 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.'); };
  document.head.appendChild(script);
};

EXCELDL.downloadChecked = async function(){
  var rowKeys = Object.keys(SLIP.checkedIds);
  if (!rowKeys.length) { alert('엑셀로 받을 번호조합을 먼저 체크해주세요.'); return; }
  var allRows = SLIP.getAllRows();
  var selected = allRows.filter(function(e){ return SLIP.checkedIds[e.rowKey]; });
  var p = EXCELDL.calcPrice(selected);

  // 조합별로 금액이 달라지는(일반/100전략레이스 혼합) 요금이라 서버의 '가변금액' 방식으로 차감한다.
  var spend = await MLL.spendPoints('excel_download', 1, { amount: p.total });
  if (!spend.success) {
    if (spend.needAuth || spend.insufficientPoints) return; // 안내 모달이 이미 떴음
    alert('⛔ 처리 실패: ' + (spend.message || ''));
    return;
  }

  EXCELDL._loadXLSX(function(){
    var rows = [['번호1','번호2','번호3','번호4','번호5','번호6','최애','회차','Data출처','구매형태','메모']];
    selected.forEach(function(e){
      var sorted = e.nums.slice().sort(function(a,b){return a-b;});
      rows.push([sorted[0],sorted[1],sorted[2],sorted[3],sorted[4],sorted[5], (e.isFavorite?'★최애':''), e.round, SLIP.SOURCE_LABEL[e.source]||e.source, e.type, e.memo||'']);
    });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '번호조합');
    var now = new Date();
    var dateStr = now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
    XLSX.writeFile(wb, '각종데이터_'+selected.length+'개_'+dateStr+'.xlsx');
  });
};

document.addEventListener('DOMContentLoaded', function(){ SLIP.init(); });

// =====================================================
// 즉석생성 그룹 — 100전략레이스 / 전략등록(번호생성기)
// 화면 전환 없이, 숨김 iframe으로 해당 페이지의 생성 로직을 그대로 호출하여
// "한 자리에 머물러 있다"는 느낌을 유지한다. 매번 새로 생성되므로 안내 토스트를 함께 띄운다.
// =====================================================
SLIP.showOnDemandToast = function(){
  var toast = document.getElementById('onDemandToast');
  toast.style.display = 'block';
  setTimeout(function(){ toast.style.display = 'none'; }, 2600);
};

SLIP.closeOnDemandModal = function(){
  document.getElementById('onDemandModalOverlay').style.display = 'none';
};

SLIP._waitForFrame = function(frameId){
  return new Promise(function(resolve, reject){
    var frame = document.getElementById(frameId);
    var tries = 0;
    var check = function(){
      tries++;
      try {
        if (frame.contentWindow && frame.contentWindow.RACE && frameId==='raceEngineFrame') { resolve(frame.contentWindow); return; }
        if (frame.contentWindow && frame.contentWindow.MLL && frameId==='generatorEngineFrame') { resolve(frame.contentWindow); return; }
      } catch(e) {}
      if (tries > 100) { reject(new Error('엔진 로드 시간 초과')); return; }
      setTimeout(check, 100);
    };
    check();
  });
};

// ── 100전략레이스에서 가져오기 ──
SLIP.openRaceFetchModal = async function(){
  document.getElementById('onDemandTitle').textContent = '🏇 100전략레이스에서 가져오기';
  document.getElementById('onDemandDesc').textContent = '100가지 전략 중 하나를 선택하고 개수를 입력하면, 그 자리에서 즉시 번호를 생성해 받을 목록에 추가합니다.';
  document.getElementById('onDemandFormArea').innerHTML = '<div style="text-align:center;padding:20px;color:#999;">불러오는 중...</div>';
  document.getElementById('onDemandResultArea').innerHTML = '';
  document.getElementById('onDemandModalOverlay').style.display = 'flex';

  try {
    var win = await SLIP._waitForFrame('raceEngineFrame');
    var strategies = win.RACE.ensureStrategies();
    var options = strategies.map(function(s){ return '<option value="'+s.no+'">'+s.name+'</option>'; }).join('');
    document.getElementById('onDemandFormArea').innerHTML =
      '<div class="filter-group" style="margin-bottom:10px;">' +
        '<label>전략 선택</label>' +
        '<select id="raceStrategySelect" style="width:100%;">'+options+'</select>' +
      '</div>' +
      '<div class="filter-group" style="margin-bottom:14px;">' +
        '<label>생성 개수</label>' +
        '<input type="number" id="raceCountInput" value="10" min="1" max="100" style="width:100%;">' +
      '</div>' +
      '<button class="btn-filter" style="width:100%;background:#7048e8;" onclick="SLIP.fetchFromRace()">⚡ 즉시 생성하기</button>';
  } catch(e) {
    document.getElementById('onDemandFormArea').innerHTML = '<div style="color:#e03131;font-size:12px;">엔진을 불러오지 못했습니다: '+e.message+'</div>';
  }
};

SLIP.fetchFromRace = async function(){
  var win = await SLIP._waitForFrame('raceEngineFrame');
  var strategyNo = parseInt(document.getElementById('raceStrategySelect').value);
  var count = Math.max(1, Math.min(100, parseInt(document.getElementById('raceCountInput').value)||10));
  SLIP.showOnDemandToast();
  var combos = win.RACE.generateOnDemand(strategyNo, count);
  if (!combos || !combos.length) {
    document.getElementById('onDemandResultArea').innerHTML = '<div style="color:#e03131;font-size:12px;">번호 생성에 실패했습니다.</div>';
    return;
  }
  SLIP._renderOnDemandResult(combos, 'race', strategyNo);
};

// ── 전략등록(번호생성기)에서 가져오기 ──
SLIP.openGeneratorFetchModal = async function(){
  document.getElementById('onDemandTitle').textContent = '✨ 전략등록(번호생성기)에서 가져오기';
  document.getElementById('onDemandDesc').textContent = '직접 만들어두신 전략 중 하나를 선택하고 개수를 입력하면, 그 자리에서 즉시 번호를 생성해 받을 목록에 추가합니다.';
  document.getElementById('onDemandFormArea').innerHTML = '<div style="text-align:center;padding:20px;color:#999;">불러오는 중...</div>';
  document.getElementById('onDemandResultArea').innerHTML = '';
  document.getElementById('onDemandModalOverlay').style.display = 'flex';

  try {
    var win = await SLIP._waitForFrame('generatorEngineFrame');
    var myStrategies = win.MLL.loadStrategies();
    if (!myStrategies || !myStrategies.length) {
      SLIP.closeOnDemandModal();
      alert('현재 이용자님이 만드신 전략이 없어요. 전략부터 만드세요!');
      return;
    }
    var options = myStrategies.map(function(s){ return '<option value="'+s.id+'">'+s.name+'</option>'; }).join('');
    document.getElementById('onDemandFormArea').innerHTML =
      '<div class="filter-group" style="margin-bottom:10px;">' +
        '<label>내 전략 선택</label>' +
        '<select id="genStrategySelect" style="width:100%;">'+options+'</select>' +
      '</div>' +
      '<div class="filter-group" style="margin-bottom:14px;">' +
        '<label>생성 개수</label>' +
        '<input type="number" id="genCountInput" value="10" min="1" max="100" style="width:100%;">' +
      '</div>' +
      '<button class="btn-filter" style="width:100%;background:#e8478e;" onclick="SLIP.fetchFromGenerator()">⚡ 즉시 생성하기</button>';
  } catch(e) {
    document.getElementById('onDemandFormArea').innerHTML = '<div style="color:#e03131;font-size:12px;">엔진을 불러오지 못했습니다: '+e.message+'</div>';
  }
};

SLIP.fetchFromGenerator = async function(){
  var win = await SLIP._waitForFrame('generatorEngineFrame');
  var stId = document.getElementById('genStrategySelect').value;
  var count = Math.max(1, Math.min(100, parseInt(document.getElementById('genCountInput').value)||10));
  var strategy = win.MLL.getStrategy ? win.MLL.getStrategy(stId) : win.MLL.loadStrategies().find(function(s){ return s.id===stId; });
  if (!strategy) { document.getElementById('onDemandResultArea').innerHTML = '<div style="color:#e03131;font-size:12px;">전략을 찾을 수 없습니다.</div>'; return; }

  SLIP.showOnDemandToast();
  var strategyForCount = Object.assign({}, strategy, { set_count: count });
  var results = win.MLL.loadResults();
  var history = Object.keys(results).map(Number).sort(function(a,b){return b-a;}).map(function(r){
    return {round:r, nums:results[r].nums||[], bonus:results[r].bonus||null};
  });
  var result = win.MLL.generateNumbers(strategyForCount, history);
  var combos = (result && result.numbers) ? result.numbers : [];
  if (!combos.length) {
    document.getElementById('onDemandResultArea').innerHTML = '<div style="color:#e03131;font-size:12px;">번호 생성에 실패했습니다.</div>';
    return;
  }
  SLIP._renderOnDemandResult(combos, 'generator', strategy.id);
};

// 즉석생성 결과를 모달 안에 보여주고, 받을목록 추가용 임시 체크상태(SLIP._onDemandCombos)로 보관
SLIP._onDemandCombos = [];
SLIP._renderOnDemandResult = function(combos, source, refKey){
  SLIP._onDemandCombos = combos.map(function(nums, i){ return { nums: nums, checked: true, idx: i }; });
  var rows = SLIP._onDemandCombos.map(function(c, i){
    var sorted = c.nums.slice().sort(function(a,b){return a-b;});
    var balls = sorted.map(function(n){
      return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';margin:1px;">'+n+'</span>';
    }).join('');
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0;">' +
      '<input type="checkbox" checked onchange="SLIP.toggleOnDemandCombo('+i+', this.checked)">' +
      '<div style="display:flex;gap:1px;">'+balls+'</div>' +
    '</div>';
  }).join('');
  document.getElementById('onDemandResultArea').innerHTML =
    '<div style="font-size:11.5px;color:#555;margin-bottom:8px;">생성된 '+combos.length+'개 — 받을 목록에 추가할 것만 체크하세요</div>' +
    '<div style="max-height:240px;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:8px 12px;margin-bottom:12px;">'+rows+'</div>' +
    '<button class="btn-filter" style="width:100%;background:#1a7ad4;" onclick="SLIP.addOnDemandToSlip(\''+source+'\')">✅ 체크된 조합 목록에 추가</button>';
};

SLIP.toggleOnDemandCombo = function(i, checked){ SLIP._onDemandCombos[i].checked = checked; };

SLIP.addOnDemandToSlip = function(source){
  var selected = SLIP._onDemandCombos.filter(function(c){ return c.checked; });
  if (!selected.length) { alert('추가할 조합을 1개 이상 체크해주세요.'); return; }
  selected.forEach(function(c, i){
    var rowKey = 'ondemand_'+source+'_'+Date.now()+'_'+i;
    SLIP._onDemandRows = SLIP._onDemandRows || [];
    SLIP._onDemandRows.push({
      rowKey: rowKey, refId: rowKey, source: source,
      round: MLL.getLottoInfo().saleRound, nums: c.nums, type: '즉석생성', isReal: false,
      memo: source==='race' ? '[100전략레이스 즉석생성]' : '[전략등록 즉석생성]',
      createdAt: Date.now(), status: null, grade: null, prizeMoney: 0, isFavorite: false
    });
    SLIP.checkedIds[rowKey] = true; // 추가하면서 바로 선택 체크도 켜둠
  });
  SLIP.closeOnDemandModal();
  SLIP.render();
  alert('✅ '+selected.length+'개 조합이 목록에 추가되었습니다. 하단의 "엑셀로 받기" 버튼으로 받으실 수 있어요.');
};
