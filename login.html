<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 로그인</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0d18; --surface:#11152a; --surface-2:#161b35;
  --border:#252b48; --border-soft:#1b2038;
  --text:#eef0f6; --text-dim:#8b91ab; --text-faint:#5a6080;
  --gold:#e0b341; --gold-dim:#8a6f2f; --gold-bg:rgba(224,179,65,.10);
  --accent:#5b6ee8; --accent-bg:rgba(91,110,232,.13);
  --green:#3fb37f; --red:#e05c5c; --red-bg:rgba(224,92,92,.10);
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;font-size:14px;letter-spacing:-0.01em;min-height:100vh;display:flex;flex-direction:column;}
.topbar{border-bottom:1px solid var(--border-soft);}
.topbar-inner{max-width:1180px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;}
.brand-mark{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 32% 28%, #f3d785, var(--gold) 60%, var(--gold-dim));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-mark svg{width:17px;height:17px;stroke:#1a1404;stroke-width:1.8;fill:none;}
.brand-text .t1{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
.brand-text .t2{font-size:10px;color:var(--text-faint);margin-top:1px;}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.lang-toggle button{background:var(--surface);color:var(--text-dim);border:none;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
.lang-toggle button.active{background:var(--gold);color:#1a1305;}
.page-body{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 60px;}
.login-wrap{width:100%;max-width:420px;}
.login-header{text-align:center;margin-bottom:32px;}
.login-header .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
.login-header h1{font-size:22px;font-weight:700;letter-spacing:-0.025em;}
.login-header p{font-size:12.5px;color:var(--text-dim);margin-top:7px;line-height:1.6;}
.login-header .login-subtitle{font-size:15.5px;color:var(--text);font-weight:600;margin-top:10px;}
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:28px 28px 26px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 13px;font-size:13.5px;color:var(--text);outline:none;transition:border-color .15s;font-family:inherit;}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text-faint);}
.field input.err{border-color:var(--red);}
.field-err{font-size:11px;color:var(--red);margin-top:5px;display:none;}
.field-err.show{display:block;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:42px;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-faint);padding:2px;display:flex;}
.pw-toggle svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.6;fill:none;}
.options-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;margin-top:-4px;}
.check-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--text-dim);user-select:none;}
.check-label input[type=checkbox]{accent-color:var(--accent);cursor:pointer;}
.forgot-link{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none;font-family:inherit;}
.btn-submit{width:100%;padding:12px;border-radius:9px;border:none;background:var(--gold);color:#1a1305;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:-.01em;transition:opacity .15s;font-family:inherit;}
.btn-submit:hover{opacity:.92;}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;}
.btn-submit.loading{position:relative;color:transparent;}
.btn-submit.loading::after{content:'';position:absolute;left:50%;top:50%;width:16px;height:16px;margin:-8px 0 0 -8px;border:2px solid rgba(26,19,5,.4);border-top-color:#1a1305;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.err-banner{background:var(--red-bg);border:1px solid rgba(224,92,92,.25);border-radius:9px;padding:10px 13px;font-size:12.5px;color:#f08080;margin-bottom:16px;display:none;}
.err-banner.show{display:block;}
.ok-banner{background:rgba(63,179,127,.10);border:1px solid rgba(63,179,127,.25);border-radius:9px;padding:10px 13px;font-size:12.5px;color:var(--green);margin-bottom:16px;display:none;}
.ok-banner.show{display:block;}
.or-row{display:flex;align-items:center;gap:10px;margin:20px 0;}
.or-row .line{flex:1;height:1px;background:var(--border-soft);}
.or-row .lbl{font-size:11px;color:var(--text-faint);}
.social-btns{display:flex;flex-direction:column;gap:10px;}
.btn-social{width:100%;padding:10px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s;font-family:inherit;}
.btn-social:hover{background:#1c2140;}
.btn-social .icon{width:18px;height:18px;flex-shrink:0;}
.signup-row{text-align:center;margin-top:22px;font-size:12.5px;color:var(--text-dim);}
.signup-row a{color:var(--gold);cursor:pointer;font-weight:600;}
@media(max-width:480px){
  .card{padding:22px 18px 20px;}
  .topbar-inner{padding:0 16px;height:auto;min-height:54px;}
  .brand-text .t2{display:none;}
  .login-header h1{font-size:19px;}
  .login-header{margin-bottom:24px;}
  .page-body{padding:24px 16px 40px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand" onclick="location.href='main_page.html'">
      <div class="brand-mark"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9l3 3-3 3M15 9l-3 3 3 3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="brand-text">
        <div class="t1">My Lotto Lab</div>
        <div class="t2" data-i18n-kr="가상 로또 등록 · 당첨 분석 · 통계 플랫폼" data-i18n-en="Virtual Lotto Entry · Win Analysis · Stats Platform">가상 로또 등록 · 당첨 분석 · 통계 플랫폼</div>
      </div>
    </div>
    <div class="lang-toggle">
      <button id="langKrBtn" class="active" onclick="setLang('kr')">KR</button>
      <button id="langEnBtn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<div class="page-body">
  <div class="login-wrap">
    <div class="login-header">
      <div class="eyebrow" data-i18n-kr="계정 로그인" data-i18n-en="Sign In">계정 로그인</div>
      <p class="login-subtitle" data-i18n-kr="이메일과 비밀번호로 로그인하세요." data-i18n-en="Sign in with your email and password.">이메일과 비밀번호로 로그인하세요.</p>
    </div>

    <div class="card">
      <div class="ok-banner" id="okBanner"></div>
      <div class="err-banner" id="errBanner"></div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="field">
          <label for="email" data-i18n-kr="이메일" data-i18n-en="Email">이메일</label>
          <input type="email" id="email" autocomplete="email"
            data-i18n-placeholder-kr="이메일 주소 입력" data-i18n-placeholder-en="Enter your email"
            placeholder="이메일 주소 입력">
          <div class="field-err" id="emailErr"></div>
        </div>

        <div class="field">
          <label for="password" data-i18n-kr="비밀번호" data-i18n-en="Password">비밀번호</label>
          <div class="pw-wrap">
            <input type="password" id="password" autocomplete="current-password"
              data-i18n-placeholder-kr="비밀번호 입력" data-i18n-placeholder-en="Enter your password"
              placeholder="비밀번호 입력">
            <button type="button" class="pw-toggle" onclick="togglePw('password','eye1')">
              <svg id="eye1" viewBox="0 0 24 24"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-err" id="passwordErr"></div>
        </div>

        <div class="options-row">
          <label class="check-label">
            <input type="checkbox" id="rememberMe">
            <span data-i18n-kr="로그인 유지" data-i18n-en="Keep me signed in">로그인 유지</span>
          </label>
          <button type="button" class="forgot-link" onclick="goForgot()">
            <span data-i18n-kr="비밀번호 찾기" data-i18n-en="Forgot password?">비밀번호 찾기</span>
          </button>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          <span data-i18n-kr="로그인" data-i18n-en="Sign In">로그인</span>
        </button>
      </form>

      <div class="or-row">
        <div class="line"></div>
        <div class="lbl" data-i18n-kr="또는" data-i18n-en="or">또는</div>
        <div class="line"></div>
      </div>

      <div class="social-btns">
        <button class="btn-social" onclick="socialLogin('google')">
          <svg class="icon" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          <span data-i18n-kr="Google로 계속하기" data-i18n-en="Continue with Google">Google로 계속하기</span>
        </button>
        <button class="btn-social" onclick="socialLogin('kakao')">
          <svg class="icon" viewBox="0 0 18 18" fill="none"><rect width="18" height="18" rx="4" fill="#FEE500"/><path d="M9 3.5C5.96 3.5 3.5 5.52 3.5 8c0 1.54.93 2.9 2.35 3.73l-.6 2.23c-.04.14.12.25.24.17L8.2 12.4c.26.03.53.05.8.05 3.04 0 5.5-2.02 5.5-4.5S12.04 3.5 9 3.5z" fill="#3C1E1E"/></svg>
          <span data-i18n-kr="카카오로 계속하기" data-i18n-en="Continue with Kakao">카카오로 계속하기</span>
        </button>
        <button class="btn-social" onclick="socialLogin('naver')">
          <svg class="icon" viewBox="0 0 18 18" fill="none"><rect width="18" height="18" rx="4" fill="#03C75A"/><path d="M10.25 9.28L7.6 4.5H5v9h2.75V8.72L10.4 13.5H13V4.5H10.25z" fill="white"/></svg>
          <span data-i18n-kr="네이버로 계속하기 (준비중)" data-i18n-en="Continue with Naver (Coming soon)">네이버로 계속하기 (준비중)</span>
        </button>
      </div>
    </div>

    <div class="signup-row">
      <span data-i18n-kr="아직 계정이 없으신가요?" data-i18n-en="Don't have an account?">아직 계정이 없으신가요?</span>
      &nbsp;<a onclick="location.href='signup.html'" data-i18n-kr="회원가입" data-i18n-en="Sign up">회원가입</a>
    </div>
    <div class="signup-row" style="margin-top:8px;">
      <span data-i18n-kr="비회원으로 등록하셨나요?" data-i18n-en="Registered as a guest?">비회원으로 등록하셨나요?</span>
      &nbsp;<a onclick="location.href='https://my-lotto-lab-api.onrender.com/pay/guest_test.html'" data-i18n-kr="닉네임+이메일로 로그인" data-i18n-en="Log in with nickname + email">닉네임+이메일로 로그인</a>
    </div>
  </div>
</div>

<script>
var API = 'https://my-lotto-lab-api.onrender.com';
var LANG = localStorage.getItem('mll_lang') || 'kr';

var I18N = {
  emailRequired: {kr:'이메일을 입력해 주세요.', en:'Please enter your email.'},
  emailInvalid:  {kr:'올바른 이메일 형식이 아닙니다.', en:'Please enter a valid email address.'},
  pwRequired:    {kr:'비밀번호를 입력해 주세요.', en:'Please enter your password.'},
  loginFail:     {kr:'이메일 또는 비밀번호를 확인해 주세요.', en:'Incorrect email or password.'},
  loginOk:       {kr:'로그인 성공! 이동 중...', en:'Signed in! Redirecting...'},
  socialSoon:    {kr:'소셜 로그인은 준비 중입니다.', en:'Social login is coming soon.'},
  forgotSoon:    {kr:'비밀번호 찾기는 준비 중입니다.', en:'Password reset is coming soon.'},
  networkErr:    {kr:'서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.', en:'Cannot connect to server. Please try again later.'}
};
function t(k){ return I18N[k][LANG]; }

function applyLang(){
  document.title = LANG==='en' ? 'My Lotto Lab - Sign In' : 'My Lotto Lab - 로그인';
  document.querySelectorAll('[data-i18n-kr]').forEach(function(el){
    var txt = LANG==='en' ? el.dataset.i18nEn : el.dataset.i18nKr;
    if(txt !== undefined) el.textContent = txt;
  });
  document.querySelectorAll('[data-i18n-placeholder-kr]').forEach(function(el){
    el.placeholder = LANG==='en' ? el.dataset.i18nPlaceholderEn : el.dataset.i18nPlaceholderKr;
  });
  document.getElementById('langKrBtn').className = LANG==='kr' ? 'active' : '';
  document.getElementById('langEnBtn').className = LANG==='en' ? 'active' : '';
}
function setLang(lang){ LANG=lang; localStorage.setItem('mll_lang',lang); applyLang(); }

function togglePw(id, iconId){
  var inp=document.getElementById(id);
  var isText=inp.type==='text';
  inp.type=isText?'password':'text';
  document.getElementById(iconId).innerHTML=isText
    ?'<path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'
    :'<path d="M17.94 12c-.18.73-.46 1.43-.83 2.07M3 3l18 18M9.88 9.88A3 3 0 0014.12 14.12M10.73 5.08A10 10 0 0122 12a10 10 0 01-1.72 2.83M6.61 6.61A9.95 9.95 0 002 12a10 10 0 0010 7c2.38 0 4.58-.84 6.3-2.22" stroke-linecap="round"/>';
}

function showFieldErr(id,msg){ var e=document.getElementById(id+'Err'); if(e){e.textContent=msg;e.classList.add('show');} document.getElementById(id).classList.add('err'); }
function clearAll(){ document.querySelectorAll('.field-err').forEach(function(e){e.classList.remove('show');}); document.querySelectorAll('input').forEach(function(e){e.classList.remove('err');}); document.getElementById('errBanner').classList.remove('show'); document.getElementById('okBanner').classList.remove('show'); }

async function handleLogin(e){
  e.preventDefault();
  clearAll();
  var email = document.getElementById('email').value.trim();
  var pw    = document.getElementById('password').value;
  var remember = document.getElementById('rememberMe').checked;
  var valid = true;
  if(!email){ showFieldErr('email', t('emailRequired')); valid=false; }
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showFieldErr('email', t('emailInvalid')); valid=false; }
  if(!pw){ showFieldErr('password', t('pwRequired')); valid=false; }
  if(!valid) return;

  var btn = document.getElementById('submitBtn');
  btn.classList.add('loading'); btn.disabled=true;

  try {
    var res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, password: pw})
    });
    var data = await res.json();
    if(!res.ok){ throw new Error(data.error || t('loginFail')); }

    // 토큰 저장 (refreshToken도 함께 저장 — 이게 있어야 accessToken 만료 시 재로그인 없이 갱신 가능)
    var storage = remember ? localStorage : sessionStorage;
    storage.setItem('mll_token', data.accessToken);
    storage.setItem('mll_refresh_token', data.refreshToken);
    storage.setItem('mll_user', JSON.stringify(data.user));

    var ob = document.getElementById('okBanner');
    ob.textContent = t('loginOk'); ob.classList.add('show');

    // ── redirect 파라미터 처리 ──────────────────────────────────────────
    // 다른 화면(예: global_lotto.html)에서 "로그인이 필요합니다" 안내와 함께
    // login.html?redirect=원래주소 형태로 보낸 경우, 로그인 후 그 페이지로
    // 돌아가야 한다. redirect 값이 같은 도메인(mylottolab.github.io) 안의
    // 상대경로라면, 이 페이지가 이미 그 도메인의 localStorage/sessionStorage에
    // 토큰을 저장해뒀으므로 별도로 토큰을 실어보낼 필요 없이 그냥 이동하면 된다.
    // (외부 도메인으로 오픈리다이렉트되는 걸 막기 위해, "http"로 시작하거나
    //  "//"로 시작하는 값은 무시하고 기존 기본 동작으로 대체한다.)
    var params = new URLSearchParams(window.location.search);
    var redirectParam = params.get('redirect');
    var isSafeRelative = redirectParam && !/^https?:|^\/\//i.test(redirectParam);

    var target;
    if (isSafeRelative) {
      target = redirectParam; // URLSearchParams.get()이 이미 디코딩된 값을 돌려줌
    } else {
      // ⚠ category_select.html은 다른 도메인(my-lotto-lab-api.onrender.com)에 있어서
      // 방금 이 페이지(mylottolab.github.io)의 localStorage에 저장한 토큰을 그대로는
      // 못 읽는다. URL 쿼리로 토큰을 함께 실어 보내면, 도착한 페이지에서
      // common.js/auth_gate.js의 부트스트랩이 그 값을 받아 자기 도메인 localStorage에 다시 저장한다.
      target = 'https://my-lotto-lab-api.onrender.com/pay/category_select.html' +
        '?mll_auth=member&mll_tok=' + encodeURIComponent(data.accessToken) +
        '&mll_rt=' + encodeURIComponent(data.refreshToken);
    }
    setTimeout(function(){ location.href = target; }, 800);
  } catch(err) {
    var msg = err.message === 'Failed to fetch' ? t('networkErr') : (err.message || t('loginFail'));
    var b=document.getElementById('errBanner'); b.textContent=msg; b.classList.add('show');
  } finally {
    btn.classList.remove('loading'); btn.disabled=false;
  }
}

// ⚠ 아래 SUPABASE_URL / SUPABASE_ANON_KEY를 실제 값으로 교체하세요.
// (anon/public key는 브라우저에 노출돼도 안전한 공개키입니다 — service_role 키와는 다릅니다)
var SUPABASE_URL = 'https://lgwzueyhtxiywoqwshxy.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_7a7XwW2R64-2n5NEbYVCFg_zPj-iQ8a';
var supabaseClient = (typeof supabase !== 'undefined')
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

async function socialLogin(provider){
  if (provider === 'naver') {
    alert(t('socialSoon'));
    return;
  }
  if (!supabaseClient) {
    alert(t('networkErr'));
    return;
  }
  var { error } = await supabaseClient.auth.signInWithOAuth({
    provider: provider, // 'google' | 'kakao'
    options: {
      redirectTo: 'https://mylottolab.github.io/my-lotto-lab/oauth_callback.html'
