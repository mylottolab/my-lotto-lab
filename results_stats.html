<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>My Lotto Lab - 결과 및 통계</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:#f3f4f6;font-size:13px;}
.header-inner{max-width:1400px;margin:0 auto;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;background:#1c1c2e;border-radius:0 0 8px 8px;}
.logo-left{display:flex;align-items:center;gap:9px;cursor:pointer;}
.logo-icon{width:30px;height:30px;background:#2f9e44;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text .title{font-size:14px;font-weight:700;color:#fff;}
.logo-text .sub{font-size:9px;color:#aaa;}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;}
.card-head{padding:10px 16px;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.head-green{background:linear-gradient(135deg,#2f9e44,#1e7a30);}
.head-dark{background:#1c1c2e;}

/* 레이아웃: 좌측 고정 메뉴 + 우측 동적 콘텐츠 */
.rs-main{max-width:1400px;margin:0 auto;padding:14px;display:grid;grid-template-columns:230px 1fr;gap:14px;align-items:start;}
.rs-menu{display:flex;flex-direction:column;gap:10px;position:sticky;top:14px;}
.rs-menu-btn{background:linear-gradient(135deg,#ff9d52,#f5750f);color:#fff;border:none;border-radius:10px;padding:18px 14px;font-size:13px;font-weight:700;text-align:center;line-height:1.5;cursor:pointer;box-shadow:0 2px 6px rgba(245,117,15,0.25);transition:transform 0.12s,box-shadow 0.12s;}
.rs-menu-btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(245,117,15,0.35);}
.rs-menu-btn.active{background:linear-gradient(135deg,#2f9e44,#1e7a30);box-shadow:0 2px 8px rgba(47,158,68,0.35);}
.rs-menu-btn.special{background:linear-gradient(135deg,#94d3a2,#5fa86f);box-shadow:0 2px 6px rgba(95,168,111,0.25);}
.rs-menu-btn.special:hover{box-shadow:0 4px 10px rgba(95,168,111,0.35);}
.rs-menu-btn .mb-sub{display:block;font-size:10px;font-weight:400;opacity:0.85;margin-top:3px;}
.rs-content{min-width:0;}

/* 통계 패널(좌상단 카드) 공통 */
.statpanel-grid{display:grid;grid-template-columns:300px 1fr;gap:12px;margin-bottom:12px;align-items:start;}
.gradetable{width:100%;border-collapse:collapse;font-size:11px;}
.gradetable th{text-align:left;color:#888;font-weight:600;padding:6px 8px;border-bottom:1px solid #eee;font-size:10px;}
.gradetable td{padding:6px 8px;border-bottom:1px solid #f5f5f5;}
.minicard-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.minicard{background:#f8f8f8;border-radius:8px;padding:10px 8px;text-align:center;min-height:88px;display:flex;flex-direction:column;justify-content:center;}
.minicard-icon{font-size:15px;}
.minicard-val{font-size:18px;font-weight:700;color:#222;margin-top:2px;}
.minicard-sub{font-size:9px;color:#888;margin-top:2px;line-height:1.4;}
.minicard.green .minicard-val{color:#2f9e44;}
.minicard.red .minicard-val{color:#e03131;}
.minicard.gold .minicard-val{color:#e67700;}

/* 회차 선택 영역 */
.round-select-bar{padding:12px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.round-select-bar select{border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:12px;background:#fff;cursor:pointer;}
.round-select-bar .gobtn{background:#2f9e44;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;}
.unconfirmed-pill{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11px;color:#888;}
.unconfirmed-pill b{color:#e67700;}
.checknow-btn{background:linear-gradient(135deg,#e03131,#c92a2a);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.2);animation:pulse-btn2 1.5s infinite;}
@keyframes pulse-btn2{0%,100%{opacity:1;}50%{opacity:0.7;}}

/* 당첨번호 박스 */
.winbox{margin:0 16px 12px;padding:12px 14px;background:linear-gradient(135deg,#fff8e1,#fffbf0);border:1px solid #ffe28a;border-radius:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.winbox-label{font-size:11px;font-weight:700;color:#7a5e00;margin-right:4px;}
.wball{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}

/* 요약 4칸 */
.summary4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px 14px;}
.s4box{background:#f8f8f8;border-radius:8px;padding:10px;text-align:center;}
.s4box-val{font-size:19px;font-weight:700;color:#2f9e44;}
.s4box-label{font-size:9px;color:#888;margin-top:2px;}

/* 상세결과 테이블 */

table.rtbl{width:100%;border-collapse:collapse;font-size:11px;min-width:760px;}
table.rtbl thead th{background:#f8f8f8;color:#666;font-weight:700;padding:8px 6px;border-bottom:2px solid #e8e8e8;text-align:center;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;}

table.rtbl thead th .sort-arrow{font-size:9px;color:#bbb;margin-left:2px;}

.matchnum{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#eef2ff;color:#3b5bdb;font-size:10px;font-weight:700;}

.cond-label{font-size:11px;color:#333;font-weight:700;margin-bottom:4px;}

.cond-input,.cond-select{width:100%;border:1px solid #ddd;border-radius:6px;padding:7px 9px;font-size:12px;background:#fff;transition:font-size 0.1s,color 0.1s;}
.cond-input.filled,.cond-select.filled{color:#e03131;font-weight:700;font-size:15px;border-color:#e03131;background:#fff5f5;}
.cond-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:14px;}
.cond-section-title{font-size:12px;font-weight:700;color:#5f3dc4;margin:14px 0 8px;display:flex;align-items:center;gap:5px;}
.cond-divider{border:none;border-top:1px dashed #e0d4f5;margin:12px 0;}
.cond-searchbtn{display:block;width:100%;background:linear-gradient(135deg,#7048e8,#5f3dc4);color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;box-shadow:0 2px 8px rgba(112,72,232,0.3);}

  .rs-menu{flex-direction:row;flex-wrap:wrap;position:static;}

<body>
<script>// =====================================================
// My Lotto Lab - 공통 모듈 (common.js)
// 모든 페이지에서 공유하는 데이터/함수
// =====================================================

if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.ROUND1_TS = new Date('2002-12-07T20:00:00+09:00').getTime();
MLL.WEEK_MS   = 7 * 24 * 60 * 60 * 1000;
MLL.STORAGE_KEY  = 'mll_entries';
MLL.RESULTS_KEY  = 'mll_results';
MLL.ADMIN_PW_KEY = 'mll_admin_auth';
MLL.SESSION_KEY  = 'mll_session';
MLL.STRATEGY_RESULT_KEY = 'mll_strategy_results';

MLL.getSession = function(tag) {
  var key = MLL.SESSION_KEY + '_' + tag;
  var s = sessionStorage.getItem(key);
  if (!s) { s = tag + '_' + Date.now(); sessionStorage.setItem(key, s); }
  return s;
};

MLL.getLottoInfo = function() {
  var now = new Date();
  var ko  = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var day = ko.getDay(), hour = ko.getHours(), min = ko.getMinutes();
  var elapsed   = now.getTime() - MLL.ROUND1_TS;
  var thisRound = Math.floor(elapsed / MLL.WEEK_MS) + 1;
  var nextRound = thisRound + 1;
  var soldOut = (day===6 && (hour>20||(hour===20&&min===0))) || (day===0 && hour<6);
  var saleRound = soldOut ? thisRound : nextRound;
  return { thisRound:thisRound, nextRound:nextRound, soldOut:soldOut, saleRound:saleRound };
};

MLL.getDrawDate = function(round) {
  var d = new Date(MLL.ROUND1_TS + (round - 1) * MLL.WEEK_MS);
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var dd= String(d.getDate()).padStart(2,'0');
  return y+'/'+m+'/'+dd;
};

MLL.getRoundStatus = function(round) {
  var info = MLL.getLottoInfo();
  return round < info.thisRound ? '추첨후' : '추첨전';
};

MLL.BC = function(n) {
  return n<=10?'#f5c518':n<=20?'#1a7ad4':n<=30?'#e03131':n<=40?'#888888':'#2f9e44';
};
MLL.TC = function(n) { return n<=10?'#7a5e00':'#ffffff'; };

MLL.uuid = function() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
};

// =====================================================
// 데이터 CRUD
// =====================================================

MLL.loadEntries = function() {
  try { return JSON.parse(localStorage.getItem(MLL.STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
};

MLL.saveEntries = function(entries) {
  localStorage.setItem(MLL.STORAGE_KEY, JSON.stringify(entries));
};

MLL.addEntry = function(item) {
  var entries = MLL.loadEntries();
  if (!item.id)          item.id          = MLL.uuid();
  if (!item.createdAt)   item.createdAt   = Date.now();
  if (!item.grade)       item.grade       = null;
  if (!item.prizeMoney)  item.prizeMoney  = 0;
  if (!item.sessionTag)  item.sessionTag  = '';
  if (item.isFavorite === undefined) item.isFavorite = false;
  item.status = MLL.getRoundStatus(item.round);
  entries.push(item);
  MLL.saveEntries(entries);
  return item;
};

MLL.addEntries = function(items) {
  var entries = MLL.loadEntries();
  items.forEach(function(item) {
    if (!item.id)         item.id         = MLL.uuid();
    if (!item.createdAt)  item.createdAt  = Date.now();
    if (!item.grade)      item.grade      = null;
    if (!item.prizeMoney) item.prizeMoney = 0;
    if (!item.sessionTag) item.sessionTag = '';
    if (item.isFavorite === undefined) item.isFavorite = false;
    item.status = MLL.getRoundStatus(item.round);
    entries.push(item);
  });
  MLL.saveEntries(entries);
  return items;
};

MLL.deleteEntry = function(id) {
  var entries = MLL.loadEntries().filter(function(e){ return e.id !== id; });
  MLL.saveEntries(entries);
};

// =====================================================
// 관심번호/재구매 최애번호 저장소 (완전 별도 파일, mll_entries와 무관)
// "결과 및 통계"의 ⭐ 클릭 시 자동으로 이 저장소에도 복사되고,
// "추가입력"(AI/일반/이미지/QR) 4가지 입력경로는 여기에만 직접 저장된다.
// 전체 통계(나의 구매 성향 등)에는 절대 포함되지 않는다.
// =====================================================
MLL.FAVORITES_KEY = 'mll_favorites';

MLL.loadFavorites = function() {
  try { return JSON.parse(localStorage.getItem(MLL.FAVORITES_KEY) || '[]'); }
  catch(e) { return []; }
};

MLL.saveFavorites = function(list) {
  localStorage.setItem(MLL.FAVORITES_KEY, JSON.stringify(list));
};

// mll_entries 항목 하나를 mll_favorites 저장소용 레코드로 복제
MLL.cloneAsFavoriteRecord = function(entry) {
  return {
    id: MLL.uuid(),
    sourceEntryId: entry.id || null,   // 원본 entries의 id (역추적용, 없어도 무방)
    round: entry.round,
    nums: entry.nums.slice(),
    type: entry.type,
    isReal: !!entry.isReal,
    memo: entry.memo || '',
    inputMethod: entry.inputMethod || 'general',
    status: entry.status,
    grade: entry.grade,
    prizeMoney: entry.prizeMoney || 0,
    isFavorite: true,
    createdAt: Date.now()
  };
};

// 관심(즐겨찾기) 토글 — mll_entries의 플래그 + mll_favorites 저장소 동기화
MLL.toggleFavorite = function(id) {
  var entries = MLL.loadEntries();
  var e = entries.find(function(x){ return x.id === id; });
  if (!e) return null;
  e.isFavorite = !e.isFavorite;
  MLL.saveEntries(entries);

  var favs = MLL.loadFavorites();
  if (e.isFavorite) {
    // 이미 같은 원본에서 복사된 게 있으면 중복 추가하지 않음
    var exists = favs.some(function(f){ return f.sourceEntryId === e.id; });
    if (!exists) {
      favs.push(MLL.cloneAsFavoriteRecord(e));
      MLL.saveFavorites(favs);
    }
  } else {
    favs = favs.filter(function(f){ return f.sourceEntryId !== e.id; });
    MLL.saveFavorites(favs);
  }
  return e.isFavorite;
};

// 추가입력(AI/일반/이미지/QR) 경로 전용
// → mll_entries에 정식으로 등록(= 전체 통계에도 반영됨) + 동시에 mll_favorites에도 자동 동기화
// → 메모에 "최애번호로 별도 추가"를 자동으로 남겨 입력경로를 구분할 수 있게 한다
MLL.addFavoriteDirect = function(item) {
  var tagNote = '[최애번호로 별도 추가]';
  var memo = item.memo ? (tagNote + ' ' + item.memo) : tagNote;
  var entry = MLL.addEntry({
    round: item.round,
    nums: item.nums.slice(),
    type: item.type || '수동',
    isReal: !!item.isReal,
    memo: memo,
    inputMethod: item.inputMethod || 'general',
    sessionTag: item.sessionTag || ''
  });
  // mll_entries 등록 직후 즉시 즐겨찾기로 동기화 (toggleFavorite은 entries를 다시 불러오므로 순서 안전)
  MLL.toggleFavorite(entry.id);
  return entry;
};

MLL.addFavoritesDirect = function(items) {
  return items.map(function(item){ return MLL.addFavoriteDirect(item); });
};

MLL.deleteFavorite = function(id) {
  var favs = MLL.loadFavorites().filter(function(f){ return f.id !== id; });
  MLL.saveFavorites(favs);
};

// mll_favorites 항목들의 결과(등수/당첨금)를 results 기준으로 갱신
MLL.refreshFavoritesResults = function() {
  var favs = MLL.loadFavorites();
  var results = MLL.loadResults();
  favs.forEach(function(f){
    var res = results[f.round] || results[Number(f.round)] || results[String(f.round)];
    if (res) {
      f.status = '추첨후';
      f.grade = MLL.calcGrade(f.nums, res.nums, res.bonus);
      f.prizeMoney = MLL.calcPrize(f.grade, res);
    }
  });
  MLL.saveFavorites(favs);
};


// =====================================================
// 당첨결과 데이터
// =====================================================

MLL.loadResults = function() {
  try { return JSON.parse(localStorage.getItem(MLL.RESULTS_KEY) || '{}'); }
  catch(e) { return {}; }
};

MLL.saveResults = function(results) {
  localStorage.setItem(MLL.RESULTS_KEY, JSON.stringify(results));
};

MLL.getResult = function(round) {
  var r = MLL.loadResults();
  return r[round] || r[Number(round)] || r[String(round)] || null;
};

// 전략으로 생성된 번호조합 데이터 (strategy_compare.html 등과 공유하는 저장소)
MLL.loadStrategyResults = function() {
  try { return JSON.parse(localStorage.getItem(MLL.STRATEGY_RESULT_KEY) || '[]'); }
  catch(e) { return []; }
};
MLL.saveStrategyResults = function(list) {
  localStorage.setItem(MLL.STRATEGY_RESULT_KEY, JSON.stringify(list));
};

MLL.calcGrade = function(myNums, winNums, bonusNum) {
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  var hasBonus = myNums.indexOf(bonusNum) >= 0;
  if (match===6)                  return 1;
  if (match===5 && hasBonus)      return 2;
  if (match===5)                  return 3;
  if (match===4)                  return 4;
  if (match===3)                  return 5;
  return 0;
};

// 본번호 일치 개수만 (보너스 제외) — 결과/통계 테이블의 "일치" 컬럼용
MLL.calcMatchCount = function(myNums, winNums) {
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  return match;
};

MLL.calcPrize = function(grade, result) {
  if (!result || grade===0) return 0;
  if (grade===1) return result.prize1 || 0;
  if (grade===2) return result.prize2 || 0;
  if (grade===3) return result.prize3 || 0;
  if (grade===4) return 50000;
  if (grade===5) return 5000;
  return 0;
};

MLL.applyResults = function(resultsObj) {
  MLL.saveResults(resultsObj);
  var entries = MLL.loadEntries();
  var updated = 0;
  entries.forEach(function(entry) {
    var res = resultsObj[entry.round] || resultsObj[String(entry.round)] || resultsObj[parseInt(entry.round)];
    if (res) {
      entry.status     = '추첨후';
      entry.grade      = MLL.calcGrade(entry.nums, res.nums, res.bonus);
      entry.prizeMoney = MLL.calcPrize(entry.grade, res);
      updated++;
    }
  });
  MLL.saveEntries(entries);
  return updated;
};

MLL.GRADE_LABEL = ['낙첨','1등','2등','3등','4등','5등'];
MLL.GRADE_COLOR = ['#aaa','#e03131','#e67700','#1a7ad4','#2f9e44','#888'];

// ── 미확인건(추첨일 경과 + 결과 미반영) 자동매칭 ──
MLL.applyCheck = function(onDone) {
  var results = MLL.loadResults();
  var resultRounds = Object.keys(results).map(Number);
  if (!resultRounds.length) {
    alert('당첨결과가 없습니다.\nadmin.html에서 엑셀을 업로드해주세요.');
    return;
  }
  var entries = MLL.loadEntries();
  var updated = 0;
  entries.forEach(function(entry) {
    var res = results[entry.round] || results[Number(entry.round)] || results[String(entry.round)];
    var isUnconfirmed =
      (entry.status === '추첨전' && !!res) ||
      (entry.status === '추첨후' && (entry.grade === null || entry.grade === undefined));
    if (!isUnconfirmed || !res) return;
    entry.status     = '추첨후';
    entry.grade      = MLL.calcGrade(entry.nums, res.nums, res.bonus);
    entry.prizeMoney = MLL.calcPrize(entry.grade, res);
    updated++;
  });
  MLL.saveEntries(entries);
  alert('✅ ' + updated + '개 항목 확인 완료!');
  if (typeof onDone === 'function') onDone(updated);
};

// =====================================================
// 조건식 판정 (strategy_manager.html의 생성조건 로직을 "검증"용으로 포팅)
// 사용자가 이미 등록한 조합(mll_entries)이 조건을 만족하는지 검사
// =====================================================

MLL._parseNumList = function(val) {
  if (!val) return [];
  var result = [];
  String(val).split(/[,\s]+/).forEach(function(t) {
    t = t.trim();
    if (!t) return;
    var m = t.match(/^(\d+)[~\-](\d+)$/);
    if (m) {
      var a = parseInt(m[1]), b = parseInt(m[2]);
      if (a <= b) { for (var i=a;i<=b;i++) if (i>=1&&i<=45) result.push(i); }
      else { for (var i=a;i<=45;i++) result.push(i); for (var i=1;i<=b;i++) result.push(i); }
    } else {
      var n = parseInt(t);
      if (n>=1 && n<=45) result.push(n);
    }
  });
  return [...new Set(result)].sort(function(a,b){ return a-b; });
};

MLL._buildRangePool = function(start, end) {
  if (!start || !end) return null; // null = 제한없음
  var pool = [], cur = start;
  while (true) {
    pool.push(cur);
    if (cur === end) break;
    cur++; if (cur>45) cur=1;
    if (pool.length>45) break;
  }
  return pool;
};

MLL._checkConsecutive = function(nums, limit) {
  if (!limit || limit<=1) return true;
  var sorted = nums.slice().sort(function(a,b){return a-b;});
  var cnt = 1;
  for (var i=1; i<sorted.length; i++) {
    if (sorted[i] === sorted[i-1]+1) { cnt++; if (cnt>limit) return false; }
    else cnt = 1;
  }
  return true;
};

MLL._checkSum = function(nums, min, max) {
  var s = nums.reduce(function(a,b){return a+b;}, 0);
  if (min!==null && s<min) return false;
  if (max!==null && s>max) return false;
  return true;
};

MLL._getTopFrequency = function(history, recent, topN) {
  var freq = {};
  history.slice(0, recent).forEach(function(h) {
    (h.nums||[]).forEach(function(n){ freq[n] = (freq[n]||0)+1; });
  });
  return Object.keys(freq).map(function(n){ return [parseInt(n), freq[n]]; })
    .sort(function(a,b){ return b[1]-a[1]; }).slice(0, topN).map(function(x){ return x[0]; });
};

// condition 객체 필드: name, odd_even, consecutive_limit, sum_min, sum_max,
//   range_start, range_end, include_numbers, exclude_numbers,
//   top_range, top_use, recent_rounds, last_week_mode
// history: MLL.loadResults()를 최근회차순으로 정렬한 [{round,nums}] 배열
MLL.matchesCondition = function(nums, condition, history) {
  var oddEven     = (condition.odd_even || '').trim();
  var consLimit   = parseInt(condition.consecutive_limit) || 0;
  var sumMin      = condition.sum_min ? parseInt(condition.sum_min) : null;
  var sumMax      = condition.sum_max ? parseInt(condition.sum_max) : null;
  var rangeStart  = condition.range_start ? parseInt(condition.range_start) : null;
  var rangeEnd    = condition.range_end   ? parseInt(condition.range_end)   : null;
  var includeNums = MLL._parseNumList(condition.include_numbers || '');
  var excludeNums = MLL._parseNumList(condition.exclude_numbers || '');
  var topRange    = parseInt(condition.top_range) || 0;
  var topUse      = (condition.top_use !== '' && condition.top_use !== undefined && condition.top_use !== null) ? parseInt(condition.top_use) : null;
  var lastWeekMode= condition.last_week_mode || '무관';

  // 홀짝비율
  if (oddEven && oddEven !== '무관') {
    var parts = oddEven.split(':');
    var needOdd = parseInt(parts[0]), needEven = parseInt(parts[1]);
    var oddCnt = nums.filter(function(n){return n%2===1;}).length;
    var evenCnt = nums.length - oddCnt;
    if (oddCnt !== needOdd || evenCnt !== needEven) return false;
  }

  // 연속제한
  if (!MLL._checkConsecutive(nums, consLimit)) return false;

  // 번호합
  if (!MLL._checkSum(nums, sumMin, sumMax)) return false;

  // 시작/끝번호(순환구간) — 모든 번호가 그 순환구간 풀 안에 있어야 함
  var rangePool = MLL._buildRangePool(rangeStart, rangeEnd);
  if (rangePool) {
    var allInRange = nums.every(function(n){ return rangePool.indexOf(n) >= 0; });
    if (!allInRange) return false;
  }

  // 포함수 — 반드시 포함
  if (includeNums.length) {
    var hasAllInclude = includeNums.every(function(n){ return nums.indexOf(n) >= 0; });
    if (!hasAllInclude) return false;
  }

  // 제외수 — 절대 포함 안됨
  if (excludeNums.length) {
    var hasAnyExclude = nums.some(function(n){ return excludeNums.indexOf(n) >= 0; });
    if (hasAnyExclude) return false;
  }

  // 상위빈도 조건 — 조합 내 상위빈도번호 개수가 정확히 topUse여야 함
  if (topRange > 0 && topUse !== null && history && history.length) {
    var recent = parseInt(condition.recent_rounds) || history.length;
    var topNums = MLL._getTopFrequency(history, recent, topRange);
    var topCnt = nums.filter(function(n){ return topNums.indexOf(n) >= 0; }).length;
    if (topCnt !== topUse) return false;
  }

  // 지난주기준 — "정렬" 의도라 매칭 자체에 영향 주지 않음(필터가 아니라 결과 정렬용)
  // 따라서 여기서는 통과 처리하고, 결과 리스트 정렬 단계에서 별도로 반영한다.

  return true;
};

// 조건을 만족하는 등록건만 추려서, last_week_mode가 있으면 겹침개수 기준 정렬까지 적용
MLL.searchEntriesByCondition = function(entries, condition, history) {
  var matched = entries.filter(function(e){ return MLL.matchesCondition(e.nums, condition, history); });
  var lastWeekMode = condition.last_week_mode || '무관';
  if (lastWeekMode !== '무관' && history && history.length) {
    var lastWinNums = history[0].nums || [];
    matched.sort(function(a,b){
      var ca = a.nums.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length;
      var cb = b.nums.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length;
      return lastWeekMode === '많은순' ? cb-ca : ca-cb;
    });
  }
  return matched;
};
</script>

<script>
function toggleNav(){
  var m=document.getElementById('navMenu');
  m.style.display=m.style.display==='none'?'block':'none';
}
document.addEventListener('click',function(e){
  var btn=document.getElementById('navBtn'),menu=document.getElementById('navMenu');
  if(menu&&btn&&!btn.contains(e.target)&&!menu.contains(e.target)) menu.style.display='none';
});

// =====================================================
// RS = Results & Stats 페이지 컨트롤러 (SPA 라우터)
// =====================================================
var RS = {};
RS.currentSection = 'byRound';
RS.sort = { key: 'createdAt', dir: 'desc' }; // 현재 테이블 정렬 상태

RS.SECTION_RENDERERS = {}; // 섹션별 render 함수 등록소

RS.switchSection = function(sec, btn) {
  RS.currentSection = sec;
  document.querySelectorAll('.rs-menu-btn').forEach(function(b){ b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  RS.sort = { key: 'createdAt', dir: 'desc' };
  var fn = RS.SECTION_RENDERERS[sec];
  var content = document.getElementById('rsContent');
  if (fn) {
    fn(content);
  } else {
    content.innerHTML = '<div class="card"><div class="card-head head-dark">🚧 준비 중</div>' +
      '<div style="padding:40px;text-align:center;color:#bbb;font-size:12px;">이 섹션은 곧 추가됩니다.</div></div>';
  }
};

// 좌측 메뉴의 "다음 회차"(추첨예정분) 라벨 갱신
// ⚠ 매주 추첨시각이 가변적(통상 토~일요일 새벽)이므로,
//   "현재 시각이 몇 시냐"가 아니라 "lotto_details1.xlsx 업데이트로
//   results에 실제로 들어와 있는 가장 최근 회차"를 기준으로 +1 계산한다.
//   즉 엑셀이 업데이트되어 새 회차 결과가 반영되는 순간 이 숫자도 즉시 넘어간다.
RS.computeUpcomingRound = function() {
  var results = MLL.loadResults();
  var resultRounds = Object.keys(results).map(Number).filter(function(n){ return !isNaN(n) && n>0; });
  if (resultRounds.length) {
    return Math.max.apply(null, resultRounds) + 1;
  }
  // results가 아예 비어있는 극초기 상태에서만 시간추정으로 폴백
  return MLL.getLottoInfo().saleRound;
};

RS.refreshUpcomingLabel = function() {
  var el = document.getElementById('rs-upcoming-round');
  if (el) el.textContent = RS.computeUpcomingRound();
};

(function initUpcomingLabel(){
  RS.refreshUpcomingLabel();
  // 다른 탭/페이지(admin.html, auto_update.html 등)에서 엑셀 업데이트로
  // localStorage(mll_results)가 바뀌면 이 라벨도 즉시 갱신
  window.addEventListener('storage', function(e){
    if (!e || e.key === MLL.RESULTS_KEY) RS.refreshUpcomingLabel();
  });
})();
</script>

<script>
// =====================================================
// 섹션: 회차별 등록현황과 결과 (byRound)
// =====================================================

// ── 좌측 "한국 로또 통계" 패널 데이터 계산 ──
RS.computeGlobalStats = function(mode) {
  var entries = MLL.loadEntries();
  var results = MLL.loadResults();
  function hasResult(round){ return !!(results[round]||results[Number(round)]||results[String(round)]); }

  if (mode === 'real') {
    entries = entries.filter(function(e){ return e.isReal === true; });
  } else if (mode === 'upcoming') {
    var upRound = RS.computeUpcomingRound();
    entries = entries.filter(function(e){ return String(e.round) === String(upRound); });
  }

  var gradeCounts = [0,0,0,0,0,0]; // index 0=낙첨,1~5등
  var totalSaved = entries.length;
  var preDrawCount = 0;     // 추첨전(결과 자체가 아직 없음)
  var unconfirmedCount = 0; // 추첨은 됐지만 결과 미반영
  var confirmedCount = 0;   // 결과 확인 완료
  var totalPrize = 0;

  entries.forEach(function(e){
    var rHas = hasResult(e.round);
    var isConfirmed = e.status === '추첨후' && e.grade !== null && e.grade !== undefined;
    if (isConfirmed) {
      confirmedCount++;
      gradeCounts[e.grade]++;
      totalPrize += (e.prizeMoney || 0);
    } else if (rHas) {
      unconfirmedCount++;
    } else {
      preDrawCount++;
    }
  });

  var totalWin = gradeCounts[1]+gradeCounts[2]+gradeCounts[3]+gradeCounts[4]+gradeCounts[5];
  var winRate = confirmedCount ? (totalWin/confirmedCount*100) : 0;

  return {
    totalSaved: totalSaved, preDrawCount: preDrawCount, unconfirmedCount: unconfirmedCount,
    confirmedCount: confirmedCount, gradeCounts: gradeCounts, totalWin: totalWin,
    winRate: winRate, totalPrize: totalPrize
  };
};

RS.renderGradeTable = function(gradeCounts, confirmedCount) {
  var labels = [
    {g:1,icon:'🥇',name:'1등'}, {g:2,icon:'🥈',name:'2등'}, {g:3,icon:'🥉',name:'3등'},
    {g:4,name:'4등'}, {g:5,name:'5등'}, {g:0,name:'낙첨'}
  ];
  var rows = labels.map(function(l){
    var cnt = gradeCounts[l.g] || 0;
    var pct = confirmedCount ? (cnt/confirmedCount*100) : 0;
    var color = MLL.GRADE_COLOR[l.g];
    return '<tr><td style="color:'+color+';font-weight:700;">'+(l.icon||'')+' '+l.name+'</td>' +
      '<td style="text-align:right;font-weight:700;">'+cnt+'</td>' +
      '<td style="text-align:right;color:#888;">'+pct.toFixed(2)+'%</td></tr>';
  }).join('');
  return '<table class="gradetable"><thead><tr><th>등수</th><th style="text-align:right;">건수</th><th style="text-align:right;">비율</th></tr></thead>' +
    '<tbody>'+rows+'</tbody></table>';
};

RS.renderStatPanel = function(mode) {
  var s = RS.computeGlobalStats(mode);
  var headLabel = mode === 'real' ? '📶 내가 등록한 한국 로또 전체 통계 (실제구매분)' :
                  mode === 'upcoming' ? '📶 내가 등록한 한국 로또 전체 통계 (이번 추첨예정분)' :
                  '📶 내가 등록한 한국 로또 전체 통계';
  return '' +
    '<div class="card" style="margin-bottom:12px;">' +
      '<div class="card-head head-dark">'+headLabel+'</div>' +
      '<div style="padding:12px 16px;">' +
        RS.renderGradeTable(s.gradeCounts, s.confirmedCount) +
        '<div class="minicard-grid" style="margin-top:12px;">' +
          '<div class="minicard"><div class="minicard-icon">🎫</div><div class="minicard-val">'+s.totalSaved+'</div>' +
            '<div class="minicard-sub">저장된 번호<br>추첨전 '+s.preDrawCount+'<br>추첨후 미확인 '+s.unconfirmedCount+'<br>추첨후 확인건 '+s.confirmedCount+'</div></div>' +
          '<div class="minicard green"><div class="minicard-icon">✅</div><div class="minicard-val">'+s.confirmedCount+'</div>' +
            '<div class="minicard-sub">결과 확인된 번호</div></div>' +
          '<div class="minicard gold"><div class="minicard-icon">🏆</div><div class="minicard-val">'+s.totalWin+'</div>' +
            '<div class="minicard-sub">총 당첨 건수</div></div>' +
          '<div class="minicard red"><div class="minicard-icon">📈</div><div class="minicard-val">'+s.winRate.toFixed(1)+'%</div>' +
            '<div class="minicard-sub">전체 당첨률</div></div>' +
        '</div>' +
        (s.unconfirmedCount>0 ?
          '<div style="margin-top:10px;text-align:center;font-size:10px;color:#888;">미확인건 중 추첨일이 경과된 미확인건을 확인하시겠습니까? ' +
          '<button class="checknow-btn" onclick="RS.runCheckNow(\''+(mode||'all')+'\')">⚡ 확인</button></div>' : '') +
      '</div>' +
    '</div>';
};

// ── 회차 드롭다운 옵션 구성 ──
// "모든회차"를 최상단에 두고, 그 아래로 최근회차→1회차 순, 옵션별 등록건수 표시
RS.buildRoundOptions = function(mode) {
  var entries = MLL.loadEntries();
  if (mode === 'real') entries = entries.filter(function(e){ return e.isReal === true; });
  var counts = {};
  entries.forEach(function(e){
    counts[e.round] = (counts[e.round]||0) + 1;
  });
  var rounds = Object.keys(counts).map(Number).sort(function(a,b){ return b-a; });
  return { rounds: rounds, counts: counts };
};

RS.ROUND_COLORS = ['#1a7ad4','#2f9e44','#e67700','#7048e8','#e03131','#0c8599'];
RS.roundColor = function(round, roundsDesc) {
  var idx = roundsDesc.indexOf(Number(round));
  if (idx < 0) idx = 0;
  return RS.ROUND_COLORS[idx % RS.ROUND_COLORS.length];
};

// 섹션별로 독립된 선택회차 상태를 유지 (all=회차별 / real=실제구매분 / upcoming=추첨예정분)
RS.roundState = { all: 'all', real: 'all' };

RS.renderRoundSection = function(container, mode) {
  // mode: 'all'(회차별 전체) | 'real'(실제구매분) | 'upcoming'(추첨예정분 고정)
  var ro = RS.buildRoundOptions(mode === 'real' ? 'real' : 'all');
  var titleMap = {
    all: '🏆 한국 로또 당첨 결과 확인 [회차별]',
    real: '🏆 한국 로또 당첨 결과 확인 [실제구매분 · 회차별]',
    upcoming: '🏆 한국 로또 당첨 결과 확인 [추첨예정분]'
  };

  var selectAreaHtml;
  if (mode === 'upcoming') {
    var upRound = RS.computeUpcomingRound();
    RS.upcomingRound = upRound;
    selectAreaHtml =
      '<span style="font-size:11px;color:#888;">대상 회차</span>' +
      '<span style="font-size:13px;font-weight:700;color:#e67700;">제 '+upRound+'회 (이번 추첨예정)</span>' +
      '<span id="rs-unconfirmed-info" class="unconfirmed-pill"></span>';
  } else {
    var sel = RS.roundState[mode] || 'all';
    RS.roundState[mode] = sel;
    var optionsHtml = '<option value="all">⭐ 모든회차</option>' +
      ro.rounds.map(function(r){
        return '<option value="'+r+'"'+(String(sel)===String(r)?' selected':'')+'>'+r+'회 ('+ro.counts[r]+')</option>';
      }).join('');
    selectAreaHtml =
      '<span style="font-size:11px;color:#888;">확인할 회차 선택</span>' +
      '<select id="rs-round-select-'+mode+'" onchange="RS.onRoundChange(\''+mode+'\',this.value)">'+optionsHtml+'</select>' +
      '<button class="gobtn" onclick="RS.onRoundChange(\''+mode+'\',document.getElementById(\'rs-round-select-'+mode+'\').value)">🔍 결과 보기</button>' +
      '<span id="rs-unconfirmed-info" class="unconfirmed-pill"></span>';
  }

  container.innerHTML =
    '<div class="statpanel-grid">' +
      '<div>' + RS.renderStatPanel(mode) + '</div>' +
      '<div class="card" id="rs-resultcard">' +
        '<div class="card-head head-dark">'+titleMap[mode]+'</div>' +
        '<div class="round-select-bar">' + selectAreaHtml + '</div>' +
        '<div id="rs-roundbody"></div>' +
      '</div>' +
    '</div>';

  RS.renderRoundBody(mode);
};

// byRound(전체) / real(실제구매분) / upcoming(추첨예정분) 각각의 진입점
RS.renderByRound = function(container) { RS.renderRoundSection(container, 'all'); };
RS.renderReal    = function(container) { RS.renderRoundSection(container, 'real'); };
RS.renderUpcoming= function(container) { RS.renderRoundSection(container, 'upcoming'); };

// ── 회차 선택 변경 ──
RS.onRoundChange = function(mode, val) {
  RS.roundState[mode] = val;
  RS.sort = { key: 'createdAt', dir: 'desc' };
  RS.renderRoundBody(mode);
};

// ── "즉시확인" 버튼 (추첨일 경과한 미확인건 자동매칭) ──
RS.runCheckNow = function(mode) {
  MLL.applyCheck(function(){
    RS.renderRoundSection(document.getElementById('rsContent'), mode);
    RS.refreshUpcomingLabel(); // 같은 탭 내 결과 반영 즉시 회차 라벨도 갱신
  });
};

// ── 본문(당첨번호박스 + 요약4칸 + 상세테이블) 렌더 ──
RS.renderRoundBody = function(mode) {
  var body = document.getElementById('rs-roundbody');
  if (!body) return;
  var entries = MLL.loadEntries();
  if (mode === 'real') entries = entries.filter(function(e){ return e.isReal === true; });
  var results = MLL.loadResults();
  var ro = RS.buildRoundOptions(mode === 'real' ? 'real' : 'all');

  function hasResult(round){ return !!(results[round]||results[Number(round)]||results[String(round)]); }
  function getRes(round){ return results[round]||results[Number(round)]||results[String(round)]||null; }

  var selectedRound = mode === 'upcoming' ? RS.upcomingRound : (RS.roundState[mode] || 'all');
  var isAll = (mode !== 'upcoming') && (selectedRound === 'all');
  var rows;

  if (isAll) {
    rows = entries.slice();
  } else {
    rows = entries.filter(function(e){ return String(e.round) === String(selectedRound); });
  }

  // 동일회차 내 추첨결과 미확인건 카운트 (선택된 범위 기준)
  var unconfirmedInScope = rows.filter(function(e){
    var rHas = hasResult(e.round);
    var isConfirmed = e.status==='추첨후' && e.grade!==null && e.grade!==undefined;
    return rHas && !isConfirmed;
  }).length;

  var unconfirmedHtml = unconfirmedInScope > 0
    ? '등록한 동일회차내<br>추첨결과 미확인건 <b>'+unconfirmedInScope+'</b> &nbsp;<button class="checknow-btn" onclick="RS.runCheckNow(\''+mode+'\')">⚡ 지금확인</button>'
    : '등록한 동일회차내<br>추첨결과 미확인건 <b>0</b>';
  var infoEl = document.getElementById('rs-unconfirmed-info');
  if (infoEl) infoEl.innerHTML = unconfirmedHtml;

  // 당첨번호 박스 + 요약 4칸 계산
  var winboxHtml = '';
  var confirmedRows = rows.filter(function(e){ return e.status==='추첨후' && e.grade!==null && e.grade!==undefined; });
  var winRows = confirmedRows.filter(function(e){ return e.grade>0; });
  var totalPrize = confirmedRows.reduce(function(a,e){ return a+(e.prizeMoney||0); }, 0);
  var winRate = confirmedRows.length ? (winRows.length/confirmedRows.length*100) : 0;

  if (!isAll) {
    var res = getRes(selectedRound);
    if (res) {
      var ballsHtml = res.nums.map(function(n){
        return '<span class="wball" style="background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';">'+n+'</span>';
      }).join('');
      winboxHtml = '<div class="winbox">' +
        '<span class="winbox-label">제 '+selectedRound+'회 당첨 번호</span>' +
        ballsHtml +
        '<span style="font-size:13px;color:#aaa;">+</span>' +
        '<span class="wball" style="background:#fff;color:#555;border:2px solid #aaa;">'+res.bonus+'</span>' +
        '</div>';
    } else {
      var emptyMsg = mode === 'upcoming'
        ? '제 '+selectedRound+'회는 아직 추첨 전입니다. 추첨 후 결과가 반영되면 당첨번호가 표시됩니다.'
        : '제 '+selectedRound+'회는 아직 추첨 전이거나 결과가 등록되지 않았습니다.';
      winboxHtml = '<div class="winbox" style="background:#f5f5f5;border-color:#e5e5e5;">' +
        '<span style="font-size:11px;color:#999;">'+emptyMsg+'</span></div>';
    }
  }

  var summaryHtml = '<div class="summary4">' +
    '<div class="s4box"><div class="s4box-val">'+confirmedRows.length+'</div><div class="s4box-label">추첨결과 확인한 등록 조합수</div></div>' +
    '<div class="s4box"><div class="s4box-val" style="color:#e67700;">'+winRows.length+'</div><div class="s4box-label">당첨 조합 수</div></div>' +
    '<div class="s4box"><div class="s4box-val" style="color:#1a7ad4;">'+winRate.toFixed(1)+'%</div><div class="s4box-label">당첨률</div></div>' +
    '<div class="s4box"><div class="s4box-val" style="color:#e03131;">'+totalPrize.toLocaleString()+'</div><div class="s4box-label">총 당첨금 (원)</div></div>' +
  '</div>';

  // 정렬 적용 데이터 가공
  var sortedRows = RS.sortRows(rows, getRes, isAll);

  var tableHtml = RS.renderResultTable(sortedRows, getRes, isAll, ro.rounds);

  body.innerHTML = winboxHtml + summaryHtml +
    '<div style="padding:0 16px 6px;font-size:11px;font-weight:700;color:#555;">상세 결과 ('+rows.length+'건)</div>' +
    tableHtml;
};

// ── 정렬 ──
RS.COLUMNS = [
  { key:'idx',        label:'#' },
  { key:'round',       label:'회차', onlyAll:true },
  { key:'nums',        label:'내 번호', noSort:true },
  { key:'match',        label:'일치' },
  { key:'grade',        label:'등수' },
  { key:'prizeMoney',   label:'당첨금' },
  { key:'type',         label:'구매형태' },
  { key:'memo',         label:'메모' },
  { key:'createdAt',    label:'등록일자' },
  { key:'isFavorite',   label:'관심' }
];

RS.sortRows = function(rows, getRes, isAll) {
  // 정렬을 위해 파생값(match, grade서열) 미리 계산해 둠
  var withDerived = rows.map(function(e, i){
    var res = getRes(e.round);
    var match = res ? MLL.calcMatchCount(e.nums, res.nums) : null;
    return { e:e, _idx:i, _match:match };
  });

  var key = RS.sort.key, dir = RS.sort.dir;
  if (!key || key==='idx') {
    // 기본: 추첨전 → 미확인 → 확인 순서를 따르는 기존 정렬과 유사하게 회차/등록일 내림차순
    withDerived.sort(function(a,b){ return b.e.round-a.e.round || b.e.createdAt-a.e.createdAt; });
  } else {
    withDerived.sort(function(a,b){
      var av, bv;
      if (key==='match') { av = a._match===null?-1:a._match; bv = b._match===null?-1:b._match; }
      else if (key==='grade') {
        // 정렬용 등급 서열: 미확인=-1, 낙첨=0, 5등<4등<...<1등이 되도록 변환(클수록 좋은 등수)
        function rank(en){
          if (en.status!=='추첨후' || en.grade===null || en.grade===undefined) return -1;
          if (en.grade===0) return 0;
          return 7 - en.grade; // 1등→6, 5등→2
        }
        av = rank(a.e); bv = rank(b.e);
      }
      else if (key==='prizeMoney') { av = a.e.prizeMoney||0; bv = b.e.prizeMoney||0; }
      else if (key==='createdAt')  { av = a.e.createdAt||0; bv = b.e.createdAt||0; }
      else if (key==='isFavorite') { av = a.e.isFavorite?1:0; bv = b.e.isFavorite?1:0; }
      else if (key==='round')      { av = Number(a.e.round); bv = Number(b.e.round); }
      else { av = (a.e[key]||'').toString(); bv = (b.e[key]||'').toString(); }

      if (av < bv) return dir==='asc' ? -1 : 1;
      if (av > bv) return dir==='asc' ? 1 : -1;
      return b.e.createdAt - a.e.createdAt;
    });
  }
  return withDerived.map(function(w){ return w.e; });
};

RS.toggleSort = function(key) {
  if (RS.COLUMNS.find(function(c){return c.key===key;}) && RS.COLUMNS.find(function(c){return c.key===key;}).noSort) return;
  if (RS.sort.key === key) {
    RS.sort.dir = RS.sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    RS.sort.key = key;
    RS.sort.dir = 'desc';
  }
  // 현재 활성 섹션에 맞는 재렌더링 함수를 호출 (회차별류 vs 조건검색결과)
  if (RS.currentSection === 'byCondition') {
    RS.renderConditionResult(RS.condLastResult || []);
  } else {
    RS.renderRoundBody(RS.currentSection);
  }
};

// ── 관심(즐겨찾기) 토글 ──
RS.toggleFav = function(id, el) {
  var nowOn = MLL.toggleFavorite(id);
  if (el) {
    el.classList.toggle('on', !!nowOn);
    el.textContent = nowOn ? '★' : '☆';
  }
};

// ── 상세 결과 테이블 HTML ──
RS.renderResultTable = function(rows, getRes, isAll, roundsDesc) {
  var cols = RS.COLUMNS.filter(function(c){ return isAll || !c.onlyAll; });

  var theadHtml = '<thead><tr>' + cols.map(function(c){
    var sorted = RS.sort.key === c.key;
    var arrow = c.noSort ? '' : '<span class="sort-arrow">'+(sorted ? (RS.sort.dir==='asc'?'▲':'▼') : '↕')+'</span>';
    var cls = sorted ? ' class="sorted"' : '';
    var onclick = c.noSort ? '' : ' onclick="RS.toggleSort(\''+c.key+'\')"';
    return '<th'+cls+onclick+'>'+c.label+arrow+'</th>';
  }).join('') + '</tr></thead>';

  if (!rows.length) {
    return '<div class="detail-table-wrap"><table class="rtbl">'+theadHtml+
      '<tbody><tr><td colspan="'+cols.length+'" class="empty-row">등록된 번호가 없습니다.</td></tr></tbody></table></div>';
  }

  var bodyRows = rows.map(function(e, i){
    var res = getRes(e.round);
    var match = res ? MLL.calcMatchCount(e.nums, res.nums) : null;
    var isConfirmed = e.status==='추첨후' && e.grade!==null && e.grade!==undefined;

    var ballsHtml = '<div style="display:flex;gap:2px;justify-content:center;flex-wrap:nowrap;">' +
      e.nums.map(function(n){
        var isMatch = res && res.nums.indexOf(n) >= 0;
        var op = (res && !isMatch) ? '0.35' : '1';
        return '<span style="width:21px;height:21px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;' +
          'font-size:9px;font-weight:700;background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';opacity:'+op+';' +
          (isMatch?'box-shadow:0 0 0 2px #f5c518 inset;':'')+'">'+n+'</span>';
      }).join('') + '</div>';

    var matchHtml = match===null ? '<span style="color:#ccc;">-</span>' : '<span class="matchnum">'+match+'</span>';

    var gradeHtml;
    if (!isConfirmed) {
      gradeHtml = '<span style="color:#bbb;font-size:9px;">미확인</span>';
    } else if (e.grade===0) {
      gradeHtml = '<span class="rbadge" style="background:'+MLL.GRADE_COLOR[0]+';">낙첨</span>';
    } else {
      gradeHtml = '<span class="rbadge" style="background:'+MLL.GRADE_COLOR[e.grade]+';">'+MLL.GRADE_LABEL[e.grade]+'</span>';
    }

    var prizeHtml = (e.prizeMoney && e.prizeMoney>0)
      ? '<span style="color:#e03131;font-weight:700;">'+e.prizeMoney.toLocaleString()+'원</span>'
      : '<span style="color:#ccc;">-</span>';

    var typeColor = e.type==='자동'?'#2f9e44':e.type==='반자동'?'#e67700':'#1a7ad4';
    var typeBg    = e.type==='자동'?'#e8fff0':e.type==='반자동'?'#fff3e0':'#e8f4ff';
    var typeHtml  = '<span class="typebadge" style="color:'+typeColor+';background:'+typeBg+';border-color:'+typeColor+';">'+e.type+'</span>';

    var d = new Date(e.createdAt);
    var dateStr = String(d.getFullYear()).slice(2)+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');

    var favHtml = '<span class="favstar'+(e.isFavorite?' on':'')+'" onclick="RS.toggleFav(\''+e.id+'\',this)">'+(e.isFavorite?'★':'☆')+'</span>';

    var roundCellHtml = '';
    if (isAll) {
      var rc = RS.roundColor(e.round, roundsDesc);
      roundCellHtml = '<td><span class="roundchip" style="background:'+rc+';">'+e.round+'회</span></td>';
    }

    return '<tr>' +
      '<td style="color:#bbb;">'+(i+1)+'</td>' +
      roundCellHtml +
      '<td>'+ballsHtml+'</td>' +
      '<td>'+matchHtml+'</td>' +
      '<td>'+gradeHtml+'</td>' +
      '<td>'+prizeHtml+'</td>' +
      '<td>'+typeHtml+'</td>' +
      '<td style="color:#888;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+(e.memo||'')+'">'+(e.memo||'-')+'</td>' +
      '<td style="color:#999;font-size:10px;">'+dateStr+'</td>' +
      '<td>'+favHtml+'</td>' +
      '</tr>';
  }).join('');

  return '<div class="detail-table-wrap"><table class="rtbl">'+theadHtml+'<tbody>'+bodyRows+'</tbody></table></div>';
};

        '<div class="cond-section-title">📊 번호 조건</div>' +
        '<div class="cond-grid2">' +
          '<div><div class="cond-label">홀짝비율 <span class="hint">홀:짝</span></div>' +
            '<select class="cond-select" id="c-odd-even">' +
              '<option value="">무관</option>' +

        '<hr class="cond-divider">' +

        '<div class="cond-grid2">' +
          '<div><div class="cond-label">상위빈도범위 <span class="hint">최근 N개 중 상위 M개</span></div>' +
            '<input class="cond-input" id="c-top-range" placeholder="예) 20 (상위 20번호)"></div>' +
          '<div><div class="cond-label">상위번호사용 <span class="hint">조합당 몇 개 포함</span></div>' +
            '<input class="cond-input" id="c-top-use" placeholder="예) 2"></div>' +
          '<div><div class="cond-label">최근분석회차 <span class="hint">최근 N회 분석</span></div>' +
            '<input class="cond-input" id="c-recent-rounds" placeholder="예) 100"></div>' +
          '<div><div class="cond-label">지난주기준 <span class="hint">지난주 당첨번호 기준 정렬</span></div>' +
            '<select class="cond-select" id="c-last-week">' +
              '<option value="무관">무관</option>' +
              '<option value="적은순">적은순 (겹침 적은 것 우선)</option>' +
              '<option value="많은순">많은순 (겹침 많은 것 우선)</option>' +
            '</select></div>' +
        '</div>' +

        '<button class="cond-searchbtn" onclick="RS.runConditionSearch()">🔍 찾기 Click!</button>' +

        '<div class="cond-note">' +
          '여기서는 사용자가 생각하는 조건을 갖춘 번호조합이 내가 이미 등록한 이곳에 있나 찾아보는 곳입니다. ' +
          '있을 경우 아래에 리스트로 나오게 됩니다.<br><br>' +
          '만일 없을 경우 <b style="color:#5f3dc4;text-decoration:underline;cursor:pointer;" onclick="location.href=\'strategy_manager.html\'">"전략등록"</b>에서 원하는 조건으로 번호를 새로 생성해 보세요.' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div id="rs-condresult" style="margin-top:14px;"></div>';

// 입력값이 채워진(공백 아님) 조건식 필드를 붉은색·크게 강조 표시
RS.bindConditionFillHighlight = function() {
  RS.CONDITION_FIELDS.forEach(function(f) {
    var el = document.getElementById(f.id);
    if (!el) return;
    var update = function() {
      var hasVal = el.value !== null && String(el.value).trim() !== '';
      el.classList.toggle('filled', hasVal);
    };
    update(); // 초기 상태 반영(값 복원 등 대비)
    el.addEventListener('input', update);
    el.addEventListener('change', update);
  });
};


RS.collectConditionFromForm = function() {
  var cond = {};
  RS.CONDITION_FIELDS.forEach(function(f) {
    var el = document.getElementById(f.id);
    if (el) cond[f.key] = el.value;
  });
  return cond;
};

RS.runConditionSearch = function() {
  var cond = RS.collectConditionFromForm();
  var entries = MLL.loadEntries();
  var results = MLL.loadResults();
  var history = Object.keys(results).map(Number).sort(function(a,b){ return b-a; }).map(function(r){
    return { round:r, nums: results[r].nums || [] };
  });

  var matched = MLL.searchEntriesByCondition(entries, cond, history);
  RS.condLastResult = matched;
  RS.sort = { key:'createdAt', dir:'desc' };
  RS.renderConditionResult(matched);
};

RS.renderConditionResult = function(matched) {
  var box = document.getElementById('rs-condresult');
  if (!box) return;
  var results = MLL.loadResults();
  function getRes(round){ return results[round]||results[Number(round)]||results[String(round)]||null; }

  var ro = RS.buildRoundOptions();
  var sorted = RS.sortRows(matched, getRes, true); // 조건검색 결과는 회차컬럼 포함 형태로 표시
  var tableHtml = RS.renderResultTable(sorted, getRes, true, ro.rounds);

  box.innerHTML =
    '<div class="card">' +
      '<div class="card-head head-dark">📋 조건을 만족하는 등록건 ('+matched.length+'건)</div>' +
      tableHtml +
    '</div>';
};

RS.SECTION_RENDERERS.byRound  = RS.renderByRound;
RS.SECTION_RENDERERS.real      = RS.renderReal;
RS.SECTION_RENDERERS.upcoming  = RS.renderUpcoming;
RS.SECTION_RENDERERS.byCondition = RS.renderByCondition;

<script>
// =====================================================
// 섹션: 나의 구매 성향 (habit)
// 전체 등록 번호조합(추첨여부 무관)을 기준으로 6가지 분석을 보여준다.
// 표의 "총등록건수(확인된 등록건수)" 형태: 괄호 밖=전체등록, 괄호 안=추첨후 확인된 것만
// 당첨건수/당첨금액은 항상 추첨후 확인건 중에서만 집계
// =====================================================

RS.isConfirmed = function(e) {
  return e.status === '추첨후' && e.grade !== null && e.grade !== undefined;
};

RS.sumNums = function(nums) { return nums.reduce(function(a,b){ return a+b; }, 0); };

// 공통: bucket 함수로 각 entry를 분류해서 표 데이터(rows + 합계) 생성
// bucketFn(entry) -> 분류 키 문자열 (해당 없으면 null 반환 가능)
RS.buildHabitTable = function(entries, buckets, bucketFn) {
  var data = {};
  buckets.forEach(function(b){ data[b] = { total:0, confirmed:0, winCount:0, winPrize:0 }; });

  entries.forEach(function(e){
    var key = bucketFn(e);
    if (key === null || !data.hasOwnProperty(key)) return;
    data[key].total++;
    if (RS.isConfirmed(e)) {
      data[key].confirmed++;
      if (e.grade > 0) {
        data[key].winCount++;
        data[key].winPrize += (e.prizeMoney || 0);
      }
    }
  });

  var totalAll = entries.length;
  var totalConfirmed = entries.filter(RS.isConfirmed).length;
  var totalWinCount = 0, totalWinPrize = 0;
  buckets.forEach(function(b){ totalWinCount += data[b].winCount; totalWinPrize += data[b].winPrize; });

  return { data:data, totalAll:totalAll, totalConfirmed:totalConfirmed, totalWinCount:totalWinCount, totalWinPrize:totalWinPrize };
};

RS.renderHabitTableHTML = function(title, icon, buckets, bucketLabels, result, colorClass) {
  var rows = buckets.map(function(b, i){
    var d = result.data[b];
    var pctAll = result.totalAll ? (d.total/result.totalAll*100) : 0;
    var pctConfirmed = result.totalConfirmed ? (d.confirmed/result.totalConfirmed*100) : 0;
    return '<tr><td>'+(bucketLabels[i]||b)+'</td>' +
      '<td>'+d.total.toLocaleString()+(d.confirmed?'<span class="sub-confirmed">('+d.confirmed.toLocaleString()+')</span>':'')+'</td>' +
      '<td>'+pctAll.toFixed(1)+'%'+(d.confirmed?'<span class="sub-confirmed">('+pctConfirmed.toFixed(1)+'%)</span>':'')+'</td>' +
      '<td>'+(d.winCount||'-')+'</td>' +
      '<td>'+(d.winPrize?d.winPrize.toLocaleString():'-')+'</td>' +
      '</tr>';
  }).join('');

  var pctAllTotal = result.totalAll ? 100 : 0;
  var pctConfirmedTotal = result.totalConfirmed ? 100 : 0;

  return '<div class="habit-block '+(colorClass||'')+'">' +
    '<div class="habit-block-title">'+icon+' '+title+'</div>' +
    '<table class="habittbl"><thead><tr>' +
      '<th>구분</th><th>총등록건수<br>(확인된 등록건수)</th><th>총등록비율<br>(확인된 등록비율)</th><th>당첨건수</th><th>당첨금액 합계</th>' +
    '</tr></thead><tbody>' + rows +
      '<tr class="total-row"><td>합계</td>' +
        '<td>'+result.totalAll.toLocaleString()+(result.totalConfirmed?'<span class="sub-confirmed">('+result.totalConfirmed.toLocaleString()+')</span>':'')+'</td>' +
        '<td>'+pctAllTotal.toFixed(1)+'%'+(result.totalConfirmed?'<span class="sub-confirmed">('+pctConfirmedTotal.toFixed(1)+'%)</span>':'')+'</td>' +
        '<td>'+(result.totalWinCount||'-')+'</td>' +
        '<td>'+(result.totalWinPrize?result.totalWinPrize.toLocaleString():'-')+'</td>' +
      '</tr>' +
    '</tbody></table>' +
  '</div>';
};

// 1) 홀짝비율
RS.calcOddEven = function(entries) {
  var buckets = ['6:0','5:1','4:2','3:3','2:4','1:5','0:6'];
  var result = RS.buildHabitTable(entries, buckets, function(e){
    var odd = e.nums.filter(function(n){ return n%2===1; }).length;
    return odd+':'+(6-odd);
  });
  return RS.renderHabitTableHTML('홀짝비율', '⚖️', buckets, buckets, result, 'c-oddeven');
};

// 2) 연속번호
RS.calcConsecutive = function(entries) {
  var buckets = ['0','2','3','4','5','6'];
  var labels  = ['연속조합 없음','2수 연속','3수 연속','4수 연속','5수 연속','6수 연속'];
  var result = RS.buildHabitTable(entries, buckets, function(e){
    var sorted = e.nums.slice().sort(function(a,b){return a-b;});
    var maxRun = 1, run = 1;
    for (var i=1;i<sorted.length;i++){
      if (sorted[i]===sorted[i-1]+1){ run++; if(run>maxRun) maxRun=run; }
      else run=1;
    }
    return maxRun===1 ? '0' : String(maxRun);
  });
  return RS.renderHabitTableHTML('연속번호: 숫자가 연달아 나오는 조합', '🔗', buckets, labels, result, 'c-consecutive');
};

// 3) 6개 번호의 합 분포 (21~67/68~114/115~161/162~208/209~255)
RS.calcSumDist = function(entries) {
  var buckets = ['21-67','68-114','115-161','162-208','209-255'];
  var labels  = ['21~67','68~114','115~161','162~208','209~255'];
  var ranges  = [[21,67],[68,114],[115,161],[162,208],[209,255]];
  var result = RS.buildHabitTable(entries, buckets, function(e){
    var s = RS.sumNums(e.nums);
    for (var i=0;i<ranges.length;i++){
      if (s>=ranges[i][0] && s<=ranges[i][1]) return buckets[i];
    }
    return null;
  });
  return RS.renderHabitTableHTML('6개 번호의 합 분포', '📐', buckets, labels, result, 'c-sumdist');
};

// 5) 구매형태별 통계
RS.calcByType = function(entries) {
  var buckets = ['자동','반자동','수동'];
  var result = RS.buildHabitTable(entries, buckets, function(e){ return e.type; });
  return RS.renderHabitTableHTML('구매형태별 통계', '🎯', buckets, buckets, result, 'c-bytype');
};

// 4) 내가 가장 많이 사용한 번호와 횟수 (총 등록번호조합 기준, 괄호합=등록건수*6)
RS.calcTopUsedNumbers = function(entries) {
  var freq = {};
  entries.forEach(function(e){ e.nums.forEach(function(n){ freq[n] = (freq[n]||0)+1; }); });
  var sorted = Object.keys(freq).map(Number).map(function(n){ return [n, freq[n]]; })
    .sort(function(a,b){ return b[1]-a[1] || a[0]-b[0]; });
  var html = sorted.map(function(x){
    return '<span class="freq-chip">'+String(x[0]).padStart(2,'0')+'(<b>'+x[1]+'</b>)</span>';
  }).join(' ');
  var totalSlots = entries.length * 6;
  return '<div class="habit-block c-topused">' +
    '<div class="habit-block-title">🔥 내가 가장 많이 사용한 번호와 횟수<span style="color:#999;font-weight:400;font-size:10px;">(총 등록번호조합 기준)</span></div>' +
    '<div class="habit-freebox">'+(html || '<span style="color:#bbb;">등록된 번호가 없습니다.</span>')+'</div>' +
    '<div class="habit-freebox-note">*참고사항: 괄호안의 합 = 총등록건수 × 6 = '+totalSlots.toLocaleString()+'</div>' +
  '</div>';
};

// 6) 등록된 번호조합의 첫 시작번호와 횟수 (총 등록번호조합 기준)
RS.calcFirstNumberFreq = function(entries) {
  var freq = {};
  entries.forEach(function(e){
    var sorted = e.nums.slice().sort(function(a,b){return a-b;});
    var first = sorted[0];
    freq[first] = (freq[first]||0)+1;
  });
  var sorted = Object.keys(freq).map(Number).sort(function(a,b){ return a-b; });
  var html = sorted.map(function(n){
    return '<span class="freq-chip">'+String(n).padStart(2,'0')+'(<b>'+freq[n]+'</b>)</span>';
  }).join(' ');
  var totalSlots = entries.length;
  return '<div class="habit-block c-firstnum">' +
    '<div class="habit-block-title">🎬 등록된 번호조합의 첫 시작번호와 횟수<span style="color:#999;font-weight:400;font-size:10px;">(총 등록번호조합 기준)</span></div>' +
    '<div class="habit-freebox">'+(html || '<span style="color:#bbb;">등록된 번호가 없습니다.</span>')+'</div>' +
    '<div class="habit-freebox-note">*참고사항: 괄호안의 합 = 총등록건수 = '+totalSlots.toLocaleString()+'</div>' +
  '</div>';
};

RS.renderHabit = function(container) {
  var entries = MLL.loadEntries();
  var preDraw = entries.filter(function(e){ return e.status==='추첨전'; }).length;
  var confirmed = entries.filter(RS.isConfirmed).length;
  var unconfirmed = entries.length - preDraw - confirmed;

  var now = new Date();
  var dateStr = now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0');

  container.innerHTML =
    '<div class="card">' +
      '<div class="habit-header">' +
        '<div class="habit-title">📊 나의 구매 성향</div>' +
        '<div class="habit-date">('+dateStr+' 현재기준)</div>' +
      '</div>' +
      '<div class="habit-summary">' +
        '<span><b>총등록건수:</b> '+entries.length.toLocaleString()+'건</span>' +
        '<span>(추첨전: '+preDraw.toLocaleString()+'</span>' +
        '<span>추첨후 확인: '+confirmed.toLocaleString()+'</span>' +
        '<span>추첨후 미확인: '+unconfirmed.toLocaleString()+')</span>' +
        '<span class="note">*당첨건수와 당첨금액은 추첨후 확인건만 계상한 것입니다.</span>' +
      '</div>' +
      '<div class="habit-grid">' +
        RS.calcOddEven(entries) +
        RS.calcConsecutive(entries) +
        RS.calcSumDist(entries) +
        RS.calcTopUsedNumbers(entries) +
        RS.calcByType(entries) +
        RS.calcFirstNumberFreq(entries) +
      '</div>' +
    '</div>';
};

RS.SECTION_RENDERERS.habit = RS.renderHabit;
</script>

<script>
// =====================================================
// 섹션: 관심번호/재구매 최애번호 저장소 (favorites)
// 데이터소스: mll_favorites (완전 별도 저장소, mll_entries와 무관하게 독립 관리)
// =====================================================

RS.favRoundState = 'all';

// ── 관심번호 List 본문에서 별표 클릭 시: 저장소에서 제거 + 연결된 entries의 isFavorite도 false로 ──
RS.unfavoriteFromList = function(favId, el) {
  if (!confirm('관심번호 저장소에서 제거하시겠습니까?')) return;
  var favs = MLL.loadFavorites();
  var fav = favs.find(function(f){ return f.id === favId; });
  if (!fav) return;

  // 원본 entries와 연결되어 있다면 그쪽의 isFavorite도 false로 되돌림
  if (fav.sourceEntryId) {
    var entries = MLL.loadEntries();
    var src = entries.find(function(e){ return e.id === fav.sourceEntryId; });
    if (src) { src.isFavorite = false; MLL.saveEntries(entries); }
  }
  favs = favs.filter(function(f){ return f.id !== favId; });
  MLL.saveFavorites(favs);
  RS.renderFavoritesBody();
};

RS.buildFavRoundOptions = function() {
  var favs = MLL.loadFavorites();
  var counts = {};
  favs.forEach(function(f){ counts[f.round] = (counts[f.round]||0) + 1; });
  var rounds = Object.keys(counts).map(Number).sort(function(a,b){ return b-a; });
  return { rounds: rounds, counts: counts };
};

RS.onFavRoundChange = function(val) {
  RS.favRoundState = val;
  RS.sort = { key:'createdAt', dir:'desc' };
  RS.renderFavoritesBody();
};

RS.renderFavorites = function(container) {
  MLL.refreshFavoritesResults(); // 화면 진입 시 최신 당첨결과 반영
  var ro = RS.buildFavRoundOptions();
  var sel = RS.favRoundState || 'all';
  var optionsHtml = '<option value="all">⭐ 모든회차</option>' +
    ro.rounds.map(function(r){
      return '<option value="'+r+'"'+(String(sel)===String(r)?' selected':'')+'>'+r+'회 ('+ro.counts[r]+')</option>';
    }).join('');

  container.innerHTML =
    '<div class="statpanel-grid" id="fav-print-wrap">' +
      '<div class="card fav-addinput-card">' +
        '<div class="card-head head-dark">🏅 나의 최애번호 추가: 다음 중 선택하여 사용하세요</div>' +
        '<div style="padding:14px;">' + RS.renderAddInputAccordion() + '</div>' +
      '</div>' +
      '<div class="card" id="fav-print-target">' +
        '<div class="card-head head-dark">🏆 나의 관심번호: 재구매 대상 최애번호 List</div>' +
        '<div class="round-select-bar">' +
          '<span style="font-size:11px;color:#888;">확인할 회차 선택</span>' +
          '<select id="rs-fav-round-select" onchange="RS.onFavRoundChange(this.value)">'+optionsHtml+'</select>' +
          '<button class="gobtn" onclick="RS.onFavRoundChange(document.getElementById(\'rs-fav-round-select\').value)">🔍 결과 보기</button>' +
        '</div>' +
        '<div id="rs-favbody"></div>' +
        '<div class="fav-toolbar">' +
          '<button class="fav-btn excel" onclick="RS.exportFavoritesExcel()">📊 엑셀 다운로드</button>' +
          '<button class="fav-btn pdf" onclick="RS.printFavorites()">🖨️ PDF 출력</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  RS.renderFavoritesBody();
  RS.initAddInputHandlers();
};

RS.renderFavoritesBody = function() {
  var body = document.getElementById('rs-favbody');
  if (!body) return;
  var favs = MLL.loadFavorites();
  var results = MLL.loadResults();
  var ro = RS.buildFavRoundOptions();
  function getRes(round){ return results[round]||results[Number(round)]||results[String(round)]||null; }

  var sel = RS.favRoundState || 'all';
  var isAll = (sel === 'all');
  var rows = isAll ? favs.slice() : favs.filter(function(f){ return String(f.round) === String(sel); });

  var confirmedRows = rows.filter(function(f){ return f.status==='추첨후' && f.grade!==null && f.grade!==undefined; });
  var winRows = confirmedRows.filter(function(f){ return f.grade>0; });
  var totalPrize = confirmedRows.reduce(function(a,f){ return a+(f.prizeMoney||0); }, 0);
  var winRate = confirmedRows.length ? (winRows.length/confirmedRows.length*100) : 0;

  var summaryHtml = '<div class="summary4">' +
    '<div class="s4box"><div class="s4box-val">'+confirmedRows.length+'</div><div class="s4box-label">추첨결과 확인한 등록 조합수</div></div>' +
    '<div class="s4box"><div class="s4box-val" style="color:#e67700;">'+winRows.length+'</div><div class="s4box-label">당첨 조합 수</div></div>' +
    '<div class="s4box"><div class="s4box-val" style="color:#1a7ad4;">'+winRate.toFixed(1)+'%</div><div class="s4box-label">당첨률</div></div>' +
    '<div class="s4box"><div class="s4box-val" style="color:#e03131;">'+totalPrize.toLocaleString()+'</div><div class="s4box-label">총 당첨금 (원)</div></div>' +
  '</div>';

  var sortedRows = RS.sortRows(rows, getRes, true);
  var tableHtml = RS.renderFavTable(sortedRows, getRes, ro.rounds);

  body.innerHTML = summaryHtml +
    '<div style="padding:0 16px 6px;font-size:11px;font-weight:700;color:#555;">상세 결과 ('+rows.length+'건)</div>' +
    tableHtml;
};

// 관심번호 List 전용 테이블 — 회차 컬럼 항상 포함, 별표는 항상 ON(끄면 저장소에서 제거)
RS.renderFavTable = function(rows, getRes, roundsDesc) {
  var cols = RS.COLUMNS; // 기존 컬럼 구성(#, 회차, 내번호, 일치, 등수, 당첨금, 구매형태, 메모, 등록일자, 관심) 그대로 재사용

  var theadHtml = '<thead><tr>' + cols.map(function(c){
    var sorted = RS.sort.key === c.key;
    var arrow = c.noSort ? '' : '<span class="sort-arrow">'+(sorted ? (RS.sort.dir==='asc'?'▲':'▼') : '↕')+'</span>';
    var cls = sorted ? ' class="sorted"' : '';
    var onclick = c.noSort ? '' : ' onclick="RS.toggleSort(\''+c.key+'\')"';
    return '<th'+cls+onclick+'>'+c.label+arrow+'</th>';
  }).join('') + '</tr></thead>';

  if (!rows.length) {
    return '<div class="detail-table-wrap"><table class="rtbl">'+theadHtml+
      '<tbody><tr><td colspan="'+cols.length+'" class="empty-row">관심번호로 등록된 조합이 없습니다.</td></tr></tbody></table></div>';
  }

  var bodyRows = rows.map(function(f, i){
    var res = getRes(f.round);
    var match = res ? MLL.calcMatchCount(f.nums, res.nums) : null;
    var isConfirmed = f.status==='추첨후' && f.grade!==null && f.grade!==undefined;

    var ballsHtml = '<div style="display:flex;gap:2px;justify-content:center;flex-wrap:nowrap;">' +
      f.nums.map(function(n){
        var isMatch = res && res.nums.indexOf(n) >= 0;
        var op = (res && !isMatch) ? '0.35' : '1';
        return '<span style="width:21px;height:21px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;' +
          'font-size:9px;font-weight:700;background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';opacity:'+op+';' +
          (isMatch?'box-shadow:0 0 0 2px #f5c518 inset;':'')+'">'+n+'</span>';
      }).join('') + '</div>';

    var matchHtml = match===null ? '<span style="color:#ccc;">-</span>' : '<span class="matchnum">'+match+'</span>';

    var gradeHtml;
    if (!isConfirmed) gradeHtml = '<span style="color:#bbb;font-size:9px;">미확인</span>';
    else if (f.grade===0) gradeHtml = '<span class="rbadge" style="background:'+MLL.GRADE_COLOR[0]+';">낙첨</span>';
    else gradeHtml = '<span class="rbadge" style="background:'+MLL.GRADE_COLOR[f.grade]+';">'+MLL.GRADE_LABEL[f.grade]+'</span>';

    var prizeHtml = (f.prizeMoney && f.prizeMoney>0)
      ? '<span style="color:#e03131;font-weight:700;">'+f.prizeMoney.toLocaleString()+'원</span>'
      : '<span style="color:#ccc;">-</span>';

    var typeColor = f.type==='자동'?'#2f9e44':f.type==='반자동'?'#e67700':'#1a7ad4';
    var typeBg    = f.type==='자동'?'#e8fff0':f.type==='반자동'?'#fff3e0':'#e8f4ff';
    var typeHtml  = '<span class="typebadge" style="color:'+typeColor+';background:'+typeBg+';border-color:'+typeColor+';">'+f.type+'</span>';

    var d = new Date(f.createdAt);
    var dateStr = String(d.getFullYear()).slice(2)+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');

    // 관심번호 List에서는 항상 ★(채워진 별)로 표시 — 클릭하면 저장소에서 제거
    var favHtml = '<span class="favstar on" onclick="RS.unfavoriteFromList(\''+f.id+'\',this)">★</span>';

    var rc = RS.roundColor(f.round, roundsDesc);
    var roundCellHtml = '<td><span class="roundchip" style="background:'+rc+';">'+f.round+'회</span></td>';

    return '<tr>' +
      '<td style="color:#bbb;">'+(i+1)+'</td>' +
      roundCellHtml +
      '<td>'+ballsHtml+'</td>' +
      '<td>'+matchHtml+'</td>' +
      '<td>'+gradeHtml+'</td>' +
      '<td>'+prizeHtml+'</td>' +
      '<td>'+typeHtml+'</td>' +
      '<td style="color:#888;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+(f.memo||'')+'">'+(f.memo||'-')+'</td>' +
      '<td style="color:#999;font-size:10px;">'+dateStr+'</td>' +
      '<td>'+favHtml+'</td>' +
      '</tr>';
  }).join('');

  return '<div class="detail-table-wrap"><table class="rtbl">'+theadHtml+'<tbody>'+bodyRows+'</tbody></table></div>';
};

// ── 엑셀 다운로드 (CSV, 외부 라이브러리 없이 엑셀에서 바로 열림) ──
RS.printFavorites = function() {
  alert('인쇄 창에서 "더보기 설정"을 열어 머리글/바닥글(날짜·URL·페이지 번호) 체크를 해제하시면, 지금 보고 계신 목록만 깨끗하게 출력됩니다.');
  window.print();
};

RS.exportFavoritesExcel = function() {
  if (typeof XLSX === 'undefined') {
    alert('엑셀 라이브러리를 불러오지 못했습니다. 네트워크 연결을 확인하고 다시 시도해주세요.');
    return;
  }
  var favs = MLL.loadFavorites();
  var results = MLL.loadResults();
  function getRes(round){ return results[round]||results[Number(round)]||results[String(round)]||null; }

  var header = ['#','회차','번호1','번호2','번호3','번호4','번호5','번호6','일치','등수','당첨금','구매형태','메모','등록일자'];
  var aoa = [header];

  favs.forEach(function(f, i){
    var res = getRes(f.round);
    var match = res ? MLL.calcMatchCount(f.nums, res.nums) : '';
    var isConfirmed = f.status==='추첨후' && f.grade!==null && f.grade!==undefined;
    var gradeText = !isConfirmed ? '미확인' : (f.grade===0 ? '낙첨' : MLL.GRADE_LABEL[f.grade]);
    var d = new Date(f.createdAt);
    var dateStr = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    var sortedNums = f.nums.slice().sort(function(a,b){ return a-b; });
    aoa.push([
      i+1,
      f.round+'회',
      sortedNums[0], sortedNums[1], sortedNums[2], sortedNums[3], sortedNums[4], sortedNums[5],
      match,
      gradeText,
      f.prizeMoney||0,
      f.type,
      f.memo||'',
      dateStr
    ]);
  });

  var ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [
    { wch:4 },  // #
    { wch:8 },  // 회차
    { wch:6 }, { wch:6 }, { wch:6 }, { wch:6 }, { wch:6 }, { wch:6 }, // 번호1~6
    { wch:6 },  // 일치
    { wch:8 },  // 등수
    { wch:14 }, // 당첨금
    { wch:8 },  // 구매형태
    { wch:30 }, // 메모
    { wch:12 }  // 등록일자
  ];

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '나의관심번호');

  var filename = '나의관심번호_' + new Date().toISOString().slice(0,10) + '.xlsx';
  XLSX.writeFile(wb, filename);
};

// =====================================================
// "나의 최애번호 추가" - 추가입력 아코디언 (4가지: AI/일반/이미지/QR)
// 모두 MLL.addFavoriteDirect()를 통해 저장 → mll_entries 등록 + mll_favorites 동기화
// =====================================================

RS.accOpen = { ai:false, general:true, image:false, qr:false }; // 기본은 "일반입력"만 펼침

RS.toggleAcc = function(key) {
  RS.accOpen[key] = !RS.accOpen[key];
  var head = document.getElementById('acc-head-'+key);
  var body = document.getElementById('acc-body-'+key);
  if (head) head.classList.toggle('open', RS.accOpen[key]);
  if (body) body.classList.toggle('open', RS.accOpen[key]);
};

RS.renderAddInputAccordion = function() {
  return '<div class="addinput-acc">' +
    RS.renderAccCard('ai', 'acc-ai', '🤖 AI 도우미 — 텍스트·음성으로 입력', RS.renderAiInputBody()) +
    RS.renderAccCard('general', 'acc-general', '✏️ 일반입력 — 직접 번호 선택', RS.renderGeneralInputBody()) +
    RS.renderAccCard('image', 'acc-image', '🖼️ 이미지 업로드 — 사진/캡처로 인식', RS.renderImageInputBody()) +
    RS.renderAccCard('qr', 'acc-qr', '📷 QR 스캔 — 카메라로 QR코드 인식', RS.renderQrInputBody()) +
  '</div>';
};

RS.renderAccCard = function(key, headClass, title, bodyHtml) {
  var isOpen = !!RS.accOpen[key];
  return '<div class="acc-card">' +
    '<div class="acc-head '+headClass+(isOpen?' open':'')+'" id="acc-head-'+key+'" onclick="RS.toggleAcc(\''+key+'\')">' +
      '<span>'+title+'</span><span class="arrow">▾</span>' +
    '</div>' +
    '<div class="acc-body'+(isOpen?' open':'')+'" id="acc-body-'+key+'">' + bodyHtml + '</div>' +
  '</div>';
};

// ── 2) 일반입력: 회차 지정 + 번호 1~6 직접선택 + 구매형태 ──
RS.renderGeneralInputBody = function() {
  var defaultRound = RS.computeUpcomingRound();
  return '' +
    '<div class="gen-round-row">' +
      '<label>회차</label>' +
      '<input type="number" id="gen-round" value="'+defaultRound+'" min="1">' +
      '<label style="margin-left:10px;">구매형태</label>' +
      '<select id="gen-type" style="border:1px solid #ddd;border-radius:5px;padding:5px 8px;font-size:12px;">' +
        '<option value="자동">자동</option><option value="반자동">반자동</option><option value="수동" selected>수동</option>' +
      '</select>' +
    '</div>' +
    '<div class="gen-num-grid" style="margin-bottom:8px;">' +
      [1,2,3,4,5,6].map(function(i){
        var nextId = i<6 ? 'gen-num-'+(i+1) : null;
        return '<input class="gen-num-in" id="gen-num-'+i+'" type="number" min="1" max="45" placeholder="'+i+'"' +
          (nextId ? ' oninput="RS.autoAdvanceNumInput(this,\''+nextId+'\')"' : ' oninput="RS.clampNumInput(this)"') + '>';
      }).join('') +
    '</div>' +
    '<input class="cond-input" id="gen-memo" placeholder="메모 (선택, 예: 생일번호)" style="margin-bottom:8px;">' +
    '<div id="acc-msg-general" class="acc-msg"></div>' +
    '<button class="gen-save-btn" onclick="RS.saveGeneralInput()">⭐ 최애번호로 저장</button>';
};

RS.saveGeneralInput = function() {
  var round = parseInt(document.getElementById('gen-round').value);
  var type = document.getElementById('gen-type').value;
  var memo = document.getElementById('gen-memo').value;
  var nums = [];
  for (var i=1;i<=6;i++) {
    var v = parseInt(document.getElementById('gen-num-'+i).value);
    if (v) nums.push(v);
  }
  var msgEl = document.getElementById('acc-msg-general');

  if (!round || round<1) return RS.showAccMsg(msgEl, 'error', '회차를 올바르게 입력해주세요.');
  if (nums.length !== 6) return RS.showAccMsg(msgEl, 'error', '번호 6개를 모두 입력해주세요.');
  if (nums.some(function(n){ return n<1 || n>45; })) return RS.showAccMsg(msgEl, 'error', '번호는 1~45 사이여야 합니다.');
  if (new Set(nums).size !== 6) return RS.showAccMsg(msgEl, 'error', '중복된 번호가 있습니다.');

  MLL.addFavoriteDirect({ round:round, nums:nums, type:type, isReal:false, memo:memo, inputMethod:'general' });
  RS.showAccMsg(msgEl, 'success', '✅ 최애번호로 저장되었습니다! 우측 목록에서 확인하세요.');
  for (var i=1;i<=6;i++) document.getElementById('gen-num-'+i).value = '';
  document.getElementById('gen-memo').value = '';
  RS.renderFavoritesBody();
};

RS.showAccMsg = function(el, type, text) {
  if (!el) return;
  el.className = 'acc-msg show ' + type;
  el.textContent = text;
  setTimeout(function(){ el.classList.remove('show'); }, 4000);
};

// 번호입력칸: 1~45 범위로 보정하고, 두 자리(또는 더 이상 입력 불가한 값)가 되면 다음 칸으로 자동 포커스 이동
RS.clampNumInput = function(el) {
  var v = el.value;
  if (v === '') return;
  var n = parseInt(v, 10);
  if (isNaN(n)) { el.value = ''; return; }
  if (n > 45) n = 45;
  if (n < 0) n = 0;
  el.value = String(n);
};

RS.autoAdvanceNumInput = function(el, nextId) {
  RS.clampNumInput(el);
  var v = el.value;
  if (v === '') return;
  var n = parseInt(v, 10);
  // 두 자리 수가 채워졌거나, 한 자리지만 더 이상 0~9를 이어붙여도 45를 넘게 되는 경우(5,6,7,8,9) 바로 다음 칸으로
  var isTwoDigits = v.length >= 2;
  var cannotGrow = v.length === 1 && n >= 5; // 5x ~ 9x는 모두 45 초과이므로 한 자리에서 확정
  if (isTwoDigits || cannotGrow) {
    var next = document.getElementById(nextId);
    if (next) { next.focus(); next.select && next.select(); }
  }
};

// ── 1) AI 도우미: 텍스트/음성으로 번호 추출 ──
RS.aiChatHistory = [
  { role:'ai', text:'안녕하세요! 최애번호로 저장하고 싶은 번호를 말씀해주세요.\n예) "1227회 자동 12 14 16 25 33 41" 처럼 회차와 번호를 같이 말씀하시면 더 정확해요.' }

// 자유 텍스트에서 회차/번호/구매형태/메모 추출
RS.parseAiText = function(text) {
  var result = { round:null, nums:[], type:null, memo:'' };

  // 회차: "1227회" 또는 "1227 회"
  var roundMatch = text.match(/(\d{3,4})\s*회/);
  if (roundMatch) result.round = parseInt(roundMatch[1]);

  // 구매형태 키워드
  if (/자동/.test(text) && !/반자동/.test(text)) result.type = '자동';
  else if (/반자동/.test(text)) result.type = '반자동';
  else if (/수동/.test(text)) result.type = '수동';

  // 번호: 1~2자리 숫자를 모두 추출한 뒤, 회차로 이미 쓰인 3~4자리 숫자는 제외
  var allNumbers = (text.match(/\d{1,2}(?!\d)/g) || []).map(Number);
  // 회차 매칭에 사용된 위치의 숫자가 1~2자리로 쪼개져 다시 잡히는 걸 방지하기 위해,
  // 원문에서 "NNNN회" 패턴 자체를 제거한 뒤 다시 숫자만 추출
  var textWithoutRound = roundMatch ? text.replace(roundMatch[0], ' ') : text;
  allNumbers = (textWithoutRound.match(/\d{1,2}(?!\d)/g) || []).map(Number).filter(function(n){ return n>=1 && n<=45; });
  result.nums = [...new Set(allNumbers)].slice(0, 6);

  // 메모로 쓸만한 키워드(생일, 기념일 등)가 있으면 그대로 남김 — 숫자/회차/형태 키워드 제외하고 남는 한글 텍스트
  var memoText = text
    .replace(/\d{3,4}\s*회/g, '')
    .replace(/\d{1,2}/g, '')
    .replace(/(반자동|자동|수동)(으로|이다|입니다)?/g, '')
    .replace(/(넣어줘|넣어주세요|해줘|해주세요|저장해줘|저장해주세요)/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  if (memoText) result.memo = memoText;

  return result;
};

RS.submitAiText = function() {
  var input = document.getElementById('ai-text-input');
  var text = input ? input.value.trim() : '';
  if (!text) return;
  RS.processAiInput(text);
  if (input) input.value = '';
};

RS.processAiInput = function(text) {
  RS.aiChatHistory.push({ role:'user', text:text });
  var parsed = RS.parseAiText(text);
  var replyParts = [];

  if (parsed.nums.length !== 6) {
    replyParts.push('번호 6개를 정확히 인식하지 못했어요. (인식된 번호: '+(parsed.nums.join(', ')||'없음')+') 다시 말씀해주시겠어요?');
    RS.aiChatHistory.push({ role:'ai', text: replyParts.join(' ') });
    RS.refreshAiChatUI();
    return;
  }
  if (new Set(parsed.nums).size !== 6) {
    RS.aiChatHistory.push({ role:'ai', text:'번호 중에 중복된 값이 있어요. 6개의 서로 다른 번호로 다시 말씀해주세요.' });
    RS.refreshAiChatUI();
    return;
  }
  if (!parsed.round) {
    parsed.round = RS.computeUpcomingRound();
    replyParts.push('회차를 따로 말씀하지 않으셔서 이번 추첨예정 회차('+parsed.round+'회)로 등록할게요.');
  }
  var type = parsed.type || '수동';

  MLL.addFavoriteDirect({ round:parsed.round, nums:parsed.nums, type:type, isReal:false, memo:parsed.memo, inputMethod:'ai' });

  replyParts.push('✅ '+parsed.round+'회 ['+parsed.nums.join(', ')+'] ('+type+') 번호를 최애번호로 저장했어요! 우측 목록에서 확인하실 수 있어요.');
  RS.aiChatHistory.push({ role:'ai', text: replyParts.join(' ') });
  RS.refreshAiChatUI();
  RS.renderFavoritesBody();
};

RS.refreshAiChatUI = function() {
  var wrap = document.getElementById('ai-chat-wrap');
  if (!wrap) return;
  wrap.innerHTML = RS.aiChatHistory.map(function(m){
    return '<div class="ai-bubble '+m.role+'">'+m.text.replace(/\n/g,'<br>')+'</div>';
  }).join('');
  wrap.scrollTop = wrap.scrollHeight;
};

RS.toggleAiVoice = function() {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var msgEl = document.getElementById('acc-msg-ai');
  if (!SpeechRecognition) {
    RS.showAccMsg(msgEl, 'error', '이 브라우저는 음성 인식을 지원하지 않습니다. 텍스트로 입력해주세요.');
    return;
  }
  var micBtn = document.getElementById('ai-mic-btn');
  if (RS.aiVoiceOn) {
    if (RS.aiRecognition) RS.aiRecognition.stop();
    RS.aiVoiceOn = false;
    if (micBtn) micBtn.classList.remove('on');
    return;
  }
  RS.aiRecognition = new SpeechRecognition();
  RS.aiRecognition.lang = 'ko-KR';
  RS.aiRecognition.interimResults = false;
  RS.aiRecognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var input = document.getElementById('ai-text-input');
    if (input) input.value = transcript;
    RS.processAiInput(transcript);
  };
  RS.aiRecognition.onerror = function() {
    RS.showAccMsg(msgEl, 'error', '음성 인식 중 오류가 발생했습니다. 다시 시도해주세요.');
    RS.aiVoiceOn = false;

  RS.aiRecognition.onend = function() {

  };

  RS.aiVoiceOn = true;
  if (micBtn) micBtn.classList.add('on');

// =====================================================
// QR 디코딩 공통 로직
// camera_qr.html에서 이미 검증된 동행복권 QR 인코딩 규격을 그대로 사용한다.
// v=<회차><타입+12자리숫자>... 형태 (타입: m=수동, q=자동, s=반자동)
// 예) v=1227m010203040506q070809101112
// =====================================================
RS.parseLottoQrUrl = function(url) {
  try {
    var match = url.match(/[?&]v=([^&]+)/);
    if (!match) return null;
    var v = match[1];
    var roundMatch = v.match(/^(\d+)/);
    if (!roundMatch) return null;
    var round = parseInt(roundMatch[1]);
    var combos = [];
    var pat = /([mqs])(\d{12})/g;
    var m;
    while ((m = pat.exec(v)) !== null) {
      var type = m[1] === 'm' ? '수동' : m[1] === 'q' ? '자동' : '반자동';
      var nums = [];
      for (var i = 0; i < 12; i += 2) nums.push(parseInt(m[2].slice(i, i + 2)));
      if (nums.length === 6 && nums.every(function(n) { return n >= 1 && n <= 45; }) && new Set(nums).size === 6) {
        combos.push({ type: type, nums: nums });
      }
    }
    if (!round || !combos.length) return null;
    return { round: round, combos: combos };
  } catch (e) { return null; }
};

RS.zxingDecode = function(imageData, w, h) {
  return new Promise(function(resolve) {
    try {
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      var reader = new ZXing.MultiFormatReader();
      reader.setHints(hints);
      var src = new ZXing.RGBLuminanceSource(imageData.data, w, h);
      var bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
      resolve(reader.decode(bitmap).getText());
    } catch (e) { resolve(null); }
  });
};

RS.loadImageEl = function(src) {
  return new Promise(function(res, rej) {
    var img = new Image();
    img.onload = function() { res(img); };
    img.onerror = rej;
    img.src = src;
  });
};

// 지정된 가로/세로 크기로 캔버스에 그린 뒤 BarcodeDetector → zxing 순서로 디코딩 시도
RS.tryDecodeImage = async function(img, w, h) {
  var canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);

  if ('BarcodeDetector' in window) {
    try {
      var det = new BarcodeDetector({ formats: ['qr_code'] });
      var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/jpeg', 0.95); });
      var bmp = await createImageBitmap(blob);
      var codes = await det.detect(bmp);
      if (codes.length > 0) return codes[0].rawValue;
    } catch (e) {}
  }
  try {
    var imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
    var text = await RS.zxingDecode(imageData, canvas.width, canvas.height);
    if (text) return text;
  } catch (e) {}
  return null;
};

RS.addImages = function(files) {
  var msgEl = document.getElementById('acc-msg-image');
  var imgs = files.filter(function(f) { return f.type.startsWith('image/'); });
  if (!imgs.length) { RS.showAccMsg(msgEl, 'error', '이미지 파일만 업로드 가능합니다.'); return; }
  imgs.forEach(function(f) { RS.imgQueue.push(f); });
  if (!RS.imgIsProcessing) RS.processImgQueue();
};

RS.processImgQueue = async function() {
  if (!RS.imgQueue.length) { RS.imgIsProcessing = false; RS.hideImgProcStatus(); return; }
  RS.imgIsProcessing = true;
  var file = RS.imgQueue.shift();
  var msgEl = document.getElementById('acc-msg-image');
  RS.showImgProcStatus('"'+file.name+'" 인식 중...', 30);

  try {
    var url = URL.createObjectURL(file);
    var img = await RS.loadImageEl(url);
    URL.revokeObjectURL(url);

    // 1차: 원본 크기로 시도, 실패하면 2차: 적정 크기로 다운스케일해서 재시도
    // (최신 스마트폰 사진은 4000px가 넘는 경우가 많아 디코더가 처리에 실패하는 경우가 있음)
    var qrText = await RS.tryDecodeImage(img, img.naturalWidth, img.naturalHeight);
    if (!qrText) {
      var maxDim = 1280;
      var scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
      if (scale < 1) {
        var w2 = Math.round(img.naturalWidth * scale);
        var h2 = Math.round(img.naturalHeight * scale);
        qrText = await RS.tryDecodeImage(img, w2, h2);
      }
    }
    // 3차: 그래도 실패하면 더 작게(800px) 한 번 더 — 너무 촘촘한 경우 반대로 작을 때 더 잘 읽히기도 함
    if (!qrText) {
      var maxDim2 = 800;
      var scale2 = Math.min(1, maxDim2 / Math.max(img.naturalWidth, img.naturalHeight));
      if (scale2 < 1) {
        var w3 = Math.round(img.naturalWidth * scale2);
        var h3 = Math.round(img.naturalHeight * scale2);
        qrText = await RS.tryDecodeImage(img, w3, h3);
      }
    }

    if (qrText) {
      var parsed = RS.parseLottoQrUrl(qrText);
      if (parsed) {
        RS.saveQrCombos(parsed.round, parsed.combos, 'image');
        RS.showAccMsg(msgEl, 'success', '✅ "'+file.name+'" 인식 성공! 제'+parsed.round+'회 '+parsed.combos.length+'개 저장됨');
      } else {
        RS.showAccMsg(msgEl, 'error', '"'+file.name+'" — 로또 QR이 아닙니다');
      }
    } else {
      RS.showAccMsg(msgEl, 'error', '"'+file.name+'" — QR 인식 실패. QR 부분을 크게 찍어주세요');
    }
  } catch (e) {
    RS.showAccMsg(msgEl, 'error', '"'+file.name+'" 오류: '+e.message);
  }
  RS.setImgProgress(100);
  setTimeout(function() { RS.processImgQueue(); }, 300);
};

RS.startQrScan = async function() {
  var msgEl = document.getElementById('acc-msg-qr');
  if (typeof Html5Qrcode === 'undefined') {
    RS.showAccMsg(msgEl, 'error', 'QR 인식 라이브러리를 불러오지 못했습니다. 네트워크를 확인하거나, URL을 직접 붙여넣어 주세요.');
    return;
  }
  try {
    document.getElementById('qr-guide-box').style.display = 'none';
    document.getElementById('qr-reader').style.display = 'block';
    document.getElementById('qr-start-btn').style.display = 'none';
    document.getElementById('qr-stop-btn').style.display = 'block';
    document.getElementById('qr-zoom-wrap').style.display = 'block';

    RS.html5Qr = new Html5Qrcode('qr-reader');
    await RS.html5Qr.start(
      { facingMode: 'environment' },
      { fps: 15, qrbox: { width: 230, height: 230 }, aspectRatio: 1.0, experimentalFeatures: { useBarCodeDetectorIfSupported: true } },
      function(text) { RS.handleQrScanSuccess(text); },
      function() {}
    );
    RS.showAccMsg(msgEl, 'info', '📷 QR코드를 화면 중앙에 맞춰주세요!');
  } catch (e) {
    document.getElementById('qr-guide-box').style.display = 'block';
    document.getElementById('qr-reader').style.display = 'none';
    document.getElementById('qr-start-btn').style.display = 'block';
    document.getElementById('qr-stop-btn').style.display = 'none';
    document.getElementById('qr-zoom-wrap').style.display = 'none';
    RS.showAccMsg(msgEl, 'error', '카메라를 사용할 수 없습니다. URL 붙여넣기를 이용해주세요.');
  }
};

RS.stopQrScan = async function() {
  if (RS.html5Qr) {
    try { await RS.html5Qr.stop(); RS.html5Qr.clear(); } catch (e) {}
    RS.html5Qr = null;
  }
  var reader = document.getElementById('qr-reader');
  if (reader) { reader.style.display = 'none'; reader.innerHTML = ''; }
  var guide = document.getElementById('qr-guide-box');
  if (guide) guide.style.display = 'block';
  var startBtn = document.getElementById('qr-start-btn');
  var stopBtn = document.getElementById('qr-stop-btn');
  if (startBtn) startBtn.style.display = 'block';
  if (stopBtn) stopBtn.style.display = 'none';
  var zoomWrap = document.getElementById('qr-zoom-wrap');
  if (zoomWrap) zoomWrap.style.display = 'none';
  var zoomSlider = document.getElementById('qr-zoom-slider');
  if (zoomSlider) zoomSlider.value = 10;
  RS.qrZoomLevel = 1.0;
  var zv = document.getElementById('qr-zoom-val');
  if (zv) zv.textContent = '1.0x';
};

RS.handleQrScanSuccess = function(text) {
  if (!text) return;
  if (text.includes('dhlottery') || text.includes('qr.dh')) {
    var parsed = RS.parseLottoQrUrl(text);
    if (parsed) {
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      RS.saveQrCombos(parsed.round, parsed.combos, 'qr');
      RS.stopQrScan();
      var msgEl = document.getElementById('acc-msg-qr');
      RS.showAccMsg(msgEl, 'success', '✅ QR 인식 성공! 제'+parsed.round+'회 '+parsed.combos.length+'개 저장됨');
    }
  }
};

RS.initAddInputHandlers = function() {
  // 섹션 재진입 시 진행 중인 카메라 스트림은 정리
  RS.stopQrScan();
};

RS.SECTION_RENDERERS.favorites = RS.renderFavorites;
</script>

window.addEventListener('DOMContentLoaded', function(){
  RS.switchSection('byRound', document.querySelector('.rs-menu-btn[data-sec="byRound"]'));
});
