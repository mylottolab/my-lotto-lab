RS.saveGeneralInput = async function() {
  var round = parseInt(document.getElementById('gen-round').value);
  var type = document.getElementById('gen-type').value;
  var memo = document.getElementById('gen-memo').value;
  var nums = [];
  for (var i=1;i<=6;i++) {
    var v = parseInt(document.getElementById('gen-num-'+i).value);
    if (v) nums.push(v);
  }
  var msgEl = document.getElementById('acc-msg-general');

  if (!round || round<1) return RS.showAccMsg(msgEl, 'error', '회차를 올바르게 입력해주세요.');
  if (nums.length !== 6) return RS.showAccMsg(msgEl, 'error', '번호 6개를 모두 입력해주세요.');
  if (nums.some(function(n){ return n<1 || n>45; })) return RS.showAccMsg(msgEl, 'error', '번호는 1~45 사이여야 합니다.');
  if (new Set(nums).size !== 6) return RS.showAccMsg(msgEl, 'error', '중복된 번호가 있습니다.');

  var result = await MLL.addFavoriteDirect({ round:round, nums:nums, type:type, isReal:false, memo:memo, inputMethod:'general' });
  if (result._failed) { if (!result.message) return; return RS.showAccMsg(msgEl, 'error', '저장 실패: ' + result.message); }
  RS.showAccMsg(msgEl, 'success', '✅ 최애번호로 저장되었습니다! 우측 목록에서 확인하세요.');
  for (var i=1;i<=6;i++) document.getElementById('gen-num-'+i).value = '';
  document.getElementById('gen-memo').value = '';
  RS.renderFavoritesBody();
};

RS.showAccMsg = function(el, type, text) {
  if (!el) return;
  el.className = 'acc-msg show ' + type;
  el.textContent = text;
  setTimeout(function(){ el.classList.remove('show'); }, 4000);
};

// 번호입력칸: 1~45 범위로 보정하고, 두 자리(또는 더 이상 입력 불가한 값)가 되면 다음 칸으로 자동 포커스 이동
RS.clampNumInput = function(el) {
  var v = el.value;
  if (v === '') return;
  var n = parseInt(v, 10);
  if (isNaN(n)) { el.value = ''; return; }
  if (n > 45) n = 45;
  if (n < 0) n = 0;
  el.value = String(n);
};

RS.autoAdvanceNumInput = function(el, nextId) {
  RS.clampNumInput(el);
  var v = el.value;
  if (v === '') return;
  var n = parseInt(v, 10);
  // 두 자리 수가 채워졌거나, 한 자리지만 더 이상 0~9를 이어붙여도 45를 넘게 되는 경우(5,6,7,8,9) 바로 다음 칸으로
  var isTwoDigits = v.length >= 2;
  var cannotGrow = v.length === 1 && n >= 5; // 5x ~ 9x는 모두 45 초과이므로 한 자리에서 확정
  if (isTwoDigits || cannotGrow) {
    var next = document.getElementById(nextId);
    if (next) { next.focus(); next.select && next.select(); }
  }
};

RS.renderAiInputBody = function() {
  var bubbles = RS.aiChatHistory.map(function(m){
    return '<div class="ai-bubble '+m.role+'">'+m.text.replace(/\n/g,'<br>')+'</div>';
  }).join('');
  var examples = ['1227회 12 14 16 25 33 41', '자동 1 2 3 4 5 6', '생일번호 5 12 18 23 31 40'];
  return '' +
    '<div class="ai-examples">' +
      examples.map(function(ex){ return '<span class="ai-ex-btn" onclick="RS.fillAiExample(\''+ex+'\')">'+ex+'</span>'; }).join('') +
    '</div>' +
    '<div class="ai-chat-wrap" id="ai-chat-wrap">'+bubbles+'</div>' +
    '<div id="acc-msg-ai" class="acc-msg"></div>' +
    '<div class="ai-input-row">' +
      '<textarea class="ai-textinput" id="ai-text-input" placeholder="예: 1227회 자동 12 14 16 25 33 41"></textarea>' +
      '<button class="ai-btn-mic" id="ai-mic-btn" onclick="RS.toggleAiVoice()" title="음성 입력">🎤</button>' +
      '<button class="ai-btn-send" onclick="RS.submitAiText()" title="전송">➤</button>' +
    '</div>';
};

RS.fillAiExample = function(text) {
  var el = document.getElementById('ai-text-input');
  if (el) { el.value = text; el.focus(); }
};

// 자유 텍스트에서 회차/번호/구매형태/메모 추출
RS.parseAiText = function(text) {
  var result = { round:null, nums:[], type:null, memo:'' };

  // 회차: "1227회" 또는 "1227 회"
  var roundMatch = text.match(/(\d{3,4})\s*회/);
  if (roundMatch) result.round = parseInt(roundMatch[1]);

  // 구매형태 키워드
  if (/자동/.test(text) && !/반자동/.test(text)) result.type = '자동';
  else if (/반자동/.test(text)) result.type = '반자동';
  else if (/수동/.test(text)) result.type = '수동';

  // 번호: 1~2자리 숫자를 모두 추출한 뒤, 회차로 이미 쓰인 3~4자리 숫자는 제외
  var allNumbers = (text.match(/\d{1,2}(?!\d)/g) || []).map(Number);
  // 회차 매칭에 사용된 위치의 숫자가 1~2자리로 쪼개져 다시 잡히는 걸 방지하기 위해,
  // 원문에서 "NNNN회" 패턴 자체를 제거한 뒤 다시 숫자만 추출
  var textWithoutRound = roundMatch ? text.replace(roundMatch[0], ' ') : text;
  allNumbers = (textWithoutRound.match(/\d{1,2}(?!\d)/g) || []).map(Number).filter(function(n){ return n>=1 && n<=45; });
  result.nums = [...new Set(allNumbers)].slice(0, 6);

  // 메모로 쓸만한 키워드(생일, 기념일 등)가 있으면 그대로 남김 — 숫자/회차/형태 키워드 제외하고 남는 한글 텍스트
  var memoText = text
    .replace(/\d{3,4}\s*회/g, '')
    .replace(/\d{1,2}/g, '')
    .replace(/(반자동|자동|수동)(으로|이다|입니다)?/g, '')
    .replace(/(넣어줘|넣어주세요|해줘|해주세요|저장해줘|저장해주세요)/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  if (memoText) result.memo = memoText;

  return result;
};

RS.submitAiText = function() {
  var input = document.getElementById('ai-text-input');
  var text = input ? input.value.trim() : '';
  if (!text) return;
  RS.processAiInput(text);
  if (input) input.value = '';
};

RS.processAiInput = async function(text) {
  RS.aiChatHistory.push({ role:'user', text:text });
  var parsed = RS.parseAiText(text);
  var replyParts = [];

  if (parsed.nums.length !== 6) {
    replyParts.push('번호 6개를 정확히 인식하지 못했어요. (인식된 번호: '+(parsed.nums.join(', ')||'없음')+') 다시 말씀해주시겠어요?');
    RS.aiChatHistory.push({ role:'ai', text: replyParts.join(' ') });
    RS.refreshAiChatUI();
    return;
  }
  if (new Set(parsed.nums).size !== 6) {
    RS.aiChatHistory.push({ role:'ai', text:'번호 중에 중복된 값이 있어요. 6개의 서로 다른 번호로 다시 말씀해주세요.' });
    RS.refreshAiChatUI();
    return;
  }
  if (!parsed.round) {
    parsed.round = RS.computeUpcomingRound();
    replyParts.push('회차를 따로 말씀하지 않으셔서 이번 추첨예정 회차('+parsed.round+'회)로 등록할게요.');
  }
  var type = parsed.type || '수동';

  var result = await MLL.addFavoriteDirect({ round:parsed.round, nums:parsed.nums, type:type, isReal:false, memo:parsed.memo, inputMethod:'ai' });
  if (result._failed) {
    if (!result.message) return; // 로그인 필요 모달이 이미 떴음
    RS.aiChatHistory.push({ role:'ai', text: '⛔ 저장 실패: ' + result.message });
    RS.refreshAiChatUI();
    return;
  }

  replyParts.push('✅ '+parsed.round+'회 ['+parsed.nums.join(', ')+'] ('+type+') 번호를 최애번호로 저장했어요! 우측 목록에서 확인하실 수 있어요.');
  RS.aiChatHistory.push({ role:'ai', text: replyParts.join(' ') });
  RS.refreshAiChatUI();
  RS.renderFavoritesBody();
};

RS.refreshAiChatUI = function() {
  var wrap = document.getElementById('ai-chat-wrap');
  if (!wrap) return;
  wrap.innerHTML = RS.aiChatHistory.map(function(m){
    return '<div class="ai-bubble '+m.role+'">'+m.text.replace(/\n/g,'<br>')+'</div>';
  }).join('');
  wrap.scrollTop = wrap.scrollHeight;
};

// 음성 입력 (Web Speech API) — 미지원 브라우저에서는 안내만 표시
RS.aiRecognition = null;
RS.aiVoiceOn = false;
RS.toggleAiVoice = function() {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  var msgEl = document.getElementById('acc-msg-ai');
  if (!SpeechRecognition) {
    RS.showAccMsg(msgEl, 'error', '이 브라우저는 음성 인식을 지원하지 않습니다. 텍스트로 입력해주세요.');
    return;
  }
  var micBtn = document.getElementById('ai-mic-btn');
  if (RS.aiVoiceOn) {
    if (RS.aiRecognition) RS.aiRecognition.stop();
    RS.aiVoiceOn = false;
    if (micBtn) micBtn.classList.remove('on');
    return;
  }
  RS.aiRecognition = new SpeechRecognition();
  RS.aiRecognition.lang = 'ko-KR';
  RS.aiRecognition.interimResults = false;
  RS.aiRecognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    var input = document.getElementById('ai-text-input');
    if (input) input.value = transcript;
    RS.processAiInput(transcript);
  };
  RS.aiRecognition.onerror = function() {
    RS.showAccMsg(msgEl, 'error', '음성 인식 중 오류가 발생했습니다. 다시 시도해주세요.');
    RS.aiVoiceOn = false;
    if (micBtn) micBtn.classList.remove('on');
  };
  RS.aiRecognition.onend = function() {
    RS.aiVoiceOn = false;
    if (micBtn) micBtn.classList.remove('on');
  };
  RS.aiRecognition.start();
  RS.aiVoiceOn = true;
  if (micBtn) micBtn.classList.add('on');
};

// =====================================================
// QR 디코딩 공통 로직
// camera_qr.html에서 이미 검증된 동행복권 QR 인코딩 규격을 그대로 사용한다.
// v=<회차><타입+12자리숫자>... 형태 (타입: m=수동, q=자동, s=반자동)
// 예) v=1227m010203040506q070809101112
// =====================================================
// =====================================================
// 공용 QR 디코딩 엔진 v2 (My Lotto Lab 전체 통일)
// 실제 로또용지 사진으로 검증된 다단계 재시도:
// 1) 원본  2) 그레이스케일  3) 히스토그램 평활화(equalizeHist)
// 4) 회전(90/180/270도)  5) 확대(1.5x/2x/3x)  6) CLAHE 근사(여러 clip/tile)
// =====================================================

MLL.zxingDecode = function(imageData, w, h){
  return new Promise(function(resolve){
    try {
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      var reader = new ZXing.MultiFormatReader(); reader.setHints(hints);
      var src = new ZXing.RGBLuminanceSource(imageData.data, w, h);
      var bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
      resolve(reader.decode(bitmap).getText());
    } catch(e) { resolve(null); }
  });
};

// 캔버스에서 BarcodeDetector → ZXing 순서로 디코딩 시도 (공통 마지막 단계)
// BarcodeDetector는 캔버스를 직접 createImageBitmap에 넘길 수 있어 toBlob(JPEG 인코딩) 비용을 보통 건너뛴다.
// 일부 환경에서 캔버스 직접 전달이 안 되면 toBlob 경유로 폴백한다.
MLL._decodeCanvas = async function(canvas){
  if ('BarcodeDetector' in window) {
    try {
      var det = new BarcodeDetector({formats:['qr_code']});
      var bmp;
      try { bmp = await createImageBitmap(canvas); }
      catch(e1) {
        var blob = await new Promise(function(r){ canvas.toBlob(r, 'image/jpeg', 0.95); });
        bmp = await createImageBitmap(blob);
      }
      var codes = await det.detect(bmp);
      if (codes.length>0) return codes[0].rawValue;
    } catch(e) {}
  }
  try {
    var ctx = canvas.getContext('2d');
    var imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    var text = await MLL.zxingDecode(imageData, canvas.width, canvas.height);
    if (text) return text;
  } catch(e) {}
  return null;
};

// 그레이스케일 ImageData 생성 (원본 캔버스로부터)
MLL._toGrayCanvas = function(srcCanvas){
  var w = srcCanvas.width, h = srcCanvas.height;
  var canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(srcCanvas, 0, 0);
  var imgData = ctx.getImageData(0,0,w,h);
  var data = imgData.data;
  for (var i=0; i<data.length; i+=4){
    var g = Math.round(data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114);
    data[i]=data[i+1]=data[i+2]=g;
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
};

// 전체 히스토그램 평활화 (equalizeHist 근사) — 그레이 캔버스에 적용
MLL._equalizeHistCanvas = function(grayCanvas){
  var w = grayCanvas.width, h = grayCanvas.height;
  var canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(grayCanvas, 0, 0);
  var imgData = ctx.getImageData(0,0,w,h);
  var data = imgData.data;
  var hist = new Float64Array(256);
  var n = w*h;
  for (var i=0; i<data.length; i+=4) hist[data[i]]++;
  var cdf = new Float64Array(256);
  var sum = 0;
  for (var i=0;i<256;i++){ sum += hist[i]; cdf[i]=sum; }
  var lut = new Uint8ClampedArray(256);
  for (var i=0;i<256;i++) lut[i] = Math.round(cdf[i]/n*255);
  for (var i=0; i<data.length; i+=4){
    var v = lut[data[i]];
    data[i]=data[i+1]=data[i+2]=v;
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
};

// 회전된 캔버스 생성 (90/180/270도)
MLL._rotateCanvas = function(srcCanvas, angle){
  var w = srcCanvas.width, h = srcCanvas.height;
  var canvas = document.createElement('canvas');
  var ctx;
  if (angle === 180) {
    canvas.width = w; canvas.height = h;
    ctx = canvas.getContext('2d');
    ctx.translate(w, h); ctx.rotate(Math.PI);
    ctx.drawImage(srcCanvas, 0, 0);
  } else {
    canvas.width = h; canvas.height = w;
    ctx = canvas.getContext('2d');
    if (angle === 90) { ctx.translate(h, 0); ctx.rotate(Math.PI/2); }
    else { ctx.translate(0, w); ctx.rotate(-Math.PI/2); }
    ctx.drawImage(srcCanvas, 0, 0);
  }
  return canvas;
};

// 확대된 캔버스 생성
MLL._scaleCanvas = function(srcCanvas, scale){
  var canvas = document.createElement('canvas');
  canvas.width = Math.round(srcCanvas.width*scale);
  canvas.height = Math.round(srcCanvas.height*scale);
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(srcCanvas, 0, 0, canvas.width, canvas.height);
  return canvas;
};

// CLAHE 근사: 타일별 클립 히스토그램 평활화 + bilinear 보간 (그레이 캔버스 대상)
// 성능: 픽셀 루프 전에 행/열별 보간 인덱스·가중치를 미리 계산해 반복 비용을 줄인다.
MLL._claheCanvas = function(grayCanvas, clipLimit, tiles){
  var w = grayCanvas.width, h = grayCanvas.height;
  var canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(grayCanvas, 0, 0);
  var imgData = ctx.getImageData(0,0,w,h);
  var data = imgData.data;

  var th = Math.floor(h/tiles), tw = Math.floor(w/tiles);
  if (th<1 || tw<1) return grayCanvas;

  // 타일별 LUT(256단계) 계산 — luts는 [tiles*tiles][256] 평탄화된 Uint8ClampedArray
  var luts = new Array(tiles*tiles);
  for (var ty=0; ty<tiles; ty++){
    var y0=ty*th, y1=(ty<tiles-1)?y0+th:h;
    for (var tx=0; tx<tiles; tx++){
      var x0=tx*tw, x1=(tx<tiles-1)?x0+tw:w;
      var hist = new Float64Array(256);
      var n=0;
      for (var y=y0; y<y1; y++){
        var rowBase = y*w*4;
        for (var x=x0; x<x1; x++){
          hist[data[rowBase+x*4]]++; n++;
        }
      }
      var clipVal = Math.max(1, clipLimit*n/256);
      var excess = 0;
      for (var i=0;i<256;i++){ if (hist[i]>clipVal){ excess += hist[i]-clipVal; hist[i]=clipVal; } }
      var redistr = excess/256;
      var lut = new Uint8ClampedArray(256);
      var sum=0;
      for (var i=0;i<256;i++){ sum += hist[i]+redistr; lut[i] = Math.round(sum*255/n); }
      luts[ty*tiles+tx] = lut;
    }
  }

  // 행(y), 열(x)별 보간 인덱스/가중치 사전계산 (루프 안에서 반복계산 제거)
  var ty0Arr = new Int32Array(h), ty1Arr = new Int32Array(h), wyArr = new Float64Array(h);
  for (var y=0; y<h; y++){
    var fy = y/th - 0.5;
    var t0 = Math.max(0, Math.min(tiles-1, Math.floor(fy)));
    ty0Arr[y]=t0; ty1Arr[y]=Math.max(0, Math.min(tiles-1, t0+1)); wyArr[y]=Math.max(0, Math.min(1, fy-t0));
  }
  var tx0Arr = new Int32Array(w), tx1Arr = new Int32Array(w), wxArr = new Float64Array(w);
  for (var x=0; x<w; x++){
    var fx = x/tw - 0.5;
    var t0x = Math.max(0, Math.min(tiles-1, Math.floor(fx)));
    tx0Arr[x]=t0x; tx1Arr[x]=Math.max(0, Math.min(tiles-1, t0x+1)); wxArr[x]=Math.max(0, Math.min(1, fx-t0x));
  }

  for (var y=0; y<h; y++){
    var ty0=ty0Arr[y], ty1=ty1Arr[y], wy=wyArr[y], wy1=1-wy;
    var lutRow0Base = ty0*tiles, lutRow1Base = ty1*tiles;
    var rowBase = y*w*4;
    for (var x=0; x<w; x++){
      var tx0=tx0Arr[x], tx1=tx1Arr[x], wx=wxArr[x], wx1=1-wx;
      var idx = rowBase+x*4;
      var v = data[idx];
      var v00=luts[lutRow0Base+tx0][v], v01=luts[lutRow0Base+tx1][v];
      var v10=luts[lutRow1Base+tx0][v], v11=luts[lutRow1Base+tx1][v];
      var val = v00*wy1*wx1 + v01*wy1*wx + v10*wy*wx1 + v11*wy*wx;
      data[idx]=data[idx+1]=data[idx+2]=val+0.5|0;
    }
  }
  ctx.putImageData(imgData, 0, 0);
  return canvas;
};

// 이미지를 캔버스로 변환 (기준 크기)
MLL._imgToCanvas = function(img, maxDim){
  var nw = img.naturalWidth, nh = img.naturalHeight;
  var scale = maxDim ? Math.min(1, maxDim/Math.max(nw,nh)) : 1;
  var canvas = document.createElement('canvas');
  canvas.width = Math.round(nw*scale);
  canvas.height = Math.round(nh*scale);
  canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
  return canvas;
};

MLL.loadImageEl = function(src){
  return new Promise(function(res, rej){
    var img = new Image();
    img.onload = function(){ res(img); };
    img.onerror = rej;
    img.src = src;
  });
};

// 이미지 1장에 대해 검증된 다단계 전략을 순차 시도, 성공하면 즉시 반환
// 빠른 단계부터 시도하고, 느린 CLAHE는 정말 필요할 때만(최후수단) 원본 해상도로 시도한다.
// (주의: CLAHE는 다운스케일된 이미지에서는 효과가 크게 떨어지므로 반드시 원본 해상도에 적용해야 한다)
MLL.decodeQrFromImage = async function(img, onProgress){
  function report(label){ if (onProgress) try{ onProgress(label); }catch(e){} }

  var workCanvas = MLL._imgToCanvas(img, 2000);

  report('이미지 분석 중');
  var text = await MLL._decodeCanvas(workCanvas);
  if (text) return text;

  var grayCanvas = MLL._toGrayCanvas(workCanvas);
  text = await MLL._decodeCanvas(grayCanvas);
  if (text) return text;

  report('밝기 보정 중');
  var eqCanvas = MLL._equalizeHistCanvas(grayCanvas);
  text = await MLL._decodeCanvas(eqCanvas);
  if (text) return text;

  report('기울기 보정 중');
  for (var k=0; k<3; k++) {
    var angle = [90,180,270][k];
    var rotated = MLL._rotateCanvas(workCanvas, angle);
    text = await MLL._decodeCanvas(rotated);
    if (text) return text;
  }

  report('확대해서 재시도 중');
  var baseDim = Math.max(workCanvas.width, workCanvas.height);
  var scales = [1.5, 2.0, 3.0].filter(function(s){ return baseDim*s <= 4000; });
  for (var i=0; i<scales.length; i++) {
    var scaled = MLL._scaleCanvas(workCanvas, scales[i]);
    text = await MLL._decodeCanvas(scaled);
    if (text) return text;
  }

  // CLAHE는 다운스케일하면 효과가 거의 사라지므로, 원본 전체 해상도 그레이스케일로 별도 처리
  // (이미지가 매우 큰 경우 시간이 좀 걸릴 수 있어 진행 안내를 표시한다)
  report('정밀 대비 보정 중 (사진에 따라 몇 초 걸릴 수 있어요)');
  var fullCanvas = document.createElement('canvas');
  fullCanvas.width = img.naturalWidth; fullCanvas.height = img.naturalHeight;
  fullCanvas.getContext('2d').drawImage(img, 0, 0);
  var fullGrayCanvas = MLL._toGrayCanvas(fullCanvas);

  var claheCombos = [{clip:2.0, tiles:8}, {clip:3.0, tiles:8}, {clip:2.0, tiles:12}, {clip:1.5, tiles:10}, {clip:2.5, tiles:6}];
  for (var j=0; j<claheCombos.length; j++) {
    var c = claheCombos[j];
    var claheCanvas = MLL._claheCanvas(fullGrayCanvas, c.clip, c.tiles);
    text = await MLL._decodeCanvas(claheCanvas);
    if (text) return text;
  }

  return null;
};

// 동행복권 QR URL 파싱 (회차 + [수동/자동/반자동] 조합들)
MLL.parseLottoQrUrl = function(url){
  try {
    var match = url.match(/[?&]v=([^&]+)/); if (!match) return null;
    var v = match[1];
    var roundMatch = v.match(/^(\d+)/); if (!roundMatch) return null;
    var round = parseInt(roundMatch[1]);
    var combos = []; var pat = /([mqs])(\d{12})/g; var m;
    while ((m = pat.exec(v)) !== null) {
      var type = m[1]==='m' ? '수동' : m[1]==='q' ? '자동' : '반자동';
      var nums = []; for (var i=0;i<12;i+=2) nums.push(parseInt(m[2].slice(i,i+2)));
      if (nums.length===6 && nums.every(function(n){return n>=1&&n<=45;}) && new Set(nums).size===6)
        combos.push({ type:type, nums:nums });
    }
    if (!round || !combos.length) return null;
    return { round:round, combos:combos };
  } catch(e) { return null; }
};




RS.parseLottoQrUrl = function(url) {
  try {
    var match = url.match(/[?&]v=([^&]+)/);
    if (!match) return null;
    var v = match[1];
    var roundMatch = v.match(/^(\d+)/);
    if (!roundMatch) return null;
    var round = parseInt(roundMatch[1]);
    var combos = [];
    var pat = /([mqs])(\d{12})/g;
    var m;
    while ((m = pat.exec(v)) !== null) {
      var type = m[1] === 'm' ? '수동' : m[1] === 'q' ? '자동' : '반자동';
      var nums = [];
      for (var i = 0; i < 12; i += 2) nums.push(parseInt(m[2].slice(i, i + 2)));
      if (nums.length === 6 && nums.every(function(n) { return n >= 1 && n <= 45; }) && new Set(nums).size === 6) {
        combos.push({ type: type, nums: nums });
      }
    }
    if (!round || !combos.length) return null;
    return { round: round, combos: combos };
  } catch (e) { return null; }
};

RS.zxingDecode = function(imageData, w, h) {
  return new Promise(function(resolve) {
    try {
      var hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      var reader = new ZXing.MultiFormatReader();
      reader.setHints(hints);
      var src = new ZXing.RGBLuminanceSource(imageData.data, w, h);
      var bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
      resolve(reader.decode(bitmap).getText());
    } catch (e) { resolve(null); }
  });
};

RS.loadImageEl = function(src) {
  return new Promise(function(res, rej) {
    var img = new Image();
    img.onload = function() { res(img); };
    img.onerror = rej;
    img.src = src;
  });
};

// 지정된 가로/세로 크기로 캔버스에 그린 뒤 BarcodeDetector → zxing 순서로 디코딩 시도
RS.tryDecodeImage = async function(img, w, h) {
  var canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);

  if ('BarcodeDetector' in window) {
    try {
      var det = new BarcodeDetector({ formats: ['qr_code'] });
      var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/jpeg', 0.95); });
      var bmp = await createImageBitmap(blob);
      var codes = await det.detect(bmp);
      if (codes.length > 0) return codes[0].rawValue;
    } catch (e) {}
  }
  try {
    var imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
    var text = await RS.zxingDecode(imageData, canvas.width, canvas.height);
    if (text) return text;
  } catch (e) {}
  return null;
};

// 인식된 회차/조합을 결과로 저장 (camera_qr.html과 동일하게 확인 단계 없이 즉시 저장)
RS.saveQrCombos = async function(round, combos, sourceTag) {
  for (var i = 0; i < combos.length; i++) {
    var c = combos[i];
    var result = await MLL.addFavoriteDirect({ round: round, nums: c.nums.slice(), type: c.type, isReal: true, memo: 'QR인식', inputMethod: sourceTag === 'qr' ? 'camera' : 'image' });
    if (result._failed && !result.message) return; // 로그인 필요 모달이 이미 떴음 — 더 이상 진행하지 않음
  }
  RS.renderFavoritesBody();
};

RS.renderManualUrlBox = function(prefix) {
  return '<div class="url-row">' +
    '<input class="url-in" id="manual-url-'+prefix+'" placeholder="QR 안의 URL을 직접 붙여넣어 주세요 (예: https://m.dhlottery.co.kr/...)">' +
    '<button class="btn-url-parse" onclick="RS.parseManualUrl(\''+prefix+'\')">분석</button>' +
  '</div>';
};

RS.parseManualUrl = function(prefix) {
  var input = document.getElementById('manual-url-'+prefix);
  var text = input ? input.value.trim() : '';
  if (!text) return;
  var msgEl = document.getElementById('acc-msg-'+prefix);
  var parsed = RS.parseLottoQrUrl(text);
  if (parsed) {
    RS.saveQrCombos(parsed.round, parsed.combos, prefix);
    RS.showAccMsg(msgEl, 'success', '✅ 파싱 성공! 제'+parsed.round+'회 '+parsed.combos.length+'개 저장됨');
    input.value = '';
  } else {
    RS.showAccMsg(msgEl, 'error', '인식 실패. 동행복권 QR URL인지 확인해주세요.');
  }
};

// ── 3) 이미지 업로드: 여러 장 동시 선택 → 순차 처리 (camera_qr.html과 동일한 큐 방식) ──
RS.imgQueue = [];
RS.imgIsProcessing = false;

RS.renderImageInputBody = function() {
  return '' +
    '<div style="background:#fff8e1;border:1px solid #f5c518;border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:10px;color:#7a5e00;line-height:1.8;">' +
      '💡 여러 장 동시 선택 가능 · 인식 성공 시 <b>자동으로 최애번호 저장</b>됩니다<br>' +
      '📱 스마트폰에서 가장 잘 인식됩니다' +
    '</div>' +
    '<div class="img-upload-area" id="img-drop-area" onclick="document.getElementById(\'img-file-input\').click()" ' +
      'ondragover="RS.onImgDrag(event,true)" ondragleave="RS.onImgDrag(event,false)" ondrop="RS.onImgDrop(event)">' +
      '<div style="font-size:28px;margin-bottom:6px;">📷</div>' +
      '<div style="font-size:12px;color:#555;">로또 용지 사진 클릭 또는 드래그</div>' +
      '<div style="font-size:10px;color:#999;margin-top:4px;">여러 장 동시 선택 가능 · JPG · PNG · HEIC</div>' +
    '</div>' +
    '<input type="file" id="img-file-input" accept="image/*" multiple style="display:none;" onchange="RS.onImgSelect(this)">' +
    '<div id="img-proc-status" style="background:#e8f4ff;border:1px solid #1a7ad4;border-radius:8px;padding:10px 12px;margin-bottom:8px;display:none;">' +
      '<div id="img-proc-text" style="font-size:10px;color:#1a5a9e;font-weight:600;">처리 중...</div>' +
      '<div style="height:6px;background:#ddd;border-radius:3px;margin:6px 0;"><div id="img-proc-bar" style="height:100%;background:#1a7ad4;border-radius:3px;width:0%;transition:width 0.3s;"></div></div>' +
    '</div>' +
    '<div id="acc-msg-image" class="acc-msg"></div>' +
    '<div id="img-preview-area"></div>';
};

RS.onImgDrag = function(e, over) {
  e.preventDefault();
  var area = document.getElementById('img-drop-area');
  if (area) area.classList.toggle('dragover', over);
};

RS.onImgDrop = function(e) {
  e.preventDefault();
  RS.onImgDrag(e, false);
  RS.addImages(Array.from(e.dataTransfer.files));
};

RS.onImgSelect = function(inp) {
  if (inp.files.length) RS.addImages(Array.from(inp.files));
  inp.value = '';
};

RS.addImages = function(files) {
  var msgEl = document.getElementById('acc-msg-image');
  var imgs = files.filter(function(f) { return f.type.startsWith('image/'); });
  if (!imgs.length) { RS.showAccMsg(msgEl, 'error', '이미지 파일만 업로드 가능합니다.'); return; }
  imgs.forEach(function(f) { RS.imgQueue.push(f); });
  if (!RS.imgIsProcessing) RS.processImgQueue();
};

RS.processImgQueue = async function() {
  if (!RS.imgQueue.length) { RS.imgIsProcessing = false; RS.hideImgProcStatus(); return; }
  RS.imgIsProcessing = true;
  var file = RS.imgQueue.shift();
  var msgEl = document.getElementById('acc-msg-image');
  RS.showImgProcStatus('"'+file.name+'" 인식 중...', 30);

  try {
    var url = URL.createObjectURL(file);
    var img = await MLL.loadImageEl(url);
    URL.revokeObjectURL(url);

    var qrText = await MLL.decodeQrFromImage(img, function(stage){
      RS.showImgProcStatus('"'+file.name+'" '+stage+'...', 50);
    });

    if (qrText) {
      var parsed = RS.parseLottoQrUrl(qrText);
      if (parsed) {
        RS.saveQrCombos(parsed.round, parsed.combos, 'image');
        RS.showAccMsg(msgEl, 'success', '✅ "'+file.name+'" 인식 성공! 제'+parsed.round+'회 '+parsed.combos.length+'개 저장됨');
      } else {
        RS.showAccMsg(msgEl, 'error', '"'+file.name+'" — 로또 QR이 아닙니다');
      }
    } else {
      RS.showAccMsg(msgEl, 'error', '"'+file.name+'" — QR 인식 실패. QR 부분을 크게, 또렷하게 다시 찍어주세요');
    }
  } catch (e) {
    RS.showAccMsg(msgEl, 'error', '"'+file.name+'" 오류: '+e.message);
  }
  RS.setImgProgress(100);
  setTimeout(function() { RS.processImgQueue(); }, 100);
};

RS.showImgProcStatus = function(text, pct) {
  var box = document.getElementById('img-proc-status');
  var txt = document.getElementById('img-proc-text');
  var bar = document.getElementById('img-proc-bar');
  if (box) box.style.display = 'block';
  if (txt) txt.textContent = text;
  if (bar) bar.style.width = pct + '%';
};
RS.hideImgProcStatus = function() {
  setTimeout(function() {
    var box = document.getElementById('img-proc-status');
    if (box) box.style.display = 'none';
  }, 1500);
};
RS.setImgProgress = function(pct) {
  var bar = document.getElementById('img-proc-bar');
  if (bar) bar.style.width = pct + '%';
};

// ── 4) QR 스캔: 카메라 실시간 인식 (html5-qrcode, camera_qr.html과 동일 설정) ──
RS.html5Qr = null;
RS.qrZoomLevel = 1.0;

RS.renderQrInputBody = function() {
  return '' +
    '<div class="qr-guide-box" id="qr-guide-box">' +
      '<div style="font-size:28px;margin-bottom:6px;">📱</div>' +
      '<div style="font-size:12px;font-weight:700;color:#5a3db8;margin-bottom:4px;">QR 자동 인식 → 자동 저장</div>' +
      '<div style="font-size:10px;color:#666;line-height:1.7;">로또 용지 QR코드를 카메라에 비추면<br>인식 즉시 <b>최애번호로 자동 저장</b>됩니다</div>' +
    '</div>' +
    '<div id="qr-reader" style="display:none;width:100%;margin-bottom:8px;border-radius:8px;overflow:hidden;"></div>' +
    '<div id="qr-zoom-wrap" style="background:#f8f8f8;border:1px solid #eee;border-radius:7px;padding:8px 10px;margin-bottom:8px;display:none;">' +
      '<div style="font-size:10px;color:#555;font-weight:600;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;">' +
        '<span>🔍 디지털 줌</span><span id="qr-zoom-val" style="color:#7048e8;font-weight:700;">1.0x</span>' +
      '</div>' +
      '<input type="range" id="qr-zoom-slider" min="10" max="40" value="10" step="1" style="width:100%;" oninput="RS.onQrZoom(this.value)">' +
    '</div>' +
    '<div class="qr-btns">' +
      '<button class="btn-qr btn-qr-start" id="qr-start-btn" onclick="RS.startQrScan()">📷 QR 스캔 시작</button>' +
      '<button class="btn-qr btn-qr-stop" id="qr-stop-btn" onclick="RS.stopQrScan()" style="display:none;">⏹ 종료</button>' +
    '</div>' +
    '<div id="acc-msg-qr" class="acc-msg"></div>' +
    '<div style="border-top:1px dashed #ddd;margin:8px 0;padding-top:8px;">' +
      '<div style="font-size:10px;color:#999;margin-bottom:5px;">📋 스마트폰으로 스캔한 URL 직접 붙여넣기</div>' +
      RS.renderManualUrlBox('qr') +
    '</div>';
};

RS.onQrZoom = function(val) {
  RS.qrZoomLevel = val / 10;
  var zv = document.getElementById('qr-zoom-val');
  if (zv) zv.textContent = RS.qrZoomLevel.toFixed(1) + 'x';
  if (RS.html5Qr) {
    try { RS.html5Qr.applyVideoConstraints({ advanced: [{ zoom: RS.qrZoomLevel }] }); } catch (e) {}
  }
};

RS.startQrScan = async function() {
  var msgEl = document.getElementById('acc-msg-qr');
  if (typeof Html5Qrcode === 'undefined') {
    RS.showAccMsg(msgEl, 'error', 'QR 인식 라이브러리를 불러오지 못했습니다. 네트워크를 확인하거나, URL을 직접 붙여넣어 주세요.');
    return;
  }
  try {
    document.getElementById('qr-guide-box').style.display = 'none';
    document.getElementById('qr-reader').style.display = 'block';
    document.getElementById('qr-start-btn').style.display = 'none';
    document.getElementById('qr-stop-btn').style.display = 'block';
    document.getElementById('qr-zoom-wrap').style.display = 'block';

    RS.html5Qr = new Html5Qrcode('qr-reader');
    await RS.html5Qr.start(
      { facingMode: 'environment' },
      { fps: 15, qrbox: { width: 230, height: 230 }, aspectRatio: 1.0, experimentalFeatures: { useBarCodeDetectorIfSupported: true } },
      function(text) { RS.handleQrScanSuccess(text); },
      function() {}
    );
    RS.showAccMsg(msgEl, 'info', '📷 QR코드를 화면 중앙에 맞춰주세요!');
  } catch (e) {
    document.getElementById('qr-guide-box').style.display = 'block';
    document.getElementById('qr-reader').style.display = 'none';
    document.getElementById('qr-start-btn').style.display = 'block';
    document.getElementById('qr-stop-btn').style.display = 'none';
    document.getElementById('qr-zoom-wrap').style.display = 'none';
    RS.showAccMsg(msgEl, 'error', '카메라를 사용할 수 없습니다. URL 붙여넣기를 이용해주세요.');
  }
};

RS.stopQrScan = async function() {
  if (RS.html5Qr) {
    try { await RS.html5Qr.stop(); RS.html5Qr.clear(); } catch (e) {}
    RS.html5Qr = null;
  }
  var reader = document.getElementById('qr-reader');
  if (reader) { reader.style.display = 'none'; reader.innerHTML = ''; }
  var guide = document.getElementById('qr-guide-box');
  if (guide) guide.style.display = 'block';
  var startBtn = document.getElementById('qr-start-btn');
  var stopBtn = document.getElementById('qr-stop-btn');
  if (startBtn) startBtn.style.display = 'block';
  if (stopBtn) stopBtn.style.display = 'none';
  var zoomWrap = document.getElementById('qr-zoom-wrap');
  if (zoomWrap) zoomWrap.style.display = 'none';
  var zoomSlider = document.getElementById('qr-zoom-slider');
  if (zoomSlider) zoomSlider.value = 10;
  RS.qrZoomLevel = 1.0;
  var zv = document.getElementById('qr-zoom-val');
  if (zv) zv.textContent = '1.0x';
};

RS.handleQrScanSuccess = function(text) {
  if (!text) return;
  if (text.includes('dhlottery') || text.includes('qr.dh')) {
    var parsed = RS.parseLottoQrUrl(text);
    if (parsed) {
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      RS.saveQrCombos(parsed.round, parsed.combos, 'qr');
      RS.stopQrScan();
      var msgEl = document.getElementById('acc-msg-qr');
      RS.showAccMsg(msgEl, 'success', '✅ QR 인식 성공! 제'+parsed.round+'회 '+parsed.combos.length+'개 저장됨');
    }
  }
};

RS.initAddInputHandlers = function() {
  // 섹션 재진입 시 진행 중인 카메라 스트림은 정리
  RS.stopQrScan();
};

RS.SECTION_RENDERERS.favorites = RS.renderFavorites;

<script>
// 마킹용지 PDF 생성 — makinglotto.com 인증정보는 이제 서버(Render)
// 환경변수(MAKINGLOTTO_USER/MAKINGLOTTO_PASS)로 옮겨졌고, marking.js가 프록시합니다.
// 프론트는 우리 서버(/api/marking/generate)만 호출합니다.

if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.API_BASE = MLL.API_BASE || 'https://my-lotto-lab-api.onrender.com';

MLL.MARKING_CONFIG = {
  chunkSize: 15,
  pageSize: 15,          // makinglotto.com이 이미지를 바꿀 수 있는 실제 단위(페이지=전표 3매).
                         // 이 값을 넘게 이미지를 선택해도 실제로는 쓰이지 않으므로, 선택 개수 자체를 여기서 제한한다.
  defaultCid: '158',
  pricePerSheet: 300,   // 전표용지 1매당 300원
  gamesPerSheet: 5,      // 마킹용지 1매(A~E)에 들어가는 게임(번호조합) 수
  extraImagePrice: 500, // 이미지 1개 추가(2개째부터)당 500원
  imageBasePath: ''
};

// ── 캐릭터 목록(이미지 폴더 스캔 대체: 정적 목록, 실제로는 145개 PNG 파일과 1:1) ──
MLL.getAvailableCharacterIds = function(){
  if (typeof MLL_CHAR_NAMES === 'undefined') return [];
  return Object.keys(MLL_CHAR_NAMES).map(Number).sort(function(a,b){return a-b;});
};
MLL.getCharacterName = function(cid){
  if (typeof MLL_CHAR_NAMES === 'undefined') return '';
  return MLL_CHAR_NAMES[String(cid)] || '';
};

// ── 캐릭터 선택 모달 상태 ──
MLL.markingState = { selectedCids: [], pendingRows: null, pendingFileBase: 'lotto_marking' };

MLL.openMarkingModal = function(rows, fileBase){
  if (!rows || !rows.length) { alert('받을 번호조합이 없습니다.'); return; }
  MLL.markingState.pendingRows = rows;
  MLL.markingState.pendingFileBase = fileBase || 'lotto_marking';
  MLL.markingState.selectedCids = [];
  MLL._renderMarkingModal();
  document.getElementById('mllMarkingModal').style.display = 'flex';
};

MLL._ensureMarkingModalDom = function(){
  if (document.getElementById('mllMarkingModal')) return;
  var overlay = document.createElement('div');
  overlay.id = 'mllMarkingModal';
  overlay.className = 'modal-overlay';
  // 외부 페이지의 CSS(부모 transform/contain 등)에 의해 position:fixed가 깨지는 것을 방지하기 위해
  // 핵심 위치 속성을 인라인 스타일로 강제 지정 (외부 스타일시트보다 우선 적용됨)
  overlay.setAttribute('style', 'position:fixed !important;top:0 !important;left:0 !important;right:0 !important;bottom:0 !important;width:100vw;height:100vh;background:rgba(0,0,0,.65);z-index:999999;display:none;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;');
  overlay.innerHTML =
    '<div class="modal-box" style="position:relative;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;background:#11152a;border:1px solid #252b48;border-radius:16px;padding:24px;box-sizing:border-box;">' +
      '<button class="modal-close-x" style="position:absolute;top:20px;right:20px;background:none;border:none;color:#5a6080;font-size:18px;cursor:pointer;" onclick="MLL.closeMarkingModal()">✕</button>' +
      '<h3 style="font-size:16px;font-weight:700;margin-bottom:8px;color:#eef0f6;display:flex;align-items:center;gap:7px;"><span style="font-size:18px;">🖨️</span> 로또인쇄 — 마킹용지 PDF로 받기</h3>' +
      '<p style="font-size:11.5px;color:#8b91ab;line-height:1.7;margin-bottom:8px;">실물 로또 판매점에 바로 제출 가능한 마킹용지 형태로 출력합니다.</p>' +
      '<div id="mllMarkingGuide" style="font-size:11.5px;color:#e0b341;background:rgba(224,179,65,.08);border:1px solid rgba(224,179,65,.25);border-radius:8px;padding:8px 11px;margin-bottom:12px;line-height:1.6;"></div>' +
      '<div id="mllCharGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-height:320px;overflow-y:auto;padding:4px;border:1px solid #252b48;border-radius:10px;margin-bottom:14px;"></div>' +
      '<div id="mllMarkingPriceBox" style="font-size:12.5px;color:#8b91ab;margin-bottom:12px;"></div>' +
      '<div id="mllMarkingResultBox" style="margin-top:10px;padding:11px 14px;border-radius:9px;font-size:12px;display:none;"></div>' +
      '<button class="btn" style="width:100%;background:#2FBFA3;color:#fff;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;" onclick="MLL.submitMarkingRequest()">PDF 생성하기</button>' +
    '</div>';
  overlay.addEventListener('click', function(e){ if (e.target === overlay) MLL.closeMarkingModal(); });
  document.body.appendChild(overlay);
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') MLL.closeMarkingModal();
  });
};



MLL._renderMarkingModal = function(){
  MLL._ensureMarkingModalDom();
  var cfg = MLL.MARKING_CONFIG;
  var gameCount = (MLL.markingState.pendingRows||[]).length;
  var maxUsefulImages = Math.max(1, Math.ceil(gameCount / cfg.pageSize));
  var sheetsPerPage = Math.round(cfg.pageSize / cfg.gamesPerSheet);
  document.getElementById('mllMarkingGuide').innerHTML =
    '💡 지금 게임 수(' + gameCount + '게임) 기준으로 <b>이미지 ' + maxUsefulImages + '개</b>까지 선택할 수 있으며, ' +
    '전표 ' + sheetsPerPage + '매씩 같은 이미지로 인쇄됩니다.';
  var ids = MLL.getAvailableCharacterIds();
  var grid = document.getElementById('mllCharGrid');
  grid.innerHTML = ids.map(function(id){
    var name = MLL.getCharacterName(id);
    return '<div class="mll-char-card" data-cid="'+id+'" onclick="MLL.toggleCharacter('+id+')" style="cursor:pointer;border:2px solid var(--border,#252b48);border-radius:8px;overflow:hidden;text-align:center;background:var(--surface-2,#161b35);">' +
      '<img src="'+MLL.MARKING_CONFIG.imageBasePath+id+'.png" style="width:100%;aspect-ratio:2/1;object-fit:cover;display:block;" loading="lazy">' +
      '<div style="font-size:9px;padding:3px 2px;color:var(--text-dim,#8b91ab);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+id+(name?(' '+name.slice(0,8)):'')+'</div>' +
    '</div>';
  }).join('');
  MLL._updateMarkingPriceBox();
};

MLL.toggleCharacter = function(cid){
  var s = MLL.markingState;
  var cfg = MLL.MARKING_CONFIG;
  var idx = s.selectedCids.indexOf(cid);
  if (idx>=0) {
    s.selectedCids.splice(idx,1);
  } else {
    var gameCount = (s.pendingRows||[]).length;
    var maxUsefulImages = Math.max(1, Math.ceil(gameCount / cfg.pageSize));
    if (s.selectedCids.length >= maxUsefulImages) {
      alert('지금 게임 수(' + gameCount + '게임)로는 이미지를 최대 ' + maxUsefulImages + '개까지만 실제로 쓸 수 있어요.\n(이미지는 15게임=용지 3매 단위로만 바뀝니다)');
      return;
    }
    s.selectedCids.push(cid);
  }
  document.querySelectorAll('.mll-char-card').forEach(function(el){
    var on = s.selectedCids.indexOf(parseInt(el.dataset.cid))>=0;
    el.style.borderColor = on ? '#2FBFA3' : 'var(--border,#252b48)';
    el.style.boxShadow = on ? '0 0 0 2px rgba(47,191,163,.3)' : 'none';
  });
  MLL._updateMarkingPriceBox();
};

MLL._updateMarkingPriceBox = function(){
  var rows = MLL.markingState.pendingRows || [];
  var cfg = MLL.MARKING_CONFIG;
  var gameCount = rows.length;
  var sheetCount = Math.ceil(gameCount / cfg.gamesPerSheet); // 5게임당 1매, 나머지가 있으면 올림(1매 더)
  var maxUsefulImages = Math.max(1, Math.ceil(gameCount / cfg.pageSize));
  var imgCount = Math.max(1, Math.min(MLL.markingState.selectedCids.length, maxUsefulImages));
  var sheetCost = sheetCount * cfg.pricePerSheet;
  var extraImgCost = Math.max(0, imgCount-1) * cfg.extraImagePrice;
  var total = sheetCost + extraImgCost;
  document.getElementById('mllMarkingPriceBox').innerHTML =
    gameCount+'게임 → 용지 '+sheetCount+'매('+cfg.gamesPerSheet+'게임/매) × '+cfg.pricePerSheet.toLocaleString()+'원 = '+sheetCost.toLocaleString()+'원' +
    (extraImgCost>0 ? ' + 이미지 추가 '+(imgCount-1)+'개 × '+cfg.extraImagePrice.toLocaleString()+'원 = '+extraImgCost.toLocaleString()+'원' : ' (이미지 1개는 무료)') +
    '<br><b style="color:#2FBFA3;font-size:14px;">합계: '+total.toLocaleString()+'원</b>' +
    '<div style="font-size:10px;color:var(--text-faint,#5a6080);margin-top:4px;">💡 이미지는 15게임(용지 3매)마다 바뀝니다 — 지금은 최대 '+maxUsefulImages+'개까지 의미있게 선택 가능해요.</div>' +
    '<div style="font-size:10px;color:var(--text-faint,#5a6080);margin-top:2px;">⚠️ 테스트 모드: 현재는 실제 포인트 차감 없이 동작만 확인합니다. (서버 구축 후 정식 차감 적용)</div>';
};

MLL.closeMarkingModal = function(){
  var el = document.getElementById('mllMarkingModal');
  if (el) el.style.display = 'none';
};

MLL._showMarkingResult = function(type, msg){
  var box = document.getElementById('mllMarkingResultBox');
  box.style.display = 'block';
  box.style.background = type==='error' ? 'rgba(212,83,94,.1)' : 'rgba(63,179,127,.1)';
  box.style.border = '1px solid ' + (type==='error' ? 'rgba(212,83,94,.25)' : 'rgba(63,179,127,.25)');
  box.style.color = type==='error' ? '#D4537E' : '#3FB37F';
  box.textContent = msg;
};

// ── makinglotto.com 연동 ──
MLL.submitMarkingRequest = function(){
  var rows = MLL.markingState.pendingRows;
  if (!rows || !rows.length) { MLL._showMarkingResult('error','받을 번호조합이 없습니다.'); return; }
  MLL._showMarkingResult('success', '⏳ PDF 생성 요청 중입니다... (여러 페이지인 경우 다소 시간이 걸려요)');
  MLL._runMarkingPipeline(rows, MLL.markingState.selectedCids, MLL.markingState.pendingFileBase);
};

MLL._runMarkingPipeline = async function(rows, cids, fileBase){
  var cfg = MLL.MARKING_CONFIG;
  if (!cids || !cids.length) cids = [parseInt(cfg.defaultCid)];

  try {
    MLL._showMarkingResult('success', '⏳ PDF 생성 중입니다... (여러 페이지인 경우 다소 시간이 걸려요)');

    var resp = await fetch(MLL.API_BASE + '/api/marking/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows: rows, cids: cids })
    });

    if (!resp.ok) {
      var errData = await resp.json().catch(function(){ return {}; });
      throw new Error(errData.error || ('서버 응답 오류 (코드 ' + resp.status + ')'));
    }

    var blob = await resp.blob();
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileBase + '_마킹용지.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    var pageCount = Math.ceil(rows.length / cfg.chunkSize);
    MLL._showMarkingResult('success', '✅ 마킹용지 PDF 생성 완료! ('+rows.length+'게임, '+pageCount+'페이지)');
  } catch(e) {
    MLL._showMarkingResult('error', '⚠️ PDF 생성 실패: ' + e.message);
    console.error('[MLL marking] error:', e);
  }
};






</script>
<script src="https://my-lotto-lab-api.onrender.com/pay/auth_gate.js"></script>
