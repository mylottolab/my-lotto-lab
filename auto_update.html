<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 자동 업데이트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:#0f0f1a;color:#fff;font-size:13px;min-height:100vh;}
.header-inner{max-width:960px;margin:0 auto;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;background:#1c1c2e;border-radius:0 0 8px 8px;}
.logo-left{display:flex;align-items:center;gap:9px;}
.logo-icon{width:30px;height:30px;background:#e03131;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text .title{font-size:14px;font-weight:700;color:#fff;}
.logo-text .sub{font-size:9px;color:#aaa;}
.btn-back{background:none;border:1px solid #555;color:#ccc;padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;}
.main{max-width:700px;margin:20px auto;padding:0 14px;}
.card{background:#1c1c2e;border:1px solid #2a2a40;border-radius:12px;padding:20px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* 상태 표시 */
.status-big{text-align:center;padding:24px 0;}
.status-icon{font-size:56px;margin-bottom:10px;}
.status-text{font-size:18px;font-weight:700;margin-bottom:6px;}
.status-sub{font-size:12px;color:#888;}
.status-wait .status-text{color:#888;}
.status-watching .status-text{color:#f5c518;}
.status-checking .status-text{color:#1a7ad4;}
.status-done .status-text{color:#2f9e44;}
.status-error .status-text{color:#e03131;}

/* 시계 */
.clock-box{background:#0f0f1a;border:1px solid #2a2a40;border-radius:8px;padding:10px 16px;text-align:center;margin-bottom:10px;}
.clock{font-size:28px;font-weight:700;color:#f5c518;letter-spacing:2px;font-family:monospace;}
.clock-date{font-size:11px;color:#888;margin-top:2px;}

/* 다음 체크 카운트다운 */
.next-check{background:#0f0f1a;border:1px solid #2a2a40;border-radius:8px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.next-check-label{font-size:11px;color:#888;}
.next-check-val{font-size:14px;font-weight:700;color:#1a7ad4;font-family:monospace;}

/* 진행 바 */
.prog-wrap{height:6px;background:#2a2a40;border-radius:3px;margin-bottom:14px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,#1a7ad4,#7048e8);border-radius:3px;transition:width 0.5s;}

/* 인터벌 버튼 */
.interval-btns{display:flex;gap:8px;margin-bottom:12px;}
.ibtn{flex:1;background:#0f0f1a;border:1px solid #333;color:#888;border-radius:6px;padding:7px;font-size:11px;font-weight:600;cursor:pointer;}
.ibtn.active{border-color:#1a7ad4;color:#1a7ad4;background:#0d1a2b;}

/* 컨트롤 버튼 */
.ctrl-btns{display:flex;gap:8px;}
.btn-start{flex:2;background:#2f9e44;color:#fff;border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-stop{flex:1;background:#e03131;color:#fff;border:none;border-radius:7px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-manual{width:100%;background:#7048e8;color:#fff;border:none;border-radius:7px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;}

/* 로그 */
.log-wrap{max-height:280px;overflow-y:auto;background:#0f0f1a;border:1px solid #2a2a40;border-radius:8px;padding:10px;}
.log-item{font-size:10px;padding:3px 0;border-bottom:1px solid #1a1a2e;display:flex;gap:8px;line-height:1.5;}
.log-item:last-child{border-bottom:none;}
.log-time{color:#555;white-space:nowrap;font-family:monospace;}
.log-msg{color:#ccc;flex:1;}
.log-msg.ok{color:#6fcf97;}
.log-msg.err{color:#ff8a8a;}
.log-msg.info{color:#74b9ff;}
.log-msg.warn{color:#f5c518;}

/* 결과 요약 */
.result-summary{display:none;background:#0d2b1a;border:1px solid #2f9e44;border-radius:8px;padding:12px;margin-top:10px;}
.result-summary.show{display:block;}
.rs-title{font-size:12px;font-weight:700;color:#6fcf97;margin-bottom:8px;}
.rs-row{display:flex;justify-content:space-between;font-size:11px;color:#aaa;margin-bottom:3px;}
.rs-row .val{color:#fff;font-weight:700;}
.balls-row{display:flex;gap:3px;margin:8px 0;align-items:center;}
.ball-sm{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-left">
      <div class="logo-icon">🔄</div>
      <div class="logo-text">
        <div class="title">My Lotto Lab</div>
        <div class="sub">자동 업데이트 시스템</div>
      </div>
    </div>
    <button class="btn-back" onclick="location.href='admin.html'">← 관리자</button>
  </div>
</div>

<div class="main">

  <!-- 현재 시각 -->
  <div class="card">
    <div class="clock-box">
      <div class="clock" id="clock">--:--:--</div>
      <div class="clock-date" id="clockDate"></div>
    </div>

    <!-- 상태 -->
    <div class="status-big status-wait" id="statusBox">
      <div class="status-icon" id="statusIcon">⏳</div>
      <div class="status-text" id="statusText">대기 중</div>
      <div class="status-sub" id="statusSub">시작 버튼을 누르거나 토요일 20:50에 자동 시작됩니다</div>
    </div>

    <!-- 다음 체크까지 -->
    <div class="next-check" id="nextCheckBox" style="display:none;">
      <span class="next-check-label">⏱ 다음 체크까지</span>
      <span class="next-check-val" id="nextCheckVal">--:--</span>
    </div>
    <div class="prog-wrap" id="progWrap" style="display:none;">
      <div class="prog-bar" id="progBar" style="width:0%"></div>
    </div>

    <!-- 체크 간격 -->
    <div class="card-title" style="margin-top:4px;">⚙️ 체크 간격</div>
    <div class="interval-btns">
      <button class="ibtn" id="ib1" onclick="setInterval2(1)">1분</button>
      <button class="ibtn active" id="ib5" onclick="setInterval2(5)">5분</button>
      <button class="ibtn" id="ib10" onclick="setInterval2(10)">10분</button>
    </div>

    <div class="ctrl-btns">
      <button class="btn-start" id="btnStart" onclick="startWatch()">▶ 자동 감시 시작</button>
      <button class="btn-stop" id="btnStop" onclick="stopWatch()" style="display:none;">⏹ 중지</button>
    </div>
    <button class="btn-manual" onclick="checkNow()">🔄 지금 즉시 체크</button>

    <!-- 결과 요약 -->
    <div class="result-summary" id="resultSummary">
      <div class="rs-title">✅ 업데이트 완료!</div>
      <div class="balls-row" id="rsBalls"></div>
      <div class="rs-row"><span>회차</span><span class="val" id="rsRound">-</span></div>
      <div class="rs-row"><span>1등 당첨금</span><span class="val" id="rsPrize1">-</span></div>
      <div class="rs-row"><span>2등 당첨금</span><span class="val" id="rsPrize2">-</span></div>
      <div class="rs-row"><span>업데이트된 항목</span><span class="val" id="rsUpdated">-</span></div>
    </div>
  </div>

  <!-- 로그 -->
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;">
      <span>📋 업데이트 로그</span>
      <button onclick="clearLog()" style="background:none;border:1px solid #333;color:#666;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;">지우기</button>
    </div>
    <div class="log-wrap" id="logWrap">
      <div class="log-item"><span class="log-time">--:--:--</span><span class="log-msg info">시스템 준비 완료. 토요일 20:50부터 자동 감시합니다.</span></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="common.js"></script>
<script>

// ── 설정 ──
var XLSX_URL = 'https://raw.githubusercontent.com/mylottolab/my-lotto-lab/main/lotto_details1.xlsx';
var CHECK_INTERVAL_MIN = 5; // 기본 5분
var watchTimer   = null;
var countdownTimer = null;
var isWatching   = false;
var lastCheckedRound = null;
var nextCheckTime = null;

// ── 시계 ──
function updateClock(){
  var now = new Date();
  var ko  = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  var h = String(ko.getHours()).padStart(2,'0');
  var m = String(ko.getMinutes()).padStart(2,'0');
  var s = String(ko.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m+':'+s;
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('clockDate').textContent =
    ko.getFullYear()+'년 '+(ko.getMonth()+1)+'월 '+ko.getDate()+'일 ('+days[ko.getDay()]+')';

  // 토요일 20:50 자동 시작
  if(!isWatching && ko.getDay()===6 && ko.getHours()===20 && ko.getMinutes()===50 && ko.getSeconds()===0){
    addLog('🤖 토요일 20:50 — 자동 감시 시작!', 'warn');
    startWatch();
  }
  // 일요일 02:00 자동 중지
  if(isWatching && ko.getDay()===0 && ko.getHours()===2 && ko.getMinutes()===0 && ko.getSeconds()===0){
    addLog('🛑 일요일 02:00 — 자동 감시 종료', 'warn');
    stopWatch();
  }
}
setInterval(updateClock, 1000);
updateClock();

// ── 카운트다운 ──
function updateCountdown(){
  if(!nextCheckTime) return;
  var now  = Date.now();
  var diff = Math.max(0, nextCheckTime - now);
  var m = Math.floor(diff/60000);
  var s = Math.floor((diff%60000)/1000);
  document.getElementById('nextCheckVal').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  var total = CHECK_INTERVAL_MIN * 60 * 1000;
  var elapsed = total - diff;
  var pct = Math.min(100, (elapsed/total)*100);
  document.getElementById('progBar').style.width = pct+'%';
}
setInterval(updateCountdown, 500);

// ── 인터벌 설정 ──
function setInterval2(min){
  CHECK_INTERVAL_MIN = min;
  ['1','5','10'].forEach(function(v){
    document.getElementById('ib'+v).classList.toggle('active', String(min)===v);
  });
  addLog('체크 간격 변경: '+min+'분', 'info');
}

// ── 감시 시작/중지 ──
function startWatch(){
  if(isWatching) return;
  isWatching = true;
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='flex';
  setStatus('watching','👁️','감시 중...','GitHub 파일을 주기적으로 체크합니다');
  document.getElementById('nextCheckBox').style.display='flex';
  document.getElementById('progWrap').style.display='block';
  addLog('✅ 자동 감시 시작 ('+CHECK_INTERVAL_MIN+'분 간격)', 'ok');
  checkNow(); // 즉시 1회 체크
}

function stopWatch(){
  isWatching = false;
  if(watchTimer){ clearTimeout(watchTimer); watchTimer=null; }
  nextCheckTime = null;
  document.getElementById('btnStart').style.display='flex';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('nextCheckBox').style.display='none';
  document.getElementById('progWrap').style.display='none';
  setStatus('wait','⏳','대기 중','시작 버튼을 누르거나 토요일 20:50에 자동 시작됩니다');
  addLog('⏹ 감시 중지', 'warn');
}

// ── 즉시 체크 ──
function checkNow(){
  setStatus('checking','🔍','체크 중...','GitHub에서 최신 당첨 데이터를 가져오는 중...');
  addLog('🔍 GitHub 파일 체크 시작...', 'info');
  fetchAndProcess();
}

// ── GitHub에서 엑셀 가져오기 ──
function fetchAndProcess(){
  var url = XLSX_URL + '?t=' + Date.now(); // 캐시 방지
  fetch(url)
    .then(function(res){
      if(!res.ok) throw new Error('HTTP '+res.status);
      return res.arrayBuffer();
    })
    .then(function(buf){
      processXlsx(buf);
    })
    .catch(function(err){
      addLog('❌ 파일 가져오기 실패: '+err.message, 'err');
      setStatus('error','❌','가져오기 실패',err.message);
      scheduleNext();
    });
}

// ── 엑셀 파싱 ──
function processXlsx(buf){
  try{
    var wb   = XLSX.read(buf, {type:'array'});
    var sheetName = wb.SheetNames[1] || wb.SheetNames[0];
    var ws   = wb.Sheets[sheetName];
    var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

    if(rows.length < 2){ throw new Error('데이터 행이 없습니다'); }

    // 2행(index 1)이 가장 최근 회차
    var latestRow  = rows[1];
    var latestRound = parseInt(latestRow[0]);
    if(!latestRound){ throw new Error('회차 파싱 실패'); }

    addLog('📊 최신 회차 확인: 제'+latestRound+'회', 'info');

    // 이미 처리한 회차인지 확인
    var savedResults = MLL.loadResults();
    if(savedResults[latestRound]){
      addLog('✅ 제'+latestRound+'회 이미 처리됨 — 업데이트 불필요', 'ok');
      setStatus('done','✅','최신 상태','이미 최신 데이터입니다 (제'+latestRound+'회)');
      scheduleNext();
      return;
    }

    // 새 회차 발견 → 전체 파싱
    addLog('🆕 새 당첨결과 발견! 제'+latestRound+'회 — 파싱 중...', 'warn');
    var resultsObj = {};
    rows.forEach(function(row){
      var round = parseInt(row[0]);
      if(!round||round<1||round>9999) return;
      var nums=[];
      for(var i=1;i<=6;i++){ var n=parseInt(row[i]); if(n>=1&&n<=45) nums.push(n); }
      if(nums.length!==6) return;
      var bonus     = parseInt(row[7])||0;
      var winners1  = parseInt(row[8])||0;
      var prize1    = parseInt(String(row[9]).replace(/[^0-9]/g,''))||0;
      var autoWin   = isNaN(parseInt(row[10]))?null:parseInt(row[10]);
      var semiWin   = isNaN(parseInt(row[11]))?null:parseInt(row[11]);
      var manualWin = isNaN(parseInt(row[12]))?null:parseInt(row[12]);
      var shops     = String(row[13]||'').trim();
      var winners2  = parseInt(row[14])||0;
      var prize2    = parseInt(String(row[15]).replace(/[^0-9]/g,''))||0;
      var winners3  = parseInt(row[16])||0;
      var prize3    = parseInt(String(row[17]).replace(/[^0-9]/g,''))||0;
      var note      = String(row[18]||'').trim();
      if(bonus>=1&&bonus<=45){
        resultsObj[round]={nums:nums,bonus:bonus,winners1:winners1,prize1:prize1,
          autoWin:autoWin,semiWin:semiWin,manualWin:manualWin,winnerShops:shops,
          winners2:winners2,prize2:prize2,winners3:winners3,prize3:prize3,note:note};
      }
    });

    var parsedCount = Object.keys(resultsObj).length;
    addLog('📋 파싱 완료: '+parsedCount+'개 회차', 'info');

    // 적용
    var updated = MLL.applyResults(resultsObj);
    var r = resultsObj[latestRound];
    addLog('🏆 제'+latestRound+'회 당첨번호: '+r.nums.join(', ')+' (보너스: '+r.bonus+')', 'ok');
    addLog('💰 1등 당첨금: '+(r.prize1?r.prize1.toLocaleString()+'원':'정보없음'), 'ok');
    addLog('✅ 총 '+updated+'개 항목 업데이트 완료!', 'ok');

    // 결과 표시
    showResultSummary(latestRound, r, updated);
    setStatus('done','🎉','업데이트 완료!','제'+latestRound+'회 당첨결과 적용 — '+updated+'개 항목 업데이트');
    lastCheckedRound = latestRound;

    // 완료됐으면 감시 중지
    addLog('✅ 이번주 업데이트 완료. 다음주 토요일 20:50까지 감시를 중지합니다.', 'warn');
    stopWatch();

  }catch(err){
    addLog('❌ 파싱 오류: '+err.message, 'err');
    setStatus('error','❌','파싱 실패',err.message);
    scheduleNext();
  }
}

// ── 다음 체크 스케줄 ──
function scheduleNext(){
  if(!isWatching) return;
  var ms = CHECK_INTERVAL_MIN * 60 * 1000;
  nextCheckTime = Date.now() + ms;
  watchTimer = setTimeout(function(){
    if(isWatching){
      addLog('🔍 정기 체크 시작 ('+CHECK_INTERVAL_MIN+'분 경과)...', 'info');
      checkNow();
    }
  }, ms);
  addLog('⏱ 다음 체크: '+CHECK_INTERVAL_MIN+'분 후', 'info');
  setStatus('watching','👁️','감시 중...','다음 체크까지 '+CHECK_INTERVAL_MIN+'분 대기');
}

// ── 결과 요약 표시 ──
function showResultSummary(round, r, updated){
  var BC = function(n){return n<=10?'#f5c518':n<=20?'#1a7ad4':n<=30?'#e03131':n<=40?'#888':'#2f9e44';};
  var TC = function(n){return n<=10?'#7a5e00':'#fff';};
  var balls = r.nums.map(function(n){
    return '<span class="ball-sm" style="background:'+BC(n)+';color:'+TC(n)+';">'+n+'</span>';
  }).join('');
  balls += ' <span style="color:#aaa;font-size:10px;">+</span> ';
  balls += '<span class="ball-sm" style="background:#fff;color:#555;border:2px solid #aaa;">'+r.bonus+'</span>';
  document.getElementById('rsBalls').innerHTML = balls;
  document.getElementById('rsRound').textContent = '제'+round+'회';
  document.getElementById('rsPrize1').textContent = r.prize1 ? r.prize1.toLocaleString()+'원' : '-';
  document.getElementById('rsPrize2').textContent = r.prize2 ? r.prize2.toLocaleString()+'원' : '-';
  document.getElementById('rsUpdated').textContent = updated+'개';
  document.getElementById('resultSummary').classList.add('show');
}

// ── 상태 업데이트 ──
function setStatus(cls, icon, text, sub){
  var box = document.getElementById('statusBox');
  box.className = 'status-big status-'+cls;
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusSub').textContent  = sub;
}

// ── 로그 ──
function addLog(msg, type){
  var wrap = document.getElementById('logWrap');
  var now  = new Date();
  var t    = [now.getHours(),now.getMinutes(),now.getSeconds()].map(function(v){return String(v).padStart(2,'0');}).join(':');
  var div  = document.createElement('div');
  div.className = 'log-item';
  div.innerHTML = '<span class="log-time">'+t+'</span><span class="log-msg '+(type||'')+'">'+msg+'</span>';
  wrap.insertBefore(div, wrap.firstChild);
  // 최대 100줄
  while(wrap.children.length > 100) wrap.removeChild(wrap.lastChild);
}

function clearLog(){
  document.getElementById('logWrap').innerHTML='';
  addLog('로그 지움', 'info');
}

window.setInterval2  = setInterval2;
window.startWatch    = startWatch;
window.stopWatch     = stopWatch;
window.checkNow      = checkNow;
window.clearLog      = clearLog;
</script>
</body>
</html>
