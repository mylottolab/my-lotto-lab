<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Lotto Lab - 전략 비교평가</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:#f3f4f6;font-size:13px;}
.header-inner{max-width:1300px;margin:0 auto;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;background:#1c1c2e;border-radius:0 0 8px 8px;}
.logo-left{display:flex;align-items:center;gap:9px;cursor:pointer;}
.logo-icon{width:30px;height:30px;background:#2f9e44;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text .title{font-size:14px;font-weight:700;color:#fff;}
.logo-text .sub{font-size:9px;color:#aaa;}
.main{max-width:1300px;margin:0 auto;padding:12px 14px;display:grid;grid-template-columns:480px 1fr;gap:12px;}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;}
.card-head{padding:10px 16px;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.head-green{background:linear-gradient(135deg,#2f9e44,#1e7a30);}
.head-dark{background:#1c1c2e;}

/* 왼쪽 리스트 */
.filter-bar{padding:8px 12px;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.filter-btn{border:1px solid #ddd;background:#fff;border-radius:5px;padding:3px 10px;font-size:10px;cursor:pointer;}
.filter-btn.active{background:#2f9e44;color:#fff;border-color:#2f9e44;}
.compare-item{padding:7px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background 0.1s;}
.compare-item:hover{background:#f0fff4;}
.compare-item.active{background:#e8fff0;border-left:3px solid #2f9e44;}
.ci-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.ci-round{background:#e03131;color:#fff;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;}
.ci-round.drawn{background:#555;}
.ci-name{font-size:12px;font-weight:700;color:#222;flex:1;}
.ci-rank{font-size:11px;font-weight:700;padding:1px 7px;border-radius:8px;}
.rank-1{background:#f5c518;color:#7a5e00;}
.rank-2{background:#aaa;color:#fff;}
.rank-3{background:#cd7f32;color:#fff;}
.rank-etc{background:#eee;color:#555;}
.ci-info{display:flex;gap:10px;font-size:9px;color:#888;flex-wrap:wrap;}
.ci-badge{background:#e8fff0;color:#2f9e44;border:1px solid #2f9e44;border-radius:3px;padding:1px 5px;font-size:8px;font-weight:600;}
.ci-badge.red{background:#fff0f0;color:#e03131;border-color:#e03131;}
.ci-badge.blue{background:#e8f4ff;color:#1a7ad4;border-color:#1a7ad4;}
.detail-btn{font-size:9px;background:#2f9e44;color:#fff;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;white-space:nowrap;}
.list-body{max-height:calc(100vh - 130px);overflow-y:auto;}
.empty-list{text-align:center;padding:40px;color:#bbb;font-size:12px;}

/* 오른쪽 상세 */
.detail-head{padding:12px 16px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.detail-title{font-size:14px;font-weight:700;color:#333;}
.stat-row-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;border-bottom:1px solid #f0f0f0;}
.stat-box{background:#f8f8f8;border-radius:8px;padding:8px 10px;text-align:center;}
.stat-box-val{font-size:18px;font-weight:700;color:#2f9e44;}
.stat-box-label{font-size:9px;color:#888;margin-top:2px;}
.balls-wrap{padding:10px 14px;overflow-y:auto;max-height:calc(100vh - 220px);}
.ball-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
.ball-num{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.row-idx{font-size:9px;color:#aaa;width:24px;flex-shrink:0;}
.row-grade{font-size:9px;font-weight:700;width:28px;flex-shrink:0;}
.no-detail{text-align:center;padding:60px;color:#bbb;font-size:12px;}
</style>
</head>
<body>
<script>// =====================================================
// My Lotto Lab - 공통 모듈 (common.js)
// 모든 페이지에서 공유하는 데이터/함수
// =====================================================

// ── 전역 MLL 객체 (중복 로드 방지) ──
if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.ROUND1_TS = new Date('2002-12-07T20:00:00+09:00').getTime();
MLL.WEEK_MS   = 7 * 24 * 60 * 60 * 1000;
MLL.STORAGE_KEY       = 'mll_entries';      // 등록번호
MLL.RESULTS_KEY       = 'mll_results';      // 당첨결과
MLL.ADMIN_PW_KEY      = 'mll_admin_auth';   // 관리자 인증
MLL.SESSION_KEY       = 'mll_session';      // 현재 세션ID

// ── 세션ID 생성/조회 ──
MLL.getSession = function(tag) {
  // 각 입력창마다 고유 세션 태그 (general/camera/ai/excel)
  var key = MLL.SESSION_KEY + '_' + tag;
  var s = sessionStorage.getItem(key);
  if (!s) { s = tag + '_' + Date.now(); sessionStorage.setItem(key, s); }
  return s;
};

// ── 회차/시간 계산 ──
// status: 'open'(접수중) / 'closing'(접수마감, 토요일20시~결과발표전) / 'waiting'(접수대기, 결과발표후~일요일06시)
MLL.getLottoInfo = function() {
  var now = new Date();
  var ko  = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var day = ko.getDay(), hour = ko.getHours(), min = ko.getMinutes();
  var elapsed   = now.getTime() - MLL.ROUND1_TS;
  var thisRound = Math.floor(elapsed / MLL.WEEK_MS) + 1;
  var nextRound = thisRound + 1;

  var inClosedWindow = (day===6 && (hour>20||(hour===20&&min>=0))) || (day===0 && hour<6);

  var results = MLL.loadResults ? MLL.loadResults() : {};
  var thisRoundDrawn = !!(results[thisRound] && results[thisRound].nums);

  var status, saleRound, soldOut;
  if (!inClosedWindow) {
    status = 'open';
    saleRound = nextRound;
    soldOut = false;
  } else if (!thisRoundDrawn) {
    status = 'closing';
    saleRound = thisRound;
    soldOut = true;
  } else {
    status = 'waiting';
    saleRound = nextRound;
    soldOut = true;
  }

  return { thisRound:thisRound, nextRound:nextRound, soldOut:soldOut, saleRound:saleRound, status:status };
};

MLL.STATUS_LABEL = { open:'접수중', closing:'접수마감', waiting:'접수대기' };

MLL.getDrawDate = function(round) {
  var d = new Date(MLL.ROUND1_TS + (round - 1) * MLL.WEEK_MS);
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var dd= String(d.getDate()).padStart(2,'0');
  return y+'/'+m+'/'+dd;
};

MLL.getRoundStatus = function(round) {
  var info = MLL.getLottoInfo();
  return round < info.thisRound ? '추첨후' : '추첨전';
};

// ── 볼 색상 ──
MLL.BC = function(n) {
  return n<=10?'#f5c518':n<=20?'#1a7ad4':n<=30?'#e03131':n<=40?'#888888':'#2f9e44';
};
MLL.TC = function(n) { return n<=10?'#7a5e00':'#ffffff'; };

// ── UUID 생성 ──
MLL.uuid = function() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
};

// =====================================================
// 데이터 CRUD
// =====================================================

MLL.loadEntries = function() {
  try { return JSON.parse(localStorage.getItem(MLL.STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
};

MLL.saveEntries = function(entries) {
  localStorage.setItem(MLL.STORAGE_KEY, JSON.stringify(entries));
};

// 단일 항목 추가
MLL.addEntry = function(item) {
  var entries = MLL.loadEntries();
  if (!item.id)          item.id          = MLL.uuid();
  if (!item.createdAt)   item.createdAt   = Date.now();
  if (!item.grade)       item.grade       = null;
  if (!item.prizeMoney)  item.prizeMoney  = 0;
  if (!item.sessionTag)  item.sessionTag  = '';
  // 항상 추첨전으로 저장 → 미확인 섹션에서 사용자가 확인하도록
  item.status = '추첨전';
  entries.push(item);
  MLL.saveEntries(entries);
  return item;
};

// 여러 항목 추가
MLL.addEntries = function(items) {
  var entries = MLL.loadEntries();
  items.forEach(function(item) {
    if (!item.id)         item.id         = MLL.uuid();
    if (!item.createdAt)  item.createdAt  = Date.now();
    if (!item.grade)      item.grade      = null;
    if (!item.prizeMoney) item.prizeMoney = 0;
    if (!item.sessionTag) item.sessionTag = '';
    // 항상 추첨전으로 저장 → 미확인 섹션에서 사용자가 확인하도록
    item.status = '추첨전';
    entries.push(item);
  });
  MLL.saveEntries(entries);
  return items;
};

// 항목 삭제
MLL.deleteEntry = function(id) {
  var entries = MLL.loadEntries().filter(function(e){ return e.id !== id; });
  MLL.saveEntries(entries);
};

// =====================================================
// 당첨결과 데이터
// =====================================================

MLL.loadResults = function() {
  try { return JSON.parse(localStorage.getItem(MLL.RESULTS_KEY) || '{}'); }
  catch(e) { return {}; }
};

MLL.saveResults = function(results) {
  localStorage.setItem(MLL.RESULTS_KEY, JSON.stringify(results));
};

MLL.getResult = function(round) {
  return MLL.loadResults()[round] || null;
};

// ── 당첨 등수 계산 ──
MLL.calcGrade = function(myNums, winNums, bonusNum) {
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  var hasBonus = myNums.indexOf(bonusNum) >= 0;
  if (match===6)                  return 1;
  if (match===5 && hasBonus)      return 2;
  if (match===5)                  return 3;
  if (match===4)                  return 4;
  if (match===3)                  return 5;
  return 0;
};

// ── 당첨금액 계산 ──
MLL.calcPrize = function(grade, result) {
  if (!result || grade===0) return 0;
  if (grade===1) return result.prize1 || 0;
  if (grade===2) return result.prize2 || 0;
  if (grade===3) return result.prize3 || 0;
  if (grade===4) return 50000;
  if (grade===5) return 5000;
  return 0;
};

// ── 당첨결과로 전체 업데이트 ──
// resultsObj 구조:
// {
//   1227: {
//     nums: [1,14,16,34,41,44],  // 당첨번호 6개
//     bonus: 13,                  // 보너스번호
//     winners1: 11,               // 1등 총 당첨게임수
//     prize1: 2674808455,         // 1등 1게임당 당첨금액
//     autoWin: 8,                 // 자동 1등 당첨게임수
//     semiWin: 1,                 // 반자동 1등 당첨게임수
//     manualWin: 2,               // 수동 1등 당첨게임수
//     winnerShops: "진흥수퍼, ...", // 1등 당첨점명
//     winners2: 70,               // 2등 당첨게임수
//     prize2: 70054508,           // 2등 1게임당 당첨금액
//     winners3: 3042,             // 3등 당첨게임수
//     prize3: 1612037,            // 3등 1게임당 당첨금액
//     note: "..."                 // 특이사항 (옵션)
//   }
// }
MLL.applyResults = function(resultsObj) {
  MLL.saveResults(resultsObj);
  var entries = MLL.loadEntries();
  var updated = 0;
  entries.forEach(function(entry) {
    // round가 숫자/문자열 둘 다 처리
    var res = resultsObj[entry.round] || resultsObj[String(entry.round)] || resultsObj[parseInt(entry.round)];
    if (res) {
      entry.status     = '추첨후';
      entry.grade      = MLL.calcGrade(entry.nums, res.nums, res.bonus);
      entry.prizeMoney = MLL.calcPrize(entry.grade, res);
      updated++;
    }
  });
  MLL.saveEntries(entries);
  return updated;
};

// =====================================================
// 정렬 (추첨전 상단, 추첨후 하단, 각각 회차 내림차순)
// =====================================================

MLL.sortEntries = function(entries) {
  var info    = MLL.getLottoInfo();
  var results = MLL.loadResults();

  function isConfirmed(entry) {
    // 당첨결과가 있고 grade가 계산된 경우
    return entry.status === '추첨후' && entry.grade !== null && entry.grade !== undefined;
  }
  function isUnconfirmed(entry) {
    // 추첨됐는데 아직 결과 미반영: 당첨결과가 있는 회차인데 grade=null
    var hasResult = !!(results[entry.round] || results[Number(entry.round)] || results[String(entry.round)]);
    return (entry.status === '추첨전' && hasResult) ||
           (entry.status === '추첨후' && (entry.grade === null || entry.grade === undefined));
  }
  function isPreDraw(entry) {
    // 진짜 추첨전: 당첨결과가 없는 회차
    var hasResult = !!(results[entry.round] || results[Number(entry.round)] || results[String(entry.round)]);
    return entry.status === '추첨전' && !hasResult;
  }

  var preDraw     = entries.filter(isPreDraw)
                           .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });
  var unconfirmed = entries.filter(isUnconfirmed)
                           .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });
  var post        = entries.filter(isConfirmed)
                           .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });

  return preDraw.concat(unconfirmed).concat(post);
};

// =====================================================
// 공통 테이블 렌더러
// =====================================================

MLL.GRADE_LABEL = ['낙첨','1등','2등','3등','4등','5등'];
MLL.GRADE_COLOR = ['#aaa','#e03131','#e67700','#1a7ad4','#2f9e44','#888'];

MLL.renderBalls = function(nums, bonusNums, small) {
  var size = small ? 19 : 24;
  var fs   = small ? 8  : 10;
  return nums.map(function(n) {
    var isBonus = bonusNums && bonusNums.indexOf(n)>=0;
    var bg  = isBonus ? '#fff'    : MLL.BC(n);
    var tc  = isBonus ? '#555'    : MLL.TC(n);
    var brd = isBonus ? '2px solid #aaa' : 'none';
    return '<span style="width:'+size+'px;height:'+size+'px;border-radius:50%;display:inline-flex;' +
      'align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:700;flex-shrink:0;' +
      'background:'+bg+';color:'+tc+';border:'+brd+';margin:1px;">'+n+'</span>';
  }).join('');
};

// 통일된 테이블 행 생성
MLL.renderRow = function(entry, sessionTag, opts) {
  opts = opts || {};
  var isSession = sessionTag && entry.sessionTag === sessionTag;
  var result    = MLL.getResult(entry.round);
  var winNums   = result ? result.nums  : [];
  var bonusNum  = result ? result.bonus : null;

  // status 실시간 재판단 (당첨결과 적용 후 반영)
  var actualStatus = entry.status;
  if (result && entry.status === '추첨전') actualStatus = '추첨후';

  // 반자동: autoNums 필드(시스템 채운 번호) 저장되어 있으면 사용
  var autoNums = entry.autoNums || [];

  // 번호 정렬 후 매치 표시
  var sorted = entry.nums.slice().sort(function(a,b){return a-b;});
  var ballsHTML = sorted.map(function(n) {
    var isMatch = winNums.indexOf(n) >= 0;
    var isBonus = n === bonusNum && !isMatch;
    var bg  = isBonus ? '#fff' : MLL.BC(n);
    var tc  = isBonus ? '#555' : MLL.TC(n);
    var brd = isMatch ? '2px solid #f5c518' : isBonus ? '2px solid #aaa' : 'none';
    // 반자동: 시스템이 채운 번호(autoNums)만 흐리게 — 추첨전/후 관계없이 항상 유지
    var op = (entry.type==='반자동' && autoNums.length>0 && autoNums.indexOf(n)>=0) ? '0.4' : '1';
    // 단, 당첨번호와 일치하는 경우 당첨 표시를 위해 흐리기 해제
    if (isMatch) op = '1';
    return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;' +
      'align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;' +
      'background:'+bg+';color:'+tc+';border:'+brd+';margin:1px;opacity:'+op+';">'+n+'</span>';
  }).join('');

  // 구매형태 뱃지
  var typeColor = entry.type==='자동'?'#2f9e44':entry.type==='반자동'?'#e67700':'#1a7ad4';
  var typeBg    = entry.type==='자동'?'#e8fff0':entry.type==='반자동'?'#fff3e0':'#e8f4ff';
  var typeHTML  = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;' +
    'color:'+typeColor+';background:'+typeBg+';border:1px solid '+typeColor+';">'+entry.type+'</span>';

  // 구분 (실구매/가상)
  var realHTML = entry.isReal
    ? '<span style="background:#f5c518;color:#7a5e00;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;">실구매</span>'
    : '<span style="background:#eee;color:#999;font-size:8px;padding:1px 4px;border-radius:3px;">가상</span>';

  // 추첨상태 (실시간 재판단 적용)
  var statusHTML = actualStatus==='추첨전'
    ? '<span style="color:#e03131;font-weight:700;font-size:9px;">추첨전</span>'
    : '<span style="color:#999;font-size:9px;">추첨후</span>';

  // 당첨결과
  var gradeHTML = '<span style="color:#ddd;">-</span>';
  if (actualStatus==='추첨후' && entry.grade !== null) {
    if (entry.grade === 0) {
      gradeHTML = '<span style="color:#aaa;font-size:9px;">낙첨</span>';
    } else {
      gradeHTML = '<span style="color:'+MLL.GRADE_COLOR[entry.grade]+';font-weight:700;font-size:9px;">' +
        MLL.GRADE_LABEL[entry.grade]+'</span>';
    }
  }

  // 당첨금
  var prizeHTML = '<span style="color:#ddd;">-</span>';
  if (entry.prizeMoney && entry.prizeMoney > 0) {
    prizeHTML = '<span style="color:#e03131;font-weight:700;font-size:9px;">' +
      entry.prizeMoney.toLocaleString()+'원</span>';
  }

  // 세션 하이라이트
  var rowStyle = isSession
    ? 'border-left:3px solid #1a7ad4;background:#f0f8ff;'
    : (actualStatus==='추첨전' ? 'background:#fff8e1;' : '');

  var rcColor = actualStatus==='추첨전' ? '#e03131' : '#555';

  var delBtn = opts.noDelete ? '' :
    '<button onclick="MLL.deleteEntry(\''+entry.id+'\');if(window.refreshTable)refreshTable();" ' +
    'style="background:none;border:1px solid #fcc;border-radius:3px;padding:1px 4px;color:#e03131;cursor:pointer;font-size:9px;">🗑</button>';

  return '<tr style="'+rowStyle+'">' +
    '<td style="text-align:center;padding:4px 4px;"><span style="background:'+rcColor+';color:#fff;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700;">'+entry.round+'회</span></td>' +
    '<td style="padding:4px 6px;"><div style="display:flex;gap:1px;align-items:center;flex-wrap:nowrap;">'+ballsHTML+'</div></td>' +
    '<td style="text-align:left;padding:4px 5px;font-size:9px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(entry.memo||'')+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+typeHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+realHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+statusHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+gradeHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+prizeHTML+'</td>' +
    '<td style="text-align:center;padding:4px 4px;">'+delBtn+'</td>' +
    '</tr>';
};

// 섹션 구분선

// 즉시확인 실행
MLL.applyCheck = function(sessionTag) {
  var results = MLL.loadResults();
  var resultRounds = Object.keys(results).map(Number);
  if (!resultRounds.length) {
    alert('당첨결과가 없습니다.\nadmin.html에서 엑셀을 업로드해주세요.');
    return;
  }

  // 커스텀 팝업 생성
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:16px;padding:28px 28px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.25);">' +
    '<div style="font-size:24px;margin-bottom:8px;">⚡</div>' +
    '<div style="font-size:15px;font-weight:700;color:#222;margin-bottom:6px;">즉시확인</div>' +
    '<div style="font-size:12px;color:#888;margin-bottom:22px;">어떤 범위를 확인하시겠습니까?</div>' +
    '<div style="display:flex;gap:10px;margin-bottom:10px;">' +
    '<button id="mll-check-all" style="flex:1;background:#e03131;color:#fff;border:none;border-radius:10px;padding:13px 8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(224,49,49,0.3);">📋 미확인분 전체</button>' +
    '<button id="mll-check-cur" style="flex:1;background:#1a7ad4;color:#fff;border:none;border-radius:10px;padding:13px 8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(26,122,212,0.3);">✏️ 지금 입력분만</button>' +
    '</div>' +
    '<button id="mll-check-cancel" style="width:100%;background:#f5f5f5;border:none;border-radius:10px;padding:10px;font-size:12px;color:#888;cursor:pointer;font-weight:600;">✕ 취소 (나중에 확인)</button>' +
    '</div>';
  document.body.appendChild(overlay);

  function doCheck(allItems) {
    document.body.removeChild(overlay);
    var entries = MLL.loadEntries();
    var info    = MLL.getLottoInfo();
    var updated = 0;
    entries.forEach(function(entry) {
      var res = results[entry.round] || results[Number(entry.round)] || results[String(entry.round)];
      var isUnconfirmed =
        (entry.status === '추첨전' && !!res) ||
        (entry.status === '추첨후' && (entry.grade === null || entry.grade === undefined));
      if (!isUnconfirmed) return;
      if (!allItems && entry.sessionTag !== sessionTag) return;
      if (res) {
        entry.status     = '추첨후';
        entry.grade      = MLL.calcGrade(entry.nums, res.nums, res.bonus);
        entry.prizeMoney = MLL.calcPrize(entry.grade, res);
        updated++;
      }
    });
    MLL.saveEntries(entries);
    alert('✅ ' + updated + '개 항목 확인 완료!');
    if (window.refreshTable) refreshTable();
  }

  document.getElementById('mll-check-all').onclick    = function(){ doCheck(true); };
  document.getElementById('mll-check-cur').onclick    = function(){ doCheck(false); };
  document.getElementById('mll-check-cancel').onclick = function(){ document.body.removeChild(overlay); };
  overlay.onclick = function(e){ if(e.target===overlay) document.body.removeChild(overlay); };
};

// 전체 테이블 렌더
MLL.renderTable = function(tbodyId, sessionTag, filterRound) {
  var entries = MLL.loadEntries();
  if (filterRound) entries = entries.filter(function(e){ return e.round == filterRound; });
  var sorted  = MLL.sortEntries(entries);
  var info    = MLL.getLottoInfo();
  var tbody   = document.getElementById(tbodyId);
  if (!tbody) return;

  // 3단계 분류 - 당첨결과 존재 여부 기준
  var rr = MLL.loadResults();
  function hr(round){ return !!(rr[round]||rr[Number(round)]||rr[String(round)]); }
  var preDraw    = sorted.filter(function(e){
    return e.status==='추첨전' && !hr(e.round);
  });
  var unconfirmed= sorted.filter(function(e){
    return (e.status==='추첨전' && hr(e.round)) ||
           (e.status==='추첨후' && (e.grade===null || e.grade===undefined));
  });
  var postDraw   = sorted.filter(function(e){
    return e.status==='추첨후' && e.grade!==null && e.grade!==undefined;
  });

  // 배지 업데이트
  var badgeEl = document.getElementById('sectionBadge');
  if (badgeEl) {
    var badgeHtml =
      '<span style="color:#e03131;font-weight:700;">🔴추첨전 '+preDraw.length+'개</span>' +
      ' &nbsp;|&nbsp; ';
    if (unconfirmed.length > 0) {
      badgeHtml +=
        '<span style="color:#e67700;font-weight:700;">🟡미확인 '+unconfirmed.length+'개</span>' +
        MLL.renderCheckBtn(sessionTag);
    } else {
      badgeHtml += '<span style="color:#e67700;">🟡미확인 0개</span>';
    }
    badgeHtml += ' &nbsp;|&nbsp; <span style="color:#555;">✅확인완료 '+postDraw.length+'개</span>';
    badgeEl.innerHTML = badgeHtml;
  }

  // 카운트 업데이트
  var tcEl = document.getElementById('totalCount');
  if (tcEl) tcEl.textContent = entries.length;
  var realEl = document.getElementById('realCount');
  if (realEl) realEl.textContent = entries.filter(function(e){return e.isReal;}).length;

  var html = '';
  if (!sorted.length) {
    html = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#bbb;font-size:12px;">저장된 번호가 없습니다.</td></tr>';
  } else {
    // 추첨전 섹션
    if (preDraw.length) {
      html += MLL.renderDivider('🔴 추첨 전', preDraw.length);
      preDraw.forEach(function(e){ html += MLL.renderRow(e, sessionTag); });
    }
    // 미확인 섹션 (주황 배경)
    if (unconfirmed.length) {
      html += '<tr><td colspan="9" style="background:#fff3e0;padding:4px 8px;font-size:9px;font-weight:700;color:#e67700;">' +
        '🟡 추첨됐으나 미확인 (' + unconfirmed.length + '개)' +
        MLL.renderCheckBtn(sessionTag) +
        '</td></tr>';
      unconfirmed.forEach(function(e){
        var row = MLL.renderRow(e, sessionTag);
        // 미확인 행은 주황 배경
        row = row.replace('style="background:#fff8e1;', 'style="background:#fff3e0;');
        row = row.replace('style="', 'style="background:#fff3e0;');
        html += row;
      });
    }
    // 확인완료 섹션
    if (postDraw.length) {
      html += MLL.renderDivider('✅ 추첨후 확인분', postDraw.length);
      postDraw.forEach(function(e){ html += MLL.renderRow(e, sessionTag); });
    }
  }
  tbody.innerHTML = html;
};

MLL.getStats = function() {
  var entries = MLL.loadEntries();
  var stats = {
    total: entries.length,
    byMethod: { general:0, camera:0, ai:0, excel:0 },
    byType:   { auto:0, semi:0, manual:0 },
    byStatus: { pre:0, post:0 },
    byReal:   { real:0, virtual:0 },
    byGrade:  { g1:0, g2:0, g3:0, g4:0, g5:0, fail:0 },
    totalPrize: 0
  };
  entries.forEach(function(e) {
    // 입력방법
    var m = e.inputMethod || 'general';
    if (stats.byMethod[m] !== undefined) stats.byMethod[m]++;
    // 구매형태
    if (e.type==='자동')   stats.byType.auto++;
    if (e.type==='반자동') stats.byType.semi++;
    if (e.type==='수동')   stats.byType.manual++;
    // 추첨상태
    if (e.status==='추첨전') stats.byStatus.pre++;
    else                     stats.byStatus.post++;
    // 실구매/가상
    if (e.isReal) stats.byReal.real++;
    else          stats.byReal.virtual++;
    // 당첨
    if (e.grade===1) stats.byGrade.g1++;
    else if (e.grade===2) stats.byGrade.g2++;
    else if (e.grade===3) stats.byGrade.g3++;
    else if (e.grade===4) stats.byGrade.g4++;
    else if (e.grade===5) stats.byGrade.g5++;
    else if (e.status==='추첨후') stats.byGrade.fail++;
    // 당첨금
    stats.totalPrize += (e.prizeMoney || 0);
  });
  return stats;
};

};

// 전략 저장 (최신순 - 맨앞에 추가)
MLL.addStrategy = function(strategy) {
  var list = MLL.loadStrategies();
  strategy.id        = strategy.id || MLL.uuid();
  strategy.createdAt = strategy.createdAt || Date.now();
  // 중복 이름 체크
  var exists = list.findIndex(function(s){ return s.name === strategy.name; });
  if (exists >= 0) return false; // 중복
  list.unshift(strategy); // 맨앞에 추가 (최신순)
  MLL.saveStrategies(list);
  return true;
};

MLL.updateStrategy = function(id, data) {
  var list = MLL.loadStrategies();
  var idx  = list.findIndex(function(s){ return s.id === id; });
  if (idx < 0) return false;
  list[idx] = Object.assign(list[idx], data);
  MLL.saveStrategies(list);
  return true;
};

MLL.deleteStrategy = function(id) {
  var list = MLL.loadStrategies().filter(function(s){ return s.id !== id; });
  MLL.saveStrategies(list);
};

MLL.getStrategy = function(id) {
  return MLL.loadStrategies().find(function(s){ return s.id === id; }) || null;
};

// 번호 생성 엔진 (Python generator_engine.py 포팅)
MLL.generateNumbers = function(strategy, lotto_history) {
  var setCount      = parseInt(strategy.set_count)    || 20;
  var repeatCount   = parseInt(strategy.repeat_count) || 1;
  var repeatMode    = (strategy.repeat_mode || 'AABBCC').toUpperCase();
  var consLimit     = parseInt(strategy.consecutive_limit) || 0;
  var oddEven       = (strategy.odd_even || '').trim();
  var includeNums   = MLL._parseNumList(strategy.include_numbers || '');
  var excludeNums   = MLL._parseNumList(strategy.exclude_numbers || '');
  var sumMin        = strategy.sum_min ? parseInt(strategy.sum_min) : null;
  var sumMax        = strategy.sum_max ? parseInt(strategy.sum_max) : null;
  var rangeStart    = strategy.range_start ? parseInt(strategy.range_start) : null;
  var rangeEnd      = strategy.range_end   ? parseInt(strategy.range_end)   : null;
  var topRange      = parseInt(strategy.top_range) || 0;
  var topUse        = strategy.top_use !== '' && strategy.top_use !== undefined ? parseInt(strategy.top_use) : null;
  var lastWeekMode  = strategy.last_week_mode || '무관';
  var bonusInclude  = (strategy.bonus_include || 'N').toUpperCase() === 'Y';

  // 기본 풀
  var pool = MLL._buildPool(rangeStart, rangeEnd);
  // 상위빈도 번호
  var topNums = [];
  if (topRange > 0 && lotto_history && lotto_history.length > 0) {
    var recent = parseInt(strategy.recent_rounds) || lotto_history.length;
    topNums = MLL._getTopFrequency(lotto_history, recent, topRange, bonusInclude);
  }
  // 지난주 당첨번호
  var lastWinNums = [];
  if (lastWeekMode !== '무관' && lotto_history && lotto_history.length > 0) {
    lastWinNums = lotto_history[0].nums || [];
  }

  var baseResults = [], used = {}, maxTry = Math.max(80000, setCount * 5000), tryCount = 0;
  while (baseResults.length < setCount && tryCount < maxTry) {
    tryCount++;
    var nums = MLL._createOneSet(pool, includeNums, excludeNums, oddEven, topNums, topUse);
    if (!nums) continue;
    if (!MLL._checkConsecutive(nums, consLimit)) continue;
    if (!MLL._checkSum(nums, sumMin, sumMax)) continue;
    var key = nums.join(',');
    if (used[key]) continue;
    used[key] = true;
    baseResults.push(nums);
  }

  // 지난주기준 정렬
  if (lastWeekMode !== '무관' && lastWinNums.length > 0) {
    baseResults.sort(function(a,b){
      var ca = a.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length;
      var cb = b.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length;
      return lastWeekMode === '많은순' ? cb-ca : ca-cb;
    });
  }

  // 반복 출력
  var final = [];
  if (repeatMode === 'ABCABC') {
    for (var r=0; r<repeatCount; r++)
      baseResults.forEach(function(row){ final.push(row.slice()); });
  } else { // AABBCC
    baseResults.forEach(function(row){
      for (var r=0; r<repeatCount; r++) final.push(row.slice());
    });
  }

  // 지난주 겹친수
  var lastWeekCounts = final.map(function(row){
    return lastWinNums.length ? row.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length : 0;
  });

  return {
    numbers: final,
    base_generated: baseResults.length,
    generated: final.length,
    requested: setCount,
    lack: Math.max(0, setCount - baseResults.length),
    try_count: tryCount,
    top_data: topNums,
    last_week_counts: lastWeekCounts,
    engine_status: baseResults.length >= setCount ? 'OK' : '조건이 강해 일부만 생성됨'
  };
};

MLL._parseNumList = function(val) {
  if (!val) return [];
  var result = [];
  String(val).split(/[,\s]+/).forEach(function(t){
    t = t.trim();
    var m = t.match(/^(\d+)[~\-](\d+)$/);
    if (m) {
      var a=parseInt(m[1]), b=parseInt(m[2]);
      if (a<=b){ for(var i=a;i<=b;i++) if(i>=1&&i<=45) result.push(i); }
      else { for(var i=a;i<=45;i++) result.push(i); for(var i=1;i<=b;i++) result.push(i); }
    } else {
      var n=parseInt(t); if(n>=1&&n<=45) result.push(n);
    }
  });
  return [...new Set(result)].sort(function(a,b){return a-b;});
};

MLL._buildPool = function(start, end) {
  if (!start || !end) return Array.from({length:45},function(_,i){return i+1;});
  var pool=[], cur=start;
  while(true){
    pool.push(cur);
    if(cur===end) break;
    cur++; if(cur>45) cur=1;
    if(pool.length>45) break;
  }
  return pool.length>=6 ? pool : Array.from({length:45},function(_,i){return i+1;});
};

MLL._getTopFrequency = function(history, recent, topN, bonusInclude) {
  var freq = {};
  history.slice(0, recent).forEach(function(h){
    (h.nums||[]).forEach(function(n){ freq[n]=(freq[n]||0)+1; });
    if (bonusInclude && h.bonus) { freq[h.bonus]=(freq[h.bonus]||0)+1; }
  });
  return Object.keys(freq).map(function(n){ return [parseInt(n), freq[n]]; })
    .sort(function(a,b){ return b[1]-a[1]; }).slice(0, topN).map(function(x){ return x[0]; });
};

MLL._createOneSet = function(pool, include, exclude, oddEven, topNums, topUse) {
  var avail = pool.filter(function(n){ return exclude.indexOf(n)<0 && include.indexOf(n)<0; });
  var fixed = include.slice();
  if (fixed.length > 6) return null;
  var need = 6 - fixed.length;
  if (avail.length < need) return null;

  var result;
  if (!oddEven || oddEven==='무관' || oddEven==='') {
    var pick = MLL._sample(avail, need);
    if (!pick) return null;
    result = fixed.concat(pick).sort(function(a,b){return a-b;});
  } else {
    var parts = oddEven.split(':');
    var needOdd = parseInt(parts[0]), needEven = parseInt(parts[1]);
    var fixOdd = fixed.filter(function(n){return n%2===1;}).length;
    var fixEven = fixed.length - fixOdd;
    var ro = needOdd-fixOdd, re = needEven-fixEven;
    if (ro<0||re<0) return null;
    var oddPool  = avail.filter(function(n){return n%2===1;});
    var evenPool = avail.filter(function(n){return n%2===0;});
    if (oddPool.length<ro || evenPool.length<re) return null;
    result = fixed.concat(MLL._sample(oddPool,ro)||[]).concat(MLL._sample(evenPool,re)||[]).sort(function(a,b){return a-b;});
  }

  // 상위빈도 체크
  if (topNums.length > 0 && topUse !== null) {
    var cnt = result.filter(function(n){return topNums.indexOf(n)>=0;}).length;
    if (cnt !== topUse) return null;
  }
  return result;
};

MLL._sample = function(arr, n) {
  if (arr.length < n) return null;
  var a = arr.slice(), result = [];
  for (var i=0; i<n; i++) {
    var idx = Math.floor(Math.random()*a.length);
    result.push(a.splice(idx,1)[0]);
  }
  return result;
};

MLL._checkConsecutive = function(nums, limit) {
  if (!limit || limit<=1) return true;
  var cnt=1;
  for (var i=1; i<nums.length; i++) {
    if (nums[i]===nums[i-1]+1) { cnt++; if(cnt>limit) return false; }
    else cnt=1;
  }
  return true;
};

MLL._checkSum = function(nums, min, max) {
  var s=nums.reduce(function(a,b){return a+b;},0);
  if (min!==null && s<min) return false;
  if (max!==null && s>max) return false;
  return true;
};

<script>
function toggleNav(){
  var m=document.getElementById('navMenu');
  m.style.display=m.style.display==='none'?'block':'none';
}
document.addEventListener('click',function(e){
  var btn=document.getElementById('navBtn'),menu=document.getElementById('navMenu');
  if(menu&&btn&&!btn.contains(e.target)&&!menu.contains(e.target)) menu.style.display='none';
});

var currentFilter = 'all';
var selectedId = null;

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderList();
  if(f==='all'){ showAllSummary(); } else { renderListExtra(); }
}

var sortKey = 'prize', sortDir = -1;

function sortSummary(key){
  if(sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=-1; }
  showAllSummary();
}

function showAllSummary(){
  var srList = MLL.loadStrategyResults();
  var results = MLL.loadResults();
  if(!srList.length){
    document.getElementById('detailBadge').textContent='저장된 전략번호가 없습니다.';
    document.getElementById('statRow').style.display='none';
    document.getElementById('detailBody').innerHTML='<div class="no-detail">전략번호를 생성하고 저장해주세요.</div>';
    return;
  }

  var rounds = Object.keys(results).map(Number).sort(function(a,b){return b-a;});
  var lastDrawnRound = rounds[0]||0;
  var allRounds = srList.map(function(sr){return sr.round;});
  var maxRound = Math.max.apply(null, allRounds);

  document.getElementById('detailBadge').textContent = '전체 전략 통합 요약';
  document.getElementById('statRow').style.display='none';

  function buildSection(round, isDrawn, sectionId){
    var winData = isDrawn ? (results[round]||results[Number(round)]||results[String(round)]) : null;
    var srInRound = srList.filter(function(sr){ return sr.round===round; });
    if(!srInRound.length) return '';

    var rows = srInRound.map(function(sr){
      var gradeCounts=[0,0,0,0,0,0], totalPrize=0;
      if(isDrawn && winData && sr.numbers){
        sr.numbers.forEach(function(nums){
          var m=0; nums.forEach(function(n){if(winData.nums.indexOf(n)>=0)m++;});
          var b=nums.indexOf(winData.bonus)>=0;
          var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
          if(g>0){
            gradeCounts[g]++;
            var prizes=[0,winData.prize1||0,winData.prize2||0,winData.prize3||0,50000,5000];
            totalPrize+=prizes[g]||0;
          }
        });
      }
      return { name: sr.strategyName, count: sr.totalCount||(sr.numbers?sr.numbers.length:0), g: gradeCounts, prize: totalPrize };
    });

    if(isDrawn){
      rows.sort(function(a,b){
        var av, bv;
        if(sortKey==='name'){ return sortDir*((a.name>b.name)?1:(a.name<b.name)?-1:0); }
        if(sortKey==='count'){ av=a.count; bv=b.count; }
        else if(sortKey>='1'&&sortKey<='5'){ av=a.g[parseInt(sortKey)]; bv=b.g[parseInt(sortKey)]; }
        else { av=a.prize; bv=b.prize; }
        return sortDir*(bv-av);
      });
      var ranked = rows.slice().sort(function(a,b){
        if(b.prize!==a.prize) return b.prize-a.prize;
        var aw=a.g.reduce(function(s,x){return s+x;},0), bw=b.g.reduce(function(s,x){return s+x;},0);
        if(bw!==aw) return bw-aw;
        return a.count-b.count;
      });
      var rankMap={};
      ranked.forEach(function(r,i){ rankMap[r.name]=i+1; });
      rows.forEach(function(r){ r.rank=rankMap[r.name]; });
    } else {
      rows.sort(function(a,b){
        if(sortKey==='name') return sortDir*((a.name>b.name)?1:(a.name<b.name)?-1:0);
        if(sortKey==='count') return sortDir*(b.count-a.count);
        return 0;
      });
    }

    var arrow = function(key){ return sortKey===key ? (sortDir===-1?' ▼':' ▲') : ''; };

    var headCols = isDrawn
      ? '<th onclick="sortSummary(\'name\')" style="cursor:pointer;">전략명'+arrow('name')+'</th>'+
        '<th onclick="sortSummary(\'count\')" style="cursor:pointer;">조합수'+arrow('count')+'</th>'+
        '<th onclick="sortSummary(\'1\')" style="cursor:pointer;">1등'+arrow('1')+'</th>'+
        '<th onclick="sortSummary(\'2\')" style="cursor:pointer;">2등'+arrow('2')+'</th>'+
        '<th onclick="sortSummary(\'3\')" style="cursor:pointer;">3등'+arrow('3')+'</th>'+
        '<th onclick="sortSummary(\'4\')" style="cursor:pointer;">4등'+arrow('4')+'</th>'+
        '<th onclick="sortSummary(\'5\')" style="cursor:pointer;">5등'+arrow('5')+'</th>'+
        '<th onclick="sortSummary(\'prize\')" style="cursor:pointer;">당첨금'+arrow('prize')+'</th>'+
        '<th>순위</th>'
      : '<th onclick="sortSummary(\'name\')" style="cursor:pointer;">전략명'+arrow('name')+'</th>'+
        '<th onclick="sortSummary(\'count\')" style="cursor:pointer;">조합수'+arrow('count')+'</th>';

    var bodyRows = rows.map(function(r){
      if(isDrawn){
        return '<tr>'+
          '<td style="font-weight:700;">'+r.name+'</td>'+
          '<td style="text-align:center;">'+r.count+'</td>'+
          '<td style="text-align:center;color:#e03131;font-weight:700;">'+(r.g[1]||0)+'</td>'+
          '<td style="text-align:center;color:#e67700;font-weight:700;">'+(r.g[2]||0)+'</td>'+
          '<td style="text-align:center;color:#1a7ad4;">'+(r.g[3]||0)+'</td>'+
          '<td style="text-align:center;color:#2f9e44;">'+(r.g[4]||0)+'</td>'+
          '<td style="text-align:center;color:#888;">'+(r.g[5]||0)+'</td>'+
          '<td style="text-align:right;font-weight:700;color:#e67700;">'+(r.prize?r.prize.toLocaleString():'0')+'</td>'+
          '<td style="text-align:center;font-weight:700;">'+(r.rank||'-')+'</td>'+
          '</tr>';
      }
      return '<tr><td style="font-weight:700;">'+r.name+'</td><td style="text-align:center;">'+r.count+'</td></tr>';
    }).join('');

    return '<div style="margin-bottom:20px;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:6px;flex-wrap:wrap;">'+
      '<div style="font-size:12px;font-weight:700;color:#333;">🔍 전체 전략 비교 평가 현황 <span style="color:#888;font-weight:400;">— '+round+'회 '+(isDrawn?'추첨후':'추첨전')+'</span></div>'+
      '<div style="display:flex;gap:6px;">'+
      '<button onclick="toggleSectionDetail(\''+sectionId+'\')" style="background:#2f9e44;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;">전체 세부항목</button>'+
      '<button onclick="downloadSummaryExcel(\''+sectionId+'\','+round+','+isDrawn+')" style="background:#1a7ad4;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;">📥 엑셀</button>'+
      '<button onclick="downloadSummaryPDF(\''+sectionId+'\','+round+','+isDrawn+')" style="background:#555;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;">📄 PDF</button>'+
      '</div>'+
      '</div>'+
      '<table style="width:100%;border-collapse:collapse;font-size:11px;">'+
      '<thead><tr style="border-bottom:2px solid #ddd;">'+headCols+'</tr></thead>'+
      '<tbody>'+bodyRows+'</tbody>'+
      '</table>'+
      '<div id="secDetail-'+sectionId+'" style="display:none;margin-top:10px;"></div>'+
      '</div>';
  }

  var html = '';
  if(maxRound > lastDrawnRound || !lastDrawnRound){
    html += buildSection(maxRound, false, 'pre');
  }
  if(lastDrawnRound){
    html += buildSection(lastDrawnRound, true, 'drawn');
  }
  document.getElementById('detailBody').innerHTML = html || '<div class="no-detail">표시할 데이터가 없습니다.</div>';
}

function toggleSectionDetail(sectionId){
  var results = MLL.loadResults();
  var rounds = Object.keys(results).map(Number).sort(function(a,b){return b-a;});
  var lastDrawnRound = rounds[0]||0;
  var srList = MLL.loadStrategyResults();
  var maxRound = Math.max.apply(null, srList.map(function(sr){return sr.round;}));
  var targetRound = sectionId==='drawn' ? lastDrawnRound : maxRound;
  var isDrawn = sectionId==='drawn';

  var el = document.getElementById('secDetail-'+sectionId);
  if(el.style.display==='block'){ el.style.display='none'; return; }
  el.style.display='block';

  var winData = isDrawn ? (results[targetRound]||results[Number(targetRound)]||results[String(targetRound)]) : null;
  var winNums = winData?winData.nums:[];
  var srInRound = srList.filter(function(sr){ return sr.round===targetRound; });
  var allRounds2 = Object.keys(results).map(Number).sort(function(a,b){return b-a;});

  function calcStats(nums){
    var best=null,last=null;
    allRounds2.forEach(function(rnd){
      var wr=results[rnd]; if(!wr||!wr.nums) return;
      var m=0; nums.forEach(function(n){if(wr.nums.indexOf(n)>=0)m++;});
      var b=nums.indexOf(wr.bonus)>=0;
      var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
      if(g>0&&(best===null||g<best)) best=g;
      if(rnd===allRounds2[0]) last=g;
    });
    return {best:best?best+'등':'-', last:(last&&last>0)?last+'등':'낙첨'};
  }

  var rowsHtml = '';
  var idx=1;
  srInRound.forEach(function(sr){
    (sr.numbers||[]).forEach(function(nums){
      var stats = calcStats(nums);
      var balls = nums.map(function(n){
        var isMatch = winNums.indexOf(n)>=0;
        var brd = isMatch?'2px solid #f5c518':'none';
        return '<span style="display:inline-flex;width:18px;height:18px;border-radius:50%;background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';align-items:center;justify-content:center;font-size:7px;font-weight:700;border:'+brd+';margin-right:1px;">'+n+'</span>';
      }).join('');
      rowsHtml += '<tr style="border-bottom:1px solid #f5f5f5;">'+
        '<td style="font-size:9px;color:#aaa;padding:3px 4px;">'+(idx++)+'</td>'+
        '<td style="font-size:9px;font-weight:700;padding:3px 4px;">'+sr.round+'회</td>'+
        '<td style="font-size:9px;padding:3px 4px;color:'+(isDrawn?'#555':'#e03131')+';">'+(isDrawn?'추첨후':'미추첨')+'</td>'+
        '<td style="font-size:9px;font-weight:600;color:#7048e8;padding:3px 4px;">'+sr.strategyName+'</td>'+
        '<td style="padding:3px 4px;">'+balls+'</td>'+
        '<td style="font-size:9px;text-align:center;color:#e03131;padding:3px 4px;">'+stats.best+'</td>'+
        '<td style="font-size:9px;text-align:center;color:#1a7ad4;padding:3px 4px;">'+stats.last+'</td>'+
        '</tr>';
    });
  });

  el.innerHTML = '<table style="width:100%;border-collapse:collapse;">'+
    '<thead><tr style="border-bottom:2px solid #ddd;">'+
    '<th style="font-size:9px;padding:4px;">#</th>'+
    '<th style="font-size:9px;padding:4px;">회차</th>'+
    '<th style="font-size:9px;padding:4px;">추첨여부</th>'+
    '<th style="font-size:9px;padding:4px;">전략명</th>'+
    '<th style="font-size:9px;padding:4px;">생성번호</th>'+
    '<th style="font-size:9px;padding:4px;">역대최고</th>'+
    '<th style="font-size:9px;padding:4px;">직전등수</th>'+
    '</tr></thead><tbody>'+rowsHtml+'</tbody></table>';
}

function renderListExtra(){
  document.getElementById('detailBadge').textContent = '← 왼쪽에서 항목을 선택하세요';
  document.getElementById('statRow').style.display='none';
  document.getElementById('detailBody').innerHTML = '<div class="no-detail">← 왼쪽 목록에서 <b>세부사항</b> 버튼을 클릭하세요</div>';
}

// 개별 전략결과 엑셀 다운로드
function openMarkingForItem(sid){
  var sr = MLL.loadStrategyResults().find(function(s){return s.id===sid;});
  if(!sr || !sr.numbers || !sr.numbers.length){ alert('번호 데이터가 없습니다.'); return; }
  MLL.openMarkingModal(sr.numbers, sr.strategyName+'_제'+sr.round+'회');
}

function downloadItemExcel(sid){
  var sr = MLL.loadStrategyResults().find(function(s){return s.id===sid;});
  if(!sr) return;
  var now=new Date();
  var dateStr=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  var fileName=sr.strategyName+'_'+sr.round+'회_'+dateStr+'.xlsx';
  var script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload=function(){
    var rows=[['#','번호1','번호2','번호3','번호4','번호5','번호6','회차','전략명']];
    (sr.numbers||[]).forEach(function(nums,idx){
      rows.push([idx+1,nums[0],nums[1],nums[2],nums[3],nums[4],nums[5],sr.round,sr.strategyName]);
    });
    var ws=XLSX.utils.aoa_to_sheet(rows);
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'생성번호');
    XLSX.writeFile(wb,fileName);
  };
  document.head.appendChild(script);
}

// 개별 전략결과 PDF 다운로드
function downloadItemPDF(sid){
  var sr = MLL.loadStrategyResults().find(function(s){return s.id===sid;});
  if(!sr) return;
  var results = MLL.loadResults();
  var winData = results[sr.round]||results[Number(sr.round)]||results[String(sr.round)];
  var isDrawn = !!winData;
  var allRounds = Object.keys(results).map(Number).sort(function(a,b){return b-a;});

  function calcStats(nums){
    var best=null,last=null;
    allRounds.forEach(function(rnd){
      var wr=results[rnd]; if(!wr||!wr.nums) return;
      var m=0; nums.forEach(function(n){if(wr.nums.indexOf(n)>=0)m++;});
      var b=nums.indexOf(wr.bonus)>=0;
      var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
      if(g>0&&(best===null||g<best)) best=g;
      if(rnd===allRounds[0]) last=g;
    });
    return {best:best?best+'등':'-', last:(last&&last>0)?last+'등':'낙첨'};
  }

  var rowsHtml='';
  (sr.numbers||[]).forEach(function(nums,idx){
    var s=calcStats(nums);
    var numStr=nums.map(function(n){return (''+n).padStart(2,'0');}).join(' ');
    rowsHtml+='<tr><td style="text-align:right;color:#888;font-size:8px;">'+(idx+1).toString().padStart(3,'0')+'</td>'+
      '<td style="font-family:monospace;font-size:9px;">'+numStr+'</td>'+
      '<td style="text-align:center;font-size:8px;color:'+(s.best!=='-'? '#c00':'#bbb')+';">'+s.best+'</td>'+
      '<td style="text-align:center;font-size:8px;color:'+(s.last!=='낙첨'?'#00c':'#bbb')+';">'+s.last+'</td></tr>';
  });

  var printWin=window.open('','_blank');
  printWin.document.write(
    '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Lotto Lab Report</title><style>'+
    'body{font-family:serif;margin:0;padding:20px;font-size:10px;}'+
    'h1{text-align:center;font-size:22px;letter-spacing:2px;margin-bottom:4px;}'+
    '.sub{text-align:center;font-size:10px;color:#888;margin-bottom:14px;}'+
    'table{border-collapse:collapse;width:100%;}'+
    'th{background:#f5f5f5;padding:3px 6px;font-size:8px;border:1px solid #ccc;}'+
    'td{padding:2px 6px;border-bottom:1px solid #eee;}'+
    '@page{margin:12mm;}'+
    '</style></head><body>'+
    '<h1>'+sr.strategyName+'</h1>'+
    '<div class="sub">제'+sr.round+'회 '+(isDrawn?'추첨후':'추첨전')+' 기준 · '+(sr.numbers?sr.numbers.length:0)+'개 생성</div>'+
    '<table><thead><tr><th>#</th><th>번호조합</th><th>역대</th><th>직전</th></tr></thead><tbody>'+rowsHtml+'</tbody></table>'+
    '</body></html>'
  );
  printWin.document.close();
  setTimeout(function(){ printWin.print(); }, 500);
}

// 요약표 전체 엑셀 다운로드
function downloadSummaryExcel(sectionId, round, isDrawn){
  var srList = MLL.loadStrategyResults().filter(function(sr){return sr.round===round;});
  var results = MLL.loadResults();
  var winData = isDrawn ? (results[round]||results[Number(round)]||results[String(round)]) : null;
  var now=new Date();
  var dateStr=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
  var fileName='전략비교평가_'+round+'회_'+(isDrawn?'추첨후':'추첨전')+'_'+dateStr+'.xlsx';

  var script=document.createElement('script');
  script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload=function(){
    var header = isDrawn
      ? ['전략명','조합수','1등','2등','3등','4등','5등','당첨금','순위']
      : ['전략명','조합수'];
    var rows=[header];
    var calcList=[];
    srList.forEach(function(sr){
      var g=[0,0,0,0,0,0], prize=0;
      if(isDrawn && winData && sr.numbers){
        sr.numbers.forEach(function(nums){
          var m=0; nums.forEach(function(n){if(winData.nums.indexOf(n)>=0)m++;});

          var grade=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;

        });
      }
      calcList.push({name:sr.strategyName, count:sr.totalCount||sr.numbers.length, g:g, prize:prize});
    });
    // 순위 계산 (당첨금 내림차순 > 당첨수 내림차순 > 조합수 적은순)
    if(isDrawn){
      var ranked = calcList.slice().sort(function(a,b){
        if(b.prize!==a.prize) return b.prize-a.prize;
        var aw=a.g.reduce(function(s,x){return s+x;},0), bw=b.g.reduce(function(s,x){return s+x;},0);
        if(bw!==aw) return bw-aw;
        return a.count-b.count;
      });
      var rankMap={};
      ranked.forEach(function(r,i){ rankMap[r.name]=i+1; });
      calcList.forEach(function(r){ r.rank=rankMap[r.name]; });
    }
    calcList.forEach(function(r){
      var row = isDrawn
        ? [r.name, r.count, r.g[1],r.g[2],r.g[3],r.g[4],r.g[5], r.prize, r.rank]
        : [r.name, r.count];
      rows.push(row);
    });
    var ws=XLSX.utils.aoa_to_sheet(rows);
    var wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'전략비교');
    XLSX.writeFile(wb,fileName);
  };
  document.head.appendChild(script);
}

function calcRank(srList){
  // 추첨완료된 것만 순위 계산
  var drawn = srList.filter(function(sr){
    var res = MLL.loadResults();
    return !!(res[sr.round]||res[Number(sr.round)]||res[String(sr.round)]);
  });
  // 점수 계산
  drawn.forEach(function(sr){
    var res = MLL.loadResults();
    var winData = res[sr.round]||res[Number(sr.round)]||res[String(sr.round)];
    var totalPrize=0, winCount=0, bestGrade=99;
    if(winData && sr.numbers){
      sr.numbers.forEach(function(nums){
        var m=0; nums.forEach(function(n){if(winData.nums.indexOf(n)>=0)m++;});
        var b=nums.indexOf(winData.bonus)>=0;
        var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
        if(g>0){
          winCount++;
          if(g<bestGrade) bestGrade=g;
          var prizes=[0,winData.prize1||0,winData.prize2||0,winData.prize3||0,50000,5000];
          totalPrize+=prizes[g]||0;
        }
      });
    }
    sr._prize = totalPrize;
    sr._winCount = winCount;
    sr._bestGrade = bestGrade<99?bestGrade:0;
  });
  // 정렬
  drawn.sort(function(a,b){
    if(b._prize!==a._prize) return b._prize-a._prize;
    if(b._winCount!==a._winCount) return b._winCount-a._winCount;
    return (a.totalCount||0)-(b.totalCount||0);
  });
  var rankMap={};
  drawn.forEach(function(sr,i){ rankMap[sr.id]=i+1; });
  return rankMap;
}

function showDetail(id){
  selectedId = id;
  var srList = MLL.loadStrategyResults();
  var sr = srList.find(function(s){return s.id===id;});
  if(!sr) return;

  renderList();

  var results = MLL.loadResults();
  var winData = results[sr.round]||results[Number(sr.round)]||results[String(sr.round)];
  var isDrawn = !!winData;
  var winNums = isDrawn?winData.nums:[];
  var winBonus= isDrawn?winData.bonus:null;

  document.getElementById('detailBadge').textContent = sr.round+'회 · '+sr.strategyName+' · '+(sr.totalCount||0)+'개';
  document.getElementById('statRow').style.display='grid';

  var totalPrize=0,winCount=0,bestGrade=0;
  var numbers = sr.numbers||[];
  numbers.forEach(function(nums){
    if(!isDrawn) return;
    var m=0; nums.forEach(function(n){if(winNums.indexOf(n)>=0)m++;});
    var b=nums.indexOf(winBonus)>=0;
    var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
    if(g>0){
      winCount++;
      if(!bestGrade||g<bestGrade) bestGrade=g;
      var prizes=[0,winData.prize1||0,winData.prize2||0,winData.prize3||0,50000,5000];
      totalPrize+=prizes[g]||0;
    }
  });

  document.getElementById('dTotal').textContent = numbers.length+'개';
  document.getElementById('dWin').textContent = winCount>0?winCount+'개':'-';
  document.getElementById('dPrize').textContent = totalPrize>0?totalPrize.toLocaleString()+'원':'-';
  document.getElementById('dBest').textContent = bestGrade?bestGrade+'등':'-';

  // 번호 볼 표시
  if(!numbers.length){
    document.getElementById('detailBody').innerHTML='<div class="no-detail">번호 데이터가 없습니다.</div>';
    return;
  }

  var html='';
  // 당첨번호 먼저 표시
  if(isDrawn){
    html+='<div style="padding:8px 0 12px;border-bottom:1px solid #eee;margin-bottom:10px;">'+
      '<div style="font-size:10px;font-weight:700;color:#555;margin-bottom:6px;">🏆 당첨번호</div>'+
      '<div class="ball-row">';
    winNums.forEach(function(n){
      html+='<span class="ball-num" style="background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';">'+n+'</span>';
    });
    html+='<span style="font-size:12px;color:#aaa;margin:0 4px;">+</span>';
    html+='<span class="ball-num" style="background:#fff;border:2px solid #aaa;color:#555;">'+winBonus+'</span>';
    html+='<span style="font-size:9px;color:#aaa;margin-left:4px;">(보너스)</span>';
    html+='</div></div>';
  }

  html+='<div style="font-size:10px;font-weight:700;color:#555;margin-bottom:8px;">생성번호 ('+numbers.length+'개)</div>';
  numbers.forEach(function(nums,idx){
    var grade=0;
    if(isDrawn){
      var m=0; nums.forEach(function(n){if(winNums.indexOf(n)>=0)m++;});
      var b=nums.indexOf(winBonus)>=0;
      grade=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
    }
    var gradeColors=['','#e03131','#e67700','#1a7ad4','#2f9e44','#888'];
    var rowBg = grade>0?'background:#fffde0;border-radius:4px;padding:2px 4px;':'';
    html+='<div class="ball-row" style="'+rowBg+'">';
    html+='<span class="row-idx" style="color:#bbb;">'+(idx+1)+'</span>';
    nums.forEach(function(n){
      var isMatch=winNums.indexOf(n)>=0;
      var isBonus=n===winBonus&&!isMatch;
      var bg=isBonus?'#fff':MLL.BC(n);
      var tc=isBonus?'#555':MLL.TC(n);
      var brd=isMatch?'2px solid #f5c518':isBonus?'2px solid #aaa':'none';
      html+='<span class="ball-num" style="background:'+bg+';color:'+tc+';border:'+brd+';">'+n+'</span>';
    });
    if(grade>0){
      html+='<span class="row-grade" style="color:'+gradeColors[grade]+';margin-left:4px;">'+grade+'등</span>';
    }
    html+='</div>';
  });
  document.getElementById('detailBody').innerHTML=html;
}

<script>
// =====================================================
// ⚠️⚠️⚠️ 매우 중요한 보안 경고 ⚠️⚠️⚠️
// 이 코드는 "지금 당장 동작을 보고 싶다"는 명시적 요청에 따라
// 위험을 감수하고 구현된 테스트용 코드입니다.
//
// makinglotto.com의 관리자 인증정보(HTTP Basic Auth)가 이 파일에
// 평문으로 포함되어 있습니다. 이 페이지의 "소스 보기"를 하는 누구나
// 그 인증정보를 그대로 가져갈 수 있습니다.
//
// 절대로 이 상태로 외부에 공개 배포하거나 실제 서비스에 올리면 안 됩니다.
// My Lotto Lab 서버가 구축되면, 이 인증정보는 반드시 서버 환경변수로
// 옮기고, 이 파일의 직접 호출 코드는 전부 제거해야 합니다.
// (설계서 v1.2, 4.5.1절 참고)
// =====================================================

if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.MARKING_CONFIG = {
  baseUrl: 'https://makinglotto.com',
  loginUrl: 'https://makinglotto.com/admin/starter/8w6q5ndxdwsua52b',
  mainPageUrl: 'https://makinglotto.com/lottomaking',
  slipdownUrl: 'https://makinglotto.com/lottomaking/slipdown',
  authUser: 'admin',
  authPass: 'ysw6673', // ⚠️ 평문 노출, 테스트 전용. 서버 이전 시 즉시 제거할 것.
  chunkSize: 15,
  defaultCid: '158',
  pricePerSheet: 300,   // 전표용지 1매당 300원
  gamesPerSheet: 5,      // 마킹용지 1매(A~E)에 들어가는 게임(번호조합) 수
  extraImagePrice: 500, // 이미지 1개 추가(2개째부터)당 500원
  imageBasePath: '' // 캐릭터 이미지 경로: 현재는 HTML 파일과 같은 위치(루트)에 직접 올려둔 상태에 맞춤. 추후 character_images/ 같은 하위폴더로 정리하면 이 값만 'character_images/'로 바꾸면 전체 반영됨.
};

// ── 캐릭터 목록(이미지 폴더 스캔 대체: 정적 목록, 실제로는 145개 PNG 파일과 1:1) ──
MLL.getAvailableCharacterIds = function(){
  if (typeof MLL_CHAR_NAMES === 'undefined') return [];
  return Object.keys(MLL_CHAR_NAMES).map(Number).sort(function(a,b){return a-b;});
};
MLL.getCharacterName = function(cid){
  if (typeof MLL_CHAR_NAMES === 'undefined') return '';
  return MLL_CHAR_NAMES[String(cid)] || '';
};

// ── 캐릭터 선택 모달 상태 ──
MLL.markingState = { selectedCids: [], pendingRows: null, pendingFileBase: 'lotto_marking' };

MLL.openMarkingModal = function(rows, fileBase){
  if (!rows || !rows.length) { alert('받을 번호조합이 없습니다.'); return; }
  MLL.markingState.pendingRows = rows;
  MLL.markingState.pendingFileBase = fileBase || 'lotto_marking';
  MLL.markingState.selectedCids = [];
  MLL._renderMarkingModal();
  document.getElementById('mllMarkingModal').style.display = 'flex';
};

MLL._ensureMarkingModalDom = function(){
  if (document.getElementById('mllMarkingModal')) return;
  var overlay = document.createElement('div');
  overlay.id = 'mllMarkingModal';
  overlay.className = 'modal-overlay';
  // 외부 페이지의 CSS(부모 transform/contain 등)에 의해 position:fixed가 깨지는 것을 방지하기 위해
  // 핵심 위치 속성을 인라인 스타일로 강제 지정 (외부 스타일시트보다 우선 적용됨)
  overlay.setAttribute('style', 'position:fixed !important;top:0 !important;left:0 !important;right:0 !important;bottom:0 !important;width:100vw;height:100vh;background:rgba(0,0,0,.65);z-index:999999;display:none;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;');
  overlay.innerHTML =
    '<div class="modal-box" style="position:relative;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;background:#11152a;border:1px solid #252b48;border-radius:16px;padding:24px;box-sizing:border-box;">' +
      '<button class="modal-close-x" style="position:absolute;top:20px;right:20px;background:none;border:none;color:#5a6080;font-size:18px;cursor:pointer;" onclick="MLL.closeMarkingModal()">✕</button>' +
      '<h3 style="font-size:16px;font-weight:700;margin-bottom:8px;color:#eef0f6;display:flex;align-items:center;gap:7px;"><span style="font-size:18px;">🖨️</span> 로또인쇄 — 마킹용지 PDF로 받기</h3>' +
      '<p style="font-size:11.5px;color:#8b91ab;line-height:1.7;margin-bottom:14px;">실물 로또 판매점에 바로 제출 가능한 마킹용지 형태로 출력합니다. 이미지를 여러 개 선택하면 용지마다 순서대로 번갈아 적용됩니다.</p>' +
      '<div id="mllCharGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-height:320px;overflow-y:auto;padding:4px;border:1px solid #252b48;border-radius:10px;margin-bottom:14px;"></div>' +
      '<div id="mllMarkingPriceBox" style="font-size:12.5px;color:#8b91ab;margin-bottom:12px;"></div>' +
      '<div id="mllMarkingResultBox" style="margin-top:10px;padding:11px 14px;border-radius:9px;font-size:12px;display:none;"></div>' +
      '<button class="btn" style="width:100%;background:#2FBFA3;color:#fff;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;" onclick="MLL.submitMarkingRequest()">PDF 생성하기</button>' +
    '</div>';
  overlay.addEventListener('click', function(e){ if (e.target === overlay) MLL.closeMarkingModal(); });
  document.body.appendChild(overlay);
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') MLL.closeMarkingModal();
  });
};



MLL._renderMarkingModal = function(){
  MLL._ensureMarkingModalDom();
  var ids = MLL.getAvailableCharacterIds();
  var grid = document.getElementById('mllCharGrid');
  grid.innerHTML = ids.map(function(id){
    var name = MLL.getCharacterName(id);
    return '<div class="mll-char-card" data-cid="'+id+'" onclick="MLL.toggleCharacter('+id+')" style="cursor:pointer;border:2px solid var(--border,#252b48);border-radius:8px;overflow:hidden;text-align:center;background:var(--surface-2,#161b35);">' +
      '<img src="'+MLL.MARKING_CONFIG.imageBasePath+id+'.png" style="width:100%;aspect-ratio:2/1;object-fit:cover;display:block;" loading="lazy">' +
      '<div style="font-size:9px;padding:3px 2px;color:var(--text-dim,#8b91ab);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+id+(name?(' '+name.slice(0,8)):'')+'</div>' +
    '</div>';
  }).join('');
  MLL._updateMarkingPriceBox();
};

MLL.toggleCharacter = function(cid){
  var s = MLL.markingState;
  var idx = s.selectedCids.indexOf(cid);
  if (idx>=0) s.selectedCids.splice(idx,1);
  else s.selectedCids.push(cid);
  document.querySelectorAll('.mll-char-card').forEach(function(el){
    var on = s.selectedCids.indexOf(parseInt(el.dataset.cid))>=0;
    el.style.borderColor = on ? '#2FBFA3' : 'var(--border,#252b48)';
    el.style.boxShadow = on ? '0 0 0 2px rgba(47,191,163,.3)' : 'none';
  });
  MLL._updateMarkingPriceBox();
};

MLL._updateMarkingPriceBox = function(){
  var rows = MLL.markingState.pendingRows || [];
  var cfg = MLL.MARKING_CONFIG;
  var gameCount = rows.length;
  var sheetCount = Math.ceil(gameCount / cfg.gamesPerSheet); // 5게임당 1매, 나머지가 있으면 올림(1매 더)
  var imgCount = Math.max(1, MLL.markingState.selectedCids.length); // 0개 선택시 디폴트 1개 취급
  var sheetCost = sheetCount * cfg.pricePerSheet;
  var extraImgCost = Math.max(0, imgCount-1) * cfg.extraImagePrice;
  var total = sheetCost + extraImgCost;
  document.getElementById('mllMarkingPriceBox').innerHTML =
    gameCount+'게임 → 용지 '+sheetCount+'매('+cfg.gamesPerSheet+'게임/매) × '+cfg.pricePerSheet.toLocaleString()+'원 = '+sheetCost.toLocaleString()+'원' +
    (extraImgCost>0 ? ' + 이미지 추가 '+(imgCount-1)+'개 × '+cfg.extraImagePrice.toLocaleString()+'원 = '+extraImgCost.toLocaleString()+'원' : ' (이미지 1개는 무료)') +
    '<br><b style="color:#2FBFA3;font-size:14px;">합계: '+total.toLocaleString()+'원</b>' +
    '<div style="font-size:10px;color:var(--text-faint,#5a6080);margin-top:4px;">⚠️ 테스트 모드: 현재는 실제 포인트 차감 없이 동작만 확인합니다. (서버 구축 후 정식 차감 적용)</div>';
};

MLL.closeMarkingModal = function(){
  var el = document.getElementById('mllMarkingModal');
  if (el) el.style.display = 'none';
};

MLL._showMarkingResult = function(type, msg){
  var box = document.getElementById('mllMarkingResultBox');
  box.style.display = 'block';
  box.style.background = type==='error' ? 'rgba(212,83,94,.1)' : 'rgba(63,179,127,.1)';
  box.style.border = '1px solid ' + (type==='error' ? 'rgba(212,83,94,.25)' : 'rgba(63,179,127,.25)');
  box.style.color = type==='error' ? '#D4537E' : '#3FB37F';
  box.textContent = msg;
};

// ── makinglotto.com 연동 ──
MLL.submitMarkingRequest = function(){
  var rows = MLL.markingState.pendingRows;
  if (!rows || !rows.length) { MLL._showMarkingResult('error','받을 번호조합이 없습니다.'); return; }
  MLL._showMarkingResult('success', '⏳ PDF 생성 요청 중입니다... (여러 페이지인 경우 다소 시간이 걸려요)');
  MLL._runMarkingPipeline(rows, MLL.markingState.selectedCids, MLL.markingState.pendingFileBase);
};

MLL._runMarkingPipeline = async function(rows, cids, fileBase){
  var cfg = MLL.MARKING_CONFIG;
  if (!cids || !cids.length) cids = [parseInt(cfg.defaultCid)];

  var chunks = [];
  for (var i=0; i<rows.length; i+=cfg.chunkSize) chunks.push(rows.slice(i, i+cfg.chunkSize));

  try {
    // 1) 로그인 (브라우저 fetch는 CORS 정책상 실패할 가능성이 높음 - 그 경우 명확히 안내)
    var authHeader = 'Basic ' + btoa(cfg.authUser + ':' + cfg.authPass);
    var pdfBlobs = [];

    for (var c=0; c<chunks.length; c++) {
      MLL._showMarkingResult('success', '⏳ '+(c+1)+'/'+chunks.length+' 페이지 생성 중...');
      // ⚠️ 캐릭터 순환의 현실적 한계:
      // makinglotto.com API는 한 번 호출에 최대 15게임까지만 처리하며, 응답도 "그 청크 전체에 1개의 캐릭터"로 옵니다.
      // 따라서 "용지 1매(게임 1개)마다 다른 캐릭터"를 완벽히 구현하려면 게임 1개당 API를 1번씩 호출해야 하는데,
      // 이 경우 60게임 기준 호출이 4번 -> 60번으로 늘어나 처리 시간이 매우 길어지고 makinglotto.com 서버 부담도 커집니다.
      // 따라서 지금 구현은 "15게임(청크) 단위로 캐릭터를 순환"하는 실용적 절충안입니다.
      // 진짜 게임 1개 단위 순환이 꼭 필요하면, 청크 크기를 1로 낮추고 처리시간 증가를 감안해야 합니다(설계서 v1.2, 4.5.3절 비고로 별도 협의 필요).
      var chunkRows = chunks[c];
      var cid = cids[c % cids.length];

      var payload = { cid: String(cid), rows: chunkRows };
      var form = new FormData();
      form.append('data', new Blob([JSON.stringify(payload)], {type:'application/json'}));

      var resp = await fetch(cfg.slipdownUrl, {
        method: 'POST',
        headers: { 'Authorization': authHeader, 'X-Requested-With': 'XMLHttpRequest' },
        body: form
      });

      if (!resp.ok) throw new Error('서버 응답 오류 (코드 '+resp.status+')');
      var blob = await resp.blob();
      if (blob.size < 500) throw new Error('PDF 생성 실패 (빈 응답)');
      pdfBlobs.push(blob);
      await new Promise(function(r){ setTimeout(r, 500); }); // 요청 간격 (서버 부담 방지)
    }

    // 2) 병합 (브라우저에서는 pypdf 대신 pdf-lib 사용)
    MLL._showMarkingResult('success', '⏳ 페이지 병합 중...');
    var mergedBlob = await MLL._mergePdfBlobs(pdfBlobs);

    // 3) 다운로드
    var url = URL.createObjectURL(mergedBlob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileBase + '_마킹용지.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    MLL._showMarkingResult('success', '✅ 마킹용지 PDF 생성 완료! ('+rows.length+'게임, '+chunks.length+'페이지)');
  } catch(e) {
    MLL._showMarkingResult('error',
      '⚠️ PDF 생성 실패: ' + e.message +
      ' — 브라우저에서 외부 서버(makinglotto.com)로 직접 요청 시 CORS(보안 정책)로 막힐 수 있습니다. ' +
      '이 기능은 서버가 구축된 뒤 서버를 통해 호출해야 안정적으로 동작합니다.');
    console.error('[MLL marking] error:', e);
  }
};

// pdf-lib 동적 로드 + 병합
MLL._pdfLibLoaded = false;
MLL._loadPdfLib = function(){
  return new Promise(function(resolve, reject){
    if (MLL._pdfLibLoaded && window.PDFLib) { resolve(); return; }
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    script.onload = function(){ MLL._pdfLibLoaded = true; resolve(); };
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

MLL._mergePdfBlobs = async function(blobs){
  await MLL._loadPdfLib();
  var merged = await PDFLib.PDFDocument.create();
  for (var i=0; i<blobs.length; i++) {
    var bytes = await blobs[i].arrayBuffer();
    var src = await PDFLib.PDFDocument.load(bytes);
    var pages = await merged.copyPages(src, src.getPageIndices());
    pages.forEach(function(p){ merged.addPage(p); });
  }
  var mergedBytes = await merged.save();
  return new Blob([mergedBytes], {type:'application/pdf'});
};
