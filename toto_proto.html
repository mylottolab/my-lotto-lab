<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 토토·프로토 시뮬레이터</title>
<style>
:root{
  --bg:#0a0d18; --surface:#11152a; --surface-2:#161b35;
  --border:#252b48; --border-soft:#1b2038;
  --text:#eef0f6; --text-dim:#8b91ab; --text-faint:#5a6080;
  --gold:#e0b341; --gold-dim:#8a6f2f;
  --green:#3fb37f; --green-dim:#1e7b4d;
  --red:#d4537e; --blue:#5b9bd5;
  --game-accent:#3fb37f;
}
*{box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;font-size:14px;letter-spacing:-0.01em;min-height:100vh;margin:0;}
.font-num{font-variant-numeric:tabular-nums;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}

.topbar{border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg);z-index:50;}
.topbar-inner{max-width:1180px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:11px;}
.brand-mark{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 32% 28%, #7fdba6, var(--green) 60%, var(--green-dim));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.brand-name{font-size:15px;font-weight:700;}
.brand-sub{font-size:10.5px;color:var(--text-faint);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.points-badge{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;}
.points-badge .lbl{font-size:11px;color:var(--text-dim);}
.points-badge .val{font-size:14px;font-weight:700;color:var(--gold);}

.lotto-wrap{position:relative;}
.lotto-switch{display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:12px;cursor:pointer;border:1px solid var(--border);padding:6px 12px;border-radius:7px;background:none;font-family:inherit;}
.lotto-switch:hover{border-color:var(--green-dim);color:var(--text);}
.lotto-menu{display:none;position:absolute;right:0;top:42px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:200px;z-index:50;}
.lotto-menu.show{display:block;}
.lotto-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;font-size:12.5px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--border-soft);}
.lotto-item > span:first-child{display:flex;align-items:center;gap:8px;}
.lotto-item:last-child{border-bottom:none;}
.lotto-item:hover{background:var(--surface-2);}
.lotto-item.active{color:var(--green);}
.lotto-item .soon{font-size:9px;color:var(--text-faint);border:1px solid var(--border);padding:2px 7px;border-radius:20px;}
.flag-ic{display:inline-block;width:18px;height:13px;border-radius:2px;background-size:cover;background-position:center;vertical-align:middle;box-shadow:0 0 0 1px rgba(255,255,255,.08);flex-shrink:0;}
.flag-kr{background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect width='30' height='20' fill='%23fff'/%3E%3Cg transform='translate(15,10)'%3E%3Ccircle r='4.2' fill='%23c60c30'/%3E%3Cpath d='M0,-4.2 A4.2,4.2 0 0 1 0,4.2 A2.1,2.1 0 0 1 0,0 A2.1,2.1 0 0 0 0,-4.2 Z' fill='%23003478'/%3E%3C/g%3E%3C/svg%3E");}
.flag-us{background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect width='30' height='20' fill='%23b22234'/%3E%3Cg fill='%23fff'%3E%3Crect y='1.54' width='30' height='1.54'/%3E%3Crect y='4.62' width='30' height='1.54'/%3E%3Crect y='7.69' width='30' height='1.54'/%3E%3Crect y='10.77' width='30' height='1.54'/%3E%3Crect y='13.85' width='30' height='1.54'/%3E%3Crect y='16.92' width='30' height='1.54'/%3E%3C/g%3E%3Crect width='13' height='10.77' fill='%233c3b6e'/%3E%3C/svg%3E");}
.flag-eu{background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 20'%3E%3Crect width='30' height='20' fill='%23003399'/%3E%3Ccircle cx='15' cy='10' r='6' fill='none' stroke='%23ffcc00' stroke-width='1'/%3E%3C/svg%3E");}

.wrap{max-width:1180px;margin:0 auto;padding:24px;}

.main-tabs{display:flex;gap:10px;margin-bottom:20px;}
.main-tab{flex:1;background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:18px 20px;cursor:pointer;transition:border-color .15s, transform .1s;}
.main-tab:hover{transform:translateY(-1px);}
.main-tab.active{border-color:var(--tab-accent);box-shadow:0 0 0 1px var(--tab-accent);}
.main-tab .mt-icon{font-size:20px;margin-right:8px;}
.main-tab .mt-title{font-size:16px;font-weight:700;display:inline;}
.main-tab .mt-desc{font-size:11.5px;color:var(--text-faint);margin-top:6px;}

.sport-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.sport-tab{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:13px 16px;cursor:pointer;}
.sport-tab.active{border-color:var(--game-accent);box-shadow:0 0 0 1px var(--game-accent);}
.sport-tab .st-name{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:6px;}
.sport-tab .st-dot{width:8px;height:8px;border-radius:50%;background:var(--game-accent);}
.sport-tab .st-sub{font-size:10.5px;color:var(--text-faint);margin-top:3px;}

.info-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:18px 22px;margin-bottom:20px;display:flex;gap:28px;flex-wrap:wrap;}
.info-item .k{font-size:10.5px;color:var(--text-faint);margin-bottom:3px;}
.info-item .v{font-size:14.5px;font-weight:700;color:var(--text);}
.info-item .v.accent{color:var(--game-accent);}

.section-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-soft);margin-bottom:20px;}
.section-tab{padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--text-faint);border-bottom:2px solid transparent;}
.section-tab.active{color:var(--text);border-bottom-color:var(--game-accent);}
.section-tab:hover{color:var(--text-dim);}

.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:14px;padding:22px;margin-bottom:18px;}
.card h3{margin:0 0 14px;font-size:15px;font-weight:700;}

.match-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.match-row{display:grid;grid-template-columns:36px 1fr 1fr 1fr 1fr;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:10px;padding:12px 14px;}
.match-row .mr-no{font-size:11px;color:var(--text-faint);font-weight:700;text-align:center;}
.match-row .mr-teams{font-size:13px;font-weight:600;}
.match-row .mr-teams .vs{color:var(--text-faint);font-weight:400;margin:0 6px;font-size:11px;}
.pick-btn{border:1px solid var(--border);background:var(--bg);color:var(--text-dim);border-radius:8px;padding:9px 4px;font-size:12.5px;font-weight:700;text-align:center;}
.pick-btn.on{background:var(--game-accent);color:#06140d;border-color:var(--game-accent);}
.pick-btn:hover{border-color:var(--game-accent);}

.action-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.cnt-in{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:7px;text-align:center;padding:9px 10px;font-size:13px;font-weight:600;outline:none;}
.btn{border-radius:9px;padding:10px 18px;font-size:13px;font-weight:700;border:1px solid var(--border);background:var(--surface-2);color:var(--text);}
.btn-outline{background:transparent;}
.btn-accent{background:var(--game-accent);color:#06140d;border:none;}
.btn-accent:disabled{opacity:.4;cursor:not-allowed;}
.btn:hover{filter:brightness(1.08);}

.sel-summary{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:12.5px;color:var(--text-dim);margin-bottom:14px;}
.sel-summary b{color:var(--game-accent);}

table.data-table{width:100%;border-collapse:collapse;font-size:12.5px;}
table.data-table thead th{background:var(--surface-2);color:var(--text-dim);font-size:10.5px;font-weight:600;padding:9px 10px;text-align:center;white-space:nowrap;}
table.data-table tbody td{padding:9px 10px;text-align:center;border-bottom:1px solid var(--border-soft);}
table.data-table tbody tr:hover{background:var(--surface-2);}

.grade-tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;}
.grade-tag.win{background:rgba(63,179,127,.16);color:var(--green);}
.grade-tag.lose{background:var(--surface-2);color:var(--text-faint);}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.stat-box{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:12px;padding:16px 18px;}
.stat-box .slabel{font-size:11px;color:var(--text-faint);margin-bottom:6px;}
.stat-box .sval{font-size:22px;font-weight:800;color:var(--game-accent);}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px;}
.history-row:hover{background:var(--surface-2);}
.help-btn{width:18px;height:18px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text-faint);font-size:10.5px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;line-height:1;margin-left:6px;}
.help-btn:hover{border-color:var(--game-accent,var(--green));color:var(--text);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;padding:26px;}
.modal-box h3{margin:0 0 12px;font-size:16px;}
.modal-box p{font-size:13px;color:var(--text-dim);line-height:1.6;margin:0 0 18px;}

.admin-lock{display:flex;flex-direction:column;align-items:center;gap:12px;padding:30px;color:var(--text-faint);}
.admin-lock input{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 14px;font-size:13px;text-align:center;}

@media (max-width:680px){
  .main-tabs{flex-direction:column;}
  .match-row{grid-template-columns:28px 1fr;grid-template-rows:auto auto;}
  .match-row .pick-btn{grid-column:span 1;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">⚽</div>
      <div>
        <div class="brand-name" id="brandName">My Lotto Lab — 토토·프로토</div>
        <div class="brand-sub" id="brandSub">소액으로 연습하는 스포츠 베팅 시뮬레이터</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="lotto-wrap">
        <button class="lotto-switch" id="lottoBtn" onclick="toggleLottoMenu()">
          <span style="font-size:13px;">⚽</span> <span id="lottoBtnLabel">토토·프로토</span> ▾
        </button>
        <div class="lotto-menu" id="lottoMenu">
          <div class="lotto-item" onclick="location.href='main_page.html'"><span><span class="flag-ic flag-kr"></span> <span data-lotto-name-kr="한국 로또" data-lotto-name-en="Korea Lotto">한국 로또</span></span><span class="soon" id="lottoTag_KRLOTTO" style="color:#9aa8f5;border-color:#4a52a8;">메인</span></div>
          <div class="lotto-item" onclick="location.href='global_lotto.html?game=POWERBALL'"><span><span class="flag-ic flag-us"></span> <span data-lotto-name-kr="파워볼" data-lotto-name-en="Powerball">파워볼</span></span><span class="soon" id="lottoTag_PB" style="color:#9aa8f5;border-color:#4a52a8;">GLOBAL</span></div>
          <div class="lotto-item" onclick="location.href='global_lotto.html?game=MEGAMILLIONS'"><span><span class="flag-ic flag-us"></span> <span data-lotto-name-kr="메가밀리언스" data-lotto-name-en="Mega Millions">메가밀리언스</span></span><span class="soon" id="lottoTag_MM" style="color:#9aa8f5;border-color:#4a52a8;">GLOBAL</span></div>
          <div class="lotto-item" onclick="location.href='global_lotto.html?game=EUROMILLIONS'"><span><span class="flag-ic flag-eu"></span> <span data-lotto-name-kr="유로밀리언스" data-lotto-name-en="EuroMillions">유로밀리언스</span></span><span class="soon" id="lottoTag_EM" style="color:#9aa8f5;border-color:#4a52a8;">GLOBAL</span></div>
          <div class="lotto-item active" onclick="toggleLottoMenu()"><span>⚽ <span data-lotto-name-kr="토토·프로토" data-lotto-name-en="Toto·Proto">토토·프로토</span></span><span class="soon" id="lottoTag_TOTO" style="color:var(--green);border-color:var(--green-dim);">이용중</span></div>
        </div>
      </div>
      <button onclick="location.href='hub_lounge.html'" style="display:flex;align-items:center;gap:6px;color:var(--text-dim);font-size:11.5px;cursor:pointer;border:1px solid var(--border);padding:6px 12px;border-radius:7px;background:none;font-family:inherit;">
        👤 <span>회원·Lounge</span>
      </button>
      <div class="lang-toggle" style="display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <button id="langKrBtn" onclick="APP.setLang('kr')" style="background:var(--gold);color:#1a1305;border:none;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;">KR</button>
        <button id="langEnBtn" onclick="APP.setLang('en')" style="background:var(--surface);color:var(--text-dim);border:none;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;">EN</button>
      </div>
      <div class="points-badge">
        <span class="lbl" id="pointsLabel">포인트</span>
        <span class="val font-num" id="pointsBalance">0</span>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="main-tabs" id="mainTabs"></div>
  <div id="mainTabBody"></div>
</div>

<!-- 등록 확인 모달 -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h3 id="confirmTitle">등록 확인</h3>
    <p id="confirmBody" style="white-space:pre-line;"></p>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-outline" style="flex:1;" id="confirmCancelBtn" onclick="APP.closeConfirm()">취소</button>
      <button class="btn btn-accent" style="flex:2;" id="confirmOkBtn" onclick="APP.confirmRegister()">확인하고 등록</button>
    </div>
  </div>
</div>

<!-- 회차결과 한장 요약 팝업 -->
<div class="modal-overlay" id="resultModal" onclick="if(event.target===this)APP.closeResultPopup()">
  <div class="modal-box" id="resultModalBox"></div>
</div>

<!-- 종목별 간단 설명 팝업 -->
<div class="modal-overlay" id="helpModal" onclick="if(event.target===this)APP.closeHelp()">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
      <h3 id="helpTitle">?</h3>
      <button onclick="APP.closeHelp()" style="background:none;border:none;color:var(--text-faint);font-size:18px;cursor:pointer;">✕</button>
    </div>
    <p id="helpBody" style="line-height:1.7;"></p>
  </div>
</div>

<script src="toto_engine.js?v=20260629b"></script>
<script src="toto_app.js?v=20260629b"></script>
<script src="https://my-lotto-lab-api.onrender.com/pay/auth_gate.js"></script>
</body>
</html>
