<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Lotto Lab - 당첨결과 빠른입력</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:#0f0f1a;color:#fff;font-size:14px;min-height:100vh;padding-bottom:40px;}
.header{background:#1c1c2e;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header .title{font-size:15px;font-weight:700;}
.header .sub{font-size:10px;color:#888;margin-top:2px;}
.btn-logout{background:none;border:1px solid #444;color:#aaa;padding:5px 10px;border-radius:6px;font-size:11px;}

.main{max-width:480px;margin:0 auto;padding:14px;}

/* 로그인 */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-box{background:#1c1c2e;border:1px solid #2a2a40;border-radius:14px;padding:30px 26px;width:100%;max-width:340px;text-align:center;}
.login-icon{font-size:36px;margin-bottom:10px;}
.login-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:11px;color:#888;margin-bottom:18px;}
.pw-input{width:100%;background:#0f0f1a;border:1px solid #333;border-radius:8px;padding:12px 14px;font-size:15px;color:#fff;margin-bottom:10px;text-align:center;}
.pw-input:focus{border-color:#e03131;outline:none;}
.btn-login{width:100%;background:#e03131;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;}
.login-err{color:#ff8a8a;font-size:11px;margin-top:8px;display:none;}

.admin-content{display:none;}

.section{background:#1c1c2e;border:1px solid #2a2a40;border-radius:12px;padding:16px;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:11.5px;color:#9aa0c0;margin-bottom:6px;font-weight:600;}
.field .hint{font-size:10px;color:#666;margin-top:4px;}
input[type=number], input[type=text], textarea{
  width:100%;background:#0f0f1a;border:1px solid #333;border-radius:8px;
  padding:12px 14px;font-size:15px;color:#fff;
}
input:focus, textarea:focus{border-color:#e03131;outline:none;}
textarea{resize:vertical;min-height:64px;font-family:inherit;}

.balls-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.balls-row input{padding:12px 4px;text-align:center;font-weight:700;}
.bonus-row{margin-top:8px;}
.bonus-row input{max-width:110px;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.three-col .field label{font-size:10.5px;}

.btn-submit{width:100%;background:linear-gradient(135deg,#e03131,#c92a2a);color:#fff;border:none;border-radius:10px;
  padding:15px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(224,49,49,.35);margin-top:6px;}
.btn-submit:active{transform:translateY(1px);}
.btn-submit:disabled{background:#444;box-shadow:none;}

.msg{padding:11px 14px;border-radius:8px;font-size:12.5px;margin-top:12px;line-height:1.6;display:none;}
.msg.show{display:block;}
.msg-success{background:#0d2b1a;border:1px solid #2f9e44;color:#6fcf97;}
.msg-error{background:#2b0d0d;border:1px solid #e03131;color:#ff8a8a;}
.msg-info{background:#0d1a2b;border:1px solid #1a7ad4;color:#74b9ff;}

.round-badge{display:inline-flex;align-items:center;gap:6px;background:#0f1330;border:1px solid #2a2a40;
  border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;color:#e0b341;margin-bottom:4px;}

/* 과거 회차 조회 */
.history-toggle{width:100%;background:#0f1330;border:1px solid #2a2a40;color:#c7cbe0;border-radius:10px;
  padding:12px 14px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.history-body{display:none;margin-top:10px;}
.history-body.open{display:block;}
.history-search{width:100%;background:#0f0f1a;border:1px solid #333;border-radius:8px;padding:9px 12px;font-size:13px;color:#fff;margin-bottom:10px;}
.res-wrap{overflow-x:auto;border:1px solid #2a2a40;border-radius:8px;max-height:360px;overflow-y:auto;}
.res-table{width:100%;border-collapse:collapse;font-size:10.5px;white-space:nowrap;}
.res-table th{background:#0f0f1a;padding:7px 8px;color:#888;font-weight:600;border-bottom:1px solid #2a2a40;position:sticky;top:0;}
.res-table td{padding:6px 8px;border-bottom:1px solid #1a1a2e;color:#ccc;}
.res-table tr:hover td{background:#1a1a30;}
.ball-sm{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;margin:1px;}
.btn-del-round{background:none;border:1px solid #3a1a1a;color:#e03131;border-radius:4px;padding:2px 7px;font-size:9px;cursor:pointer;}

@media (max-width:380px){
  .two-col, .three-col{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">📝 당첨결과 빠른입력</div>
    <div class="sub">회차 1건만 등록 · 나머지 데이터는 그대로 유지</div>
  </div>
  <button class="btn-logout" id="btnLogout" style="display:none;" onclick="doLogout()">로그아웃</button>
</div>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🔒</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">Render ADMIN_API_KEY를 입력하세요</div>
    <input type="text" class="pw-input" id="pwInput" placeholder="관리자 키" autocomplete="off">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">키가 올바르지 않을 수 있습니다.</div>
  </div>
</div>

<div class="main admin-content" id="adminContent">

  <div class="section">
    <div class="round-badge" id="roundBadge">회차 계산 중...</div>
    <div class="field" style="margin-top:10px;">
      <label>회차</label>
      <input type="number" id="f-round" inputmode="numeric" placeholder="예: 1232">
      <div class="hint">보통 자동으로 채워지는 다음 회차 그대로 쓰시면 됩니다. 지난 회차를 고치고 싶으면 숫자만 바꾸세요.</div>
    </div>
  </div>

  <div class="section">
    <button class="history-toggle" onclick="toggleHistory()">
      <span>📋 과거 회차 조회</span>
      <span id="historyArrow">▼</span>
    </button>
    <div class="history-body" id="historyBody">
      <input type="text" class="history-search" id="historySearch" placeholder="회차 검색 (예: 1230)" oninput="renderHistory()">
      <div class="res-wrap">
        <table class="res-table">
          <thead><tr>
            <th>회차</th><th>추첨일</th><th>당첨번호</th><th>보너스</th>
            <th>1등</th><th>자/반/수</th><th>1등금액</th><th>2등</th><th>3등</th><th>삭제</th>
          </tr></thead>
          <tbody id="resTbody"></tbody>
        </table>
      </div>
      <button onclick="loadHistory()" style="margin-top:8px;background:#333;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:11px;cursor:pointer;">🔄 새로고침</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🎱 당첨번호</div>
    <div class="field">
      <label>번호 6개</label>
      <div class="balls-row">
        <input type="number" id="n1" inputmode="numeric" min="1" max="45">
        <input type="number" id="n2" inputmode="numeric" min="1" max="45">
        <input type="number" id="n3" inputmode="numeric" min="1" max="45">
        <input type="number" id="n4" inputmode="numeric" min="1" max="45">
        <input type="number" id="n5" inputmode="numeric" min="1" max="45">
        <input type="number" id="n6" inputmode="numeric" min="1" max="45">
      </div>
    </div>
    <div class="field bonus-row">
      <label>보너스번호</label>
      <input type="number" id="f-bonus" inputmode="numeric" min="1" max="45">
    </div>
  </div>

  <div class="section">
    <div class="section-title">🥇 1등</div>
    <div class="two-col">
      <div class="field">
        <label>당첨게임수</label>
        <input type="number" id="f-winners1" inputmode="numeric">
      </div>
      <div class="field">
        <label>1게임당 당첨금액(원)</label>
        <input type="number" id="f-prize1" inputmode="numeric">
      </div>
    </div>
    <div class="field">
      <label>구매형태별 당첨게임수</label>
      <div class="three-col">
        <div class="field"><label>자동</label><input type="number" id="f-auto" inputmode="numeric"></div>
        <div class="field"><label>반자동</label><input type="number" id="f-semi" inputmode="numeric"></div>
        <div class="field"><label>수동</label><input type="number" id="f-manual" inputmode="numeric"></div>
      </div>
    </div>
    <div class="field">
      <label>당첨점</label>
      <textarea id="f-shops" placeholder="(서울)OO복권방, (부산)OO마트 ..."></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🥈 2등 / 🥉 3등</div>
    <div class="two-col">
      <div class="field">
        <label>2등 당첨게임수</label>
        <input type="number" id="f-winners2" inputmode="numeric">
      </div>
      <div class="field">
        <label>2등 1게임당 당첨금액(원)</label>
        <input type="number" id="f-prize2" inputmode="numeric">
      </div>
    </div>
    <div class="two-col">
      <div class="field">
        <label>3등 당첨게임수</label>
        <input type="number" id="f-winners3" inputmode="numeric">
      </div>
      <div class="field">
        <label>3등 1게임당 당첨금액(원)</label>
        <input type="number" id="f-prize3" inputmode="numeric">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📌 특이사항 (선택)</div>
    <div class="field">
      <textarea id="f-note" placeholder="예: 서울 지역 1등 당첨 없음"></textarea>
    </div>
  </div>

  <button class="btn-submit" id="btnSubmit" onclick="submitResult()">💾 이 회차 저장하기</button>
  <div class="msg" id="resultMsg"></div>

</div>

<script>
var API = 'https://my-lotto-lab-api.onrender.com';
var adminKey = '';
var ROUND1_TS = new Date('2002-12-07T20:00:00+09:00').getTime();
var WEEK_MS = 7*24*60*60*1000;

function computeExpectedRound(){
  // ⚠ 이 화면은 "다음에 입력하실 회차"를 미리 보여주는 용도다.
  //   (아직 추첨 전인 회차 = 가장 최근 완료된 회차 + 1)
  var lastCompletedRound = Math.floor((Date.now() - ROUND1_TS) / WEEK_MS) + 1;
  return lastCompletedRound + 1;
}

function doLogin(){
  var key = document.getElementById('pwInput').value.trim();
  if(!key) return;
  adminKey = key;
  sessionStorage.setItem('mll_admin_key', key);
  enterAdmin();
}
function doLogout(){
  sessionStorage.removeItem('mll_admin_key');
  location.reload();
}
document.getElementById('pwInput').addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});

function enterAdmin(){
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
  document.getElementById('btnLogout').style.display = 'block';
  var r = computeExpectedRound();
  document.getElementById('roundBadge').textContent = '💡 다음 입력할 회차: 제' + r + '회';
  document.getElementById('f-round').value = r;
  loadHistory();
}

(function(){
  var saved = sessionStorage.getItem('mll_admin_key');
  if(saved){ adminKey = saved; enterAdmin(); }
})();

// ── 볼 색상 (common.js MLL.BC/TC와 동일 규칙, 이 페이지는 가볍게 유지하려고 직접 포함) ──
function ballBg(n){ return n<=10?'#f5c518':n<=20?'#1a7ad4':n<=30?'#e03131':n<=40?'#888888':'#2f9e44'; }
function ballTc(n){ return n<=10?'#7a5e00':'#ffffff'; }
function drawDateOf(round){
  var d = new Date(ROUND1_TS + (round-1)*WEEK_MS);
  return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
}

var _historyCache = {};

function toggleHistory(){
  var body = document.getElementById('historyBody');
  var arrow = document.getElementById('historyArrow');
  var opening = !body.classList.contains('open');
  body.classList.toggle('open');
  arrow.textContent = opening ? '▲' : '▼';
  if(opening && !Object.keys(_historyCache).length) loadHistory();
}

async function loadHistory(){
  var tbody = document.getElementById('resTbody');
  tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:16px;color:#666;">불러오는 중...</td></tr>';
  try {
    var data = await fetch(API + '/api/lotto/results').then(function(r){ return r.json(); });
    _historyCache = data.results || {};
    renderHistory();
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:16px;color:#e03131;">조회 실패: '+e.message+'</td></tr>';
  }
}

function renderHistory(){
  var tbody = document.getElementById('resTbody');
  var keyword = document.getElementById('historySearch').value.trim();
  var rounds = Object.keys(_historyCache).map(Number).sort(function(a,b){return b-a;});
  if(keyword) rounds = rounds.filter(function(r){ return String(r).indexOf(keyword) >= 0; });

  if(!rounds.length){
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:16px;color:#555;">데이터가 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = rounds.map(function(round){
    var r = _historyCache[round];
    var balls = r.nums.map(function(n){
      return '<span class="ball-sm" style="background:'+ballBg(n)+';color:'+ballTc(n)+';">'+n+'</span>';
    }).join('');
    return '<tr style="cursor:pointer;" onclick="loadForEdit('+round+')">' +
      '<td style="color:#e0b341;font-weight:700;">'+round+'회</td>' +
      '<td style="color:#888;">'+drawDateOf(round)+'</td>' +
      '<td>'+balls+'</td>' +
      '<td><span class="ball-sm" style="background:#fff;color:#555;border:1px solid #555;">'+r.bonus+'</span></td>' +
      '<td style="color:#f5c518;">'+(r.winners1||0)+'건</td>' +
      '<td style="font-size:9px;">'+(r.autoWin||0)+'/'+(r.semiWin||0)+'/'+(r.manualWin||0)+'</td>' +
      '<td style="color:#f5c518;">'+(r.prize1?r.prize1.toLocaleString():'-')+'</td>' +
      '<td>'+(r.winners2||0)+'건</td>' +
      '<td>'+(r.winners3||0)+'건</td>' +
      '<td><button class="btn-del-round" onclick="event.stopPropagation();deleteRound('+round+')">삭제</button></td>' +
      '</tr>';
  }).join('');
}

// 표에서 회차를 클릭하면 그 회차의 기존 데이터를 위 입력폼에 그대로 불러온다.
// (잘못 입력된 회차를 고칠 때 사용 — 고친 뒤 저장하면 같은 회차라 자동으로 덮어써짐)
function loadForEdit(round){
  var r = _historyCache[round];
  if(!r) return;
  document.getElementById('f-round').value = round;
  document.getElementById('n1').value = r.nums[0];
  document.getElementById('n2').value = r.nums[1];
  document.getElementById('n3').value = r.nums[2];
  document.getElementById('n4').value = r.nums[3];
  document.getElementById('n5').value = r.nums[4];
  document.getElementById('n6').value = r.nums[5];
  document.getElementById('f-bonus').value = r.bonus;
  document.getElementById('f-winners1').value = r.winners1 || 0;
  document.getElementById('f-prize1').value = r.prize1 || 0;
  document.getElementById('f-auto').value = r.autoWin || 0;
  document.getElementById('f-semi').value = r.semiWin || 0;
  document.getElementById('f-manual').value = r.manualWin || 0;
  document.getElementById('f-shops').value = r.winnerShops || '';
  document.getElementById('f-winners2').value = r.winners2 || 0;
  document.getElementById('f-prize2').value = r.prize2 || 0;
  document.getElementById('f-winners3').value = r.winners3 || 0;
  document.getElementById('f-prize3').value = r.prize3 || 0;
  document.getElementById('f-note').value = r.note || '';
  showMsg('info', '✏️ 제' + round + '회 데이터를 불러왔습니다. 수정 후 "이 회차 저장하기"를 누르면 덮어써집니다.');
  document.getElementById('f-round').scrollIntoView({ behavior:'smooth', block:'start' });
}

async function deleteRound(round){
  if(!confirm(round+'회 당첨결과를 삭제하시겠습니까?')) return;
  try {
    var resp = await fetch(API + '/api/lotto/results/' + round, { method:'DELETE', headers:{ 'x-admin-key': adminKey } });
    var data = await resp.json();
    if(!resp.ok){ alert('삭제 실패: ' + (data.error||'')); return; }
    delete _historyCache[round];
    renderHistory();
  } catch(e){
    alert('네트워크 오류: ' + e.message);
  }
}

function num(id){
  var v = document.getElementById(id).value;
  return v === '' ? 0 : Number(v);
}

async function submitResult(){
  var round = num('f-round');
  var nums = [num('n1'),num('n2'),num('n3'),num('n4'),num('n5'),num('n6')];
  var bonus = num('f-bonus');

  if(!round){ showMsg('error', '회차를 입력해주세요.'); return; }
  if(nums.some(function(n){return n<1 || n>45;})){ showMsg('error', '당첨번호 6개는 1~45 사이여야 합니다.'); return; }
  if(new Set(nums).size !== 6){ showMsg('error', '당첨번호 6개가 중복되지 않아야 합니다.'); return; }
  if(bonus<1 || bonus>45){ showMsg('error', '보너스번호를 확인해주세요.'); return; }

  var resultObj = {};
  resultObj[round] = {
    nums: nums,
    bonus: bonus,
    winners1: num('f-winners1'),
    prize1: num('f-prize1'),
    autoWin: num('f-auto'),
    semiWin: num('f-semi'),
    manualWin: num('f-manual'),
    winnerShops: document.getElementById('f-shops').value.trim(),
    winners2: num('f-winners2'),
    prize2: num('f-prize2'),
    winners3: num('f-winners3'),
    prize3: num('f-prize3'),
    note: document.getElementById('f-note').value.trim()
  };

  var btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  showMsg('info', '⏳ 저장 중입니다...');

  try {
    var resp = await fetch(API + '/api/lotto/results', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body: JSON.stringify({ results: resultObj })
    });
    var data = await resp.json();
    if(resp.status === 403){ showMsg('error', '⛔ 관리자 키가 올바르지 않습니다.'); btn.disabled = false; return; }
    if(!resp.ok){ showMsg('error', '⛔ 저장 실패: ' + (data.error || '')); btn.disabled = false; return; }
    showMsg('success', '✅ 제' + round + '회 저장 완료! (다른 회차는 그대로 유지됩니다)');
    loadHistory();
  } catch(e){
    showMsg('error', '⛔ 네트워크 오류: ' + e.message);
  }
  btn.disabled = false;
}

function showMsg(type, text){
  var el = document.getElementById('resultMsg');
  el.className = 'msg show msg-' + type;
  el.textContent = text;
  el.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
</script>

</body>
</html>
