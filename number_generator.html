<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Lotto Lab - 전략번호 생성</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif;}
body{background:#f3f4f6;font-size:13px;}
.header-inner{max-width:1200px;margin:0 auto;padding:0 14px;height:44px;display:flex;align-items:center;justify-content:space-between;background:#1c1c2e;border-radius:0 0 8px 8px;}
.logo-left{display:flex;align-items:center;gap:9px;cursor:pointer;}
.logo-icon{width:30px;height:30px;background:#e67700;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text .title{font-size:14px;font-weight:700;color:#fff;}
.logo-text .sub{font-size:9px;color:#aaa;}
.main{max-width:1200px;margin:0 auto;padding:12px 14px;display:grid;grid-template-columns:320px 1fr;gap:12px;}

/* 왼쪽 패널 */
.left-panel{display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;overflow:hidden;}
.card-head{padding:10px 14px;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.head-orange{background:linear-gradient(135deg,#e67700,#c85a00);}
.head-dark{background:#1c1c2e;}
.card-body{padding:12px 14px;}

/* 전략 선택 */
.strategy-item{padding:9px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background 0.1s;border-radius:6px;margin-bottom:3px;}
.strategy-item:hover{background:#fff8e1;}
.strategy-item.active{background:#fff3e0;border-left:3px solid #e67700;}
.si-name{font-size:12px;font-weight:700;color:#222;}
.si-info{font-size:9px;color:#aaa;margin-top:2px;}

/* 조건 요약 */
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px;}
.cond-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f5f5f5;}
.cond-key{color:#888;}
.cond-val{font-weight:700;color:#333;}

/* 생성 설정 */
.gen-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.gen-label{font-size:11px;color:#555;font-weight:600;white-space:nowrap;width:80px;}
.gen-input{flex:1;border:1px solid #ddd;border-radius:5px;padding:5px 8px;font-size:12px;outline:none;}
.gen-input:focus{border-color:#e67700;}
.gen-select{flex:1;border:1px solid #ddd;border-radius:5px;padding:5px 8px;font-size:12px;background:#fff;}
.est-box{background:#fff8e1;border:1px solid #f5c518;border-radius:6px;padding:8px;text-align:center;margin-bottom:10px;}
.est-num{font-size:22px;font-weight:700;color:#e67700;}
.est-label{font-size:9px;color:#888;}

/* 생성 버튼 */
.btn-gen{width:100%;background:linear-gradient(135deg,#e67700,#c85a00);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:6px;}
.btn-gen:disabled{background:#ccc;cursor:not-allowed;}
.btn-save{width:100%;background:#2f9e44;color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;display:none;}
.btn-compare{width:100%;background:#7048e8;color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;display:none;}

/* 오른쪽: 생성 결과 */
.result-head{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #eee;flex-wrap:wrap;}
.result-title{font-size:14px;font-weight:700;color:#333;}
.result-badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;}
.badge-orange{background:#fff3e0;color:#e67700;border:1px solid #e67700;}
.badge-green{background:#e8fff0;color:#2f9e44;border:1px solid #2f9e44;}
.badge-blue{background:#e8f4ff;color:#1a7ad4;border:1px solid #1a7ad4;}

/* 분석 패널 */
.analysis-panel{background:#1c1c2e;border-radius:8px;padding:12px 14px;margin:10px 14px;font-size:10px;color:#aaa;line-height:2;}
.analysis-panel .title{color:#f5c518;font-weight:700;font-size:11px;margin-bottom:6px;}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;}
.top-nums{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.top-ball{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;}

/* 번호 테이블 */
.num-table{width:100%;border-collapse:collapse;}
.num-table th{background:#f8f8f8;padding:5px 6px;font-size:9px;color:#555;border-bottom:1px solid #eee;text-align:center;position:sticky;top:0;z-index:2;}
.num-table td{padding:4px 6px;border-bottom:1px solid #f5f5f5;font-size:10px;text-align:center;vertical-align:middle;}
.num-table tr:hover td{background:#fffef0;}
.num-row{display:flex;gap:2px;align-items:center;justify-content:center;}
.ball-sm{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;}
.lw-badge{font-size:8px;color:#888;white-space:nowrap;}
.tw-wrap{overflow-y:auto;max-height:calc(100vh-200px);}
.empty-result{text-align:center;padding:60px;color:#bbb;font-size:13px;}
.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden;margin:6px 0;}
.progress-fill{height:100%;background:linear-gradient(90deg,#e67700,#f5c518);border-radius:2px;transition:width 0.3s;}
</style>
</head>
<body>
<script>
// =====================================================
// My Lotto Lab - 공통 모듈 (common.js)
// 모든 페이지에서 공유하는 데이터/함수
// =====================================================

// ── 전역 MLL 객체 (중복 로드 방지) ──
if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.ROUND1_TS = new Date('2002-12-07T20:00:00+09:00').getTime();
MLL.WEEK_MS   = 7 * 24 * 60 * 60 * 1000;
MLL.STORAGE_KEY       = 'mll_entries';      // 등록번호
MLL.RESULTS_KEY       = 'mll_results';      // 당첨결과
MLL.ADMIN_PW_KEY      = 'mll_admin_auth';   // 관리자 인증
MLL.SESSION_KEY       = 'mll_session';      // 현재 세션ID

// ── 세션ID 생성/조회 ──
// sessionStorage는 탭을 닫거나 새로고침 환경이 바뀌면 사라져서,
// "방금 입력한 것"이 즉시확인 시점엔 다른 세션으로 바뀌어 "지금 입력분만"이
// 0건으로 잡히는 문제가 있었다. localStorage로 바꾸고, 날짜(한국시간 기준)가
// 바뀌면 새 세션을 발급하는 정책으로 교체한다.
MLL.getSession = function(tag) {
  var key = MLL.SESSION_KEY + '_' + tag;
  var today = new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Seoul'});
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { saved = null; }
  if (saved && saved.date === today && saved.tagValue) {
    return saved.tagValue;
  }
  var fresh = tag + '_' + today + '_' + Date.now();
  try { localStorage.setItem(key, JSON.stringify({date:today, tagValue:fresh})); } catch(e) {}
  return fresh;
};

// ── 회차/시간 계산 ──
MLL.getLottoInfo = function() {
  var now = new Date();
  var ko  = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Seoul'}));
  var day = ko.getDay(), hour = ko.getHours(), min = ko.getMinutes();
  var elapsed   = now.getTime() - MLL.ROUND1_TS;
  var thisRound = Math.floor(elapsed / MLL.WEEK_MS) + 1;
  var nextRound = thisRound + 1;
  // 판매중단: 토요일 20:00 ~ 일요일 06:00
  var soldOut = (day===6 && (hour>20||(hour===20&&min===0))) || (day===0 && hour<6);
  // 현재 판매 가능한 최대 회차
  // - 판매중단 시간: nextRound도 아직 안 열림 → thisRound 판매 안 됨
  // - 그 외: nextRound가 현재 판매 회차
  var saleRound = soldOut ? thisRound : nextRound;
  return { thisRound:thisRound, nextRound:nextRound, soldOut:soldOut, saleRound:saleRound };
};

MLL.getDrawDate = function(round) {
  var d = new Date(MLL.ROUND1_TS + (round - 1) * MLL.WEEK_MS);
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var dd= String(d.getDate()).padStart(2,'0');
  return y+'/'+m+'/'+dd;
};

MLL.getRoundStatus = function(round) {
  var info = MLL.getLottoInfo();
  return round < info.thisRound ? '추첨후' : '추첨전';
};

// ── 볼 색상 ──
MLL.BC = function(n) {
  return n<=10?'#f5c518':n<=20?'#1a7ad4':n<=30?'#e03131':n<=40?'#888888':'#2f9e44';
};
MLL.TC = function(n) { return n<=10?'#7a5e00':'#ffffff'; };

// ── UUID 생성 ──
MLL.uuid = function() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
};

// =====================================================
// 데이터 CRUD
// =====================================================

MLL.loadEntries = function() {
  try { return JSON.parse(localStorage.getItem(MLL.STORAGE_KEY) || '[]'); }
  catch(e) { return []; }
};

MLL.saveEntries = function(entries) {
  localStorage.setItem(MLL.STORAGE_KEY, JSON.stringify(entries));
};

// 단일 항목 추가
MLL.addEntry = function(item) {
  var entries = MLL.loadEntries();
  if (!item.id)          item.id          = MLL.uuid();
  if (!item.createdAt)   item.createdAt   = Date.now();
  if (!item.grade)       item.grade       = null;
  if (!item.prizeMoney)  item.prizeMoney  = 0;
  if (!item.sessionTag)  item.sessionTag  = '';
  // 항상 추첨전으로 저장 → 미확인 섹션에서 사용자가 확인하도록
  item.status = '추첨전';
  entries.push(item);
  MLL.saveEntries(entries);
  return item;
};

// 여러 항목 추가
MLL.addEntries = function(items) {
  var entries = MLL.loadEntries();
  items.forEach(function(item) {
    if (!item.id)         item.id         = MLL.uuid();
    if (!item.createdAt)  item.createdAt  = Date.now();
    if (!item.grade)      item.grade      = null;
    if (!item.prizeMoney) item.prizeMoney = 0;
    if (!item.sessionTag) item.sessionTag = '';
    // 항상 추첨전으로 저장 → 미확인 섹션에서 사용자가 확인하도록
    item.status = '추첨전';
    entries.push(item);
  });
  MLL.saveEntries(entries);
  return items;
};

// 항목 삭제
MLL.deleteEntry = function(id) {
  var entries = MLL.loadEntries().filter(function(e){ return e.id !== id; });
  MLL.saveEntries(entries);
};

// =====================================================
// 당첨결과 데이터
// =====================================================

MLL.loadResults = function() {
  try { return JSON.parse(localStorage.getItem(MLL.RESULTS_KEY) || '{}'); }
  catch(e) { return {}; }
};

MLL.saveResults = function(results) {
  localStorage.setItem(MLL.RESULTS_KEY, JSON.stringify(results));
};

MLL.getResult = function(round) {
  return MLL.loadResults()[round] || null;
};

// ── 당첨 등수 계산 ──
MLL.calcGrade = function(myNums, winNums, bonusNum) {
  var match = 0;
  myNums.forEach(function(n){ if(winNums.indexOf(n) >= 0) match++; });
  var hasBonus = myNums.indexOf(bonusNum) >= 0;
  if (match===6)                  return 1;
  if (match===5 && hasBonus)      return 2;
  if (match===5)                  return 3;
  if (match===4)                  return 4;
  if (match===3)                  return 5;
  return 0;
};

// ── 당첨금액 계산 ──
MLL.calcPrize = function(grade, result) {
  if (!result || grade===0) return 0;
  if (grade===1) return result.prize1 || 0;
  if (grade===2) return result.prize2 || 0;
  if (grade===3) return result.prize3 || 0;
  if (grade===4) return 50000;
  if (grade===5) return 5000;
  return 0;
};

// ── 당첨결과로 전체 업데이트 ──
// resultsObj 구조:
// {
//   1227: {
//     nums: [1,14,16,34,41,44],  // 당첨번호 6개
//     bonus: 13,                  // 보너스번호
//     winners1: 11,               // 1등 총 당첨게임수
//     prize1: 2674808455,         // 1등 1게임당 당첨금액
//     autoWin: 8,                 // 자동 1등 당첨게임수
//     semiWin: 1,                 // 반자동 1등 당첨게임수
//     manualWin: 2,               // 수동 1등 당첨게임수
//     winnerShops: "진흥수퍼, ...", // 1등 당첨점명
//     winners2: 70,               // 2등 당첨게임수
//     prize2: 70054508,           // 2등 1게임당 당첨금액
//     winners3: 3042,             // 3등 당첨게임수
//     prize3: 1612037,            // 3등 1게임당 당첨금액
//     note: "..."                 // 특이사항 (옵션)
//   }
// }
MLL.applyResults = function(resultsObj) {
  MLL.saveResults(resultsObj);
  var entries = MLL.loadEntries();
  var updated = 0;
  entries.forEach(function(entry) {
    // round가 숫자/문자열 둘 다 처리
    var res = resultsObj[entry.round] || resultsObj[String(entry.round)] || resultsObj[parseInt(entry.round)];
    if (res) {
      entry.status     = '추첨후';
      entry.grade      = MLL.calcGrade(entry.nums, res.nums, res.bonus);
      entry.prizeMoney = MLL.calcPrize(entry.grade, res);
      updated++;
    }
  });
  MLL.saveEntries(entries);
  return updated;
};

// =====================================================
// 정렬 (추첨전 상단, 추첨후 하단, 각각 회차 내림차순)
// =====================================================

MLL.sortEntries = function(entries) {
  var info    = MLL.getLottoInfo();
  var results = MLL.loadResults();

  function isConfirmed(entry) {
    // 당첨결과가 있고 grade가 계산된 경우
    return entry.status === '추첨후' && entry.grade !== null && entry.grade !== undefined;
  }
  function isUnconfirmed(entry) {
    // 추첨됐는데 아직 결과 미반영: 당첨결과가 있는 회차인데 grade=null
    var hasResult = !!(results[entry.round] || results[Number(entry.round)] || results[String(entry.round)]);
    return (entry.status === '추첨전' && hasResult) ||
           (entry.status === '추첨후' && (entry.grade === null || entry.grade === undefined));
  }
  function isPreDraw(entry) {
    // 진짜 추첨전: 당첨결과가 없는 회차
    var hasResult = !!(results[entry.round] || results[Number(entry.round)] || results[String(entry.round)]);
    return entry.status === '추첨전' && !hasResult;
  }

  var preDraw     = entries.filter(isPreDraw)
                           .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });
  var unconfirmed = entries.filter(isUnconfirmed)
                           .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });
  var post        = entries.filter(isConfirmed)
                           .sort(function(a,b){ return b.round-a.round || b.createdAt-a.createdAt; });

  return preDraw.concat(unconfirmed).concat(post);
};

// =====================================================
// 공통 테이블 렌더러
// =====================================================

MLL.GRADE_LABEL = ['낙첨','1등','2등','3등','4등','5등'];
MLL.GRADE_COLOR = ['#aaa','#e03131','#e67700','#1a7ad4','#2f9e44','#888'];

MLL.renderBalls = function(nums, bonusNums, small) {
  var size = small ? 19 : 24;
  var fs   = small ? 8  : 10;
  return nums.map(function(n) {
    var isBonus = bonusNums && bonusNums.indexOf(n)>=0;
    var bg  = isBonus ? '#fff'    : MLL.BC(n);
    var tc  = isBonus ? '#555'    : MLL.TC(n);
    var brd = isBonus ? '2px solid #aaa' : 'none';
    return '<span style="width:'+size+'px;height:'+size+'px;border-radius:50%;display:inline-flex;' +
      'align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:700;flex-shrink:0;' +
      'background:'+bg+';color:'+tc+';border:'+brd+';margin:1px;">'+n+'</span>';
  }).join('');
};

// 통일된 테이블 행 생성
MLL.renderRow = function(entry, sessionTag, opts) {
  opts = opts || {};
  var isSession = sessionTag && entry.sessionTag === sessionTag;
  var result    = MLL.getResult(entry.round);
  var winNums   = result ? result.nums  : [];
  var bonusNum  = result ? result.bonus : null;

  // status 실시간 재판단 (당첨결과 적용 후 반영)
  var actualStatus = entry.status;
  if (result && entry.status === '추첨전') actualStatus = '추첨후';

  // 반자동: autoNums 필드(시스템 채운 번호) 저장되어 있으면 사용
  var autoNums = entry.autoNums || [];

  // 번호 정렬 후 매치 표시
  var sorted = entry.nums.slice().sort(function(a,b){return a-b;});
  var ballsHTML = sorted.map(function(n) {
    var isMatch = winNums.indexOf(n) >= 0;
    var isBonus = n === bonusNum && !isMatch;
    var bg  = isBonus ? '#fff' : MLL.BC(n);
    var tc  = isBonus ? '#555' : MLL.TC(n);
    var brd = isMatch ? '2px solid #f5c518' : isBonus ? '2px solid #aaa' : 'none';
    // 반자동: 시스템이 채운 번호(autoNums)만 흐리게 — 추첨전/후 관계없이 항상 유지
    var op = (entry.type==='반자동' && autoNums.length>0 && autoNums.indexOf(n)>=0) ? '0.4' : '1';
    // 단, 당첨번호와 일치하는 경우 당첨 표시를 위해 흐리기 해제
    if (isMatch) op = '1';
    return '<span style="width:19px;height:19px;border-radius:50%;display:inline-flex;' +
      'align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;' +
      'background:'+bg+';color:'+tc+';border:'+brd+';margin:1px;opacity:'+op+';">'+n+'</span>';
  }).join('');

  // 구매형태 뱃지
  var typeColor = entry.type==='자동'?'#2f9e44':entry.type==='반자동'?'#e67700':'#1a7ad4';
  var typeBg    = entry.type==='자동'?'#e8fff0':entry.type==='반자동'?'#fff3e0':'#e8f4ff';
  var typeHTML  = '<span style="font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;' +
    'color:'+typeColor+';background:'+typeBg+';border:1px solid '+typeColor+';">'+entry.type+'</span>';

  // 구분 (실구매/가상)
  var realHTML = entry.isReal
    ? '<span style="background:#f5c518;color:#7a5e00;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;">실구매</span>'
    : '<span style="background:#eee;color:#999;font-size:8px;padding:1px 4px;border-radius:3px;">가상</span>';

  // 추첨상태 (실시간 재판단 적용)
  var statusHTML = actualStatus==='추첨전'
    ? '<span style="color:#e03131;font-weight:700;font-size:9px;">추첨전</span>'
    : '<span style="color:#999;font-size:9px;">추첨후</span>';

  // 당첨결과
  var gradeHTML = '<span style="color:#ddd;">-</span>';
  if (actualStatus==='추첨후' && entry.grade !== null) {
    if (entry.grade === 0) {
      gradeHTML = '<span style="color:#aaa;font-size:9px;">낙첨</span>';
    } else {
      gradeHTML = '<span style="color:'+MLL.GRADE_COLOR[entry.grade]+';font-weight:700;font-size:9px;">' +
        MLL.GRADE_LABEL[entry.grade]+'</span>';
    }
  }

  // 당첨금
  var prizeHTML = '<span style="color:#ddd;">-</span>';
  if (entry.prizeMoney && entry.prizeMoney > 0) {

// 즉시확인 실행
MLL.applyCheck = function(sessionTag) {
  var results = MLL.loadResults();
  var resultRounds = Object.keys(results).map(Number);
  if (!resultRounds.length) {
    alert('당첨결과가 없습니다.\nadmin.html에서 엑셀을 업로드해주세요.');
    return;
  }

  // 커스텀 팝업 생성
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:16px;padding:28px 28px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.25);">' +
    '<div style="font-size:24px;margin-bottom:8px;">⚡</div>' +
    '<div style="font-size:15px;font-weight:700;color:#222;margin-bottom:6px;">즉시확인</div>' +
    '<div style="font-size:12px;color:#888;margin-bottom:22px;">어떤 범위를 확인하시겠습니까?</div>' +
    '<div style="display:flex;gap:10px;margin-bottom:10px;">' +
    '<button id="mll-check-all" style="flex:1;background:#e03131;color:#fff;border:none;border-radius:10px;padding:13px 8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(224,49,49,0.3);">📋 미확인분 전체</button>' +
    '<button id="mll-check-cur" style="flex:1;background:#1a7ad4;color:#fff;border:none;border-radius:10px;padding:13px 8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(26,122,212,0.3);">✏️ 지금 입력분만</button>' +
    '</div>' +
    '<div style="font-size:10.5px;color:#aaa;line-height:1.5;margin-bottom:14px;">자정이 지나 날짜가 바뀐 건은 \'지금 입력분만\'으로 안 잡혀요.<br>그런 건은 <b style="color:#e03131;">\'미확인분 전체\'</b>를 눌러주세요.</div>' +
    '<button id="mll-check-cancel" style="width:100%;background:#f5f5f5;border:none;border-radius:10px;padding:10px;font-size:12px;color:#888;cursor:pointer;font-weight:600;">✕ 취소 (나중에 확인)</button>' +
    '</div>';
  document.body.appendChild(overlay);

  function doCheck(allItems) {
    document.body.removeChild(overlay);
    var entries = MLL.loadEntries();
    var info    = MLL.getLottoInfo();
    var updated = 0;
    entries.forEach(function(entry) {
      var res = results[entry.round] || results[Number(entry.round)] || results[String(entry.round)];
      var isUnconfirmed =
        (entry.status === '추첨전' && !!res) ||
        (entry.status === '추첨후' && (entry.grade === null || entry.grade === undefined));
      if (!isUnconfirmed) return;
      if (!allItems && entry.sessionTag !== sessionTag) return;
      if (res) {
        entry.status     = '추첨후';
        entry.grade      = MLL.calcGrade(entry.nums, res.nums, res.bonus);
        entry.prizeMoney = MLL.calcPrize(entry.grade, res);
        updated++;
      }
    });
    MLL.saveEntries(entries);
    alert('✅ ' + updated + '개 항목 확인 완료!');
    if (window.refreshTable) refreshTable();
  }

  document.getElementById('mll-check-all').onclick    = function(){ doCheck(true); };
  document.getElementById('mll-check-cur').onclick    = function(){ doCheck(false); };
  document.getElementById('mll-check-cancel').onclick = function(){ document.body.removeChild(overlay); };
  overlay.onclick = function(e){ if(e.target===overlay) document.body.removeChild(overlay); };
};

// 전체 테이블 렌더
MLL.renderTable = function(tbodyId, sessionTag, filterRound) {
  var entries = MLL.loadEntries();
  if (filterRound) entries = entries.filter(function(e){ return e.round == filterRound; });
  var sorted  = MLL.sortEntries(entries);
  var info    = MLL.getLottoInfo();
  var tbody   = document.getElementById(tbodyId);
  if (!tbody) return;

  // 3단계 분류 - 당첨결과 존재 여부 기준
  var rr = MLL.loadResults();
  function hr(round){ return !!(rr[round]||rr[Number(round)]||rr[String(round)]); }
  var preDraw    = sorted.filter(function(e){
    return e.status==='추첨전' && !hr(e.round);
  });
  var unconfirmed= sorted.filter(function(e){
    return (e.status==='추첨전' && hr(e.round)) ||
           (e.status==='추첨후' && (e.grade===null || e.grade===undefined));
  });
  var postDraw   = sorted.filter(function(e){
    return e.status==='추첨후' && e.grade!==null && e.grade!==undefined;
  });

  // 배지 업데이트
  var badgeEl = document.getElementById('sectionBadge');
  if (badgeEl) {
    var badgeHtml =
      '<span style="color:#e03131;font-weight:700;">🔴추첨전 '+preDraw.length+'개</span>' +
      ' &nbsp;|&nbsp; ';
    if (unconfirmed.length > 0) {
      badgeHtml +=
        '<span style="color:#e67700;font-weight:700;">🟡미확인 '+unconfirmed.length+'개</span>' +
        MLL.renderCheckBtn(sessionTag);
    } else {
      badgeHtml += '<span style="color:#e67700;">🟡미확인 0개</span>';
    }
    badgeHtml += ' &nbsp;|&nbsp; <span style="color:#555;">✅확인완료 '+postDraw.length+'개</span>';
    badgeEl.innerHTML = badgeHtml;
  }

  // 카운트 업데이트
  var tcEl = document.getElementById('totalCount');
  if (tcEl) tcEl.textContent = entries.length;
  var realEl = document.getElementById('realCount');
  if (realEl) realEl.textContent = entries.filter(function(e){return e.isReal;}).length;

  var html = '';
  if (!sorted.length) {
    html = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#bbb;font-size:12px;">저장된 번호가 없습니다.</td></tr>';
  } else {
    // 추첨전 섹션
    if (preDraw.length) {
      html += MLL.renderDivider('🔴 추첨 전', preDraw.length);
      preDraw.forEach(function(e){ html += MLL.renderRow(e, sessionTag); });
    }
    // 미확인 섹션 (주황 배경)
    if (unconfirmed.length) {
      html += '<tr><td colspan="9" style="background:#fff3e0;padding:4px 8px;font-size:9px;font-weight:700;color:#e67700;">' +
        '🟡 추첨됐으나 미확인 (' + unconfirmed.length + '개)' +
        MLL.renderCheckBtn(sessionTag) +
        '</td></tr>';
      unconfirmed.forEach(function(e){
        var row = MLL.renderRow(e, sessionTag);
        // 미확인 행은 주황 배경
        row = row.replace('style="background:#fff8e1;', 'style="background:#fff3e0;');
        row = row.replace('style="', 'style="background:#fff3e0;');
        html += row;
      });
    }
    // 확인완료 섹션
    if (postDraw.length) {
      html += MLL.renderDivider('✅ 추첨후 확인분', postDraw.length);
      postDraw.forEach(function(e){ html += MLL.renderRow(e, sessionTag); });
    }
  }
  tbody.innerHTML = html;
};

MLL.getStats = function() {
  var entries = MLL.loadEntries();
  var stats = {
    total: entries.length,
    byMethod: { general:0, camera:0, ai:0, excel:0 },
    byType:   { auto:0, semi:0, manual:0 },
    byStatus: { pre:0, post:0 },
    byReal:   { real:0, virtual:0 },
    byGrade:  { g1:0, g2:0, g3:0, g4:0, g5:0, fail:0 },
    totalPrize: 0
  };
  entries.forEach(function(e) {
    // 입력방법
    var m = e.inputMethod || 'general';
    if (stats.byMethod[m] !== undefined) stats.byMethod[m]++;
    // 구매형태
    if (e.type==='자동')   stats.byType.auto++;
    if (e.type==='반자동') stats.byType.semi++;
    if (e.type==='수동')   stats.byType.manual++;
    // 추첨상태
    if (e.status==='추첨전') stats.byStatus.pre++;
    else                     stats.byStatus.post++;
    // 실구매/가상
    if (e.isReal) stats.byReal.real++;
    else          stats.byReal.virtual++;
    // 당첨
    if (e.grade===1) stats.byGrade.g1++;
    else if (e.grade===2) stats.byGrade.g2++;
    else if (e.grade===3) stats.byGrade.g3++;
    else if (e.grade===4) stats.byGrade.g4++;
    else if (e.grade===5) stats.byGrade.g5++;
    else if (e.status==='추첨후') stats.byGrade.fail++;
    // 당첨금
    stats.totalPrize += (e.prizeMoney || 0);
  });
  return stats;
};

// 전략 저장 (최신순 - 맨앞에 추가)
MLL.addStrategy = function(strategy) {
  var list = MLL.loadStrategies();
  strategy.id        = strategy.id || MLL.uuid();
  strategy.createdAt = strategy.createdAt || Date.now();
  // 중복 이름 체크
  var exists = list.findIndex(function(s){ return s.name === strategy.name; });
  if (exists >= 0) return false; // 중복
  list.unshift(strategy); // 맨앞에 추가 (최신순)
  MLL.saveStrategies(list);
  return true;
};

MLL.updateStrategy = function(id, data) {
  var list = MLL.loadStrategies();
  var idx  = list.findIndex(function(s){ return s.id === id; });
  if (idx < 0) return false;
  list[idx] = Object.assign(list[idx], data);
  MLL.saveStrategies(list);
  return true;
};

MLL.deleteStrategy = function(id) {
  var list = MLL.loadStrategies().filter(function(s){ return s.id !== id; });
  MLL.saveStrategies(list);
};

MLL.getStrategy = function(id) {
  return MLL.loadStrategies().find(function(s){ return s.id === id; }) || null;
};

// 번호 생성 엔진 (Python generator_engine.py 포팅)
MLL.generateNumbers = function(strategy, lotto_history) {
  var setCount      = parseInt(strategy.set_count)    || 20;
  var repeatCount   = parseInt(strategy.repeat_count) || 1;
  var repeatMode    = (strategy.repeat_mode || 'AABBCC').toUpperCase();
  var consLimit     = parseInt(strategy.consecutive_limit) || 0;
  var oddEven       = (strategy.odd_even || '').trim();
  var includeNums   = MLL._parseNumList(strategy.include_numbers || '');
  var excludeNums   = MLL._parseNumList(strategy.exclude_numbers || '');
  var sumMin        = strategy.sum_min ? parseInt(strategy.sum_min) : null;
  var sumMax        = strategy.sum_max ? parseInt(strategy.sum_max) : null;
  var rangeStart    = strategy.range_start ? parseInt(strategy.range_start) : null;
  var rangeEnd      = strategy.range_end   ? parseInt(strategy.range_end)   : null;
  var topRange      = parseInt(strategy.top_range) || 0;
  var topUse        = strategy.top_use !== '' && strategy.top_use !== undefined ? parseInt(strategy.top_use) : null;
  var lastWeekMode  = strategy.last_week_mode || '무관';
  var bonusInclude  = (strategy.bonus_include || 'N').toUpperCase() === 'Y';

  // 기본 풀
  var pool = MLL._buildPool(rangeStart, rangeEnd);
  // 상위빈도 번호
  var topNums = [];
  if (topRange > 0 && lotto_history && lotto_history.length > 0) {
    var recent = parseInt(strategy.recent_rounds) || lotto_history.length;
    topNums = MLL._getTopFrequency(lotto_history, recent, topRange, bonusInclude);
  }
  // 지난주 당첨번호
  var lastWinNums = [];
  if (lastWeekMode !== '무관' && lotto_history && lotto_history.length > 0) {
    lastWinNums = lotto_history[0].nums || [];
  }

  var baseResults = [], used = {}, maxTry = Math.max(80000, setCount * 5000), tryCount = 0;
  while (baseResults.length < setCount && tryCount < maxTry) {
    tryCount++;
    var nums = MLL._createOneSet(pool, includeNums, excludeNums, oddEven, topNums, topUse);
    if (!nums) continue;
    if (!MLL._checkConsecutive(nums, consLimit)) continue;
    if (!MLL._checkSum(nums, sumMin, sumMax)) continue;
    var key = nums.join(',');
    if (used[key]) continue;
    used[key] = true;
    baseResults.push(nums);
  }

  // 지난주기준 정렬
  if (lastWeekMode !== '무관' && lastWinNums.length > 0) {
    baseResults.sort(function(a,b){
      var ca = a.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length;
      var cb = b.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length;
      return lastWeekMode === '많은순' ? cb-ca : ca-cb;
    });
  }

  // 반복 출력
  var final = [];
  if (repeatMode === 'ABCABC') {
    for (var r=0; r<repeatCount; r++)
      baseResults.forEach(function(row){ final.push(row.slice()); });
  } else { // AABBCC
    baseResults.forEach(function(row){
      for (var r=0; r<repeatCount; r++) final.push(row.slice());
    });
  }

  // 지난주 겹친수
  var lastWeekCounts = final.map(function(row){
    return lastWinNums.length ? row.filter(function(n){return lastWinNums.indexOf(n)>=0;}).length : 0;
  });

  return {
    numbers: final,
    base_generated: baseResults.length,
    generated: final.length,
    requested: setCount,
    lack: Math.max(0, setCount - baseResults.length),
    try_count: tryCount,
    top_data: topNums,
    last_week_counts: lastWeekCounts,
    engine_status: baseResults.length >= setCount ? 'OK' : '조건이 강해 일부만 생성됨'
  };
};

MLL._parseNumList = function(val) {
  if (!val) return [];
  var result = [];
  String(val).split(/[,\s]+/).forEach(function(t){
    t = t.trim();
    var m = t.match(/^(\d+)[~\-](\d+)$/);
    if (m) {
      var a=parseInt(m[1]), b=parseInt(m[2]);
      if (a<=b){ for(var i=a;i<=b;i++) if(i>=1&&i<=45) result.push(i); }
      else { for(var i=a;i<=45;i++) result.push(i); for(var i=1;i<=b;i++) result.push(i); }
    } else {
      var n=parseInt(t); if(n>=1&&n<=45) result.push(n);
    }
  });
  return [...new Set(result)].sort(function(a,b){return a-b;});
};

MLL._buildPool = function(start, end) {
  if (!start || !end) return Array.from({length:45},function(_,i){return i+1;});
  var pool=[], cur=start;
  while(true){
    pool.push(cur);
    if(cur===end) break;
    cur++; if(cur>45) cur=1;
    if(pool.length>45) break;
  }
  return pool.length>=6 ? pool : Array.from({length:45},function(_,i){return i+1;});
};

MLL._getTopFrequency = function(history, recent, topN, bonusInclude) {
  var freq = {};
  history.slice(0, recent).forEach(function(h){
    (h.nums||[]).forEach(function(n){ freq[n]=(freq[n]||0)+1; });
    if (bonusInclude && h.bonus) { freq[h.bonus]=(freq[h.bonus]||0)+1; }
  });
  return Object.keys(freq).map(function(n){ return [parseInt(n), freq[n]]; })
    .sort(function(a,b){ return b[1]-a[1]; }).slice(0, topN).map(function(x){ return x[0]; });
};

MLL._createOneSet = function(pool, include, exclude, oddEven, topNums, topUse) {
  var avail = pool.filter(function(n){ return exclude.indexOf(n)<0 && include.indexOf(n)<0; });
  var fixed = include.slice();
  if (fixed.length > 6) return null;
  var need = 6 - fixed.length;
  if (avail.length < need) return null;

  var result;
  if (!oddEven || oddEven==='무관' || oddEven==='') {
    var pick = MLL._sample(avail, need);
    if (!pick) return null;
    result = fixed.concat(pick).sort(function(a,b){return a-b;});
  } else {
    var parts = oddEven.split(':');
    var needOdd = parseInt(parts[0]), needEven = parseInt(parts[1]);
    var fixOdd = fixed.filter(function(n){return n%2===1;}).length;
    var fixEven = fixed.length - fixOdd;
    var ro = needOdd-fixOdd, re = needEven-fixEven;
    if (ro<0||re<0) return null;
    var oddPool  = avail.filter(function(n){return n%2===1;});
    var evenPool = avail.filter(function(n){return n%2===0;});
    if (oddPool.length<ro || evenPool.length<re) return null;
    result = fixed.concat(MLL._sample(oddPool,ro)||[]).concat(MLL._sample(evenPool,re)||[]).sort(function(a,b){return a-b;});
  }

  // 상위빈도 체크
  if (topNums.length > 0 && topUse !== null) {
    var cnt = result.filter(function(n){return topNums.indexOf(n)>=0;}).length;
    if (cnt !== topUse) return null;
  }
  return result;
};

MLL._sample = function(arr, n) {
  if (arr.length < n) return null;
  var a = arr.slice(), result = [];
  for (var i=0; i<n; i++) {
    var idx = Math.floor(Math.random()*a.length);
    result.push(a.splice(idx,1)[0]);
  }
  return result;
};

MLL._checkConsecutive = function(nums, limit) {
  if (!limit || limit<=1) return true;
  var cnt=1;
  for (var i=1; i<nums.length; i++) {
    if (nums[i]===nums[i-1]+1) { cnt++; if(cnt>limit) return false; }
    else cnt=1;
  }
  return true;
};

MLL._checkSum = function(nums, min, max) {
  var s=nums.reduce(function(a,b){return a+b;},0);
  if (min!==null && s<min) return false;
  if (max!==null && s>max) return false;
  return true;
};

</script>

<script>
function toggleNav(){
  var m=document.getElementById('navMenu');
  m.style.display=m.style.display==='none'?'block':'none';
}
document.addEventListener('click',function(e){
  var btn=document.getElementById('navBtn'),menu=document.getElementById('navMenu');
  if(menu&&btn&&!btn.contains(e.target)&&!menu.contains(e.target)) menu.style.display='none';
});
window.toggleNav=toggleNav;

var selectedStrategy = null;
var generatedResult  = null;
var INFO = MLL.getLottoInfo();

// 전략번호 생성의 기준 회차는 "지금이 몇 시냐"가 아니라
// mll_results에 실제로 들어와 있는 가장 최근(추첨 완료) 회차+1을 기준으로 계산한다.
// (토요일 추첨 발표 직후~일요일 새벽 판매중단 시간대에는 시간추정(INFO.saleRound)이
//  이미 추첨이 끝난 회차를 가리켜버리는 경우가 있어, 이번 주 신규 전략수립 분이
//  엉뚱하게 "추첨후"로 표시되는 문제가 있었다. 데이터 기준으로 고정한다.)
function computeSaleRoundFromData() {
  var results = MLL.loadResults();
  var resultRounds = Object.keys(results).map(Number).filter(function(n){ return !isNaN(n) && n>0; });
  if (resultRounds.length) return Math.max.apply(null, resultRounds) + 1;
  return INFO.saleRound; // results가 비어있는 극초기 상태에서만 시간추정으로 폴백
}
var SALE_ROUND = computeSaleRoundFromData();

// 기본 회차 설정 (항상 미추첨 상태인 다음 회차)
document.getElementById('g-round').value = SALE_ROUND;

// 예상 생성수 계산
function updateEst(){
  var sc = parseInt(document.getElementById('g-set-count').value)||0;
  var rc = parseInt(document.getElementById('g-repeat-count').value)||1;
  var total = sc*rc;
  var el = document.getElementById('estVal');
  el.textContent = total+'개';
  el.style.color = total===100 ? '#2f9e44' : '#e67700';
  var note = document.getElementById('estNote');
  if(total===100) note.innerHTML='<span style="color:#2f9e44;">✅ 권장 생성수 (전략 비교평가 기준)</span>';
  else if(total<100) note.innerHTML='<span style="color:#e67700;">⚠️ 100개 생성 권장</span>';
  else note.innerHTML='<span style="color:#aaa;">100개 생성 시 공정한 비교 가능</span>';
}
document.addEventListener('DOMContentLoaded', function(){
  ['g-set-count','g-repeat-count'].forEach(function(id){
    document.getElementById(id).addEventListener('input', updateEst);
  });
});

// 번호조합의 역대최고/직전등수 계산
function calcNumStats(nums){
  var results = MLL.loadResults();
  var rounds = Object.keys(results).map(Number).sort(function(a,b){return b-a;});
  if(!rounds.length) return {best:'-', last:'-'};

  var bestGrade = null;
  var lastGrade = null;
  var lastRound = rounds[0]; // 가장 최근 추첨회차

  rounds.forEach(function(round){
    var r = results[round];
    if(!r||!r.nums) return;
    var m=0; nums.forEach(function(n){if(r.nums.indexOf(n)>=0)m++;});
    var b=nums.indexOf(r.bonus)>=0;
    var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
    if(g>0){
      if(bestGrade===null||g<bestGrade) bestGrade=g;
    }
    if(round===lastRound) lastGrade=g;
  });

  return {
    best: bestGrade ? bestGrade+'등' : '-',
    last: lastGrade>0 ? lastGrade+'등' : '낙첨'
  };
}

// 전략 목록용 - 전략 전체 통계 (저장된 번호들의 역대최고)
function getStrategyStats(strategyId){
  var srList = MLL.loadStrategyResults().filter(function(sr){
    return sr.strategyId === strategyId && sr.numbers && sr.numbers.length;
  });
  if(!srList.length) return {best:'-', last:'-'};

  var results = MLL.loadResults();
  var rounds = Object.keys(results).map(Number).sort(function(a,b){return b-a;});
  if(!rounds.length) return {best:'미추첨', last:'미추첨'};

  var lastRound = rounds[0];
  var overallBest = null, lastBest = null;

  srList.forEach(function(sr){
    sr.numbers.forEach(function(nums){
      rounds.forEach(function(round){
        var r=results[round];
        if(!r||!r.nums) return;
        var m=0; nums.forEach(function(n){if(r.nums.indexOf(n)>=0)m++;});
        var b=nums.indexOf(r.bonus)>=0;
        var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
        if(g>0 && (overallBest===null||g<overallBest)) overallBest=g;
        if(round===lastRound && g>0 && (lastBest===null||g<lastBest)) lastBest=g;
      });
    });
  });

  return {
    best: overallBest ? overallBest+'등' : '낙첨',
    last: lastBest ? lastBest+'등 ('+lastRound+'회)' : '낙첨 ('+lastRound+'회)'
  };
}

// 전략 목록 렌더
function renderStrategyList(){
  var list = MLL.loadStrategies();
  var srList = MLL.loadStrategyResults();
  var el   = document.getElementById('strategyList');
  if(!list.length){
    el.innerHTML='<div style="text-align:center;padding:16px;color:#bbb;font-size:11px;">저장된 전략이 없습니다.</div>';
    return;
  }
  el.innerHTML = list.map(function(s){
    var active = selectedStrategy && selectedStrategy.id===s.id ? ' active' : '';
    var hasResult = srList.some(function(sr){ return sr.strategyId === s.id && sr.compareAdded; });
    var statsHtml = hasResult
      ? '<div style="font-size:9px;margin-top:3px;color:#e03131;font-weight:600;">📊 전략비교평가 진행중</div>'
      : '';
    return '<div class="strategy-item'+active+'" onclick="selectStrategy(\''+s.id+'\')">'+
      '<div class="si-name">'+s.name+'</div>'+
      statsHtml+
      '</div>';
  }).join('');
}

function selectStrategy(id){
  selectedStrategy = MLL.getStrategy(id);
  if(!selectedStrategy) return;
  // 설정값 반영
  if(selectedStrategy.set_count)    document.getElementById('g-set-count').value    = selectedStrategy.set_count;
  if(selectedStrategy.repeat_count) document.getElementById('g-repeat-count').value = selectedStrategy.repeat_count;
  if(selectedStrategy.repeat_mode)  document.getElementById('g-repeat-mode').value  = selectedStrategy.repeat_mode;
  updateEst();
  // 조건 요약
  renderCondSummary();
  document.getElementById('condCard').style.display='block';
  document.getElementById('badgeStrategy').textContent = selectedStrategy.name;
  renderStrategyList();
  generatedResult = null;
  document.getElementById('btnSave').style.display='none';
  document.getElementById('btnCompare').style.display='none';
  document.getElementById('resultBody').innerHTML='<div class="empty-result">🎲 번호 생성 버튼을 누르세요</div>';
  document.getElementById('analysisPanel').style.display='none';
  document.getElementById('badgeCount').style.display='none';
  document.getElementById('badgeStatus').style.display='none';
}

function renderCondSummary(){
  var s = selectedStrategy;
  var rows = [
    ['홀짝비율', s.odd_even||'무관'],
    ['포함수', s.include_numbers||'-'],
    ['제외수', s.exclude_numbers||'-'],
    ['번호합', (s.sum_min||'-')+'~'+(s.sum_max||'-')],
    ['연속제한', s.consecutive_limit||'-'],
    ['순환구간', s.range_start?s.range_start+'~'+s.range_end:'-'],
    ['상위빈도범위', s.top_range||'-'],
    ['상위번호사용', s.top_use||'-'],
    ['최근분석회차', s.recent_rounds||'-'],
    ['지난주기준', s.last_week_mode||'무관'],
    ['보너스포함', (s.bonus_include||'N')==='Y' ? 'Y (보너스 포함)' : 'N (본번호만)'],
  ];
  document.getElementById('condSummary').innerHTML =
    '<div class="cond-grid">'+
    rows.map(function(r){
      return '<div class="cond-row"><span class="cond-key">'+r[0]+'</span><span class="cond-val">'+r[1]+'</span></div>';
    }).join('')+'</div>';
}

// 번호 생성
function generateNumbers(){
  if(!selectedStrategy){ alert('전략을 먼저 선택해주세요!'); return; }
  var round = parseInt(document.getElementById('g-round').value);
  if(!round){ alert('회차를 입력해주세요!'); return; }

  // 중복 생성 완전 차단
  var srList = MLL.loadStrategyResults();
  var duplicate = srList.find(function(sr){
    return sr.strategyId === selectedStrategy.id && Number(sr.round) === round;
  });
  if(duplicate){
    var d = new Date(duplicate.createdAt);
    var dt = (d.getMonth()+1)+'/'+(d.getDate())+' '+(''+d.getHours()).padStart(2,'0')+':'+(''+d.getMinutes()).padStart(2,'0');
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;';
    overlay.innerHTML =
      '<div style="background:#fff;border-radius:14px;padding:26px 28px;max-width:400px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.25);">'+
      '<div style="font-size:28px;margin-bottom:8px;">🚫</div>'+
      '<div style="font-size:14px;font-weight:700;color:#e03131;margin-bottom:10px;">중복 생성 불가!</div>'+
      '<div style="background:#fff0f0;border:1px solid #fcc;border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px;color:#333;text-align:left;line-height:1.9;">'+
      '이미 <b style="color:#e03131;">'+selectedStrategy.name+'</b> 전략으로<br>'+
      '<b>제'+round+'회</b> 번호조합을 생성하셨습니다.<br>'+
      '<span style="font-size:10px;color:#888;">(생성일시: '+dt+')</span>'+
      '</div>'+
      '<div style="font-size:11px;color:#555;margin-bottom:18px;line-height:1.8;">다른 전략명칭으로 새롭게 수립 후<br>생성하시기 바랍니다.</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:8px;">'+
      '<button id="dupForce" style="flex:1;background:#e03131;color:#fff;border:none;border-radius:8px;padding:11px;font-size:11px;font-weight:700;cursor:pointer;">⚡ 덮어쓰고 생성</button>'+
      '<button id="dupCompare" style="flex:1;background:#2f9e44;color:#fff;border:none;border-radius:8px;padding:11px;font-size:11px;font-weight:700;cursor:pointer;">📊 비교평가 보기</button>'+
      '<button id="dupClose" style="flex:1;background:#f5f5f5;color:#555;border:none;border-radius:8px;padding:11px;font-size:11px;cursor:pointer;">✕ 닫기</button>'+
      '</div>'+
      '<button id="dupStrategy" style="width:100%;background:#7048e8;color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;">🧠 새 전략 수립하러 가기</button>'+
      '</div>';
    document.body.appendChild(overlay);
    document.getElementById('dupForce').onclick   = function(){
      document.body.removeChild(overlay);
      // 기존 결과 삭제 후 재생성 (overwrite)
      var srList2 = MLL.loadStrategyResults().filter(function(sr){
        return !(sr.strategyId === selectedStrategy.id && Number(sr.round) === round);
      });
      MLL.saveStrategyResults(srList2);
      doGenerate(round);
    };
    document.getElementById('dupCompare').onclick = function(){ document.body.removeChild(overlay); location.href='strategy_compare.html'; };
    document.getElementById('dupClose').onclick   = function(){ document.body.removeChild(overlay); };
    document.getElementById('dupStrategy').onclick= function(){ document.body.removeChild(overlay); location.href='strategy_manager.html'; };
    return; // 팝업 표시 후 중단
  }
  doGenerate(round);
}

function doGenerate(round){
  var strategy = Object.assign({}, selectedStrategy, {
    set_count:    parseInt(document.getElementById('g-set-count').value)||20,
    repeat_count: parseInt(document.getElementById('g-repeat-count').value)||5,
    repeat_mode:  document.getElementById('g-repeat-mode').value,
  });

  document.getElementById('btnGen').disabled = true;
  document.getElementById('btnGen').textContent = '⏳ 생성 중...';
  document.getElementById('progWrap').style.display='block';
  document.getElementById('progFill').style.width='30%';

  // lotto_results에서 당첨이력 가져오기
  var results = MLL.loadResults();
  var history = Object.keys(results).map(Number).sort(function(a,b){return b-a;}).map(function(r){
    return {round:r, nums:results[r].nums||[], bonus:results[r].bonus||null};
  });

  setTimeout(function(){
    document.getElementById('progFill').style.width='60%';
    var result = MLL.generateNumbers(strategy, history);
    document.getElementById('progFill').style.width='100%';

    generatedResult = { round:round, strategy:strategy, result:result };

    setTimeout(function(){
      document.getElementById('progWrap').style.display='none';
      document.getElementById('progFill').style.width='0%';
      document.getElementById('btnGen').disabled=false;
      document.getElementById('btnGen').textContent='🎲 번호 생성';
      renderResult(result, round, strategy);
    }, 300);
  }, 50);
}

function renderResult(result, round, strategy){
  // 배지
  document.getElementById('badgeCount').style.display='inline-flex';
  document.getElementById('badgeCount').textContent='생성: '+result.generated+'개';
  document.getElementById('badgeStatus').style.display='inline-flex';
  var ok = result.engine_status==='OK';
  document.getElementById('badgeStatus').textContent = ok?'✅ '+result.engine_status:'⚠️ '+result.engine_status;
  document.getElementById('badgeStatus').className = 'result-badge '+(ok?'badge-green':'badge-orange');

  // 분석 패널
  if(result.top_data && result.top_data.length>0){
    document.getElementById('analysisPanel').style.display='block';
    document.getElementById('apTopN').textContent = strategy.top_range||'-';
    var topBalls = result.top_data.map(function(n){
      return '<span class="top-ball" style="background:'+MLL.BC(n)+';color:'+MLL.TC(n)+';">'+n+'</span>';
    }).join('');
    document.getElementById('apTopNums').innerHTML = topBalls;
    document.getElementById('apSummary').innerHTML =
      '<div>기본생성: '+result.base_generated+'조합</div>'+
      '<div>반복횟수: '+(strategy.repeat_count||1)+'회</div>'+
      '<div>총생성수: '+result.generated+'조합</div>'+
      '<div style="color:'+(result.lack>0?'#e03131':'#aaa')+';">부족분: '+result.lack+'조합</div>';
  }

  // 번호 테이블
  if(!result.numbers || !result.numbers.length){
    document.getElementById('resultBody').innerHTML='<div class="empty-result" style="color:#e03131;">⚠️ 조건이 너무 강해 번호를 생성하지 못했습니다.<br>전략 조건을 완화해주세요.</div>';
    return;
  }

  // 당첨결과 로드
  var lottRes = MLL.loadResults();
  var winData = lottRes[round] || lottRes[Number(round)] || lottRes[String(round)];
  var winNums = winData ? winData.nums : [];
  var winBonus= winData ? winData.bonus : null;
  var isDrawn = !!winData;

  // 역대최고/직전등수 계산
  var srList = MLL.loadStrategyResults().filter(function(sr){
    return sr.strategyId === strategy.id && sr.result;
  });

  // 역대최고: 전체 결과 중 grade가 1~5인 것 중 가장 작은 숫자(1등이 최고)
  var bestGrade = null;
  srList.forEach(function(sr){
    if(sr.result && sr.result.grades){
      sr.result.grades.forEach(function(g){
        if(g>0 && (bestGrade===null || g<bestGrade)) bestGrade=g;
      });
    }
  });
  var prevBest = bestGrade ? bestGrade+'등' : '-';

  // 직전등수: 가장 최근 결과(현재 제외)에서 당첨된 최고 등수
  var prevLast = '-';
  // 현재 생성 회차 제외한 직전 결과
  var prevResults = srList.filter(function(sr){ return sr.round !== round; });
  if(prevResults.length > 0){
    prevResults.sort(function(a,b){ return b.createdAt-a.createdAt; });
    var latest = prevResults[0];
    if(latest.result && latest.result.grades){
      var latestBest = null;
      latest.result.grades.forEach(function(g){
        if(g>0 && (latestBest===null || g<latestBest)) latestBest=g;
      });
      if(latestBest) prevLast = latestBest+'등 ('+latest.round+'회)';
    }
  }

  var html='<table class="num-table"><thead><tr>'+
    '<th style="width:32px;">#</th>'+
    '<th style="width:46px;">회차</th>'+
    '<th style="width:54px;">추첨여부</th>'+
    '<th style="width:90px;">전략명</th>'+
    '<th>생성번호</th>'+
    (isDrawn ? '<th style="width:36px;">상금</th>'+
    '<th style="width:28px;">1등</th>'+
    '<th style="width:28px;">2등</th>'+
    '<th style="width:28px;">3등</th>'+
    '<th style="width:28px;">4등</th>'+
    '<th style="width:28px;">5등</th>' : '')+
    '<th style="width:60px;">역대최고</th>'+
    '<th style="width:60px;">직전등수</th>'+
    '<th style="width:28px;">삭제</th>'+
    '</tr></thead><tbody>';

  // 등수별 카운트 계산
  var gradeCounts = [0,0,0,0,0,0];
  result.numbers.forEach(function(nums){
    if(!isDrawn) return;
    var m=0; nums.forEach(function(n){if(winNums.indexOf(n)>=0)m++;});
    var b=nums.indexOf(winBonus)>=0;
    var g=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
    if(g>0) gradeCounts[g]++;
  });

  result.numbers.forEach(function(nums, idx){
    var balls = nums.map(function(n){
      var isMatch = winNums.indexOf(n)>=0;
      var isBonus = n===winBonus&&!isMatch;
      var bg = isBonus?'#fff':MLL.BC(n);
      var tc = isBonus?'#555':MLL.TC(n);
      var brd = isMatch?'2px solid #f5c518':isBonus?'2px solid #aaa':'none';
      return '<span class="ball-sm" style="background:'+bg+';color:'+tc+';border:'+brd+';">'+n+'</span>';
    }).join('');

    var grade = 0;
    if(isDrawn){
      var m=0; nums.forEach(function(n){if(winNums.indexOf(n)>=0)m++;});
      var b=nums.indexOf(winBonus)>=0;
      grade=m===6?1:m===5&&b?2:m===5?3:m===4?4:m===3?5:0;
    }

    // 역대최고/직전등수 계산
    var numStats = calcNumStats(nums);
    var gradeColors=['','#e03131','#e67700','#1a7ad4','#2f9e44','#888'];
    var trStyle = grade>0 ? ' style="background:#fffde0;"' : '';

    html+='<tr'+trStyle+'>';
    html+='<td style="color:#aaa;font-size:9px;">'+(idx+1)+'</td>';
    html+='<td style="font-weight:700;font-size:10px;text-align:center;">'+round+'회</td>';
    html+='<td style="font-size:9px;text-align:center;color:'+(isDrawn?'#555':'#e03131')+';">'+(isDrawn?'추첨후':'미추첨')+'</td>';
    html+='<td style="font-size:9px;font-weight:600;color:#7048e8;text-align:center;">'+strategy.name+'</td>';
    html+='<td><div class="num-row">'+balls+'</div></td>';
    if(isDrawn){
      html+='<td style="text-align:center;">'+(grade>0?'<span style="font-size:9px;color:#e03131;font-weight:700;">'+grade+'등</span>':'<span style="color:#aaa;font-size:9px;">-</span>')+'</td>';
      [1,2,3,4,5].forEach(function(g){
        html+='<td style="text-align:center;color:'+gradeColors[g]+';font-weight:700;font-size:10px;">'+(gradeCounts[g]>0&&grade===g?'✓':'-')+'</td>';
      });
    }
    html+='<td style="font-size:9px;text-align:center;color:'+(numStats.best!=='-'?'#e03131':'#bbb')+';">'+numStats.best+'</td>';
    html+='<td style="font-size:9px;text-align:center;color:'+(numStats.last!=='낙첨'&&numStats.last!=='-'?'#1a7ad4':'#bbb')+';">'+numStats.last+'</td>';
    html+='<td style="text-align:center;"><button onclick="delGenEntry('+idx+')" style="background:none;border:1px solid #fcc;border-radius:3px;padding:1px 4px;color:#e03131;cursor:pointer;font-size:9px;">🗑</button></td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('resultBody').innerHTML=html;

  // 저장/비교/다운로드 버튼 표시
  document.getElementById('btnSave').style.display='block';
  document.getElementById('btnCompare').style.display='block';
  document.getElementById('btnExcel').style.display='inline-block';
  document.getElementById('btnPDF').style.display='inline-block';
  document.getElementById('btnMarking').style.display='inline-block';
}

// 개별 번호 삭제
function delGenEntry(idx){
  if(!generatedResult) return;
  generatedResult.result.numbers.splice(idx,1);
  if(generatedResult.result.last_week_counts) generatedResult.result.last_week_counts.splice(idx,1);
  generatedResult.result.generated = generatedResult.result.numbers.length;
  renderResult(generatedResult.result, generatedResult.round, generatedResult.strategy);
}

function downloadExcel(){
  if(!generatedResult) return;
  var r = generatedResult;
  var now = new Date();
  var dateStr = now.getFullYear()+
    String(now.getMonth()+1).padStart(2,'0')+
    String(now.getDate()).padStart(2,'0')+'_'+
    String(now.getHours()).padStart(2,'0')+
    String(now.getMinutes()).padStart(2,'0');
  var fileName = r.strategy.name+'_'+r.round+'회_'+dateStr+'.xlsx';

  // SheetJS로 xlsx 생성
  var script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload = function(){
    var rows = [['#','번호1','번호2','번호3','번호4','번호5','번호6','번호합','회차','전략명','생성일']];
    var dateLabel = now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate();
    r.result.numbers.forEach(function(nums, idx){
      var sum = nums.reduce(function(a,b){return a+b;},0);
      rows.push([idx+1, nums[0],nums[1],nums[2],nums[3],nums[4],nums[5], sum, r.round, r.strategy.name, dateLabel]);
    });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    // 컬럼 너비 설정
    ws['!cols'] = [{wch:4},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:7},{wch:6},{wch:20},{wch:12}];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '생성번호');
    XLSX.writeFile(wb, fileName);
  };
  document.head.appendChild(script);
}

  var results = MLL.loadResults();

  });

      // 빈도수 계산
      var freq=0;
      history.slice(0,recentN).forEach(function(h){

      topRows+='<td style="padding:3px 8px;font-size:10px;color:#555;">('+freq+'회)</td>';

  var allNums = r.result.numbers;

      if(g>0&&(best===null||g<best)) best=g;
      if(rnd===lastRound) last=g;

    return {
      best: best?best+'등':'-',
      last: (last&&last>0)?last+'등':'낙첨'
    };

    '@media print{head{display:none;} title{display:none;}}'+
    '</style></head><body>'+

    // 1페이지
    '<h1>Lotto Lab Report</h1>'+
    '<div class="subtitle">Generated by My Lotto Lab | LottoMaster Pro</div>'+

    '<tr><th>요청조합수</th><td>'+(r.strategy.set_count||20)+'</td><th>상위빈도범위</th><td>'+(r.strategy.top_range||'-')+'</td></tr>'+

    '<div class="section-title">출현빈도 상세현황 (Top'+(r.strategy.top_range||topData.length)+' / 최근 '+(r.strategy.recent_rounds||history.length)+'회 기준'+(bonusIncludePdf?' · 보너스포함':'')+')</div>'+
    '<table><tbody>'+topRows+'</tbody></table>'+


    // 2페이지
    '<div class="page-break">'+

    '<div class="two-col">'+
    '<table class="num-table">'+
    '<thead><tr><th>#</th><th>번호조합</th><th>역대</th><th>직전</th></tr></thead>'+
    '<tbody>'+leftRows+'</tbody>'+
    '</table>'+
    '<table class="num-table">'+
    '<thead><tr><th>#</th><th>번호조합</th><th>역대</th><th>직전</th></tr></thead>'+
    '<tbody>'+midRows+'</tbody>'+
    '</table>'+
    '<table class="num-table">'+
    '<thead><tr><th>#</th><th>번호조합</th><th>역대</th><th>직전</th></tr></thead>'+

    '</div>'+

  );
  printWin.document.close();
  setTimeout(function(){ printWin.print(); }, 500);
}

// My Lotto Lab에 저장
function saveToMyLotto(){
  if(!generatedResult) return;
  var r      = generatedResult;
  var round  = r.round;
  var nums   = r.result.numbers;
  var saleRound = INFO.saleRound;

  // 판매 가능 회차 체크
  var results = MLL.loadResults();
  var hasResult = !!(results[round]||results[Number(round)]||results[String(round)]);
  if(round > saleRound && !hasResult){
    alert('⛔ 제'+round+'회는 아직 판매하지 않습니다.\n현재 판매 회차: 제'+saleRound+'회');
    return;
  }

  var SESSION = MLL.getSession('strategy');
  var items = nums.map(function(n){
    return {
      round: round, nums: n, type: '자동',
      isReal: false, inputMethod: 'strategy',
      sessionTag: SESSION,
      memo: '[전략] '+r.strategy.name,
      autoNums: [], strategyId: r.strategy.id,
      strategyName: r.strategy.name
    };
  });

  // 전략 결과도 별도 저장 (grades 포함)
  var lottRes = MLL.loadResults();
  var winData2 = lottRes[round]||lottRes[Number(round)]||lottRes[String(round)];
  var grades = nums.map(function(n){ return 0; }); // 기본 낙첨
  if(winData2){
    grades = nums.map(function(n){

<script>
// =====================================================
// ⚠️⚠️⚠️ 매우 중요한 보안 경고 ⚠️⚠️⚠️
// 이 코드는 "지금 당장 동작을 보고 싶다"는 명시적 요청에 따라
// 위험을 감수하고 구현된 테스트용 코드입니다.
//
// makinglotto.com의 관리자 인증정보(HTTP Basic Auth)가 이 파일에
// 평문으로 포함되어 있습니다. 이 페이지의 "소스 보기"를 하는 누구나
// 그 인증정보를 그대로 가져갈 수 있습니다.
//
// 절대로 이 상태로 외부에 공개 배포하거나 실제 서비스에 올리면 안 됩니다.
// My Lotto Lab 서버가 구축되면, 이 인증정보는 반드시 서버 환경변수로
// 옮기고, 이 파일의 직접 호출 코드는 전부 제거해야 합니다.
// (설계서 v1.2, 4.5.1절 참고)
// =====================================================

if (typeof window.MLL === 'undefined') { window.MLL = {}; }
var MLL = window.MLL;

MLL.MARKING_CONFIG = {
  baseUrl: 'https://makinglotto.com',
  loginUrl: 'https://makinglotto.com/admin/starter/8w6q5ndxdwsua52b',
  mainPageUrl: 'https://makinglotto.com/lottomaking',
  slipdownUrl: 'https://makinglotto.com/lottomaking/slipdown',
  authUser: 'admin',
  authPass: 'ysw6673', // ⚠️ 평문 노출, 테스트 전용. 서버 이전 시 즉시 제거할 것.
  chunkSize: 15,
  defaultCid: '158',
  pricePerSheet: 300,   // 전표용지 1매당 300원
  extraImagePrice: 500, // 이미지 1개 추가(2개째부터)당 500원
  imageBasePath: 'character_images/' // 캐릭터 이미지 폴더 (상대경로)
};

// ── 캐릭터 목록(이미지 폴더 스캔 대체: 정적 목록, 실제로는 145개 PNG 파일과 1:1) ──
MLL.getAvailableCharacterIds = function(){
  if (typeof MLL_CHAR_NAMES === 'undefined') return [];
  return Object.keys(MLL_CHAR_NAMES).map(Number).sort(function(a,b){return a-b;});
};
MLL.getCharacterName = function(cid){
  if (typeof MLL_CHAR_NAMES === 'undefined') return '';
  return MLL_CHAR_NAMES[String(cid)] || '';
};

// ── 캐릭터 선택 모달 상태 ──
MLL.markingState = { selectedCids: [], pendingRows: null, pendingFileBase: 'lotto_marking' };

MLL.openMarkingModal = function(rows, fileBase){
  if (!rows || !rows.length) { alert('받을 번호조합이 없습니다.'); return; }
  MLL.markingState.pendingRows = rows;
  MLL.markingState.pendingFileBase = fileBase || 'lotto_marking';
  MLL.markingState.selectedCids = [];
  MLL._renderMarkingModal();
  document.getElementById('mllMarkingModal').classList.add('show');
};

MLL._ensureMarkingModalDom = function(){
  if (document.getElementById('mllMarkingModal')) return;
  var overlay = document.createElement('div');
  overlay.id = 'mllMarkingModal';
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal-box" style="max-width:760px;">' +
      '<button class="modal-close-x" style="position:absolute;top:20px;right:20px;background:none;border:none;color:var(--text-faint);font-size:18px;cursor:pointer;" onclick="MLL.closeMarkingModal()">✕</button>' +
      '<h3 style="font-size:16px;font-weight:700;margin-bottom:8px;">🖨 마킹용지 PDF로 받기</h3>' +
      '<p style="font-size:11.5px;color:var(--text-dim,#8b91ab);line-height:1.7;margin-bottom:14px;">실물 로또 판매점에 바로 제출 가능한 마킹용지 형태로 출력합니다. 이미지를 여러 개 선택하면 용지마다 순서대로 번갈아 적용됩니다.</p>' +
      '<div id="mllCharGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-height:320px;overflow-y:auto;padding:4px;border:1px solid var(--border,#252b48);border-radius:10px;margin-bottom:14px;"></div>' +
      '<div id="mllMarkingPriceBox" style="font-size:12.5px;color:var(--text-dim,#8b91ab);margin-bottom:12px;"></div>' +
      '<div id="mllMarkingResultBox" style="margin-top:10px;padding:11px 14px;border-radius:9px;font-size:12px;display:none;"></div>' +
      '<button class="btn" style="width:100%;background:#2FBFA3;color:#fff;border:none;border-radius:9px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;" onclick="MLL.submitMarkingRequest()">PDF 생성하기</button>' +
    '</div>';
  document.body.appendChild(overlay);
};

MLL._renderMarkingModal = function(){
  MLL._ensureMarkingModalDom();
  var ids = MLL.getAvailableCharacterIds();
  var grid = document.getElementById('mllCharGrid');
  grid.innerHTML = ids.map(function(id){
    var name = MLL.getCharacterName(id);
    return '<div class="mll-char-card" data-cid="'+id+'" onclick="MLL.toggleCharacter('+id+')" style="cursor:pointer;border:2px solid var(--border,#252b48);border-radius:8px;overflow:hidden;text-align:center;background:var(--surface-2,#161b35);">' +
      '<img src="'+MLL.MARKING_CONFIG.imageBasePath+id+'.png" style="width:100%;aspect-ratio:2/1;object-fit:cover;display:block;" loading="lazy">' +
      '<div style="font-size:9px;padding:3px 2px;color:var(--text-dim,#8b91ab);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+id+(name?(' '+name.slice(0,8)):'')+'</div>' +
    '</div>';
  }).join('');
  MLL._updateMarkingPriceBox();
};

MLL.toggleCharacter = function(cid){
  var s = MLL.markingState;
  var idx = s.selectedCids.indexOf(cid);
  if (idx>=0) s.selectedCids.splice(idx,1);
  else s.selectedCids.push(cid);
  document.querySelectorAll('.mll-char-card').forEach(function(el){
    var on = s.selectedCids.indexOf(parseInt(el.dataset.cid))>=0;
    el.style.borderColor = on ? '#2FBFA3' : 'var(--border,#252b48)';
    el.style.boxShadow = on ? '0 0 0 2px rgba(47,191,163,.3)' : 'none';
  });
  MLL._updateMarkingPriceBox();
};

MLL._updateMarkingPriceBox = function(){
  var rows = MLL.markingState.pendingRows || [];
  var sheetCount = rows.length;
  var imgCount = Math.max(1, MLL.markingState.selectedCids.length); // 0개 선택시 디폴트 1개 취급
  var cfg = MLL.MARKING_CONFIG;
  var sheetCost = sheetCount * cfg.pricePerSheet;
  var extraImgCost = Math.max(0, imgCount-1) * cfg.extraImagePrice;
  var total = sheetCost + extraImgCost;
  document.getElementById('mllMarkingPriceBox').innerHTML =
    '용지 '+sheetCount+'매 × '+cfg.pricePerSheet.toLocaleString()+'원 = '+sheetCost.toLocaleString()+'원' +
    (extraImgCost>0 ? ' + 이미지 추가 '+(imgCount-1)+'개 × '+cfg.extraImagePrice.toLocaleString()+'원 = '+extraImgCost.toLocaleString()+'원' : ' (이미지 1개는 무료)') +
    '<br><b style="color:#2FBFA3;font-size:14px;">합계: '+total.toLocaleString()+'원</b>' +
    '<div style="font-size:10px;color:var(--text-faint,#5a6080);margin-top:4px;">⚠️ 테스트 모드: 현재는 실제 포인트 차감 없이 동작만 확인합니다. (서버 구축 후 정식 차감 적용)</div>';
};

MLL.closeMarkingModal = function(){
  var el = document.getElementById('mllMarkingModal');
  if (el) el.classList.remove('show');
};

MLL._showMarkingResult = function(type, msg){
  var box = document.getElementById('mllMarkingResultBox');
  box.style.display = 'block';
  box.style.background = type==='error' ? 'rgba(212,83,94,.1)' : 'rgba(63,179,127,.1)';
  box.style.border = '1px solid ' + (type==='error' ? 'rgba(212,83,94,.25)' : 'rgba(63,179,127,.25)');
  box.style.color = type==='error' ? '#D4537E' : '#3FB37F';
  box.textContent = msg;
};

// ── makinglotto.com 연동 ──
MLL.submitMarkingRequest = function(){
  var rows = MLL.markingState.pendingRows;
  if (!rows || !rows.length) { MLL._showMarkingResult('error','받을 번호조합이 없습니다.'); return; }
  MLL._showMarkingResult('success', '⏳ PDF 생성 요청 중입니다... (여러 페이지인 경우 다소 시간이 걸려요)');
  MLL._runMarkingPipeline(rows, MLL.markingState.selectedCids, MLL.markingState.pendingFileBase);
};

MLL._runMarkingPipeline = async function(rows, cids, fileBase){
  var cfg = MLL.MARKING_CONFIG;
  if (!cids || !cids.length) cids = [parseInt(cfg.defaultCid)];

  var chunks = [];
  for (var i=0; i<rows.length; i+=cfg.chunkSize) chunks.push(rows.slice(i, i+cfg.chunkSize));

  try {
    // 1) 로그인 (브라우저 fetch는 CORS 정책상 실패할 가능성이 높음 - 그 경우 명확히 안내)
    var authHeader = 'Basic ' + btoa(cfg.authUser + ':' + cfg.authPass);
    var pdfBlobs = [];

    for (var c=0; c<chunks.length; c++) {
      MLL._showMarkingResult('success', '⏳ '+(c+1)+'/'+chunks.length+' 페이지 생성 중...');
      // ⚠️ 캐릭터 순환의 현실적 한계:
      // makinglotto.com API는 한 번 호출에 최대 15게임까지만 처리하며, 응답도 "그 청크 전체에 1개의 캐릭터"로 옵니다.
      // 따라서 "용지 1매(게임 1개)마다 다른 캐릭터"를 완벽히 구현하려면 게임 1개당 API를 1번씩 호출해야 하는데,
      // 이 경우 60게임 기준 호출이 4번 -> 60번으로 늘어나 처리 시간이 매우 길어지고 makinglotto.com 서버 부담도 커집니다.
      // 따라서 지금 구현은 "15게임(청크) 단위로 캐릭터를 순환"하는 실용적 절충안입니다.
      // 진짜 게임 1개 단위 순환이 꼭 필요하면, 청크 크기를 1로 낮추고 처리시간 증가를 감안해야 합니다(설계서 v1.2, 4.5.3절 비고로 별도 협의 필요).
      var chunkRows = chunks[c];
      var cid = cids[c % cids.length];

      var payload = { cid: String(cid), rows: chunkRows };
      var form = new FormData();
      form.append('data', new Blob([JSON.stringify(payload)], {type:'application/json'}));

      var resp = await fetch(cfg.slipdownUrl, {
        method: 'POST',
        headers: { 'Authorization': authHeader, 'X-Requested-With': 'XMLHttpRequest' },
        body: form
      });

      if (!resp.ok) throw new Error('서버 응답 오류 (코드 '+resp.status+')');
      var blob = await resp.blob();
      if (blob.size < 500) throw new Error('PDF 생성 실패 (빈 응답)');
      pdfBlobs.push(blob);
      await new Promise(function(r){ setTimeout(r, 500); }); // 요청 간격 (서버 부담 방지)
    }

    // 2) 병합 (브라우저에서는 pypdf 대신 pdf-lib 사용)
    MLL._showMarkingResult('success', '⏳ 페이지 병합 중...');
    var mergedBlob = await MLL._mergePdfBlobs(pdfBlobs);

    // 3) 다운로드
    var url = URL.createObjectURL(mergedBlob);
    var a = document.createElement('a');
    a.href = url;
    a.download = fileBase + '_마킹용지.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    MLL._showMarkingResult('success', '✅ 마킹용지 PDF 생성 완료! ('+rows.length+'게임, '+chunks.length+'페이지)');
  } catch(e) {
    MLL._showMarkingResult('error',
      '⚠️ PDF 생성 실패: ' + e.message +
      ' — 브라우저에서 외부 서버(makinglotto.com)로 직접 요청 시 CORS(보안 정책)로 막힐 수 있습니다. ' +
      '이 기능은 서버가 구축된 뒤 서버를 통해 호출해야 안정적으로 동작합니다.');
    console.error('[MLL marking] error:', e);
  }
};

// pdf-lib 동적 로드 + 병합
MLL._pdfLibLoaded = false;
MLL._loadPdfLib = function(){
  return new Promise(function(resolve, reject){
    if (MLL._pdfLibLoaded && window.PDFLib) { resolve(); return; }
    var script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    script.onload = function(){ MLL._pdfLibLoaded = true; resolve(); };
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

MLL._mergePdfBlobs = async function(blobs){
  await MLL._loadPdfLib();
  var merged = await PDFLib.PDFDocument.create();
  for (var i=0; i<blobs.length; i++) {
    var bytes = await blobs[i].arrayBuffer();
    var src = await PDFLib.PDFDocument.load(bytes);
    var pages = await merged.copyPages(src, src.getPageIndices());
    pages.forEach(function(p){ merged.addPage(p); });
  }
  var mergedBytes = await merged.save();
  return new Blob([mergedBytes], {type:'application/pdf'});
};
